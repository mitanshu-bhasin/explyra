<body class="track-page">

    <div class="track-container">
        <div class="vercel-card" style="padding: 2rem;">
            <div id="lookup-view">
                <div style="text-align: center; margin-bottom: 1.75rem;">
                    <div style="font-size: 2.5rem; color: var(--info); margin-bottom: 1rem;">
                        <i class="fa-solid fa-calendar-check"></i>
                    </div>
                    <h2 class="font-bold" style="font-size: 1.15rem; margin-bottom: 0.25rem;">Track Your Booking</h2>
                    <p style="color: var(--text-secondary); font-size: 0.85rem;">Enter your details to view meeting status.</p>
                </div>

                <form id="trackForm">
                    <div class="form-group">
                        <label class="form-label">Booking Code</label>
                        <input type="text" id="track-code" class="form-input" placeholder="BOOK-23847" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Your Email</label>
                        <input type="email" id="track-email" class="form-input" placeholder="you@example.com" required>
                    </div>
                    <button type="submit" class="btn-primary btn-full btn-lg">
                        View Status <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </form>
            </div>

            <!-- Booking Details View -->
            <div id="details-view" style="display: none;">
                <div style="text-align: center; margin-bottom: 1.5rem;">
                    <div id="statusIcon" style="font-size: 2.5rem; margin-bottom: 0.75rem; color: var(--info);">
                        <i class="fa-solid fa-calendar-check"></i>
                    </div>
                    <h2 class="font-bold" style="font-size: 1.15rem;" id="statusTitle">Scheduled</h2>
                </div>

                <div style="border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                    <div class="detail-row">
                        <span class="detail-label">Meeting With</span>
                        <span class="detail-value" id="res-owner">...</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Date & Time</span>
                        <span class="detail-value" id="res-time">...</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Booking Code</span>
                        <span class="detail-value" id="res-code">...</span>
                    </div>
                </div>

                <div id="linkContainer" class="meeting-link-box" style="display: none;">
                    <div style="font-size: 0.75rem; color: var(--info); font-weight: 700; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em;">
                        Meeting Link Ready
                    </div>
                    <a href="#" id="meetingLink" target="_blank" class="btn-primary btn-lg" style="text-decoration: none;">
                        Join Meeting <i class="fa-solid fa-video"></i>
                    </a>
                </div>

                <div id="noLinkMsg" style="text-align: center; color: var(--text-secondary); font-size: 0.85rem; margin-top: 1.5rem; font-style: italic;">
                    Meeting link will be visible here once added by the host.
                </div>

                <button class="btn-secondary btn-full btn-lg" style="margin-top: 1.5rem;" onclick="location.reload()">
                    Track Another
                </button>
            </div>
        </div>

        <!-- Theme toggle -->
        <div style="text-align: center; margin-top: 1.5rem;">
            <div class="theme-pill" style="display: inline-flex;">
                <button onclick="setTheme('light')" id="theme-light-btn" title="Light Mode">
                    <i class="fa-solid fa-sun"></i>
                </button>
                <button onclick="setTheme('dark')" id="theme-dark-btn" title="Dark Mode">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Theme Script -->
    <script>
        function setTheme(theme) {
            if (theme === 'dark') document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
            localStorage.setItem('explyra-theme', theme);
            updateThemePill();
        }
        function updateThemePill() {
            const theme = localStorage.getItem('explyra-theme') || 'light';
            document.getElementById('theme-light-btn')?.classList.toggle('active-theme', theme === 'light');
            document.getElementById('theme-dark-btn')?.classList.toggle('active-theme', theme === 'dark');
        }
        updateThemePill();
    </script>

    <!-- Tracking Logic (PRESERVED) -->
    <script type="module">
        import { getBookingByCode } from './booking.js';

        const form = document.getElementById('trackForm');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = form.querySelector('button');
            const code = document.getElementById('track-code').value.trim();
            const email = document.getElementById('track-email').value.trim();

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Searching...';

            try {
                const booking = await getBookingByCode(code, email);

                if (!booking) {
                    alert("No booking found with these details.");
                    btn.disabled = false;
                    btn.innerText = 'View Status';
                    return;
                }

                showDetails(booking);

            } catch (error) {
                console.error("Tracking error:", error);
                alert("Something went wrong. Please try again.");
                btn.disabled = false;
            }
        });

        function showDetails(b) {
            document.getElementById('lookup-view').style.display = 'none';
            document.getElementById('details-view').style.display = 'block';

            document.getElementById('res-owner').innerText = b.ownerName;
            document.getElementById('res-code').innerText = b.code;
            document.getElementById('res-time').innerText = new Date(b.scheduledAt).toLocaleString([], {
                dateStyle: 'full', timeStyle: 'short'
            });

            document.getElementById('statusTitle').innerText = b.status.charAt(0).toUpperCase() + b.status.slice(1);

            if (b.status === 'cancelled') {
                document.getElementById('statusIcon').style.color = 'var(--danger)';
                document.getElementById('statusIcon').innerHTML = '<i class="fa-solid fa-calendar-xmark"></i>';
            }

            if (b.meetingLink) {
                document.getElementById('linkContainer').style.display = 'block';
                document.getElementById('noLinkMsg').style.display = 'none';
                document.getElementById('meetingLink').href = b.meetingLink;
            } else {
                document.getElementById('linkContainer').style.display = 'none';
                document.getElementById('noLinkMsg').style.display = 'block';
            }
        }
    </script>
</body>
