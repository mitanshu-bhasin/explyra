    <style>
        .form-container {
            max-width: 800px;
            margin: 4rem auto;
            background: var(--surface);
            padding: 3rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }
        .form-group {
            margin-bottom: 2rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.875rem 1rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--background);
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .submit-btn {
            background: var(--primary);
            color: white;
            padding: 1rem 2rem;
            border-radius: var(--radius-md);
            border: none;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-size: 1.125rem;
            transition: background 0.2s;
        }
        .submit-btn:hover {
            background: var(--primary-hover);
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        @media (max-width: 640px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

<body>
    <header>
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg>

        </div>

    <main class="container">
        <div class="form-container">
            <h2 style="font-size: 2rem; margin-bottom: 1rem;">List Your Business</h2>
            <p style="color: var(--text-muted); margin-bottom: 3rem;">Fill out the form below to submit your business for review. Our team will verify the details before listing it.</p>
            
            <form id="listing-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Business Name</label>
                        <input type="text" name="name" required placeholder="Acme Inc">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select name="category" required>
                            <option value="">Select Category</option>
                            <option value="SaaS">SaaS</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Design">Design</option>
                            <option value="Lifestyle">Lifestyle</option>
                            <option value="Tech">Tech</option>
                        </select>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Logo URL</label>
                        <input type="url" name="logo" placeholder="https://example.com/logo.png">
                    </div>
                    <div class="form-group">
                        <label>Business Website</label>
                        <input type="url" name="website" placeholder="https://yourwebsite.com">
                    </div>
                </div>

                <div class="form-group">
                    <label>Short Description (150 chars max)</label>
                    <textarea name="description" rows="2" maxlength="150" required placeholder="A brief overview of what you do..."></textarea>
                </div>

                <div class="form-group">
                    <label>Long Description (for the listing page)</label>
                    <textarea name="longDescription" rows="4" placeholder="Detailed information about your services, history, and mission..."></textarea>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Contact Email</label>
                        <input type="email" name="email" required placeholder="contact@business.com">
                    </div>
                    <div class="form-group">
                        <label>Contact Phone</label>
                        <input type="tel" name="phone" placeholder="+1 (555) 000-0000">
                    </div>
                </div>

                <div class="form-group">
                    <label>Full Address</label>
                    <input type="text" name="address" placeholder="123 Business Way, Suite 100, City, State, ZIP">
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Opening Hours</label>
                        <input type="text" name="openingHours" placeholder="Mon-Fri: 9AM - 5PM">
                    </div>
                    <div class="form-group">
                        <label>Location (City, Country)</label>
                        <input type="text" name="location" placeholder="San Francisco, USA">
                    </div>
                </div>

                <div class="form-group">
                    <label>Social Links (comma separated URLs)</label>
                    <input type="text" name="sameAs" placeholder="https://twitter.com/acme, https://linkedin.com/company/acme">
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">Submit for Verification</button>
            </form>
        </div>
    </main>
