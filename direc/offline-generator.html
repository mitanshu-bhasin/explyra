<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline HTML Listing Generator | Explyra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .form-input { 
            width: 100%;
            border: 2px solid #9ca3af; /* gray-400 - much darker */
            background-color: #f9fafb; /* subtle light gray */
            padding: 0.75rem;
            border-radius: 0.75rem;
            outline: none;
            transition: all 0.2s;
            color: #111827; /* gray-900 */
        }
        .form-input:focus {
            border-color: #2563eb; /* blue-600 */
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.2);
        }
        label { 
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: #4b5563; /* gray-600 */
            text-transform: uppercase;
            margin-bottom: 0.25rem;
            margin-left: 0.25rem;
        }
    </style>

    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Organization",
      "@id": "https://explyra.me/#organization",
      "name": "Explyra",

        "https://instagram.com/explyra",
        "https://www.snapchat.com/add/explyra",
        "https://t.me/explyra",
        "https://facebook.com/people/explyra",
        "https://threads.net/@explyras",
        "https://whatsapp.com/channel/0029Vb7iW4Y5Ejxu8YxXQo2N",
        "https://explyra.blogspot.com",
        "https://g2.com/products/explyra",
        "https://capterra.com/p/explyra",
        "https://producthunt.com/products/explyra",
        "https://alternativeto.net/software/explyra",
        "https://betalist.com/startups/explyra",
        "https://lu.ma/explyra",
        "https://sites.google.com/view/explyra",
        "https://linktr.ee/explyra",
        "https://open.spotify.com/episode/2koPs0nutBjLEUIK5YQgMy?si=zibzsoF2Twey9dMkoJATWA"

    {

        "ratingValue": "4.9",

        },
        {

          "priceCurrency": "INR"
        }
      ],
      "featureList": [
        "Expense Management (from ₹149)",

  ]

</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-gray-900">Offline Generator 🚀</h1>
                <p class="text-gray-500">Create listing pages without internet/Firebase</p>
            </div>
            <div class="flex gap-2">
                <button onclick="resetForm()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-xl font-bold hover:bg-gray-300 transition">Reset</button>
                <div class="px-4 py-2 bg-green-100 text-green-700 rounded-full text-sm font-bold uppercase flex items-center gap-2">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div> Local Mode
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Input Form -->
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 space-y-6">
                <h3 class="text-xl font-bold flex items-center gap-2"><i class="fas fa-edit text-blue-500"></i> Business Details</h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label>Business Name</label>
                        <input type="text" id="name" class="form-input" placeholder="e.g. Coffee Hub" oninput="updateFilename()">
                    </div>
                    <div>
                        <label>Category</label>
                        <input type="text" id="category" class="form-input" placeholder="e.g. Cafe, Tech, Agency">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label>Email</label>
                        <input type="email" id="email" class="form-input" placeholder="contact@business.com">
                    </div>
                    <div>
                        <label>Phone</label>
                        <input type="text" id="phone" class="form-input" placeholder="+91 00000 00000">
                    </div>
                </div>

                <div>
                    <label>Website URL</label>
                    <input type="url" id="website" class="form-input" placeholder="https://business.com">
                </div>

                <div>
                    <label>Logo Image URL</label>
                    <input type="text" id="logo" class="form-input" placeholder="https://path-to-logo.png">
                </div>

                <div>
                    <label>Short Description</label>
                    <input type="text" id="description" class="form-input" placeholder="Brief tagline of your business">
                </div>

                <div>
                    <label>Full Services / Long Description</label>
                    <textarea id="longDescription" class="form-input h-32" placeholder="Detail your services, history, etc."></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label>Address / Location</label>
                        <input type="text" id="address" class="form-input" placeholder="Full address">
                    </div>
                    <div>
                        <label>Opening Hours</label>
                        <input type="text" id="openingHours" class="form-input" placeholder="Mo-Fr 09:00-17:00">
                    </div>
                </div>

                <div>
                    <label>Social Links (Comma separated)</label>
                    <input type="text" id="sameAs" class="form-input" placeholder="https://fb.com/page, https://ig.com/user">
                </div>

                <div class="pt-4">
                    <label>Custom Filename</label>
                    <input type="text" id="filename" class="form-input font-mono text-sm bg-gray-50" placeholder="direc-business.html">
                </div>

                <button onclick="generate()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-lg hover:bg-blue-700 transition shadow-xl shadow-blue-200 transform hover:-translate-y-1 active:scale-95">
                    <i class="fas fa-magic mr-2"></i> PREPARE HTML CODE
                </button>
            </div>

            <!-- Output Area -->
            <div class="flex flex-col gap-6">
                <!-- Preview Canvas (Optional Concept) -->
                <div class="bg-gray-900 p-6 rounded-[2.5rem] shadow-2xl border border-gray-800 flex flex-col h-full min-h-[600px]">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2">
                            <div class="flex gap-1.5">
                                <div class="w-3 h-3 bg-red-500 rounded-full"></div>
                                <div class="w-3 h-3 bg-yellow-500 rounded-full"></div>
                                <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                            </div>
                            <span class="text-gray-500 text-xs font-mono ml-2">generated_output.html</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="copyCode()" class="p-2 text-gray-400 hover:text-white transition" title="Copy"><i class="fas fa-copy"></i></button>
                            <button onclick="downloadCode()" class="p-2 text-gray-400 hover:text-green-400 transition" title="Download"><i class="fas fa-download"></i></button>
                        </div>
                    </div>
                    <textarea id="code-output" class="flex-grow bg-transparent text-blue-300 font-mono text-xs outline-none resize-none p-2 border border-gray-800 rounded-xl" readonly placeholder="Click 'Prepare HTML Code' to see the magic..."></textarea>
                    
                    <div class="mt-4 p-4 bg-blue-500/10 border border-blue-500/20 rounded-2xl">
                        <p class="text-[10px] text-blue-300 leading-relaxed font-mono">
                            <i class="fas fa-info-circle mr-1"></i> No internet needed. This tool works locally. Just fill the fields, copy the code, and save it as an .html file in your /listings folder.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Generator Script -->
    <script>
        function updateFilename() {
            const name = document.getElementById('name').value;
            const filenameInput = document.getElementById('filename');
            if (name) {
                const slug = name.toLowerCase().trim().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-');
                filenameInput.value = `direc-${slug}.html`;
            }
        }

        function generate() {
            const data = {
                name: document.getElementById('name').value || 'Business Name',
                category: document.getElementById('category').value || 'Category',
                email: document.getElementById('email').value || '',
                phone: document.getElementById('phone').value || '',
                website: document.getElementById('website').value || '',
                logo: document.getElementById('logo').value || 'https://direc.explyra.me/assets/default-logo.png',
                description: document.getElementById('description').value || 'No description provided.',
                longDescription: document.getElementById('longDescription').value || '',
                address: document.getElementById('address').value || '',
                openingHours: document.getElementById('openingHours').value || 'Mo-Fr 09:00-17:00',
                sameAs: document.getElementById('sameAs').value || ''
            };

            const filename = document.getElementById('filename').value || 'direc-business.html';
            const title = `${data.name} | Explyra Directories`;
            const desc = `${data.name} – Find services, contact details, business hours, website and more on Explyra Directories.`;
            const keys = `${data.name}, ${data.category}, services, explyra directory`;
            const url = `https://direc.explyra.me/listings/${filename}`;

            const schema = {
                "@context": "https://schema.org",
                "@type": "LocalBusiness",
                "name": data.name,
                "image": data.logo,
                "description": data.longDescription || data.description,
                "address": {
                    "@type": "PostalAddress",
                    "streetAddress": data.address,
                    "addressLocality": data.address ? data.address.split(',')[0] : ""
                },
                "telephone": data.phone,
                "url": data.website,
                "openingHours": data.openingHours
            };
            if (data.sameAs) schema.sameAs = data.sameAs.split(',').map(u => u.trim());

            const htmlContent = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${title}</title>
    <meta name="description" content="${desc}">
    <meta name="keywords" content="${keys}">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="${url}">
    <meta property="og:title" content="${title}">
    <meta property="og:description" content="${desc}">
    <meta property="og:image" content="${data.logo}">
    <meta property="og:url" content="${url}">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="${title}">
    <meta name="twitter:description" content="${desc}">
    <meta name="twitter:image" content="${data.logo}">
    <script type="application/ld+json">
${JSON.stringify(schema, null, 2)}
    <\/script>
    <script src="https://cdn.tailwindcss.com"><\/script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f9fafb; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <header class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="../index.html" class="text-xl font-bold flex items-center gap-2 text-blue-600">
                <i class="fas fa-th"></i> Explyra Directories
            </a>
            <div class="flex items-center gap-6">
                <a href="../index.html" class="text-sm font-medium text-gray-600 hover:text-blue-600">Browse</a>
                <a href="../submit.html" class="bg-blue-600 text-white px-5 py-2 rounded-xl font-bold text-sm shadow-lg shadow-blue-200">Add Business</a>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-6 py-12">
        <article class="max-w-5xl mx-auto space-y-12">
            <header class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-gray-100 flex flex-col md:flex-row items-center gap-10">
                <div class="w-40 h-40 bg-gray-50 rounded-3xl flex-shrink-0 flex items-center justify-center p-6 border border-gray-100">
                    <img src="${data.logo}" alt="${data.name} Logo" class="max-w-full max-h-full rounded-xl object-contain">
                </div>
                <div class="flex-1 text-center md:text-left">
                    <div class="inline-block px-4 py-1.5 bg-blue-50 text-blue-700 rounded-full text-xs font-bold uppercase mb-4">
                        ${data.category} • Verified
                    </div>
                    <h1 class="text-5xl font-black text-gray-900 mb-4">${data.name}</h1>
                    <p class="text-xl text-gray-600">${data.description}</p>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                <div class="lg:col-span-2 space-y-12">
                    <section class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-gray-100">
                        <h2 class="text-2xl font-bold mb-6">Our Services & Description</h2>
                        <div class="prose prose-blue text-gray-600 leading-relaxed text-lg">
                            ${(data.longDescription || data.description).replace(/\n/g, '<br>')}
                        </div>
                    </section>

                    <section class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-gray-100">
                        <h2 class="text-2xl font-bold mb-6">Contact Details</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="p-6 bg-gray-50 rounded-2xl">
                                <h3 class="text-xs font-bold text-gray-400 uppercase mb-4">Location</h3>
                                <p class="text-gray-900 font-medium">${data.address || 'N/A'}</p>
                            </div>
                            <div class="p-6 bg-gray-50 rounded-2xl space-y-4">
                                <h3 class="text-xs font-bold text-gray-400 uppercase mb-4">Channels</h3>
                                <p class="flex items-center gap-3"><i class="fas fa-phone text-blue-500"></i> ${data.phone || 'N/A'}</p>
                                <p class="flex items-center gap-3"><i class="fas fa-envelope text-blue-500"></i> ${data.email || 'N/A'}</p>
                            </div>
                        </div>
                    </section>
                </div>

                <aside class="space-y-12">
                    <section class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-100">
                        <h2 class="text-xl font-bold mb-6">Quick Links</h2>
                        <div class="space-y-4">
                            ${data.website ? `<a href="${data.website}" target="_blank" class="flex items-center justify-center gap-3 py-4 bg-blue-600 text-white rounded-2xl font-bold text-lg hover:bg-blue-700">Visit Website</a>` : ''}
                            <div class="pt-4">
                                <p class="text-sm font-bold mb-3">Social Media</p>
                                <div class="flex gap-2">
                                    ${data.sameAs ? data.sameAs.split(',').map(s => `<a href="${s.trim()}" class="w-12 h-12 flex items-center justify-center bg-gray-100 rounded-xl hover:bg-blue-50 text-gray-600 hover:text-blue-600 transition"><i class="fas fa-link"></i></a>`).join('') : '<span class="text-gray-400 text-sm">None listed</span>'}
                                </div>
                            </div>
                        </div>
                    </section>
                </aside>
            </div>
        </article>
    </main>

    <footer class="bg-white border-t py-12 mt-12 text-center text-gray-500 text-sm">
        <p>&copy; 2026 Explyra Directories. All rights reserved.</p>
    </footer>
</body>
</html>`;
            document.getElementById('code-output').value = htmlContent;
        }

        function copyCode() {
            const output = document.getElementById('code-output');
            output.select();
            document.execCommand('copy');
            alert('Code copied to clipboard!');
        }

        function downloadCode() {
            const code = document.getElementById('code-output').value;
            const filename = document.getElementById('filename').value || 'listing.html';
            if (!code) return alert('Generate code first!');
            const blob = new Blob([code], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
        }

        function resetForm() {
            if(confirm('Clear all fields?')) {
                const inputs = document.querySelectorAll('input, textarea');
                inputs.forEach(i => i.value = '');
                document.getElementById('code-output').value = '';
            }
        }
    </script>
</body>
</html>
