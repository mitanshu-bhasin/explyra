<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Explyra Search</title>
    <meta name="description" content="Discover the web with Explyra Search." />

    <!-- Preload Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap"
        rel="stylesheet" />

    <style>
        /* ═══════════════════════════════════════════
           DESIGN TOKENS (From Explyra Theme)
        ═══════════════════════════════════════════ */
        :root {
            --bg: #F8F7F4;
            --surf: #FFFFFF;
            --bdr: #E4E1DB;
            --ink: #0D1117;
            --ink2: #2A3141;
            --ink3: #586070;
            --blue: #1546C0;
            --blue-g: rgba(21, 70, 192, 0.08);
            --blue-hover: #0f348f;
            --r: 8px;
            --r-lg: 24px;
            --t: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            --shadow: 0 4px 16px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04);
            --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        [data-theme="dark"] {
            --bg: #080B14;
            --surf: #141928;
            --bdr: rgba(255, 255, 255, 0.1);
            --ink: #EEF0F8;
            --ink2: #C4CCDC;
            --ink3: #8290A8;
            --blue: #5B8AF5;
            --blue-g: rgba(91, 138, 245, 0.15);
            --blue-hover: #7ba2ff;
            --shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.6);
        }

        /* ═══════════════════════════════════════════
           RESET & BASE
        ═══════════════════════════════════════════ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Outfit', sans-serif;
            font-weight: 400;
            line-height: 1.6;
            transition: background 0.4s, color 0.4s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-y: scroll;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
        }

        /* ═══════════════════════════════════════════
           LAYOUT CONTROLS
        ═══════════════════════════════════════════ */
        #app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Mode: Home */
        #app.home-mode #header {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
            padding: 2rem;
            transition: all 0.5s ease;
        }

        #app.home-mode .logo-container {
            margin-bottom: 2rem;
            transform: scale(1.4);
            transition: transform 0.5s ease;
        }

        #app.home-mode .search-container {
            width: 100%;
            max-width: 600px;
        }

        #app.home-mode #main-content {
            display: none;
        }

        /* Mode: Results */
        #app.results-mode #header {
            flex-direction: row;
            align-items: center;
            padding: 1rem 2rem;
            min-height: auto;
            border-bottom: 1px solid var(--bdr);
            background: rgba(248, 247, 244, 0.85);
            /* Slightly transparent for glassmorphism */
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: all 0.5s ease;
        }

        [data-theme="dark"] #app.results-mode #header {
            background: rgba(8, 11, 20, 0.85);
        }

        #app.results-mode .logo-container {
            margin-bottom: 0;
            margin-right: 2rem;
            transform: scale(1);
            transition: transform 0.5s ease;
        }

        #app.results-mode .search-container {
            max-width: 700px;
            width: 100%;
            flex-grow: 1;
        }

        #app.results-mode #main-content {
            display: block;
            flex-grow: 1;
            padding: 2rem;
            max-width: 800px;
            margin-left: 120px;
            /* Offset for Google-like alignment */
            animation: fadeIn 0.5s ease;
        }

        @media (max-width: 768px) {
            #app.results-mode #header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            #app.results-mode .logo-container {
                margin-right: 0;
            }

            #app.results-mode #main-content {
                margin-left: 0;
                padding: 1rem;
            }
        }

        /* ═══════════════════════════════════════════
           COMPONENTS
        ═══════════════════════════════════════════ */

        /* Logo */
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--ink);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: #fff;
            stroke-width: 2.2;
            stroke-linecap: round;
        }

        /* Search Bar (Glassmorphism + clean tech) */
        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            background: var(--surf);
            border: 1px solid var(--bdr);
            border-radius: 30px;
            padding: 0.2rem 1rem;
            box-shadow: var(--shadow);
            transition: var(--t);
            z-index: 10;
        }

        .search-wrapper:hover,
        .search-wrapper.active {
            box-shadow: var(--shadow-hover);
            border-color: var(--blue);
        }

        .search-icon {
            color: var(--ink3);
            margin-right: 0.5rem;
        }

        .search-input {
            flex-grow: 1;
            border: none;
            background: none;
            padding: 0.8rem 0;
            font-size: 1.1rem;
            color: var(--ink);
            outline: none;
            font-family: inherit;
        }

        .search-input::placeholder {
            color: var(--ink4);
        }

        .search-btn {
            background: var(--blue-g);
            color: var(--blue);
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            font-weight: 500;
            transition: var(--t);
            margin-left: 0.5rem;
        }

        .search-btn:hover {
            background: var(--blue);
            color: #fff;
        }

        /* Dropdown Suggestions */
        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--surf);
            border: 1px solid var(--bdr);
            border-radius: 16px;
            margin-top: 0.5rem;
            box-shadow: var(--shadow-hover);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 50;
        }

        .search-wrapper.active .suggestions {
            display: flex;
        }

        .suggestion-item {
            padding: 0.8rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            transition: background 0.2s;
            color: var(--ink2);
        }

        .suggestion-item:hover,
        .suggestion-item.selected {
            background: var(--bg);
            color: var(--ink);
        }

        /* Controls (Theme toggle) */
        .top-controls {
            position: absolute;
            top: 2rem;
            right: 2rem;
        }

        #app.results-mode .top-controls {
            position: static;
            margin-left: auto;
        }

        .theme-toggle-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--surf);
            border: 1px solid var(--bdr);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ink);
            box-shadow: var(--shadow);
            transition: var(--t);
        }

        .theme-toggle-btn:hover {
            border-color: var(--blue);
            color: var(--blue);
        }

        /* Results Area */
        .meta-stats {
            font-size: 0.85rem;
            color: var(--ink3);
            margin-bottom: 1.5rem;
        }

        .result-item {
            margin-bottom: 2rem;
            max-width: 650px;
        }

        .result-url {
            font-size: 0.85rem;
            color: var(--ink3);
            margin-bottom: 0.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .result-url img {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        .result-title {
            font-size: 1.3rem;
            color: var(--blue);
            font-weight: 500;
            margin-bottom: 0.3rem;
            display: inline-block;
            text-decoration: none;
        }

        .result-title:hover {
            text-decoration: underline;
        }

        [data-theme="dark"] .result-title {
            color: var(--blue2);
        }

        .result-snippet {
            font-size: 0.95rem;
            color: var(--ink2);
            line-height: 1.6;
        }

        .result-snippet b {
            color: var(--ink);
            font-weight: 600;
        }

        /* Pagination */
        .pagination {
            display: flex;
            gap: 0.5rem;
            margin-top: 3rem;
            margin-bottom: 4rem;
            align-items: center;
        }

        .page-btn {
            padding: 0.5rem 1rem;
            border-radius: var(--r);
            background: var(--surf);
            border: 1px solid var(--bdr);
            color: var(--ink2);
            font-weight: 500;
            transition: var(--t);
        }

        .page-btn:hover:not(:disabled) {
            border-color: var(--blue);
            color: var(--blue);
            background: var(--blue-g);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-num {
            padding: 0.5rem 0.8rem;
            border-radius: var(--r);
            cursor: pointer;
            transition: var(--t);
        }

        .page-num.active {
            background: var(--blue);
            color: white;
            font-weight: 600;
        }

        .page-num:hover:not(.active) {
            background: var(--bg);
        }

        /* States Loader / Error */
        .loader {
            display: none;
            width: 40px;
            height: 40px;
            border: 3px solid var(--bdr);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 3rem auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-msg {
            color: #E11D48;
            background: rgba(225, 29, 72, 0.1);
            padding: 1rem;
            border-radius: var(--r);
            border: 1px solid rgba(225, 29, 72, 0.2);
            margin-bottom: 2rem;
            display: none;
        }

        /* Footer */
        footer {
            margin-top: auto;
            text-align: center;
            padding: 1.5rem;
            font-size: 0.85rem;
            color: var(--ink3);
            border-top: 1px solid var(--bdr);
        }
    </style>
</head>

<body>

    <div id="app" class="home-mode">

        <!-- Top Controls (Theme) -->
        <div class="top-controls">
            <button class="theme-toggle-btn" id="theme-toggle" aria-label="Toggle Theme">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </button>
        </div>

        <!-- Header Section -->
        <header id="header">
            <div class="logo-container" id="logo-btn">
                <div class="logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                        </svg>
                    </div>
                    <span>Explyra</span>
                </div>
            </div>

            <div class="search-container">
                <div class="search-wrapper" id="search-wrapper">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="search-input" class="search-input" placeholder="Search Explyra..."
                        autocomplete="off" spellcheck="false" />
                    <button class="search-btn" id="search-btn">Explyra Search</button>

                    <!-- Suggestions Dropdown Mock -->
                    <div class="suggestions" id="suggestions-box">
                        <div class="suggestion-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg> explyra developer utilities</div>
                        <div class="suggestion-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg> recent search example</div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Results Content -->
        <main id="main-content">
            <div id="error-container" class="error-msg"></div>
            <div id="loader" class="loader"></div>

            <div id="results-meta" class="meta-stats"></div>
            <div id="results-container"></div>

            <div id="pagination" class="pagination" style="display: none;">
                <button class="page-btn" id="prev-btn">Previous</button>
                <div id="page-numbers" style="display:flex; gap: 0.3rem;"></div>
                <button class="page-btn" id="next-btn">Next</button>
            </div>
        </main>

        <!-- Footer -->
        <footer>
            &copy; <span id="year"></span> Explyra. All rights reserved. Built for developers.
        </footer>
    </div>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        /* ═══════════════════════════════════════════
           STATE AND CONFIGURATION
        ═══════════════════════════════════════════ */
        const CONFIG = {
            // REPLACE THESE WITH REAL GOOGLE CUSTOM SEARCH CREDENTIALS
            API_KEY: 'AIzaSyAKXkuH1zbUwOD1gA35gG4vQXKTX60xwe0',
            CX_ID: 'c57fb5273f98f49c1',
            RESULTS_PER_PAGE: 10
        };

        const state = {
            query: '',
            startIndex: 1,
            totalResults: 0,
            isLoading: false
        };

        /* ═══════════════════════════════════════════
           DOM ELEMENTS
        ═══════════════════════════════════════════ */
        const app = document.getElementById('app');
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const searchWrapper = document.getElementById('search-wrapper');
        const suggestionsBox = document.getElementById('suggestions-box');
        const logoBtn = document.getElementById('logo-btn');

        const resultsContainer = document.getElementById('results-container');
        const resultsMeta = document.getElementById('results-meta');
        const loader = document.getElementById('loader');
        const errorContainer = document.getElementById('error-container');
        const pagination = document.getElementById('pagination');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const pageNumbers = document.getElementById('page-numbers');

        const themeToggleBtn = document.getElementById('theme-toggle');

        /* ═══════════════════════════════════════════
           THEME MANAGEMENT
        ═══════════════════════════════════════════ */
        function initTheme() {
            const storedTheme = localStorage.getItem('explyra-theme') || 'light';
            document.documentElement.setAttribute('data-theme', storedTheme);
            updateThemeIcon(storedTheme);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('explyra-theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            if (theme === 'dark') {
                themeToggleBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>';
            } else {
                themeToggleBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>';
            }
        }

        themeToggleBtn.addEventListener('click', toggleTheme);
        initTheme();

        /* ═══════════════════════════════════════════
           EVENT LISTENERS (Search interactions)
        ═══════════════════════════════════════════ */

        // Auto-focus logic
        searchInput.addEventListener('focus', () => {
            if (searchInput.value.trim().length > 0) {
                searchWrapper.classList.add('active');
            }
        });

        searchInput.addEventListener('blur', () => {
            // Small timeout to allow clicking on suggestions
            setTimeout(() => searchWrapper.classList.remove('active'), 200);
        });

        searchInput.addEventListener('input', (e) => {
            if (e.target.value.trim().length > 0) {
                searchWrapper.classList.add('active');
            } else {
                searchWrapper.classList.remove('active');
            }
        });

        searchInput.addEventListener('keydown', (e) => {
            // Handle suggestions navigation with up/down arrows
            const items = document.querySelectorAll('.suggestion-item');
            let selectedIndex = Array.from(items).findIndex(el => el.classList.contains('selected'));

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (selectedIndex < items.length - 1) {
                    if (selectedIndex >= 0) items[selectedIndex].classList.remove('selected');
                    items[selectedIndex + 1].classList.add('selected');
                    searchInput.value = items[selectedIndex + 1].textContent.trim();
                }
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (selectedIndex > 0) {
                    items[selectedIndex].classList.remove('selected');
                    items[selectedIndex - 1].classList.add('selected');
                    searchInput.value = items[selectedIndex - 1].textContent.trim();
                }
            } else if (e.key === 'Enter') {
                triggerSearch(searchInput.value);
                searchWrapper.classList.remove('active');
            }
        });

        searchBtn.addEventListener('click', () => {
            triggerSearch(searchInput.value);
        });

        logoBtn.addEventListener('click', () => {
            resetToHome();
        });

        // Pagination listeners
        prevBtn.addEventListener('click', () => {
            if (state.startIndex > 1) {
                state.startIndex = Math.max(1, state.startIndex - CONFIG.RESULTS_PER_PAGE);
                executeSearch();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });

        nextBtn.addEventListener('click', () => {
            state.startIndex += CONFIG.RESULTS_PER_PAGE;
            executeSearch();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        /* ═══════════════════════════════════════════
           SEARCH LOGIC
        ═══════════════════════════════════════════ */

        function triggerSearch(query) {
            query = query.trim();
            if (!query) return;

            state.query = query;
            state.startIndex = 1;

            // Switch layout to results mode
            app.classList.remove('home-mode');
            app.classList.add('results-mode');

            executeSearch();
        }

        function resetToHome() {
            app.classList.remove('results-mode');
            app.classList.add('home-mode');
            searchInput.value = '';
            resultsContainer.innerHTML = '';
            resultsMeta.innerHTML = '';
            pagination.style.display = 'none';
            errorContainer.style.display = 'none';
        }

        async function executeSearch() {
            if (!state.query) return;

            // UI Reset
            resultsContainer.innerHTML = '';
            resultsMeta.innerHTML = '';
            pagination.style.display = 'none';
            errorContainer.style.display = 'none';
            loader.style.display = 'block';
            state.isLoading = true;

            try {
                const url = `https://www.googleapis.com/customsearch/v1?key=${CONFIG.API_KEY}&cx=${CONFIG.CX_ID}&q=${encodeURIComponent(state.query)}&start=${state.startIndex}`;

                const response = await fetch(url);
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || 'Failed to fetch search results.');
                }

                const data = await response.json();
                renderResults(data);

            } catch (error) {
                console.error('Search error:', error);
                showError(error.message);
            } finally {
                loader.style.display = 'none';
                state.isLoading = false;
            }
        }

        function renderResults(data) {
            // Meta stats
            const searchTime = data.searchInformation?.formattedSearchTime || '0.00';
            const totalNum = data.searchInformation?.formattedTotalResults || '0';
            resultsMeta.innerHTML = `About ${totalNum} results (${searchTime} seconds)`;

            state.totalResults = parseInt(data.searchInformation?.totalResults || '0');

            // Results
            if (data.items && data.items.length > 0) {
                resultsContainer.innerHTML = data.items.map(item => createResultItemHTML(item)).join('');
                setupPagination();
            } else {
                resultsContainer.innerHTML = `<p style="color: var(--ink2); font-size: 1.1rem; margin-top: 2rem;">No documents match your search for <b>${state.query}</b>.</p>`;
                pagination.style.display = 'none';
            }
        }

        function createResultItemHTML(item) {
            // Highlight keywords in snippet
            let snippet = item.htmlSnippet || item.snippet || '';
            if (!item.htmlSnippet) {
                // Basic highlighter if htmlSnippet isn't available
                const qRegex = new RegExp(`(${state.query.split(' ').join('|')})`, 'gi');
                snippet = snippet.replace(qRegex, '<b>$1</b>');
            }

            // Get favicon domain for display
            const domain = new URL(item.link).hostname;
            const faviconUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;

            const displayLink = item.displayLink || domain;

            return `
            <div class="result-item">
                <div class="result-url">
                    <img src="${faviconUrl}" alt="" loading="lazy"/> 
                    <span>${displayLink}</span>
                </div>
                <a href="${item.link}" target="_blank" rel="noopener" class="result-title">
                    ${item.htmlTitle || item.title}
                </a>
                <div class="result-snippet">
                    ${snippet}
                </div>
            </div>
        `;
        }

        function setupPagination() {
            if (state.totalResults <= CONFIG.RESULTS_PER_PAGE) {
                pagination.style.display = 'none';
                return;
            }

            pagination.style.display = 'flex';
            prevBtn.disabled = state.startIndex <= 1;

            // Google Custom Search API only supports up to 100 pages (start index 100)
            const maxStart = 100;
            nextBtn.disabled = state.startIndex + CONFIG.RESULTS_PER_PAGE > state.totalResults || state.startIndex >= maxStart;

            // Render page numbers (simplified standard google pagination)
            const currentPage = Math.floor((state.startIndex - 1) / CONFIG.RESULTS_PER_PAGE) + 1;

            let html = '';
            // Show up to 5 page numbers around the current page
            const startPage = Math.max(1, currentPage - 5);
            const endPage = Math.min(Math.ceil(Math.min(state.totalResults, 100) / CONFIG.RESULTS_PER_PAGE), startPage + 9);

            for (let i = startPage; i <= endPage; i++) {
                if (i === currentPage) {
                    html += `<div class="page-num active">${i}</div>`;
                } else {
                    html += `<div class="page-num" onclick="goToPage(${i})">${i}</div>`;
                }
            }
            pageNumbers.innerHTML = html;
        }

        window.goToPage = function (pageNum) {
            state.startIndex = ((pageNum - 1) * CONFIG.RESULTS_PER_PAGE) + 1;
            executeSearch();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function showError(message) {
            errorContainer.textContent = `Error: ${message}. 
        Please ensure you have configured a valid Google Custom Search API Key and Search Engine ID (CX) in the code.`;
            errorContainer.style.display = 'block';
        }

        /* ═══════════════════════════════════════════
           MOCK RESULTS (For Demonstration purposes)
        ═══════════════════════════════════════════ */
        function renderMockResults(query) {
            const mockData = {
                searchInformation: {
                    formattedSearchTime: "0.42",
                    formattedTotalResults: "1,420,000",
                    totalResults: "1420000"
                },
                items: Array(10).fill().map((_, i) => ({
                    title: `${query.charAt(0).toUpperCase() + query.slice(1)} - Example Result ${state.startIndex + i}`,
                    link: `https://example.com/result/${state.startIndex + i}`,
                    displayLink: 'example.com',
                    snippet: `Provides comprehensive documentation, tools, and resources related to <b>${query}</b>. Designed by Explyra to help developers build better applications faster...`
                }))
            };
            renderResults(mockData);
        }
    </script>
