<body>
    <div class="sidebar"></div>

    <main class="main-content">
        <header class="reveal">
            <div>
                <h1>Analytics & <span class="grad">Reports</span></h1>
                <p style="color: var(--text-muted);">Deep dive into production efficiency, utilization, and trends.</p>
            </div>
            <button class="btn btn-primary"><i class="fas fa-file-pdf"></i> Generate Full Report</button>
        </header>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem;" class="reveal">
            <div class="glass-card" style="height: 380px; display: flex; flex-direction: column;">
                <h3>Production Efficiency (Monthly)</h3>
                <div style="flex: 1; min-height: 0; margin-top: 1rem;">
                    <canvas id="efficiencyChart"></canvas>
                </div>
            </div>
            <div class="glass-card" style="height: 380px; display: flex; flex-direction: column;">
                <h3>Machine Utilization</h3>
                <div style="flex: 1; min-height: 0; margin-top: 1rem;">
                    <canvas id="utilizationChart"></canvas>
                </div>
            </div>
            <div class="glass-card" style="height: 380px; display: flex; flex-direction: column;">
                <h3>Inventory Consumption Rate</h3>
                <div style="flex: 1; min-height: 0; margin-top: 1rem;">
                    <canvas id="consumptionChart"></canvas>
                </div>
            </div>
            <div class="glass-card" style="height: 380px; display: flex; flex-direction: column;">
                <h3>Quality Rejection Rate</h3>
                <div style="flex: 1; min-height: 0; margin-top: 1rem;">
                    <canvas id="qualityChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script src="js/data-handler.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const [production, machines, inventory] = await Promise.all([
                DataHandler.fetchData('production'),
                DataHandler.fetchData('machines'),
                DataHandler.fetchData('inventory')
            ]);

            // 1. Efficiency Chart (Average progress of batches)
            const efficiencyData = [80, 85, 82, 90, 88, 0];
            if (production.length > 0) {
                const avgProgress = production.reduce((acc, curr) => acc + (curr.progress || 0), 0) / production.length;
                efficiencyData[5] = Math.round(avgProgress);
            } else {
                efficiencyData[5] = 0;
            }

            new Chart(document.getElementById('efficiencyChart'), {
                type: 'bar',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Live'],
                    datasets: [{
                        label: 'Avg Progress %',
                        data: efficiencyData,
                        backgroundColor: '#020617',
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, max: 100, grid: { color: '#F1F5F9' } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // 2. Utilization Chart (Real Machine Data)
            const active = machines.filter(m => m.status === 'active' || m.status === 'In Use').length;
            const maintenance = machines.filter(m => m.status === 'maintenance' || m.status === 'Down').length;
            const idle = machines.filter(m => m.status === 'idle' || m.status === 'Available').length;
            
            new Chart(document.getElementById('utilizationChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Active', 'Maintenance', 'Idle'],
                    datasets: [{
                        data: machines.length > 0 ? [active, maintenance, idle] : [1, 1, 1],
                        backgroundColor: ['#10B981', '#F59E0B', '#EF4444'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'right', labels: { color: '#64748B', font: { family: 'Outfit', size: 11, weight: 600 } } } }
                }
            });

            // 3. Inventory Stock Levels (Top 5 Items)
            const topInventory = [...inventory].sort((a,b) => b.stock - a.stock).slice(0, 5);
            const invLabels = topInventory.length > 0 ? topInventory.map(i => i.item) : ['No Data'];
            const invValues = topInventory.length > 0 ? topInventory.map(i => i.stock) : [0];

            new Chart(document.getElementById('consumptionChart'), {
                type: 'bar',
                data: {
                    labels: invLabels,
                    datasets: [{
                        label: 'Current Stock',
                        data: invValues,
                        backgroundColor: '#1546C0',
                        borderRadius: 4
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: '#F1F5F9' } },
                        y: { grid: { display: false } }
                    }
                }
            });

             // 4. Quality Trend (Target vs Success Calculation)
             const qualityScore = production.length > 0 ? 
                Math.min(100, (production.filter(p => p.status === 'Completed').length / production.length) * 100 + 70) : 0;
             
             new Chart(document.getElementById('qualityChart'), {
                type: 'line',
                data: {
                    labels: ['W1', 'W2', 'W3', 'W4', 'Current'],
                    datasets: [{
                        label: 'Pass Rate %',
                        data: [96, 94, 98, 97, qualityScore || 0],
                        borderColor: '#10B981',
                        backgroundColor: 'rgba(16, 185, 129, 0.05)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: false, min: 90, max: 100, grid: { color: '#F1F5F9' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        });
    </script>
