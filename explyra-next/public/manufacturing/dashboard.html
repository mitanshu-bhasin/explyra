<body>
    <div class="sidebar"></div>

    <main class="main-content">
        <header class="reveal">
            <div>
                <h1>Manufacturing <span class="grad">Dashboard</span></h1>
                <p style="color: var(--text-muted);">Real-time production metrics and analytics.</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn"><i class="fas fa-download"></i> Export Data</button>
                <button class="btn btn-primary" onclick="window.location.href='production.html'"><i class="fas fa-plus"></i> New Batch</button>
            </div>
        </header>

        <section class="stat-grid reveal">
            <div class="glass-card">
                <div class="stat-label">Production Today</div>
                <div class="stat-value" id="stat-production">0 <span style="font-size: 0.9rem; color: var(--success);"><i class="fas fa-arrow-up"></i> --%</span></div>
            </div>
            <div class="glass-card">
                <div class="stat-label">Active Machines</div>
                <div class="stat-value" id="stat-machines">0 / 0</div>
            </div>
            <div class="glass-card">
                <div class="stat-label">Pending Orders</div>
                <div class="stat-value" id="stat-orders">0</div>
            </div>
            <div class="glass-card">
                <div class="stat-label">Efficiency</div>
                <div class="stat-value" id="stat-efficiency">0%</div>
            </div>
        </section>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem;" class="reveal">
            <div class="glass-card">
                <h3>Production Trends</h3>
                <div style="position: relative; height: 300px; width: 100%; margin-top: 1rem;">
                    <canvas id="productionChart"></canvas>
                </div>
            </div>
            <div class="glass-card">
                <h3>Inventory Status</h3>
                <div style="position: relative; height: 300px; width: 100%; margin-top: 1rem;">
                    <canvas id="inventoryChart"></canvas>
                </div>
            </div>
        </div>

        <section class="glass-card reveal" style="margin-top: 1.5rem;">
            <h3>Ongoing Production Batches</h3>
            <div class="table-container">
                <table id="productionTable">
                    <thead>
                        <tr>
                            <th>Batch ID</th>
                            <th>Product</th>
                            <th>Machine</th>
                            <th>Progress</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Dynamic content -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/data-handler.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const [production, stats, chartData, invChartData] = await Promise.all([
                DataHandler.fetchData('production'),
                DataHandler.getDashboardStats(),
                DataHandler.getProductionChartData(),
                DataHandler.getInventoryChartData()
            ]);
            
            // Populate Stats
            document.getElementById('stat-production').childNodes[0].textContent = stats.productionToday + ' ';
            document.getElementById('stat-machines').textContent = stats.activeMachines;
            document.getElementById('stat-orders').textContent = stats.pendingOrders;
            document.getElementById('stat-efficiency').textContent = stats.efficiency;

            // Render Table
            const tableBody = document.querySelector('#productionTable tbody');
            tableBody.innerHTML = production.map(item => `
                <tr>
                    <td><strong>${item.id}</strong></td>
                    <td>${item.product}</td>
                    <td>${item.machine}</td>
                    <td>
                        <div style="width: 100px; height: 6px; background: var(--bg4); border-radius: 10px;">
                            <div style="width: ${item.progress}%; height: 100%; background: var(--accent); border-radius: 10px;"></div>
                        </div>
                    </td>
                    <td><span class="badge ${item.progress === 100 ? 'badge-active' : 'badge-idle'}">${item.status}</span></td>
                </tr>
            `).join('');

            // Render Trends Chart
            new Chart(document.getElementById('productionChart'), {
                type: 'line',
                data: {
                    labels: chartData.labels,
                    datasets: [{
                        label: 'Production Output',
                        data: chartData.data,
                        borderColor: '#1546C0',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(21, 70, 192, 0.05)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#F1F5F9' } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // Render Inventory Chart
            new Chart(document.getElementById('inventoryChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Available', 'Reserverd', 'Low Stock'],
                    datasets: [{
                        data: invChartData,
                        backgroundColor: ['#10B981', '#1546C0', '#EF4444'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { color: '#64748B', font: { family: 'Outfit' } } } }
                }
            });
        });
    </script>
