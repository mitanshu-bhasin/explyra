<body>
    <div class="sidebar"></div>

    <main class="main-content">
        <header class="reveal">
            <div>
                <h1>Order <span class="grad">Management</span></h1>
                <p style="color: var(--text-muted);">Track manufacturing orders from initiation to delivery.</p>
            </div>
            <button class="btn btn-primary" onclick="showActionModal('orders')"><i class="fas fa-plus"></i> New Order</button>
        </header>

        <section class="stat-grid reveal">
            <div class="glass-card">
                <div class="stat-label">Active Orders</div>
                <div class="stat-value" id="activeOrders">0</div>
            </div>
            <div class="glass-card">
                <div class="stat-label">Pending Fulfilment</div>
                <div class="stat-value" id="pendingFulfilment">0</div>
            </div>
            <div class="glass-card">
                <div class="stat-label">Revenue Impact (Est.)</div>
                <div class="stat-value" style="color: var(--success);" id="revenueImpact">$0</div>
            </div>
        </section>

        <section class="glass-card reveal">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h3>Manufacturing Orders</h3>
                <div style="display: flex; gap: 10px;">
                    <input type="text" placeholder="Search orders..." class="btn" style="padding: 0.5rem 1rem; width: 250px; text-align: left;">
                </div>
            </div>
            <div class="table-container">
                <table id="ordersTable">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Product</th>
                            <th>Quantity</th>
                            <th>Due Date</th>
                            <th>Batch ID</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Dynamic content -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/data-handler.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const data = await DataHandler.fetchData('orders');
            
            document.getElementById('activeOrders').textContent = data.filter(d => d.status === 'Active').length;
            document.getElementById('pendingFulfilment').textContent = data.filter(d => d.status === 'Pending').length;
            
            const totalUnits = data.reduce((acc, curr) => acc + curr.quantity, 0);
            document.getElementById('revenueImpact').textContent = DataHandler.formatCurrency(totalUnits * 50);

            const tableBody = document.querySelector('#ordersTable tbody');
            tableBody.innerHTML = data.map(item => `
                <tr>
                    <td><strong>${item.id}</strong></td>
                    <td>${item.product}</td>
                    <td>${item.quantity} units</td>
                    <td>${item.dueDate}</td>
                    <td><span style="font-family: monospace; color: var(--accent);">${item.batchId}</span></td>
                    <td><span class="badge ${item.status === 'Active' ? 'badge-active' : (item.status === 'Pending' ? 'badge-idle' : 'badge-maintenance')}">${item.status}</span></td>
                    <td>
                        <button class="btn" style="padding: 5px 10px;" onclick="window.showToast('Order details feature coming soon!', 'info')"><i class="fas fa-eye"></i></button>
                        <button class="btn" style="padding: 5px 10px; color: var(--danger);" onclick="deleteItem('orders', 'id', '${item.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        });
    </script>
