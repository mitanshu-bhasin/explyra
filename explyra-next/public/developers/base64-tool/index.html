    <nav><a href="../index.html" class="nav-logo">Explyra Devs</a><a href="../index.html" class="back-link">← Back</a>

    <main>
        <div class="tool-header">
            <h1>Base64 Tool</h1>
            <p>Encode text to Base64 or decode Base64 back to text.</p>
        </div>
        <div class="box"><label>Input Text</label><textarea id="inputText" placeholder="Enter text here..."></textarea>
        </div>
        <div class="controls">
            <button class="btn-primary" onclick="encode()">Encode → Base64</button>
            <button class="btn-primary" onclick="decode()">Decode ← Base64</button>
            <button class="btn-secondary" onclick="clearAll()">Clear</button>
        </div>
        <div class="box" style="margin-top: 2rem;"><label>Result</label><textarea id="outputText" readonly
                placeholder="Result will appear here..."></textarea></div>
    </main>
    <script>
        const input = document.getElementById('inputText');
        const output = document.getElementById('outputText');
        function encode() { try { output.value = btoa(unescape(encodeURIComponent(input.value))); } catch (e) { alert('Encoding error'); } }
        function decode() { try { output.value = decodeURIComponent(escape(atob(input.value))); } catch (e) { alert('Invalid Base64 input'); } }
        function clearAll() { input.value = ''; output.value = ''; }
        const savedTheme = localStorage.getItem('explyra-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
