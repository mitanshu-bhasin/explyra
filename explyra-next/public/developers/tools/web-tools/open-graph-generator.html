<body>

    <header>
    <meta property="og:site_name" content="Explyra" />
    <meta property="og:locale" content="en_US" />

                    style="font-weight: 400; font-family: 'Outfit'; font-size: 0.8rem; color: var(--ink3);">Developers</span></span>
        </a>
    </header>

    <main class="container">
        <nav style="margin-bottom: 20px; font-size: 0.9rem; color: var(--ink3);">
            <a href="../../index.html">Developers</a> / Web Tools / Open Graph Generator
        </nav>

        <div class="tool-card animate-fade">
            <div class="tool-header">
                <h1 class="tool-title">Open Graph Generator</h1>
                <p class="tool-desc">Create the tags that control how your website's preview appears on social media
                    platforms.</p>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="input-group">
                    <label for="ogTitle">Content Title</label>
                    <input type="text" id="ogTitle" placeholder="e.g. Explyra Developer Hub">
                </div>
                <div class="input-group">
                    <label for="ogType">Content Type</label>
                    <select id="ogType">
                        <option value="website">Website</option>
                        <option value="article">Article</option>
                        <option value="book">Book</option>
                        <option value="profile">Profile</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label for="ogUrl">Canonical URL</label>
                <input type="text" id="ogUrl" placeholder="https://example.com/page">
            </div>

            <div class="input-group">
                <label for="ogImage">Image URL (recommended 1200x630)</label>
                <input type="text" id="ogImage" placeholder="https://example.com/og-image.jpg">
            </div>

            <div class="input-group">
                <label for="ogDesc">Social Description</label>
                <textarea id="ogDesc" style="min-height: 80px;"
                    placeholder="What should people see in the preview?"></textarea>
            </div>

            <div class="btn-row">
                <button id="genBtn" class="btn btn-primary">Generate OG Tags</button>
                <button id="copyBtn" class="btn btn-secondary">Copy XML</button>
            </div>

            <div class="input-group">
                <label for="output">Generated Open Graph Tags</label>
                <textarea id="output" readonly style="min-height: 180px;"></textarea>
            </div>
        </div>
    </main>

    <script>
        const genBtn = document.getElementById('genBtn');
        const output = document.getElementById('output');
        const copyBtn = document.getElementById('copyBtn');

        genBtn.addEventListener('click', () => {
            const title = document.getElementById('ogTitle').value;
            const type = document.getElementById('ogType').value;
            const url = document.getElementById('ogUrl').value;
            const image = document.getElementById('ogImage').value;
            const desc = document.getElementById('ogDesc').value;

            let tags = `<!-- Open Graph / Facebook -->\n`;
            tags += `<meta property="og:type" content="${type}">\n`;
            tags += `<meta property="og:url" content="${url}">\n`;
            tags += `<meta property="og:title" content="${title}">\n`;
            tags += `<meta property="og:description" content="${desc}">\n`;
            tags += `<meta property="og:image" content="${image}">\n\n`;

            tags += `<!-- Twitter -->\n`;
            tags += `<meta property="twitter:card" content="summary_large_image">\n`;
            tags += `<meta property="twitter:url" content="${url}">\n`;
            tags += `<meta property="twitter:title" content="${title}">\n`;
            tags += `<meta property="twitter:description" content="${desc}">\n`;
            tags += `<meta property="twitter:image" content="${image}">\n`;

            output.value = tags;
        });

        copyBtn.addEventListener('click', () => {
            output.select();
            document.execCommand('copy');
            copyBtn.textContent = 'Copied!';
            setTimeout(() => copyBtn.textContent = 'Copy XML', 2000);
        });
    </script>
