    <main>
        <div class="tool-header">
            <h1>URL Encoder / Decoder</h1>
            <p>Encode and decode URLs, handling special characters for safe web transmission.</p>
        </div>
        <textarea id="urlInput" placeholder="Enter URL or text here..."></textarea>
        <div class="controls">
            <button class="btn-primary" onclick="encode()">Encode URL</button>
            <button class="btn-primary" onclick="decode()">Decode URL</button>
            <button class="btn-secondary" onclick="clearAll()">Clear</button>
        </div>
        <textarea id="urlOutput" readonly placeholder="Result will appear here..."></textarea>
    </main>
    <script>
        const input = document.getElementById('urlInput');
        const output = document.getElementById('urlOutput');
        function encode() { output.value = encodeURIComponent(input.value); }
        function decode() { try { output.value = decodeURIComponent(input.value); } catch (e) { alert('Invalid URL encoding'); } }
        function clearAll() { input.value = ''; output.value = ''; }
        const savedTheme = localStorage.getItem('explyra-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
