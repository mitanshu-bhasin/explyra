<body>

    <div class="track-container">
        <div class="card">
            <div id="lookup-view">
                <div class="status-header">
                    <h2 style="font-family: 'Playfair Display', serif; margin-bottom: 1rem;">Track Your Booking</h2>
                    <p style="color: var(--ink3); font-weight: 300;">Enter your details to view meeting status.</p>
                </div>

                <form id="trackForm">
                    <div class="form-group">
                        <label class="form-label">Booking Code</label>
                        <input type="text" id="track-code" class="form-input" placeholder="BOOK-23847" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Your Email</label>
                        <input type="email" id="track-email" class="form-input" placeholder="you@example.com" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        View Status <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </form>
            </div>

            <!-- Booking Details View -->
            <div id="details-view" style="display: none;">
                <div class="status-header">
                    <div id="statusIcon" style="font-size: 3rem; margin-bottom: 1rem; color: var(--blue);">
                        <i class="fa-solid fa-calendar-check"></i>
                    </div>
                    <h2 style="font-family: 'Playfair Display', serif;" id="statusTitle">Scheduled</h2>
                </div>

                <div class="booking-details">
                    <div class="detail-row">
                        <span class="detail-label">Meeting With</span>
                        <span class="detail-value" id="res-owner">...</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Date & Time</span>
                        <span class="detail-value" id="res-time">...</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Booking Code</span>
                        <span class="detail-value" id="res-code">...</span>
                    </div>
                </div>

                <div id="linkContainer" class="meeting-link-box" style="display: none;">
                    <div
                        style="font-size: 0.85rem; color: var(--blue); font-weight: 600; margin-bottom: 0.5rem; text-transform: uppercase;">
                        Meeting Link Ready
                    </div>
                    <a href="#" id="meetingLink" target="_blank" class="btn btn-primary" style="text-decoration: none;">
                        Join Meeting <i class="fa-solid fa-video"></i>
                    </a>
                </div>

                <div id="noLinkMsg"
                    style="text-align: center; color: var(--ink3); font-size: 0.9rem; margin-top: 2rem; font-style: italic;">
                    Meeting link will be visible here once added by the host.
                </div>

                <button class="btn btn-ghost" style="width: 100%; margin-top: 2rem;" onclick="location.reload()">
                    Track Another
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { getBookingByCode } from './booking.js';

        const form = document.getElementById('trackForm');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = form.querySelector('button');
            const code = document.getElementById('track-code').value.trim();
            const email = document.getElementById('track-email').value.trim();

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Searching...';

            try {
                const booking = await getBookingByCode(code, email);

                if (!booking) {
                    alert("No booking found with these details.");
                    btn.disabled = false;
                    btn.innerText = 'View Status';
                    return;
                }

                showDetails(booking);

            } catch (error) {
                console.error("Tracking error:", error);
                alert("Something went wrong. Please try again.");
                btn.disabled = false;
            }
        });

        function showDetails(b) {
            document.getElementById('lookup-view').style.display = 'none';
            document.getElementById('details-view').style.display = 'block';

            document.getElementById('res-owner').innerText = b.ownerName;
            document.getElementById('res-code').innerText = b.code;
            document.getElementById('res-time').innerText = new Date(b.scheduledAt).toLocaleString([], {
                dateStyle: 'full', timeStyle: 'short'
            });

            document.getElementById('statusTitle').innerText = b.status.charAt(0).toUpperCase() + b.status.slice(1);

            if (b.status === 'cancelled') {
                document.getElementById('statusIcon').style.color = '#dc2626';
                document.getElementById('statusIcon').innerHTML = '<i class="fa-solid fa-calendar-xmark"></i>';
            }

            if (b.meetingLink) {
                document.getElementById('linkContainer').style.display = 'block';
                document.getElementById('noLinkMsg').style.display = 'none';
                document.getElementById('meetingLink').href = b.meetingLink;
            } else {
                document.getElementById('linkContainer').style.display = 'none';
                document.getElementById('noLinkMsg').style.display = 'block';
            }
        }
    </script>
