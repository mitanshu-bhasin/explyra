<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar System Test</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 dark:bg-black p-6">
    <div class="max-w-md mx-auto bg-white dark:bg-slate-800 rounded-lg shadow-lg p-8 space-y-6">
        <h1 class="text-2xl font-bold">🎭 Avatar System Test</h1>
        
        <div class="space-y-2">
            <p class="text-sm text-slate-600 dark:text-slate-300">Click the button below to test avatar picker:</p>
            <button onclick="window.openAvatarPickerModal?.()" 
                class="w-full px-4 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold">
                <i class="fa-solid fa-image mr-2"></i>Open Avatar Picker
            </button>
        </div>

        <div class="border-t border-slate-200 dark:border-slate-700 pt-4">
            <h3 class="font-bold mb-2">Debug Info:</h3>
            <button onclick="window.debugAvatarSystem?.()" 
                class="w-full px-4 py-2 bg-slate-100 dark:bg-slate-700 rounded text-sm font-mono">
                Check System Status
            </button>
        </div>

        <div class="bg-blue-50 dark:bg-blue-900/20 p-4 rounded text-sm">
            <p class="text-blue-800 dark:text-blue-300">
                <strong>Instructions:</strong> Open browser console (F12) to see debug info
            </p>
        </div>
    </div>

    <script src="js/avatar-manager.js"></script>
    <script>
        console.log('Avatar System Test Page Loaded');
        // Initialize avatar system
        setTimeout(() => {
            window.debugAvatarSystem?.();
        }, 1000);
    </script>
</body>
</html>
