<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Listing Generator | Explyra Directories</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        pre { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; font-size: 0.825rem; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex items-center justify-between mb-8">
            <div>
                <a href="admin.html" class="text-blue-600 font-bold mb-2 inline-block hover:underline"><i class="fas fa-arrow-left mr-2"></i> Back to Admin</a>
                <h1 class="text-3xl font-extrabold text-gray-900">Static Page Generator</h1>
                <p class="text-gray-500">Generate SEO-optimized HTML for business listings</p>
            </div>
            <div id="status-badge" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-full text-sm font-bold uppercase">
                Loading Data...
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Source Data & Config -->
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2"><i class="fas fa-database text-blue-500"></i> Business Information</h3>
                    <div id="form-preview" class="space-y-3 text-sm">
                        <!-- Filled by JS -->
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2"><i class="fas fa-cog text-blue-500"></i> Generation Options</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">File Name</label>
                            <input type="text" id="filename-input" class="w-full border p-2 rounded-lg font-mono text-sm" placeholder="direc-acme.html">
                        </div>
                        <button id="generate-btn" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                            <i class="fas fa-magic mr-2"></i> Generate HTML Code
                        </button>
                    </div>
                </div>
            </div>

            <!-- Code Output -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-bold flex items-center gap-2"><i class="fas fa-code text-purple-500"></i> Generated Code</h3>
                    <div class="flex gap-2">
                        <button id="copy-btn" class="p-2 text-gray-500 hover:text-blue-600 transition" title="Copy Code"><i class="fas fa-copy"></i></button>
                        <button id="download-btn" class="p-2 text-gray-500 hover:text-green-600 transition" title="Download File"><i class="fas fa-download"></i></button>
                    </div>
                </div>
                <div class="flex-1 min-h-[400px]">
                    <textarea id="code-output" class="w-full h-full bg-gray-900 text-gray-100 p-4 rounded-xl font-mono text-xs focus:outline-none" readonly></textarea>
                </div>
                <div class="mt-4 p-4 bg-yellow-50 border border-yellow-100 rounded-xl">
                    <p class="text-xs text-yellow-800">
                        <i class="fas fa-exclamation-triangle mr-1"></i> 
                        <strong>Note:</strong> Static files must be saved in the <code>/listings</code> folder. After saving, remember to update the <code>manifest.json</code> and sitemap.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const businessId = urlParams.get('id');
            const formPreview = document.getElementById('form-preview');
            const filenameInput = document.getElementById('filename-input');
            const codeOutput = document.getElementById('code-output');
            const generateBtn = document.getElementById('generate-btn');
            const statusBadge = document.getElementById('status-badge');
            
            let businessData = null;

            if (!businessId) {
                alert('No business ID provided.');
                return;
            }

            // Fetch Data
            try {
                const doc = await db.collection('business_submissions').doc(businessId).get();
                if (!doc.exists) throw new Error('Business not found');
                businessData = doc.data();
                statusBadge.textContent = businessData.name;
                statusBadge.className = 'px-4 py-2 bg-blue-100 text-blue-700 rounded-full text-sm font-bold uppercase';
                
                renderPreview(businessData);
                
                // Suggested Filename
                const suggestedName = 'direc-' + businessData.name.toLowerCase().replace(/[^a-z0-9]/g, '-') + '.html';
                filenameInput.value = suggestedName;

            } catch (error) {
                console.error(error);
                statusBadge.textContent = 'Error';
                statusBadge.className = 'px-4 py-2 bg-red-100 text-red-700 rounded-full text-sm font-bold uppercase';
            }

            function renderPreview(data) {
                const fields = [
                    { label: 'Name', value: data.name },
                    { label: 'Category', value: data.category },
                    { label: 'Email', value: data.email },
                    { label: 'Phone', value: data.phone || 'N/A' },
                    { label: 'Website', value: data.website || 'N/A' },
                    { label: 'Address', value: data.address || 'N/A' },
                    { label: 'Social', value: data.sameAs || 'N/A' },
                    { label: 'Hours', value: data.openingHours || 'N/A' },
                    { label: 'Description', value: data.description },
                    { label: 'Long Desc', value: (data.longDescription || '').substring(0, 50) + '...' }
                ];
                
                formPreview.innerHTML = fields.map(f => `
                    <div class="flex justify-between border-b border-gray-50 pb-2">
                        <span class="text-gray-400 uppercase font-bold text-[10px]">${f.label}</span>
                        <span class="font-medium text-right text-xs truncate max-w-[200px]">${f.value}</span>
                    </div>
                `).join('');
            }

            generateBtn.addEventListener('click', () => {
                const html = generateHTML(businessData);
                codeOutput.value = html;
            });

            function generateHTML(data) {
                const bId = data.name.toLowerCase().replace(/[^a-z0-9]/g, '-');
                const filename = `direc-${bId}.html`;
                const title = `${data.name} | Explyra Directories`;
                const desc = `${data.name} – Find services, contact details, business hours, website and more on Explyra Directories.`;
                const keys = `${data.name}, ${data.category}, services, ${data.location || ''}, explyra directory`;
                const url = `https://direc.explyra.me/listings/${filename}`;
                
                const schema = {
                    "@context": "https://schema.org",
                    "@type": "LocalBusiness",
                    "name": data.name,
                    "image": data.logo || "https://direc.explyra.me/assets/default-logo.png",
                    "description": data.longDescription || data.description,
                    "address": {
                        "@type": "PostalAddress",
                        "streetAddress": data.address || "",
                        "addressLocality": data.location ? data.location.split(',')[0] : "",
                        "addressCountry": "US"
                    },
                    "telephone": data.phone || "",
                    "url": data.website || "",
                    "openingHours": data.openingHours || "Mo-Fr 09:00-17:00"
                };

                if (data.sameAs) schema.sameAs = data.sameAs.split(',').map(u => u.trim());

                let html = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${title}</title>
    <meta name="description" content="${desc}">
    <meta name="keywords" content="${keys}">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="${url}">
    <meta property="og:title" content="${title}">
    <meta property="og:description" content="${desc}">
    <meta property="og:image" content="${data.logo || ''}">
    <meta property="og:url" content="${url}">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="${title}">
    <meta name="twitter:description" content="${desc}">
    <meta name="twitter:image" content="${data.logo || ''}">
    <script type="application/ld+json">`;
                
                html += JSON.stringify(schema, null, 2);
                html += `\n    <\/script>`;
                
                html += `
    <script src="https://cdn.tailwindcss.com"><\/script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f9fafb; }
        .business-hero { background: white; border-bottom: 1px solid #f3f4f6; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <header class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="../index.html" class="text-xl font-bold flex items-center gap-2 text-blue-600">
                <i class="fas fa-th"></i> Explyra Directories
            </a>
            <div class="flex items-center gap-6">
                <a href="../index.html" class="text-sm font-medium text-gray-600 hover:text-blue-600">Browse</a>
                <a href="../submit.html" class="bg-blue-600 text-white px-5 py-2 rounded-xl font-bold text-sm shadow-lg shadow-blue-200">Add Business</a>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-6 py-12">
        <article class="max-w-5xl mx-auto space-y-12">
            <header class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-gray-100 flex flex-col md:flex-row items-center gap-10">
                <div class="w-40 h-40 bg-gray-50 rounded-3xl flex-shrink-0 flex items-center justify-center p-6 border border-gray-100">
                    <img src="${data.logo || ''}" alt="${data.name} Logo" class="max-w-full max-h-full rounded-xl object-contain">
                </div>
                <div class="flex-1 text-center md:text-left">
                    <div class="inline-block px-4 py-1.5 bg-blue-50 text-blue-700 rounded-full text-xs font-bold uppercase mb-4">
                        ${data.category} • Verified
                    </div>
                    <h1 class="text-5xl font-black text-gray-900 mb-4">${data.name}</h1>
                    <p class="text-xl text-gray-600">${data.description}</p>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                <div class="lg:col-span-2 space-y-12">
                    <section class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-gray-100">
                        <h2 class="text-2xl font-bold mb-6">Our Services & Description</h2>
                        <div class="prose prose-blue text-gray-600 leading-relaxed text-lg">
                            ${(data.longDescription || data.description).replace(/\n/g, '<br>')}
                        </div>
                    </section>

                    <section class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-gray-100">
                        <h2 class="text-2xl font-bold mb-6">Contact Details</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="p-6 bg-gray-50 rounded-2xl">
                                <h3 class="text-xs font-bold text-gray-400 uppercase mb-4">Location</h3>
                                <p class="text-gray-900 font-medium">${data.address || data.location || 'N/A'}</p>
                            </div>
                            <div class="p-6 bg-gray-50 rounded-2xl space-y-4">
                                <h3 class="text-xs font-bold text-gray-400 uppercase mb-4">Channels</h3>
                                <p class="flex items-center gap-3"><i class="fas fa-phone text-blue-500"></i> ${data.phone || 'N/A'}</p>
                                <p class="flex items-center gap-3"><i class="fas fa-envelope text-blue-500"></i> ${data.email || 'N/A'}</p>
                            </div>
                        </div>
                    </section>
                </div>

                <aside class="space-y-12">
                    <section class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-100">
                        <h2 class="text-xl font-bold mb-6">Quick Links</h2>
                        <div class="space-y-4">
                            ${data.website ? `<a href="${data.website}" target="_blank" class="flex items-center justify-center gap-3 py-4 bg-blue-600 text-white rounded-2xl font-bold text-lg hover:bg-blue-700">Visit Website</a>` : ''}
                            <div class="pt-4">
                                <p class="text-sm font-bold mb-3">Social Media</p>
                                <div class="flex gap-2">
                                    ${data.sameAs ? data.sameAs.split(',').map(s => `<a href="${s.trim()}" class="w-12 h-12 flex items-center justify-center bg-gray-100 rounded-xl hover:bg-blue-50 text-gray-600 hover:text-blue-600 transition"><i class="fas fa-link"></i></a>`).join('') : '<span class="text-gray-400 text-sm">None listed</span>'}
                                </div>
                            </div>
                        </div>
                    </section>

                    <section class="bg-gray-900 p-8 rounded-[2rem] text-white">
                        <h2 class="text-xl font-bold mb-6">Opening Hours</h2>
                        <div class="space-y-4 text-sm text-gray-400">
                            <div class="flex justify-between border-b border-gray-800 pb-3">
                                <span>Regular</span>
                                <span class="text-blue-400 font-bold">${data.openingHours || '9am - 5pm'}</span>
                            </div>
                            <div class="flex justify-between border-b border-gray-800 pb-3">
                                <span>Days</span>
                                <span class="text-white">Mon - Fri</span>
                            </div>
                        </div>
                    </section>
                </aside>
            </div>
        </article>
    </main>

    <footer class="bg-white border-t py-12 mt-12 text-center text-gray-500 text-sm">
        <p>&copy; 2026 Explyra Directories. All rights reserved.</p>
    </footer>
</body>
</html>`;
                return html;
            }

            // UI Helpers
            document.getElementById('copy-btn').addEventListener('click', () => {
                codeOutput.select();
                document.execCommand('copy');
                alert('Code copied to clipboard!');
            });

            document.getElementById('download-btn').addEventListener('click', () => {
                if (!codeOutput.value) {
                    alert('Please generate the code first!');
                    return;
                }
                const blob = new Blob([codeOutput.value], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filenameInput.value;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });
        });
    </script>
</body>
</html>
