<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Explyra Partner Program</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F8F7F4;
            --bg2: #FFFFFF;
            --surf: #FFFFFF;
            --bdr: #E4E1DB;
            --ink: #0D1117;
            --ink2: #2A3141;
            --ink3: #586070;
            --ink4: #939BAC;
            --blue: #1546C0;
            --blue-g: rgba(21, 70, 192, .08);
            --s1: 0 1px 3px rgba(0, 0, 0, .06);
            --s2: 0 4px 16px rgba(0, 0, 0, .08);
            --s4: 0 24px 72px rgba(0, 0, 0, .12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .auth-card {
            background: var(--surf);
            width: 100%;
            max-width: 500px;
            padding: 3rem;
            border-radius: 32px;
            border: 1px solid var(--bdr);
            box-shadow: var(--s4);
            text-align: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 2rem;
            display: block;
            text-decoration: none;
            color: var(--ink);
        }

        h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 0.5rem; }
        p.subtitle { color: var(--ink3); margin-bottom: 2rem; font-size: 0.95rem; }

        /* TYPE TOGGLE */
        .type-toggle {
            display: flex;
            background: var(--bg);
            padding: 5px;
            border-radius: 100px;
            margin-bottom: 2rem;
            border: 1px solid var(--bdr);
        }
        .type-btn {
            flex: 1;
            padding: 0.7rem;
            border-radius: 100px;
            border: none;
            background: transparent;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--ink3);
        }
        .type-btn.active { background: var(--surf); color: var(--blue); box-shadow: var(--s1); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; text-align: left; }
        .form-group { text-align: left; margin-bottom: 1.2rem; }
        .full-width { grid-column: 1 / -1; }

        label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--ink2); padding-left: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
        input, select {
            width: 100%;
            padding: 0.9rem 1.1rem;
            border-radius: 14px;
            border: 1.5px solid var(--bdr);
            background: var(--bg);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        input:focus { outline: none; border-color: var(--blue); background: var(--bg2); box-shadow: 0 0 0 4px var(--blue-g); }

        .btn-auth {
            width: 100%;
            padding: 1.1rem;
            border-radius: 14px;
            background: var(--ink);
            color: #fff;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.3s;
        }
        .btn-auth:hover { transform: translateY(-2px); box-shadow: var(--s2); }

        .toggle-auth { margin-top: 2rem; font-size: 0.9rem; color: var(--ink3); }
        .toggle-auth a { color: var(--blue); font-weight: 700; text-decoration: none; }

        #error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 1rem; display: none; }

        .company-fields { display: none; }
        body.company-mode .company-fields { display: block; }
        body.company-mode .individual-fields { display: none; }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-auth.loading .spinner { display: block; }
        .btn-auth.loading span { display: none; }
    </style>
</head>
<body class="individual-mode">

    <div class="auth-card">
        <a href="index.html" class="logo">Explyra Partner</a>
        
        <div id="login-view">
            <h2>Welcome Back</h2>
            <p class="subtitle">Access your partner dashboard</p>
            
            <div class="type-toggle">
                <button class="type-btn active" id="btn-login-type-ind" onclick="setLoginType('individual')">Individual</button>
                <button class="type-btn" id="btn-login-type-com" onclick="setLoginType('company')">Company</button>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="name@company.com">
            </div>
            
            <div class="form-group">
                <label id="login-pass-label">Password</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            
            <button id="btn-login" class="btn-auth">
                <span>Sign In</span>
                <div class="spinner"></div>
            </button>
            
            <div class="toggle-auth">
                New to the program? <a href="#" onclick="toggleAuth('signup')">Create Account</a>
            </div>
        </div>

        <div id="signup-view" style="display:none">
            <h2>Join the Program</h2>
            <div class="type-toggle">
                <button class="type-btn active" id="btn-type-ind" onclick="setPartnerType('individual')">Individual</button>
                <button class="type-btn" id="btn-type-com" onclick="setPartnerType('company')">Company</button>
            </div>
            
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Admin Full Name</label>
                    <input type="text" id="signup-name" placeholder="John Doe">
                </div>

                <div class="form-group company-fields full-width">
                    <label>Company Legal Name</label>
                    <input type="text" id="signup-company-name" placeholder="Explyra Solutions Pvt Ltd">
                </div>

                <div class="form-group full-width">
                    <label>Work Email Address</label>
                    <input type="email" id="signup-email" placeholder="name@company.com">
                </div>
                
                <div class="form-group individual-fields full-width">
                    <label>Create Password</label>
                    <input type="password" id="signup-password" placeholder="••••••••">
                </div>

                <!-- COMPANY SPECIFIC -->
                <div class="form-group company-fields">
                    <label>PAN Number</label>
                    <input type="text" id="signup-pan" placeholder="ABCDE1234F">
                </div>
                <div class="form-group company-fields">
                    <label>Domain/Website</label>
                    <input type="text" id="signup-domain" placeholder="explyra.me">
                </div>
                <div class="form-group company-fields full-width">
                    <label>Payment Output (Bank/UPI)</label>
                    <select id="signup-payment">
                        <option value="UPI">UPI (Fastest)</option>
                        <option value="Bank">Bank Transfer</option>
                    </select>
                </div>
                <div class="form-group company-fields full-width">
                    <label>Create Password</label>
                    <input type="password" id="signup-password-com" placeholder="••••••••">
                </div>
            </div>
            
            <button id="btn-signup" class="btn-auth">
                <span>Join Now</span>
                <div class="spinner"></div>
            </button>
            
            <div class="toggle-auth">
                Already have an account? <a href="#" onclick="toggleAuth('login')">Sign In</a>
            </div>
        </div>

        <div id="error-msg"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKXkuH1zbUwOD1gA35gG4vQXKTX60xwe0",
            authDomain: "explyras.firebaseapp.com",
            projectId: "explyras",
            storageBucket: "explyras.firebasestorage.app",
            messagingSenderId: "411853553644",
            appId: "1:411853553644:web:eca79eab846b6a5149cac9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let partnerType = 'individual';

        window.setPartnerType = (type) => {
            partnerType = type;
            document.body.className = type + '-mode';
            document.getElementById('btn-type-ind').classList.toggle('active', type === 'individual');
            document.getElementById('btn-type-com').classList.toggle('active', type === 'company');
        };

        window.setLoginType = (type) => {
            document.getElementById('btn-login-type-ind').classList.toggle('active', type === 'individual');
            document.getElementById('btn-login-type-com').classList.toggle('active', type === 'company');
            document.getElementById('login-pass-label').textContent = type === 'company' ? 'Company Password' : 'Password';
        };

        window.toggleAuth = (view) => {
            document.getElementById('login-view').style.display = view === 'login' ? 'block' : 'none';
            document.getElementById('signup-view').style.display = view === 'signup' ? 'block' : 'none';
            document.getElementById('error-msg').style.display = 'none';
        };

        const showError = (msg) => {
            const err = document.getElementById('error-msg');
            err.textContent = msg;
            err.style.display = 'block';
        };

        // SIGN UP
        document.getElementById('btn-signup').onclick = async () => {
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const btn = document.getElementById('btn-signup');
            
            let password;
            let metadata = {};

            if (partnerType === 'company') {
                password = document.getElementById('signup-password-com').value;
                metadata = {
                    companyName: document.getElementById('signup-company-name').value,
                    pan: document.getElementById('signup-pan').value,
                    domain: document.getElementById('signup-domain').value,
                    paymentMethod: document.getElementById('signup-payment').value
                };
                if (!metadata.companyName || !metadata.pan || !metadata.domain) return showError("Please fill all company fields");
            } else {
                password = document.getElementById('signup-password').value;
            }

            if (!name || !email || !password) return showError("Please fill all fields");
            
            btn.classList.add('loading');
            try {
                const credential = await createUserWithEmailAndPassword(auth, email, password);
                const user = credential.user;
                
                await updateProfile(user, { displayName: name });

                // Referral code: Company Name (slug) or Random ID
                let referralCode;
                if (partnerType === 'company') {
                    referralCode = metadata.companyName.toLowerCase().replace(/[^a-z0-9]/g, '');
                } else {
                    referralCode = Math.random().toString(36).substring(2, 8).toUpperCase();
                }

                // Initialize partner doc
                await setDoc(doc(db, "partners", user.uid), {
                    uid: user.uid,
                    displayName: name,
                    email: email,
                    type: partnerType,
                    metadata: metadata,
                    referralCode: referralCode,
                    credits: 0,
                    totalClicks: 0,
                    createdAt: new Date()
                });

                window.location.href = 'dashboard.html';
            } catch (e) {
                showError(e.message);
            } finally {
                btn.classList.remove('loading');
            }
        };

        // LOG IN
        document.getElementById('btn-login').onclick = async () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('btn-login');

            if (!email || !password) return showError("Please fill all fields");
            
            btn.classList.add('loading');
            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'dashboard.html';
            } catch (e) {
                showError("Invalid email or password");
            } finally {
                btn.classList.remove('loading');
            }
        };
    </script>

</body>
</html>
