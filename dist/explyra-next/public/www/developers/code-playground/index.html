    <style>
        :root {
            --bg: #F8F7F4;
            --bg2: #FFFFFF;
            --bdr: #E4E1DB;
            --ink: #0D1117;
            --blue: #1546C0;
        }

        [data-theme="dark"] {
            --bg: #080B14;
            --bg2: #0E1220;
            --bdr: rgba(255, 255, 255, .07);
            --ink: #EEF0F8;
            --blue: #5B8AF5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        nav {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: var(--bg2);
            border-bottom: 1px solid var(--bdr);
        }

        .playground {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
        }

        .editors {
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--bdr);
            overflow-y: auto;
        }

        .edit-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid var(--bdr);
        }

        .edit-label {
            padding: 5px 15px;
            font-size: 0.7rem;
            font-weight: 700;
            background: var(--bg);
            border-bottom: 1px solid var(--bdr);
            text-transform: uppercase;
        }

        textarea {
            flex: 1;
            width: 100%;
            padding: 15px;
            border: none;
            background: var(--bg2);
            color: var(--ink);
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            resize: none;
            outline: none;
        }

        .preview {
            background: #fff;
            height: 100%;
            width: 100%;
            border: none;
        }

        .btn-run {
            background: var(--blue);
            color: #fff;
            border: none;
            padding: 5px 15px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }
    </style>

<body>
    <nav><a href="../index.html" style="font-weight: 700; text-decoration: none; color: inherit;">Explyra Playground</a>
        <button class="btn-run" onclick="update()">Run Code</button></nav>
    <main class="playground">
        <div class="editors">
            <div class="edit-box">
                <div class="edit-label">HTML</div><textarea id="htmlCode" spellcheck="false"><h1>Hello World!</h1>
<p>Welcome to Explyra Playground.</p>
<button id="btn">Click Me</button></textarea>
            </div>
            <div class="edit-box">
                <div class="edit-label">CSS</div><textarea id="cssCode"
                    spellcheck="false">body { font-family: sans-serif; text-align: center; padding: 50px; }
h1 { color: #1546C0; }
button { padding: 10px 20px; background: #1546C0; color: #fff; border: none; border-radius: 5px; cursor: pointer; }</textarea>
            </div>
            <div class="edit-box" style="border-bottom: none;">
                <div class="edit-label">JavaScript</div><textarea id="jsCode" spellcheck="false">document.getElementById('btn').onclick = () => {
  alert('Explyra Suite is Awesome!');
};</textarea>
            </div>
        </div>
        <iframe id="output" class="preview"></iframe>
    </main>
    <script>
        function update() {
            const html = document.getElementById('htmlCode').value;
            const css = document.getElementById('cssCode').value;
            const js = document.getElementById('jsCode').value;
            const output = document.getElementById('output').contentWindow.document;
            output.open();
            output.write(`${html}<style>${css}</style><script>${js}<\/script>`);
            output.close();
        }
        update();
        const savedTheme = localStorage.getItem('explyra-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</body>
