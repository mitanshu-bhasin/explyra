<body>
    <div class="sidebar"></div>

    <main class="main-content">
        <header class="reveal">
            <div>
                <h1>Analytics & <span class="grad">Reports</span></h1>
                <p style="color: var(--text-muted);">Deep dive into production efficiency, utilization, and trends.</p>
            </div>
            <button class="btn btn-primary"><i class="fas fa-file-pdf"></i> Generate Full Report</button>
        </header>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem;" class="reveal">
            <div class="glass-card" style="height: 380px; display: flex; flex-direction: column;">
                <h3>Production Efficiency (Monthly)</h3>
                <div style="flex: 1; min-height: 0; margin-top: 1rem;">
                    <canvas id="efficiencyChart"></canvas>
                </div>
            </div>
            <div class="glass-card" style="height: 380px; display: flex; flex-direction: column;">
                <h3>Machine Utilization</h3>
                <div style="flex: 1; min-height: 0; margin-top: 1rem;">
                    <canvas id="utilizationChart"></canvas>
                </div>
            </div>
            <div class="glass-card" style="height: 380px; display: flex; flex-direction: column;">
                <h3>Inventory Consumption Rate</h3>
                <div style="flex: 1; min-height: 0; margin-top: 1rem;">
                    <canvas id="consumptionChart"></canvas>
                </div>
            </div>
            <div class="glass-card" style="height: 380px; display: flex; flex-direction: column;">
                <h3>Quality Rejection Rate</h3>
                <div style="flex: 1; min-height: 0; margin-top: 1rem;">
                    <canvas id="qualityChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script src="js/data-handler.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const [production, machines, inventory] = await Promise.all([
                DataHandler.fetchData('production'),
                DataHandler.fetchData('machines'),
                DataHandler.fetchData('inventory')
            ]);

            // Efficiency Chart (Mock monthly trends)
            new Chart(document.getElementById('efficiencyChart'), {
                type: 'bar',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    datasets: [{
                        label: 'Efficiency %',
                        data: [88, 91, 85, 94, 92, 96],
                        backgroundColor: '#5B8AF5'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: false, min: 80, grid: { color: 'rgba(255,255,255,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // Utilization Chart (Based on machine status)
            const active = machines.filter(m => m.status === 'active').length;
            const maintenance = machines.filter(m => m.status === 'maintenance').length;
            const idle = machines.filter(m => m.status === 'idle').length;
            
            new Chart(document.getElementById('utilizationChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Productive', 'Maintenance', 'Idle'],
                    datasets: [{
                        data: [active, maintenance, idle],
                        backgroundColor: ['#10B981', '#F59E0B', '#EF4444'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'right', labels: { color: '#8290A8' } } }
                }
            });

            // Consumption Chart (Mock weekly based on inventory types)
            new Chart(document.getElementById('consumptionChart'), {
                type: 'line',
                data: {
                    labels: ['W1', 'W2', 'W3', 'W4'],
                    datasets: [{
                        label: 'Raw Materials',
                        data: [400, 450, 420, 500],
                        borderColor: '#5B8AF5',
                        tension: 0.4
                    }, {
                        label: 'Components',
                        data: [800, 750, 900, 850],
                        borderColor: '#10B981',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#8290A8' } } },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });

             // Quality Chart
             new Chart(document.getElementById('qualityChart'), {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    datasets: [{
                        label: 'Reject Rate %',
                        data: [2.1, 1.8, 2.5, 1.2, 1.5, 0.8],
                        borderColor: '#EF4444',
                        backgroundColor: 'rgba(239, 68, 68, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        });
    </script>
</body>
</html>
