<div class="card p-6 bg-white rounded-xl shadow-sm border border-slate-100">
    <h2 class="text-xl font-bold mb-4 text-slate-800">Create Your Subdomain</h2>
    <p class="text-slate-500 mb-6 text-sm">Choose a unique subdomain for your workspace on mitanshu.tech</p>
    
    <div class="flex flex-col gap-4">
        <div class="flex items-center gap-2">
            <input type="text" id="subdomainInput" placeholder="username" 
                class="flex-1 px-4 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            <span class="text-slate-500 font-medium">.mitanshu.tech</span>
        </div>
        <button id="createSubdomainBtn" 
            class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition-colors flex items-center justify-center gap-2">
            <span id="btnText">Claim Subdomain</span>
            <div id="btnLoader" class="hidden w-4 h-4 border-2 border-white/50 border-t-white rounded-full animate-spin"></div>
        </button>
        <p id="subdomainStatus" class="text-sm mt-2"></p>
    </div>
</div>
