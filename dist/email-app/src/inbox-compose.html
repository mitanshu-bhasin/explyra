<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explyra Unified Inbox and Compose</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen">
  <main class="max-w-6xl mx-auto p-4 md:p-8 grid md:grid-cols-3 gap-6">
    <section class="md:col-span-1 bg-white rounded-xl shadow p-4">
      <h2 class="text-lg font-semibold">Inbox</h2>
      <ul id="inboxList" class="mt-3 space-y-2"></ul>
    </section>

    <section class="md:col-span-2 bg-white rounded-xl shadow p-4">
      <h2 class="text-lg font-semibold">Email Detail</h2>
      <div id="emailView" class="mt-3 text-sm text-slate-700">Select an email to read it.</div>
    </section>

    <section class="md:col-span-3 bg-white rounded-xl shadow p-6">
      <h2 class="text-lg font-semibold">Compose Email</h2>
      <form id="composeForm" class="mt-4 grid gap-3">
        <select id="fromSelect" class="border rounded-lg px-3 py-2" required></select>
        <input id="toEmail" type="email" placeholder="recipient@example.com" class="border rounded-lg px-3 py-2" required />
        <input id="subject" type="text" placeholder="Subject" class="border rounded-lg px-3 py-2" required />
        <textarea id="htmlContent" rows="8" class="border rounded-lg px-3 py-2" placeholder="<p>Hello</p>" required></textarea>
        <button class="bg-blue-600 text-white px-4 py-2 rounded-lg w-fit">Send Email</button>
      </form>
    </section>
  </main>

  <script type="module" src="./inbox-compose.js"></script>
</body>
</html>
