<body>
    <div class="container">
        <header>
            <h1>Explyra Suite Status</h1>

        <main>
            <!-- Overall Status Banner -->

            <!-- Core Platform Services -->
            <section>
                <h2>Core Platform Services</h2>
                <div id="core-services" class="status-grid">
                    <!-- Cards will be populated by status.js -->
                </div>
            </section>

            <!-- Product Systems -->
            <section>
                <h2>Product Systems</h2>
                <div id="product-systems" class="status-grid">
                    <!-- Cards will be populated by status.js -->

            <!-- Infrastructure -->
            <section>
                <h2>Infrastructure</h2>
                <div id="infra-services" class="status-grid">
                    <!-- Cards will be populated by status.js -->
                </div>
            </section>

            <!-- Incident History -->
            <section>
                <h2>Incident History</h2>
                <div id="incident-history" class="incident-list">
                    <!-- History will be populated by status.js -->

            </section>

        <footer>

            <p>One Platform. Infinite Possibilities.</p>
        </footer>
