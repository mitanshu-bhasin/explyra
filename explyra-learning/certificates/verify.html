<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta property="og:site_name" content="Explyra" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:site" content="@explyras" />
    <meta name="twitter:creator" content="@explyras" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Certificate — Explyra Learning</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/learning-style.css">
    <style>
        .verify-box {
            max-width: 500px;
            margin: 100px auto;
            text-align: center;
            background: var(--surf);
            padding: 4rem;
            border-radius: 24px;
            box-shadow: var(--s4);
        }

        #result-area {
            margin-top: 3rem;
            display: none;
            text-align: left;
            padding: 2rem;
            border-radius: 12px;
            background: var(--bg3);
        }

        .success-tick {
            color: var(--teal);
            font-weight: 700;
            display: block;
            margin-bottom: 1rem;
        }
    </style>

    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Explyra",
  "url": "https://explyra.me/",
  "sameAs": [
    "https://x.com/explyras",
    "https://www.facebook.com/profile.php?id=61584891033070&sk=directory_personal_details",
    "https://www.instagram.com/explyras",
    "https://www.youtube.com/@explyras",
    "https://www.linkedin.com/company/explyra/",
    "https://www.threads.com/@explyras",
    "https://github.com/Explyra"
  ]
}
    </script>
</head>

<body>
    <nav>
        <div class="container" style="display:flex; justify-content: space-between; align-items: center; width: 100%;">
            <a href="../index.html" class="logo">
                <i>E</i> Explyra Learning
            </a>
            <a href="../index.html" class="btn btn-outline" style="padding: 0.4rem 1rem;">Back to Home</a>
        </div>
    </nav>

    <main class="container">
        <div class="verify-box">
            <h1 style="margin-bottom: 2rem;">Verify Excellence</h1>
            <p style="color: var(--ink3); margin-bottom: 2.5rem;">Enter the multi-character certificate ID below to
                verify authenticity.</p>

            <div class="form-group">
                <input type="text" id="verify-id" placeholder="EXP-XXXXXX"
                    style="text-align: center; font-size: 1.2rem; letter-spacing: 1px;">
            </div>
            <button class="btn btn-primary" style="width: 100%; justify-content: center;" onclick="verifyCert()">Verify
                Now</button>

            <div id="result-area">
                <!-- Result injected here -->
            </div>
        </div>
    </main>

    <script src="../scripts/learning-core.js"></script>
    <script>
        function verifyCert() {
            const id = document.getElementById('verify-id').value.trim();
            const resultArea = document.getElementById('result-area');
            if (!id) return;

            const cert = ExplyraLearning.Certificates.verify(id);
            resultArea.style.display = 'block';

            if (cert) {
                resultArea.innerHTML = `
                    <span class="success-tick" style="color:var(--teal)">✓ AUTHENTIC CERTIFICATE</span>
                    <h3 style="margin-bottom: 0.5rem; color:var(--ink)">${cert.studentName}</h3>
                    <p style="font-size: 0.9rem; color: var(--ink3);">Successfully completed <strong>${cert.courseName}</strong> on <strong>${cert.date}</strong>.</p>
                    <p style="margin-top: 1rem; font-size: 0.8rem; color: var(--ink4);">Verified by Explyra Learning Authentication System.</p>
                `;
                resultArea.style.background = 'var(--teal-g)';
                resultArea.style.border = '1px solid var(--teal-b)';
            } else {
                resultArea.innerHTML = `
                    <span class="success-tick" style="color:var(--rose)">✗ INVALID ID</span>
                    <p style="font-size: 0.9rem; color: var(--ink3);">No certificate found with the ID <strong>${id}</strong>. Please check and try again.</p>
                `;
                resultArea.style.background = 'var(--rose-g)';
                resultArea.style.border = '1px solid var(--rose-b)';
            }
        }
    </script>
</body>

</html>
