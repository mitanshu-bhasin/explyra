<div class="space-y-6">
    <!-- Record Creation Form -->
    <div class="card p-6 bg-white rounded-xl shadow-sm border border-slate-100">
        <h2 class="text-xl font-bold mb-4 text-slate-800">Add New Record</h2>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Type</label>
                <select id="recordType" class="w-full px-3 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="A">A</option>
                    <option value="AAAA">AAAA</option>
                    <option value="CNAME">CNAME</option>
                    <option value="TXT">TXT</option>
                    <option value="MX">MX</option>
                </select>
            </div>
            <div class="md:col-span-1">
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Name (sub-subdomain)</label>
                <input type="text" id="recordName" placeholder="e.g. blog" class="w-full px-3 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="md:col-span-2">
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Content (Value/IP)</label>
                <input type="text" id="recordContent" placeholder="e.g. 192.168.1.1" class="w-full px-3 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>
        <button id="addRecordBtn" class="mt-4 px-6 py-2 bg-slate-900 hover:bg-black text-white font-medium rounded-lg transition-colors">
            Add Record
        </button>
        <p id="dnsStatus" class="text-sm mt-2"></p>
    </div>

    <!-- Records Table -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
            <h3 class="font-bold text-slate-800">Active DNS Records</h3>
            <button id="refreshDns" class="text-blue-600 hover:text-blue-700 text-sm font-medium">Refresh List</button>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50">
                        <th class="px-6 py-3 text-xs font-semibold text-slate-500 uppercase">Type</th>
                        <th class="px-6 py-3 text-xs font-semibold text-slate-500 uppercase">Name</th>
                        <th class="px-6 py-3 text-xs font-semibold text-slate-500 uppercase">Content</th>
                        <th class="px-6 py-3 text-xs font-semibold text-slate-500 uppercase">Actions</th>
                    </tr>
                </thead>
                <tbody id="dnsRecordsTable">
                    <!-- Dynamic Rows -->
                </tbody>
            </table>
        </div>
    </div>
</div>
