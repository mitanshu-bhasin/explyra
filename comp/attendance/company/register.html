<body
    class="bg-green-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-['Outfit'] min-h-screen flex items-center justify-center p-4 transition-colors duration-300">

    <div class="fixed top-6 right-6 z-50 flex items-center gap-4">
        <a href="../index.html"
            class="text-sm font-bold text-slate-500 hover:text-green-600 dark:hover:text-green-400 transition bg-white dark:bg-slate-800 px-4 py-2 rounded-full shadow-sm border border-slate-200 dark:border-slate-700">
            <i class="fa-solid fa-arrow-left mr-1"></i> Back
        </a>
        <button onclick="toggleTheme()"
            class="w-10 h-10 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex items-center justify-center text-slate-500 dark:text-yellow-400 hover:bg-slate-50 dark:hover:bg-slate-700 transition shadow-sm">
            <i class="fa-solid fa-moon dark:hidden"></i>
            <i class="fa-solid fa-sun hidden dark:block"></i>
        </button>
    </div>

    <!-- Background Decoration -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
        <div
            class="absolute top-0 right-0 w-[500px] h-[500px] bg-green-200/40 dark:bg-green-900/20 rounded-full blur-3xl">
        </div>
        <div
            class="absolute bottom-0 left-0 w-[600px] h-[600px] bg-emerald-200/40 dark:bg-emerald-900/20 rounded-full blur-3xl">
        </div>
    </div>

    <div
        class="bg-white/90 dark:bg-slate-800/90 backdrop-blur-xl p-8 md:p-10 rounded-3xl shadow-2xl w-full max-w-md border border-slate-100 dark:border-slate-700 relative z-10 animate-fade-in overflow-hidden hover:shadow-green-900/10 transition-shadow mt-10 mb-10">
        <div class="absolute -left-10 -bottom-10 text-green-50 dark:text-green-900/20 text-9xl pointer-events-none">
            <i class="fa-solid fa-building-flag"></i>
        </div>

        <div class="text-center mb-8 relative z-10">
            <div
                class="w-16 h-16 bg-gradient-to-br from-green-500 to-green-700 rounded-2xl flex items-center justify-center mx-auto mb-4 text-white text-3xl shadow-lg shadow-green-500/30">
                <i class="fa-solid fa-building-circle-check"></i>
            </div>
            <h1 class="text-3xl font-black tracking-tight mb-2">Create Workspace</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm">Register your company and admin account</p>
        </div>

        <form onsubmit="onRegisterSubmit(event)" class="space-y-5 relative z-10">
            <div>
                <label
                    class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Company
                    / Organization Name</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-solid fa-building"></i>
                    </div>
                    <input type="text" id="reg-company-name"
                        class="w-full pl-10 pr-4 py-3.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-900/50 focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none text-sm transition-all font-medium"
                        placeholder="e.g. Acme Corp" required>
                </div>
            </div>

            <div>
                <label
                    class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Admin
                    Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <input type="email" id="reg-email"
                        class="w-full pl-10 pr-4 py-3.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-900/50 focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none text-sm transition-all font-medium"
                        placeholder="admin@company.com" required>
                </div>
            </div>

            <div>
                <label
                    class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Admin
                    Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <input type="password" id="reg-password"
                        class="w-full pl-10 pr-4 py-3.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-900/50 focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none text-sm transition-all font-medium"
                        placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" id="reg-btn"
                class="w-full bg-gradient-to-r from-green-600 to-green-700 hover:from-green-500 hover:to-green-600 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-green-600/30 flex items-center justify-center gap-2 mt-4 text-sm tracking-wide">
                <span>Complete Registration</span>
                <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <div class="mt-8 text-center relative z-10 border-t border-slate-100 dark:border-slate-700 pt-6">
            <p class="text-xs text-slate-500 dark:text-slate-400 font-medium">
                Already registered? <a href="login.html"
                    class="text-green-600 dark:text-green-400 font-bold hover:underline">Log in here</a>
            </p>
        </div>
    </div>

</body>

</html>
