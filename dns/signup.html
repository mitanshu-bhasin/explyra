<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Explyra DNS</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #F8F7F4;
            --surf: #FFFFFF;
            --bdr: #E4E1DB;
            --ink: #0D1117;
            --ink2: #2A3141;
            --ink3: #586070;
            --blue: #000000;
            --blue-g: rgba(0, 0, 0, 0.08);
            --r: 8px;
            --r2: 16px;
            --t: 0.2s ease;
            --s2: 0 4px 16px rgba(0, 0, 0, 0.08);
            --serif: 'Playfair Display', serif;
        }

        [data-theme="dark"] {
            --bg: #080B14;
            --surf: #141928;
            --bdr: rgba(255, 255, 255, 0.08);
            --ink: #EEF0F8;
            --ink2: #C4CCDC;
            --ink3: #A0ACC0;
            --blue: #FFFFFF;
            --blue-g: rgba(255, 255, 255, 0.12);
            --s2: 0 4px 16px rgba(0, 0, 0, 0.45);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            background: var(--surf);
            border: 1px solid var(--bdr);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: var(--s2);
            text-align: center;
        }

        .auth-logo { width: 48px; height: 48px; background: var(--ink); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; box-shadow: var(--s2); }
        .auth-logo svg { width: 24px; height: 24px; fill: none; stroke: var(--bg); stroke-width: 2.2; stroke-linecap: round; }

        .auth-title { font-family: var(--serif); font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--ink); }
        .auth-desc { font-size: 0.95rem; color: var(--ink3); margin-bottom: 2rem; font-weight: 300; }

        .form-group { text-align: left; margin-bottom: 1.2rem; }
        .form-label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--ink2); margin-bottom: 0.4rem; }
        .form-input {
            width: 100%; padding: 0.8rem 1rem;
            background: var(--bg); border: 1px solid var(--bdr);
            border-radius: var(--r); color: var(--ink);
            font-family: inherit; font-size: 0.95rem;
            outline: none; transition: all var(--t);
        }
        .form-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-g); }

        .btn-submit {
            width: 100%; background: var(--blue); color: #fff;
            padding: 0.9rem; border-radius: var(--r);
            font-size: 0.95rem; font-weight: 600; border: none;
            cursor: pointer; transition: all var(--t);
            margin-top: 1rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .btn-submit:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }
        .btn-primary { width: 100%; padding: 0.8rem; background: var(--ink); color: var(--bg); border: none; border-radius: var(--r); font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: opacity var(--t); margin-top: 1rem; }
        .btn-primary:hover { opacity: 0.9; }

        .auth-footer { margin-top: 2rem; font-size: 0.9rem; color: var(--ink3); }
        .auth-footer a { color: var(--ink); font-weight: 600; text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }

        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            padding: 12px 20px; border-radius: 8px; color: white; font-size: 0.9rem;
            box-shadow: var(--s2); display: flex; align-items: center; gap: 10px;
            animation: slideIn 0.3s ease forwards;
        }
        .toast.success { background: #10B981; }
        .toast.error { background: #EF4444; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-logo">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z" /><path d="M2 17l10 5 10-5" /><path d="M2 12l10 5 10-5" /></svg>
        </div>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-desc">Join Explyra DNS and manage your infrastructure.</p>

        <form id="signupForm">
            <div class="form-group">
                <label class="form-label" for="name">Full Name</label>
                <input type="text" id="name" class="form-input" placeholder="Mitanshu Bhasin" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="email">Work Email</label>
                <input type="email" id="email" class="form-input" placeholder="you@company.com" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="Min 6 characters" required minlength="6">
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">Get Started <i class="fa-solid fa-arrow-right"></i></button>
        </form>

        <div class="auth-footer">Already have an account? <a href="login.html">Sign In</a></div>
    </div>
    <div id="toast-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKXkuH1zbUwOD1gA35gG4vQXKTX60xwe0",
            authDomain: "explyras.firebaseapp.com",
            projectId: "explyras",
            storageBucket: "explyras.firebasestorage.app",
            messagingSenderId: "411853553644",
            appId: "1:411853553644:web:eca79eab846b6a5149cac9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Redirect if already logged in
        auth.onAuthStateChanged(user => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });

        window.showToast = (msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        };

        // Utility to fetch Public IP
        async function getPublicIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (e) {
                console.error("IP Fetch Error:", e);
                return null;
            }
        }

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing...';

            try {
                // One Device / One Account - IP Check
                const ip = await getPublicIP();
                if (ip) {
                    const { collection, query, where, getDocs } = await import("https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js");
                    const q = query(collection(db, "users"), where("registrationIp", "==", ip));
                    const querySnapshot = await getDocs(q);
                    
                    if (!querySnapshot.empty) {
                        throw new Error("Spam Protection: Only one account per network/device is permitted.");
                    }
                }

                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCred.user;
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    name: name,
                    email: email,
                    role: 'admin', // Default to admin for DNS users
                    registrationIp: ip || 'unknown',
                    createdAt: serverTimestamp()
                });

                showToast('Account created! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } catch (error) {
                showToast(error.message, 'error');
                btn.disabled = false;
                btn.innerHTML = 'Get Started <i class="fa-solid fa-arrow-right"></i>';
            }
        });
    </script>
</body>
</html>
