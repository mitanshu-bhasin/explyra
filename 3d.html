    <style>
        body {

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }

        #tooltip {

            display: none;

            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }
    </style>

<body>
    <div id="loader">
        <div class="spinner"></div>
        <div class="label">Assembling High-Detail City</div>
    </div>

    <div id="ui-overlay">
        <div class="label">Explyra Ecosystem Preview</div>
        <div class="sub-label">Futuristic Tech City Ecosystem • High-Detail Architecture • v3.5.0</div>
    </div>

    <div id="tooltip"></div>
    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- Configuration ---
        const COLORS = {
            bg: 0x050810,
            primary: 0x00f2ff,
            secondary: 0x7000ff,
            accent: 0xffffff,
            cityBase: 0x1a1e2e,
            grid: 0x1a2133,
            road: 0x151926,
            window: 0x00f2ff
        };

        const PRODUCT_ZONES = [
            { name: "Explyra Suite", color: 0x00f2ff, pos: { x: -35, z: -25 } },
            { name: "Expense Manager", color: 0x00ff88, pos: { x: -40, z: 15 } },
            { name: "Mailbox", color: 0xff00cc, pos: { x: -15, z: -45 } },
            { name: "Booking / CRM", color: 0xffcc00, pos: { x: 35, z: -30 } },
            { name: "Developer Tools", color: 0x0066ff, pos: { x: 45, z: 20 } },
            { name: "Learning Platform", color: 0xaa00ff, pos: { x: 15, z: 45 } },
            { name: "Cloud Tools", color: 0x00f2ff, pos: { x: -10, z: 35 } }
        ];

        let scene, camera, renderer, composer, controls, raycaster;
        let clock = new THREE.Clock();
        let mouse = new THREE.Vector2();
        let hoveredObject = null;
        
        const worldGroup = new THREE.Group();
        const cityGroup = new THREE.Group();
        const vehicleGroup = new THREE.Group();
        const dataParticlesGroup = new THREE.Group();
        const drones = [];
        const buildings = [];
        const shuttles = [];

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(COLORS.bg);
            scene.fog = new THREE.FogExp2(COLORS.bg, 0.01);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(70, 50, 70);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ReinhardToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.2;
            controls.maxDistance = 200;
            controls.minDistance = 30;

            scene.add(new THREE.AmbientLight(0xffffff, 0.1));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(50, 100, 50);
            scene.add(sun);

            const p1 = new THREE.PointLight(COLORS.primary, 40, 120);
            p1.position.set(-50, 30, -50);
            scene.add(p1);

            const p2 = new THREE.PointLight(COLORS.secondary, 30, 120);
            p2.position.set(50, 30, 50);
            scene.add(p2);

            // Post Processing
            const renderPass = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0.15;
            bloomPass.strength = 1.4;
            bloomPass.radius = 0.5;
            
            composer = new EffectComposer(renderer);
            composer.addPass(renderPass);
            composer.addPass(bloomPass);

            raycaster = new THREE.Raycaster();

            createFloatingIsland();
            createCentralCity();
            createProductZones();
            createRoads();
            createSkyEffects();
            
            scene.add(worldGroup);

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);

            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').remove(), 500);
            }, 2500);
        }

        function createFloatingIsland() {
            // High-detail base with multi-layers
            const baseGeo = new THREE.CylinderGeometry(80, 70, 6, 32);
            const baseMat = new THREE.MeshStandardMaterial({ 
                color: 0x10121a,
                metalness: 0.9,
                roughness: 0.1
            });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = -3;
            worldGroup.add(base);

            // Glowing tech grid with bloom-friendly material
            const gridHelper = new THREE.GridHelper(160, 80, COLORS.primary, COLORS.grid);
            gridHelper.position.y = 0.1;
            gridHelper.material.opacity = 0.25;
            gridHelper.material.transparent = true;
            worldGroup.add(gridHelper);

            // Rock structure underneath
            const rockGeo = new THREE.ConeGeometry(78, 30, 32);
            rockGeo.translate(0, -15, 0);
            const rockMat = new THREE.MeshStandardMaterial({ color: 0x050508, roughness: 1 });
            const rock = new THREE.Mesh(rockGeo, rockMat);
            rock.rotation.x = Math.PI;
            rock.position.y = -6;
            worldGroup.add(rock);
        }

        function createCentralCity() {
            const downtownRadius = 25;
            const buildingsCount = 30;

            for(let i = 0; i < buildingsCount; i++) {
                const angle = (i / buildingsCount) * Math.PI * 2;
                const dist = 5 + Math.random() * (downtownRadius - 5);
                const x = Math.cos(angle) * dist;
                const z = Math.sin(angle) * dist;
                
                const w = 2.5 + Math.random() * 2;
                const h = 8 + Math.random() * 20;
                const d = 2.5 + Math.random() * 2;
                
                const building = createDetailedBuilding(w, h, d, COLORS.primary);
                building.position.set(x, 0, z); // Fixed inside creator
                cityGroup.add(building);
                buildings.push(building);
            }

            // Founder Building (Mitanshu Bhasin) - Unique Tiered Spire
            const founderTower = createFounderTower();
            founderTower.position.set(0, 0, 0);
            cityGroup.add(founderTower);
            buildings.push(founderTower);

            worldGroup.add(cityGroup);
        }

        function createDetailedBuilding(w, h, d, glowColor) {
            const group = new THREE.Group();
            
            // Base Tier
            const baseH = h * 0.7;
            const geo1 = new THREE.BoxGeometry(w, baseH, d);
            const mat1 = new THREE.MeshStandardMaterial({ color: 0x0a0c14, metalness: 1, roughness: 0.05 });
            const mesh1 = new THREE.Mesh(geo1, mat1);
            mesh1.position.y = baseH / 2;
            group.add(mesh1);

            // Top Tier (Tapered)
            const topH = h * 0.3;
            const geo2 = new THREE.CylinderGeometry(w * 0.3, w * 0.5, topH, 4);
            const mesh2 = new THREE.Mesh(geo2, mat1);
            mesh2.position.y = baseH + topH / 2;
            mesh2.rotation.y = Math.PI / 4;
            group.add(mesh2);

            // Emissive strips
            const stripGeo = new THREE.BoxGeometry(w + 0.1, 0.1, d + 0.1);
            const stripMat = new THREE.MeshBasicMaterial({ color: glowColor });
            for(let i = 1; i < 6; i++) {
                const strip = new THREE.Mesh(stripGeo, stripMat);
                strip.position.y = (baseH / 6) * i;
                group.add(strip);
            }

            // Balconies / Roof details
            const roofGeo = new THREE.BoxGeometry(w * 0.8, 0.2, d * 0.8);
            const roof = new THREE.Mesh(roofGeo, mat1);
            roof.position.y = baseH + 0.1;
            group.add(roof);

            // Label Helper
            const shellGeo = new THREE.BoxGeometry(w * 1.1, h * 1.05, d * 1.1);
            const shellMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0, wireframe: true });
            const shell = new THREE.Mesh(shellGeo, shellMat);
            shell.position.y = h / 2;
            shell.name = "hover_shell";
            group.add(shell);

            group.userData = { name: "City Hub Cluster", description: "Office Space for Registered Entities" };
            return group;
        }

        function createFounderTower() {
            const group = new THREE.Group();
            const h = 40;
            const w = 5;

            // Tiered Spire Geometry
            for(let i = 0; i < 4; i++) {
                const tierH = h / 4;
                const tierW = w - i * 0.8;
                const geo = new THREE.CylinderGeometry(tierW - 0.5, tierW, tierH, 4);
                const mat = new THREE.MeshStandardMaterial({ color: 0x1a2133, metalness: 1, roughness: 0.02 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = (tierH * i) + tierH/2;
                mesh.rotation.y = Math.PI/4;
                group.add(mesh);
                
                // Neon Ring between tiers
                const ringGeo = new THREE.TorusGeometry(tierW + 0.1, 0.05, 8, 32);
                const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI/2;
                ring.position.y = (tierH * i);
                group.add(ring);
            }

            // Top Spire
            const antenna = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.1, 8), new THREE.MeshBasicMaterial({ color: 0xffffff }));
            antenna.position.y = h + 4;
            group.add(antenna);

            // Hover Shell
            const shell = new THREE.Mesh(new THREE.BoxGeometry(w+1, h+8, w+1), new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, wireframe: true }));
            shell.name = "hover_shell";
            shell.position.y = h/2;
            group.add(shell);

            group.userData = { name: "Founder Tower: Mitanshu Bhasin", description: "Central Nexus of the Explyra Ecosystem" };
            
            const label = createLabel("Founder Tower");
            label.position.set(0, h+10, 0);
            group.add(label);

            return group;
        }

        function createProductZones() {
            PRODUCT_ZONES.forEach((zone) => {
                const group = new THREE.Group();
                group.position.set(zone.pos.x, 0, zone.pos.z);

                const h = 12 + Math.random() * 8;
                const building = createDetailedBuilding(4, h, 4, zone.color);
                building.userData = { name: zone.name, description: "Official Explyra " + zone.name + " Hub" };
                group.add(building);
                buildings.push(building);

                const label = createLabel(zone.name);
                label.position.set(0, h + 5, 0);
                group.add(label);

                const ui = createUIPanel(zone.color);
                ui.position.set(4, h * 0.6, 0);
                group.add(ui);

                // Animated Network Connection
                createDataFlow(new THREE.Vector3(zone.pos.x, 2, zone.pos.z), new THREE.Vector3(0, 2, 0), zone.color);

                worldGroup.add(group);
            });
        }

        function createDataFlow(start, end, color) {
            const points = [];
            for(let i = 0; i <= 20; i++) {
                const t = i / 20;
                const p = new THREE.Vector3().lerpVectors(start, end, t);
                p.y += Math.sin(t * Math.PI) * 2; // Arched path
                points.push(p);
            }
            const curve = new THREE.CatmullRomCurve3(points);
            const lineGeo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(50));
            const lineMat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.1 });
            const line = new THREE.Line(lineGeo, lineMat);
            worldGroup.add(line);

            // Data particles zip-lining
            for(let i = 0; i < 3; i++) {
                const particle = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), new THREE.MeshBasicMaterial({ color: color }));
                particle.userData = { curve: curve, t: Math.random(), speed: 0.005 + Math.random() * 0.01 };
                dataParticlesGroup.add(particle);
            }
        }

        function createRoads() {
            const roadGeo = new THREE.TorusGeometry(50, 2, 8, 64);
            const roadMat = new THREE.MeshStandardMaterial({ color: COLORS.road, roughness: 0.3 });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = Math.PI / 2;
            road.position.y = 0.05;
            worldGroup.add(road);

            // Realistic Shuttles
            for(let i = 0; i < 20; i++) {
                const shuttle = createShuttleModel(Math.random() > 0.5 ? COLORS.primary : COLORS.secondary);
                shuttle.userData = {
                    angle: Math.random() * Math.PI * 2,
                    speed: 0.004 + Math.random() * 0.008,
                    radius: 50 + (Math.random() - 0.5) * 2
                };
                shuttles.push(shuttle);
                vehicleGroup.add(shuttle);
            }
            worldGroup.add(vehicleGroup);
            worldGroup.add(dataParticlesGroup);
        }

        function createShuttleModel(color) {
            const group = new THREE.Group();
            // Aerodynamic shuttle body
            const bodyGeo = new THREE.CylinderGeometry(0.3, 0.5, 2, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x222233, metalness: 1, roughness: 0.1 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.rotation.x = Math.PI / 2;
            group.add(body);

            // Glass cockpit
            const glassGeo = new THREE.SphereGeometry(0.4, 8, 8);
            const glassMat = new THREE.MeshStandardMaterial({ color: 0x00f2ff, transparent: true, opacity: 0.6 });
            const glass = new THREE.Mesh(glassGeo, glassMat);
            glass.position.z = 0.8;
            glass.position.y = 0.2;
            group.add(glass);

            // Headlights / Taillights
            const lightGeo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
            const hLight = new THREE.Mesh(lightGeo, new THREE.MeshBasicMaterial({ color: 0xffffff }));
            hLight.position.set(0.2, 0, 1);
            group.add(hLight);
            
            const tLight = new THREE.Mesh(lightGeo, new THREE.MeshBasicMaterial({ color: 0xff0000 }));
            tLight.position.set(0, 0, -1);
            group.add(tLight);

            return group;
        }

        function createSkyEffects() {
            // Starfield
            const starGeo = new THREE.BufferGeometry();
            const starPos = [];
            for(let i = 0; i < 4000; i++) {
                starPos.push((Math.random()-0.5)*500, (Math.random()-0.5)*500, (Math.random()-0.5)*500);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15 });
            scene.add(new THREE.Points(starGeo, starMat));

            // Floating Drones (Data Collectors)
            for(let i = 0; i < 15; i++) {
                const drone = new THREE.Group();
                drone.add(new THREE.Mesh(new THREE.OctahedronGeometry(0.3), new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true })));
                const light = new THREE.PointLight(COLORS.primary, 2, 8);
                drone.add(light);
                
                drone.userData = {
                    pivot: new THREE.Vector3((Math.random()-0.5)*120, 30 + Math.random()*30, (Math.random()-0.5)*120),
                    radius: 10 + Math.random()*20,
                    speed: 0.01 + Math.random()*0.02,
                    angle: Math.random() * Math.PI * 2
                };
                drones.push(drone);
                scene.add(drone);
            }
        }

        function createLabel(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512;
            canvas.height = 128;
            ctx.font = 'bold 36px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#00f2ff';
            ctx.shadowColor = '#00f2ff';
            ctx.shadowBlur = 10;
            ctx.fillText(text, 256, 70);
            const texture = new THREE.CanvasTexture(canvas);
            const mat = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(mat);
            sprite.scale.set(16, 4, 1);
            return sprite;
        }

        function createUIPanel(color) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 256;
            ctx.strokeStyle = '#' + color.toString(16).padStart(6, '0');
            ctx.lineWidth = 6;
            ctx.strokeRect(10, 10, 236, 236);
            ctx.fillStyle = ctx.strokeStyle + '22';
            ctx.fillRect(15, 15, 226, 226);
            for(let i = 0; i < 6; i++) {
                ctx.fillStyle = ctx.strokeStyle + '88';
                ctx.fillRect(30, 40 + i * 30, 196 * Math.random(), 12);
            }
            const texture = new THREE.CanvasTexture(canvas);
            const mat = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(mat);
            sprite.scale.set(6, 6, 1);
            return sprite;
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(buildings, true);
            if(intersects.length > 0) {
                let target = intersects[0].object;
                while(target.parent && !buildings.includes(target)) target = target.parent;
                if(hoveredObject !== target) {
                    if(hoveredObject) setHighlight(hoveredObject, false);
                    hoveredObject = target;
                    setHighlight(hoveredObject, true);
                    showTooltip(event.clientX, event.clientY, hoveredObject.userData.name, hoveredObject.userData.description);
                }
            } else {
                if(hoveredObject) setHighlight(hoveredObject, false);
                hoveredObject = null;
                hideTooltip();
            }
        }

        function setHighlight(obj, active) {
            const shell = obj.getObjectByName('hover_shell');
            if(shell) {
                shell.material.opacity = active ? 0.3 : 0;
                shell.material.color.set(active ? 0x00f2ff : 0xffffff);
            }
        }

        function showTooltip(x, y, title, desc) {
            const el = document.getElementById('tooltip');
            el.style.display = 'block';
            el.style.left = (x + 15) + 'px';
            el.style.top = (y + 15) + 'px';
            el.innerHTML = `<strong>${title}</strong><br><small>${desc}</small>`;
        }

        function hideTooltip() {
            document.getElementById('tooltip').style.display = 'none';
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            worldGroup.position.y = Math.sin(time * 0.4) * 1.5;
            worldGroup.rotation.z = Math.sin(time * 0.15) * 0.015;

            // Shuttles with banking
            shuttles.forEach(s => {
                s.userData.angle += s.userData.speed;
                s.position.x = Math.cos(s.userData.angle) * s.userData.radius;
                s.position.z = Math.sin(s.userData.angle) * s.userData.radius;
                s.rotation.y = -s.userData.angle;
                s.rotation.z = s.userData.speed * 10; // Banking effect
            });

            // Data flow particles
            dataParticlesGroup.children.forEach(p => {
                p.userData.t = (p.userData.t + p.userData.speed) % 1;
                const pos = p.userData.curve.getPoint(p.userData.t);
                p.position.copy(pos);
            });

            // Drones
            drones.forEach(d => {
                d.userData.angle += d.userData.speed;
                d.position.x = d.userData.pivot.x + Math.cos(d.userData.angle) * d.userData.radius;
                d.position.z = d.userData.pivot.z + Math.sin(d.userData.angle) * d.userData.radius;
                d.position.y = d.userData.pivot.y + Math.sin(time + d.userData.angle) * 3;
            });

            // Camera Interactivity
            camera.position.x += (mouse.x * 3 - (camera.position.x - 70)) * 0.01;
            camera.position.y += (mouse.y * 3 - (camera.position.y - 50)) * 0.01;

            controls.update();
            composer.render();
        }
    </script>
</body>
</html>
