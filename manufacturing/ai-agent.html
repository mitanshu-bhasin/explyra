<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent — Manufacturing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/ai-support.css">
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <style>
        .ai-container {
            height: calc(100vh - 160px);
            max-width: 1000px;
            margin: 0 auto;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
        }
        .ai-chat-window {
            position: relative !important;
            bottom: auto !important;
            right: auto !important;
            width: 100% !important;
            height: 100% !important;
            max-height: none !important;
            opacity: 1 !important;
            transform: none !important;
            pointer-events: all !important;
            display: flex !important;
            background: rgba(255,255,255,0.8) !important;
            backdrop-filter: blur(20px) !important;
        }
    </style>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "IPEC Consulting",
  "url": "https://explyra.me",
  "logo": "https://explyra.me/assets/images/explyra_logo.png",
  "sameAs": [
    "https://ipecconsulting.org/",
    "https://www.linkedin.com/company/ipec-consulting/",
    "https://twitter.com/ipecconsulting"
  ],
  "@id": "https://explyra.me/#organization"
}
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "IPEC Expense Manager",
  "url": "https://explyra.me",
  "publisher": {
    "@id": "https://explyra.me/#organization"
  },
  "potentialAction": {
    "@type": "SearchAction",
    "target": "https://explyra.me/search?q={search_term_string}",
    "query-input": "required name=search_term_string"
  }
}
</script>
</head>
<body style="background: linear-gradient(rgba(248, 247, 244, 0.9), rgba(248, 247, 244, 0.95)), url('../assets/images/manufacturing_bg.png') center/cover no-repeat fixed;">
    <div class="sidebar"></div>

    <main class="main-content">
        <header class="reveal">
            <div>
                <h1>Manufacturing <span class="grad">AI Agent</span></h1>
                <p style="color: var(--text-muted);">Intelligent floor analysis and operational optimization.</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <span class="badge badge-active"><i class="fas fa-signal-stream"></i> Live Data Feed</span>
            </div>
        </header>

        <section class="reveal">
            <div id="ai-agent-container" class="ai-container">
                <!-- AI Agent will be injected here -->
            </div>
        </section>
    </main>

    <script src="js/data-handler.js"></script>
    <script src="js/main.js"></script>
    <script type="module">
        import { ManufacturingAI } from './js/ai-logic.js';
        import './js/ai-config.js'; // Ensure global AI_CONFIG is loaded

        document.addEventListener('DOMContentLoaded', () => {
            const checkAuth = setInterval(() => {
                const user = firebase.auth().currentUser;
                if (user) {
                    clearInterval(checkAuth);
                    window.mfgAI = new ManufacturingAI({
                        name: user.displayName || user.email.split('@')[0],
                        email: user.email,
                        role: localStorage.getItem('erp_clearance') || 'Operator'
                    }, 'ai-agent-container');
                }
            }, 500);
        });
    </script>
</body>
</html>
