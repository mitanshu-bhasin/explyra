<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><base href="./"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Welcome to Expense Manager | Sign In</title><script src="js/env.js" defer="defer"></script><script src="js/tenant-routing.js" defer="defer"></script><link rel="icon" type="image/png" href="assets/images/explyra_logo.png"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>:root{--glass:rgba(255, 255, 255, 0.98);--glass-border:rgba(0, 0, 0, 0.08);--text-main:#1a1a1a;--text-muted:#666;--brand:#1546C0;--brand-hover:#0d38a0;--success:#10b981;--error:#ef4444}.dark-mode{--glass:rgba(20, 20, 20, 0.95);--glass-border:rgba(255, 255, 255, 0.1);--text-main:#f5f5f5;--text-muted:#999;--brand:#3b82f6;--brand-hover:#60a5fa}*{margin:0;padding:0;box-sizing:border-box}body{font-family:Inter,sans-serif;background:#f8fafc;color:var(--text-main);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:10px;transition:background .3s ease;overflow-y:auto}body.dark-mode{background:#000}.auth-card{width:100%;max-width:380px;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:20px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.05);position:relative}.dual-logos{display:flex;justify-content:center;gap:12px;margin-bottom:16px}.dual-logos img{height:32px;width:auto;object-fit:contain}h1{font-family:Outfit,sans-serif;font-size:20px;font-weight:800;text-align:center;margin-bottom:4px;letter-spacing:-.02em}.subtitle{color:var(--text-muted);font-size:13px;text-align:center;margin-bottom:20px}.tabs{display:flex;background:rgba(0,0,0,.04);padding:3px;border-radius:10px;margin-bottom:16px}.dark-mode .tabs{background:rgba(255,255,255,.05)}.tab-btn{flex:1;border:none;background:0 0;padding:6px;font-size:12px;font-weight:700;color:var(--text-muted);cursor:pointer;border-radius:7px}.tab-btn.active{background:#fff;color:var(--brand);box-shadow:0 2px 6px rgba(0,0,0,.05)}.dark-mode .tab-btn.active{background:#2a2a2a;color:#fff}.input-grp{margin-bottom:12px}label{display:block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:4px}input{width:100%;background:rgba(0,0,0,.02);border:1px solid var(--glass-border);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--text-main);outline:0;transition:all .2s ease}input:focus{border-color:var(--brand);background:0 0;box-shadow:0 0 0 3px rgba(21,70,192,.08)}.dark-mode input{background:rgba(255,255,255,.03)}.btn-primary{width:100%;background:var(--brand);color:#fff;border:none;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s ease}.btn-primary:hover{background:var(--brand-hover);transform:translateY(-1px)}.google-auth{margin-top:10px;width:100%;background:0 0;border:1px solid var(--glass-border);color:var(--text-main);padding:9px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}.google-auth:hover{background:rgba(0,0,0,.02)}.dark-mode .google-auth:hover{background:rgba(255,255,255,.03)}.footer-links{margin-top:20px;text-align:center;font-size:12px}.footer-links a{color:var(--brand);text-decoration:none;margin:0 8px;font-weight:600}.footer-links a:hover{color:var(--brand-hover);text-decoration:underline}.toast{min-height:20px;margin-top:12px;font-size:13px;text-align:center;font-weight:600}.toast.error{color:var(--error)}.toast.success{color:var(--success)}.pane{display:none}.pane.active{display:block;animation:fadeUp .3s ease}@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}</style></head><body><div class="auth-card"><div class="dual-logos"><img src="ipec.jpg" alt="IPEC"> <img src="excenor.png" alt="Excenor"></div><h1>Welcome back</h1><p class="subtitle">Access your Explyra Expense dashboard</p><div class="tabs"><button id="t-login" class="tab-btn active">Sign In</button> <button id="t-activate" class="tab-btn">Activate</button></div><div id="p-login" class="pane active"><form id="f-login"><div class="input-grp"><label>Email or Phone</label> <input type="text" id="l-uid" placeholder="Enter credentials" required></div><div class="input-grp"><label>Password</label> <input type="password" id="l-pwd" placeholder="••••••••" required></div><button class="btn-primary" type="submit"><span>Continue</span> <i class="fa-solid fa-arrow-right"></i></button></form><button class="google-auth" id="g-btn"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="16" alt="G"> <span>Google Sign In</span></button><div class="footer-links"><p style="margin-bottom:10px;color:var(--text-muted)">New setup? <a href="signup.html?next=company.html" style="color:var(--brand)">Create Company</a></p><a href="#" id="forgot">Forgot password?</a> <a href="signup.html">Need help?</a></div></div><div id="p-activate" class="pane"><form id="f-activate"><div class="input-grp"><label>Invited Email</label> <input type="email" id="a-email" placeholder="name@company.com" required></div><div class="input-grp"><label>New Password</label> <input type="password" id="a-pwd" placeholder="Min 8 characters" minlength="8" required></div><div class="input-grp"><label>Confirm</label> <input type="password" id="a-cfn" placeholder="Repeat password" required></div><button class="btn-primary" type="submit">Activate Account</button></form></div><div id="msg" class="toast"></div></div><script type="module">import"./js/auth-gateway.js";const gateway=window.ExplyraAuthGateway,qs=new URLSearchParams(window.location.search),next=qs.get("next")||"";"dark"===localStorage.getItem("explyra-theme")&&document.body.classList.add("dark-mode");const tLogin=document.getElementById("t-login"),tActivate=document.getElementById("t-activate"),pLogin=document.getElementById("p-login"),pActivate=document.getElementById("p-activate"),msg=document.getElementById("msg");function notify(t,e=""){msg.textContent=t,msg.className=`toast ${e}`}tLogin.onclick=()=>{tLogin.className="tab-btn active",tActivate.className="tab-btn",pLogin.className="pane active",pActivate.className="pane",notify("")},tActivate.onclick=()=>{tActivate.className="tab-btn active",tLogin.className="tab-btn",pActivate.className="pane active",pLogin.className="pane",notify("")},document.getElementById("f-login").onsubmit=async t=>{t.preventDefault(),notify("Processing...");const e=document.getElementById("l-uid").value.trim(),a=document.getElementById("l-pwd").value;try{const{userData:t}=await gateway.signInWithIdentifier(e,a);notify("Welcome back!","success"),await gateway.redirectForUser(t,next)}catch(t){notify(t.message,"error")}},document.getElementById("f-activate").onsubmit=async t=>{t.preventDefault();const e=document.getElementById("a-email").value,a=document.getElementById("a-pwd").value;if(a!==document.getElementById("a-cfn").value)return notify("Passwords mismatch","error");notify("Activating...");try{const{userData:t}=await gateway.activateExistingAccount(e,a);notify("Account activated!","success"),await gateway.redirectForUser(t,next)}catch(t){notify(t.message,"error")}},document.getElementById("g-btn").onclick=async()=>{try{const{userData:t}=await gateway.signInWithGoogle();t&&await gateway.redirectForUser(t,next)}catch(t){notify(t.message,"error")}},qs.has("email")&&(tActivate.click(),document.getElementById("a-email").value=qs.get("email"))</script></body></html>
