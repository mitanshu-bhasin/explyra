<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><base href="./"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#1546C0"><title>Explyra Signup</title><script src="js/env.js"></script><script src="js/tenant-routing.js"></script><link rel="icon" type="image/png" href="assets/images/explyra_logo.png"><style>:root{--bg:#f3f3f3;--card:#fff;--ink:#1b1b1b;--muted:#616161;--line:#d0d0d0;--brand:#0067b8;--ok:#0f7b0f;--err:#b42318}*{box-sizing:border-box}body{margin:0;font-family:"Segoe UI","Helvetica Neue",Arial,sans-serif;color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:16px;background:linear-gradient(155deg,#f8f8f8 0,#ececec 100%)}.shell{width:min(420px,100%);background:var(--card);border:1px solid #e6e6e6;border-radius:0;padding:40px;box-shadow:0 6px 18px rgba(0,0,0,.12)}.brand{display:flex;align-items:center;gap:10px;margin-bottom:10px}.brand img{width:32px;height:32px;border-radius:4px}h1{margin:0;font-size:1.6rem;font-weight:600}p{margin:6px 0 16px;color:var(--muted);font-size:.92rem}label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:5px}input{width:100%;padding:11px;border-radius:0;border:1px solid #8a8886;margin-bottom:12px;font-size:.95rem}input:focus{outline:2px solid rgba(0,103,184,.24);border-color:var(--brand)}button{width:100%;border:0;border-radius:0;padding:11px;font-weight:700;background:var(--brand);color:#fff;cursor:pointer}.msg{min-height:22px;margin-top:11px;font-size:.88rem}.msg.ok{color:var(--ok)}.msg.err{color:var(--err)}.links{display:flex;justify-content:space-between;gap:10px;margin-top:12px;flex-wrap:wrap}.links a{color:var(--brand);text-decoration:none;font-weight:600;font-size:.86rem}@media (max-width:480px){.shell{padding:28px 18px}}</style>    <link rel="stylesheet" href="../../assets/css/global-theme.css">
</head><body><div class="shell"><div class="brand"><img src="assets/images/explyra_logo.png" alt="Explyra"><h1>Activate account</h1></div><p>Enter the email invited by your admin and set your password.</p><form id="signup-form"><label for="email">Invited Email</label> <input id="email" type="email" required> <label for="password">Create Password</label> <input id="password" type="password" minlength="8" required> <label for="confirm">Confirm Password</label> <input id="confirm" type="password" minlength="8" required> <button id="submit-btn" type="submit">Activate Account</button></form><div id="msg" class="msg"></div><div class="links"><a href="login.html">Back to login</a> <a href="signup.html?next=company.html">Create company</a> <a href="privacy.html">Privacy</a> <a href="terms.html">Terms</a></div></div><script type="module">import"./js/auth-gateway.js";const gateway=window.ExplyraAuthGateway,qs=new URLSearchParams(window.location.search),msg=document.getElementById("msg");function show(t,e=""){msg.textContent=t||"",msg.className=`msg ${e}`}const prefill=qs.get("email")||"";prefill&&(document.getElementById("email").value=prefill),document.getElementById("signup-form").addEventListener("submit",async t=>{t.preventDefault(),show("");const e=document.getElementById("email").value.trim(),a=document.getElementById("password").value;if(a!==document.getElementById("confirm").value)return void show("Passwords do not match.","err");const n=document.getElementById("submit-btn");n.disabled=!0,n.textContent="Activating...";try{const{userData:t}=await gateway.activateExistingAccount(e,a);show("Account activated. Redirecting...","ok"),await gateway.redirectForUser(t,nextHint)}catch(t){show(t?.message||"Activation failed.","err")}finally{n.disabled=!1,n.textContent="Activate Account"}})</script></body></html>
