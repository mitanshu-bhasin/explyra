# Secondary host option; primary production is Cloudflare Pages (wrangler.toml).
[build]
  publish = "."  # Public directory (root)

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# ==============================
# 🚀 SECURITY & CACHE HEADERS (PRODUCTION MODE)
# ==============================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# ==============================
# 🔒 SENSITIVE FILE PROTECTION
# ==============================

# Block access to firestore rules
[[redirects]]
  from = "/firestore.rules"
  to = "/404.html"
  status = 404
  force = true

# Redirect anything not found to 404.html
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
  force = false