<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>EXPLYRA - Generator Command Center</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet"><style>body{font-family:Inter,sans-serif;background:#fdfdfd;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;color:#111}.card{background:#fff;padding:40px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.05);text-align:center;max-width:800px;width:90%}h1{margin-bottom:20px;font-weight:600;text-transform:uppercase;letter-spacing:2px}p{color:#666;margin-bottom:30px}button{background:#1a1a1a;color:#fff;border:none;padding:15px 40px;font-size:16px;font-weight:600;border-radius:6px;cursor:pointer;transition:.3s;width:100%}button:hover{background:#333;transform:translateY(-2px)}button:disabled{background:#ccc;cursor:not-allowed}#status{margin-top:20px;padding:15px;border-radius:6px;font-weight:600;display:none}.success{background:#e8f5e9;color:#2e7d32;display:block!important}.error{background:#ffebee;color:#c62828;display:block!important}.article-table{margin-top:30px;border-collapse:collapse;width:100%;text-align:left;display:none}.article-table th{padding:12px;border-bottom:2px solid #eee;font-weight:600}.article-table td{padding:12px;border-bottom:1px solid #eee}.thumb{width:60px;height:40px;border-radius:4px;object-fit:cover}.view-btn{text-decoration:none;background:#eee;padding:5px 12px;border-radius:4px;color:#333;font-size:13px;font-weight:600}</style></head><body><div class="card"><h1>EXPLYRA BATCH-GEN</h1><p>Triggering this will fetch **10 Top Tech Headlines** and generate individual 1000-word articles with SEO Meta Tags and dynamic thumbnails.</p><button id="triggerBtn" onclick="startGeneration()">START BATCH GENERATION (10x)</button><div id="status">Connecting...</div><table class="article-table" id="articlesTable"><thead><tr><th>Thumb</th><th>Article Title</th><th>Action</th></tr></thead><tbody id="articlesBody"></tbody></table></div><script>async function startGeneration(){const e=document.getElementById("triggerBtn"),t=document.getElementById("status"),n=document.getElementById("articlesTable"),s=document.getElementById("articlesBody");e.disabled=!0,t.innerHTML="⚡ Generating 10 technical articles with thumbnails. This may take 30-40s...",t.className="success",n.style.display="none";try{const e=await fetch("/api/trigger",{method:"POST"}),a=await e.json();a.success?(t.innerHTML="✅ SUCCESS: 10 Articles Generated Successfully!",s.innerHTML="",a.articles.forEach(e=>{s.innerHTML+=`\n                            <tr>\n                                <td><img src="${e.thumb}" class="thumb"></td>\n                                <td>${e.title}</td>\n                                <td><a href="${e.url}" target="_blank" class="view-btn">VIEW HTML</a></td>\n                            </tr>\n                        `}),n.style.display="table"):(t.innerHTML="❌ FAILED: "+(a.error||"Unknown error"),t.className="error")}catch(e){t.innerHTML="❌ FAILED: "+e.message,t.className="error"}finally{e.disabled=!1}}</script></body></html>
