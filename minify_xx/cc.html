<!DOCTYPE html><html lang="en" data-theme="dark"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Explyra — Document Verification (CC)</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@12..96,200..800&family=Inter:wght@300..700&display=swap" rel="stylesheet"><script src="js/env.js"></script><style>:root{--bg:#04060b;--blue:#6724b2;--ink:#EEF0F8;--bdr:rgba(255, 255, 255, .1)}body{background:var(--bg);color:var(--ink);font-family:Inter,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;overflow:hidden}.verify-card{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);border:1px solid var(--bdr);padding:40px;border-radius:24px;max-width:450px;width:90%;text-align:center;animation:slideUp .6s ease}@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}.logo{width:60px;margin-bottom:20px}h1{font-family:Inter,sans-serif;margin-bottom:10px;font-size:1.8rem}p{color:#8290a8;margin-bottom:30px;font-size:.95rem}.status-badge{padding:10px 20px;border-radius:100px;font-weight:700;display:inline-flex;align-items:center;gap:8px;margin-bottom:30px}.status-valid{background:rgba(52,211,153,.1);color:#34d399}.status-invalid{background:rgba(244,114,182,.1);color:#f472b6}.details-box{text-align:left;background:rgba(0,0,0,.2);padding:20px;border-radius:12px;margin-bottom:20px}.detail-row{display:flex;justify-content:space-between;margin-bottom:10px;font-size:.85rem}.detail-row span:first-child{color:#4e5a70}.detail-row span:last-child{color:#eef0f8;font-weight:600}</style></head><body><div class="verify-card"><img src="nobg.png" alt="Explyra" class="logo"><h1>Document Verification</h1><p id="subHeading">Authenticating Explyra Secure Document...</p><div id="statusContainer" class="hidden"><div id="statusBadge" class="status-badge"><i class="fas fa-check-circle"></i> VERIFIED</div><div class="details-box"><div class="detail-row"><span>Document ID</span><span id="resId"></span></div><div class="detail-row"><span>Candidate</span><span id="resName"></span></div><div class="detail-row"><span>Role</span><span id="resRole"></span></div><div class="detail-row"><span>Issued On</span><span id="resDate"></span></div></div><p style="font-size:.75rem">This document is part of the Explyra Suite secure blockchain verification system.</p></div><div id="errorContainer" class="hidden"><div class="status-badge status-invalid"><i class="fas fa-times-circle"></i> INVALID</div><p>We could not find a record for this document ID. It may be forged or expired.</p></div><div id="loader"><i class="fas fa-spinner fa-spin fa-3x" style="color:var(--blue)"></i></div></div><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";import{getFirestore,collection,query,where,getDocs}from"https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";const firebaseConfig=window.EXPLYRA_CONFIG.firebase,app=initializeApp(firebaseConfig),db=getFirestore(app),urlParams=new URLSearchParams(window.location.search),docId=urlParams.get("id");async function verify(){const e=document.getElementById("loader"),t=document.getElementById("statusContainer"),d=document.getElementById("errorContainer");if(!docId)return e.classList.add("hidden"),d.classList.remove("hidden"),void(document.getElementById("subHeading").innerText="No Document ID Provided");try{const s=query(collection(db,"generated_docs"),where("docId","==",docId)),n=await getDocs(s);if(e.classList.add("hidden"),n.empty)d.classList.remove("hidden");else{const e=n.docs[0].data();t.classList.remove("hidden"),document.getElementById("statusBadge").className="status-badge status-valid",document.getElementById("resId").innerText=e.docId,document.getElementById("resName").innerText=e.candidateName,document.getElementById("resRole").innerText=e.role,document.getElementById("resDate").innerText=e.createdAt?.toDate().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"})||"N/A"}}catch(t){console.error(t),e.classList.add("hidden"),d.classList.remove("hidden")}}verify()</script></body></html>
