rdersTable tbody").innerHTML=t.map(t=>`\n                <tr>\n                    <td><strong>${t.id}</strong></td>\n                    <td>${t.product}</td>\n                    <td>${t.quantity} units</td>\n                    <td>${t.dueDate}</td>\n                    <td><span style="font-family: monospace; color: var(--accent);">${t.batchId}</span></td>\n                    <td><span class="badge ${"Active"===t.status?"badge-active":"Pending"===t.status?"badge-idle":"badge-maintenance"}">${t.status}</span></td>\n                    <td>\n                        <button class="btn" style="padding: 5px 10px;" onclick="window.showToast('Order details feature coming soon!', 'info')"><i class="fas fa-eye"></i></button>\n                        <button class="btn" style="padding: 5px 10px; color: var(--danger);" onclick="deleteItem('orders', 'id', '${t.id}')"><i class="fas fa-trash"></i></button>\n                    </td>\n                </tr>\n            `).join("")})</script></body></html>
