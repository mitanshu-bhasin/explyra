name = "explyra-api-e"
main = "src/index.mjs"
compatibility_date = "2026-03-16"
routes = [
  { pattern = "api.explyra.me", custom_domain = true }
]

# Node.js compatibility for some pure-js libs if needed (though we use Web Crypto)
compatibility_flags = [ "nodejs_compat" ]

kv_namespaces = [
  { binding = "EXPLYRA_COMPANIES", id = "29551b1990794f8d8e195d77f228f5ff" },
  { binding = "EXPLYRA_API_KEYS", id = "dd6c748eeac941faa32132845c3c3803" },
  { binding = "EXPLYRA_USAGE", id = "a909885c4d2e4e59b237ad3d55cd9337" },
  { binding = "EXPLYRA_SESSIONS", id = "0c92ec0efc8e48b5a06cb5009719173a" },
  { binding = "EXPLYRA_EXPENSES", id = "4fd89ac22641494d9dd02aeba3496403" }
]

# Public Firebase project id (safe in vars). FIREBASE_API_KEY is a client-style key but
# prefer `wrangler secret put FIREBASE_API_KEY` if you want it out of git-backed config.
[vars]
FIREBASE_PROJECT_ID = "explyras"
FIREBASE_API_KEY = "AIzaSyAKXkuH1zbUwOD1gA35gG4vQXKTX60xwe0"

# Required secrets (never commit values):
#   wrangler secret put JWT_SECRET
#   wrangler secret put WEBHOOK_SECRET
# Optional: wrangler secret put FIREBASE_API_KEY  # overrides [vars] if you migrate off plain vars
