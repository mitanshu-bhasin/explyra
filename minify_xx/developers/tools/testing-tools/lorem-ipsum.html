olore magna aliqua ut enim ad minim veniam quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur excepteur sint occaecat cupidatat non proident sunt in culpa qui officia deserunt mollit anim id est laborum".split(" ");function generateWords(e){let t=[];for(let n=0;n<e;n++)t.push(words[Math.floor(Math.random()*words.length)]);return t.join(" ")}function generateSentences(e){let t=[];for(let n=0;n<e;n++){let e=generateWords(Math.floor(10*Math.random())+5);t.push(e.charAt(0).toUpperCase()+e.slice(1)+".")}return t.join(" ")}function generateParagraphs(e){let t=[];for(let n=0;n<e;n++)t.push(generateSentences(Math.floor(3*Math.random())+3));return t.join("\n\n")}const genBtn=document.getElementById("genBtn"),output=document.getElementById("output");genBtn.addEventListener("click",()=>{const e=parseInt(document.getElementById("count").value),t=document.getElementById("type").value;output.value="w"===t?generateWords(e):"s"===t?generateSentences(e):generateParagraphs(e)}),document.getElementById("copyBtn").addEventListener("click",()=>{output.select(),document.execCommand("copy")}),document.getElementById("genBtn").click()</script></body></html>
