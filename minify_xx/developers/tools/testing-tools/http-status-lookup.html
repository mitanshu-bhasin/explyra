quested resource could not be found but may be available in the future."},{code:500,name:"Internal Server Error",desc:"A generic error message, given when an unexpected condition was encountered."},{code:502,name:"Bad Gateway",desc:"The server was acting as a gateway or proxy and received an invalid response from the upstream server."},{code:503,name:"Service Unavailable",desc:"The server is currently unavailable (because it is overloaded or down for maintenance)."}],list=document.getElementById("statusList"),search=document.getElementById("search");function render(e){list.innerHTML=e.map(e=>`\n                <div class="status-item">\n                    <div class="status-code">${e.code}</div>\n                    <div class="status-info">\n                        <h3>${e.name}</h3>\n                        <p>${e.desc}</p>\n                    </div>\n                </div>\n            `).join("")}search.addEventListener("input",e=>{const n=e.target.value.toLowerCase();render(statusCodes.filter(e=>e.code.toString().includes(n)||e.name.toLowerCase().includes(n)||e.desc.toLowerCase().includes(n)))}),render(statusCodes)</script></body></html>
