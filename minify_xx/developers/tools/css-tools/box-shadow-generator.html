="input-group" style="margin-top:30px"><label>Generated CSS</label> <textarea id="output" readonly="readonly" style="min-height:60px"></textarea></div><div class="btn-row"><button id="copyBtn" class="btn btn-primary">Copy CSS Code</button></div></div></main><script>const preview=document.getElementById("preview"),output=document.getElementById("output"),controls=["shiftX","shiftY","blur","spread","opacity","color"];function hexToRgb(e){return`${parseInt(e.slice(1,3),16)}, ${parseInt(e.slice(3,5),16)}, ${parseInt(e.slice(5,7),16)}`}function update(){const e=document.getElementById("shiftX").value,t=document.getElementById("shiftY").value,n=document.getElementById("blur").value,o=document.getElementById("spread").value,d=document.getElementById("opacity").value/100,u=document.getElementById("color").value;document.getElementById("valX").textContent=e,document.getElementById("valY").textContent=t,document.getElementById("valBlur").textContent=n,document.getElementById("valSpread").textContent=o,document.getElementById("valOp").textContent=d;const l=`box-shadow: ${e}px ${t}px ${n}px ${o}px rgba(${hexToRgb(u)}, ${d});`;preview.style.boxShadow=`${e}px ${t}px ${n}px ${o}px rgba(${hexToRgb(u)}, ${d})`,output.value=l}controls.forEach(e=>{document.getElementById(e).addEventListener("input",update)}),document.getElementById("copyBtn").addEventListener("click",()=>{output.select(),document.execCommand("copy")}),update()</script></body></html>
