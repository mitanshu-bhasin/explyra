input.value.trim();if(t)try{output.value=csvToJSON(t)}catch(t){output.value="Error: Invalid CSV format."}}),copyBtn.addEventListener("click",()=>{output.select(),document.execCommand("copy"),copyBtn.textContent="Copied!",setTimeout(()=>copyBtn.textContent="Copy JSON",2e3)}),document.getElementById("clearBtn").addEventListener("click",()=>{input.value="",output.value=""})</script></body></html>
