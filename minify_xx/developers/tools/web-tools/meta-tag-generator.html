s"><option value="index, follow">Yes (index, follow)</option><option value="noindex, nofollow">No (noindex, nofollow)</option></select></div></div><div class="btn-row"><button id="genBtn" class="btn btn-primary">Generate Tags</button> <button id="copyBtn" class="btn btn-secondary">Copy Result</button></div><div class="input-group"><label for="output">Generated HTML Tags</label> <textarea id="output" readonly="readonly" style="min-height:150px"></textarea></div></div></main><script>const genBtn=document.getElementById("genBtn"),output=document.getElementById("output"),copyBtn=document.getElementById("copyBtn");genBtn.addEventListener("click",()=>{const t=document.getElementById("siteTitle").value;let e="\x3c!-- Primary Meta Tags --\x3e\n";t&&(e+=`<title>${t}</title>\n`),e+=`<meta name="title" content="${t}">\n`,e+=`<meta name="description" content="${document.getElementById("siteDesc").value}">\n`,e+=`<meta name="keywords" content="${document.getElementById("siteKeywords").value}">\n`,e+=`<meta name="author" content="${document.getElementById("siteAuthor").value}">\n`,e+=`<meta name="robots" content="${document.getElementById("allowRobots").value}">\n`,e+='<meta http-equiv="Content-Type" content="text/html; charset=utf-8">\n',e+=`<meta name="language" content="${document.getElementById("siteLang").value}">\n`,output.value=e}),copyBtn.addEventListener("click",()=>{output.select(),document.execCommand("copy");const t=copyBtn.textContent;copyBtn.textContent="Copied!",setTimeout(()=>copyBtn.textContent=t,2e3)})</script></body></html>
