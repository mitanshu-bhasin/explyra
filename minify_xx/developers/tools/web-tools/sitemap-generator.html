</head><body><header><meta property="og:site_name" content="Explyra"><meta property="og:locale" content="en_US"><meta name="twitter:site" content="@explyras"><meta name="twitter:creator" content="@explyras"><meta name="twitter:card" content="summary_large_image"><a href="../../index.html" class="logo"><div class="logo-icon">E</div><span>Explyra <span style="font-weight:400;font-family:Outfit;font-size:.8rem;color:var(--ink3)">Developers</span></span></a></header><main class="container"><nav style="margin-bottom:20px;font-size:.9rem;color:var(--ink3)"><a href="../../index.html">Developers</a> / Web Tools / Sitemap.xml Generator</nav><div class="tool-card animate-fade"><div class="tool-header"><h1 class="tool-title">Sitemap.xml Generator</h1><p class="tool-desc">Paste your website URLs (one per line) to generate a sitemap for search engines.</p></div><div class="input-group"><label for="urls">Internal URLs</label> <textarea id="urls" style="min-height:150px" placeholder="https://example.com/&#10;https://example.com/about&#10;https://example.com/pricing"></textarea></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:20px"><div class="input-group"><label for="priority">Global Priority</label> <select id="priority"><option value="1.0">1.0 (High)</option><option value="0.8" selected="selected">0.8 (Standard)</option><option value="0.5">0.5 (Low)</option></select></div><div class="input-group"><label for="freq">Change Frequency</label> <select id="freq"><option value="always">Always</option><option value="hourly">Hourly</option><option value="daily" selected="selected">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option></select></div></div><div class="btn-row"><button id="genBtn" class="btn btn-primary">Generate Sitemap</button> <button id="copyBtn" class="btn btn-secondary">Copy XML</button> <button id="downloadBtn" class="btn btn-secondary">Download XML</button></div><div class="input-group"><label for="output">Generated Sitemap.xml</label> <textarea id="output" readonly="readonly" style="min-height:200px;font-size:.85rem"></textarea></div></div></main><script>const genBtn=document.getElementById("genBtn"),output=document.getElementById("output"),copyBtn=document.getElementById("copyBtn");genBtn.addEventListener("click",()=>{const t=document.getElementById("urls").value.split("\n"),e=document.getElementById("freq").value,n=document.getElementById("priority").value,o=(new Date).toISOString().split("T")[0];let l='<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n';t.forEach(t=>{t.trim()&&(l+=`  <url>\n    <loc>${t.trim()}</loc>\n    <lastmod>${o}</lastmod>\n    <changefreq>${e}</changefreq>\n    <priority>${n}</priority>\n  </url>\n`)}),l+="</urlset>",output.value=l}),copyBtn.addEventListener("click",()=>{output.select(),document.execCommand("copy"),copyBtn.textContent="Copied!",setTimeout(()=>copyBtn.textContent="Copy XML",2e3)}),document.getElementById("downloadBtn").addEventListener("click",()=>{const t=new Blob([output.value],{type:"application/xml"}),e=URL.createObjectURL(t),n=document.createElement("a");n.href=e,n.download="sitemap.xml",n.click()})</script></body></html>
