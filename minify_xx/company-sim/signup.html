<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sign Up — CompanySim</title><meta name="description" content="Create your CompanySim account and start building your AI-powered company."><link rel="icon" type="image/svg+xml" href="../favicon.svg"><link rel="stylesheet" href="css/variables.css"><link rel="stylesheet" href="css/base.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/auth.css"><script src="../js/security.js" defer="defer"></script></head><body><div class="auth-page"><div class="auth-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div></div><div class="auth-container"><div class="auth-header"><a class="auth-logo" href="index.html"><div class="auth-logo-icon">CS</div><span class="auth-logo-text">CompanySim</span></a><h1>Create Your Account</h1><p>Start building your AI-powered company today</p></div><div class="auth-card"><form class="auth-form" id="signup-form" onsubmit="handleSignup(event)"><div class="input-group"><label for="signup-name">Full Name</label> <input class="input" type="text" id="signup-name" placeholder="John Doe" required autocomplete="name"></div><div class="input-group"><label for="signup-email">Email Address</label> <input class="input" type="email" id="signup-email" placeholder="john@company.com" required autocomplete="email"></div><div class="input-group"><label for="signup-password">Password</label><div class="input-wrapper"><input class="input" type="password" id="signup-password" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password"> <button type="button" class="password-toggle" onclick='togglePassword("signup-password",this)'>👁</button></div></div><div id="signup-error" class="error-text" style="display:none"></div><button type="submit" class="btn btn-primary" id="signup-btn"><span id="signup-btn-text">Create Account</span> <span id="signup-btn-spinner" class="spinner" style="display:none"></span></button></form><div class="divider-text" style="margin:24px 0">or continue with</div><button class="google-btn" onclick="handleGoogleSignup()"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continue with Google</button></div><p class="auth-footer">Already have an account? <a href="login.html">Log in</a></p></div></div><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script><script src="js/firebase-init.js"></script><script src="js/utils.js"></script><script src="js/auth.js"></script><script src="js/router.js"></script><script>function togglePassword(e,t){const n=document.getElementById(e),o="password"===n.type;n.type=o?"text":"password",t.textContent=o?"🔒":"👁"}async function handleSignup(e){e.preventDefault();const t=document.getElementById("signup-name").value.trim(),n=document.getElementById("signup-email").value.trim(),o=document.getElementById("signup-password").value,s=document.getElementById("signup-error"),i=document.getElementById("signup-btn"),c=document.getElementById("signup-btn-text"),l=document.getElementById("signup-btn-spinner");s.style.display="none",i.disabled=!0,c.textContent="Creating account...",l.style.display="inline-block";const a=await AuthService.signup(n,o,t);a.success?(Utils.toast("Account created! Welcome to CompanySim 🎉","success"),setTimeout(()=>window.location.href="dashboard.html",500)):(s.textContent=a.error,s.style.display="block",i.disabled=!1,c.textContent="Create Account",l.style.display="none")}async function handleGoogleSignup(){const e=await AuthService.googleSignIn();e.success?(Utils.toast("Welcome to CompanySim! 🎉","success"),setTimeout(()=>window.location.href="dashboard.html",500)):Utils.toast(e.error,"error")}Router.redirectIfAuth()</script></body></html>
