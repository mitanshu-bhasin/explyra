<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Settings — CompanySim</title><link rel="stylesheet" href="css/presentation.css"><link rel="stylesheet" href="css/dashboard.css"><style>.settings-container{max-width:800px;margin:40px auto;padding:30px;background:rgba(255,255,255,.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:20px}.section-title{font-size:24px;font-weight:700;margin-bottom:20px;color:#fff;display:flex;align-items:center;gap:12px}.settings-group{margin-bottom:30px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,.1)}.settings-field{margin-bottom:20px}.settings-label{display:block;font-size:14px;font-weight:600;color:#a0a8d0;margin-bottom:8px}.settings-input{width:100%;padding:12px 16px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-size:16px;transition:all .3s ease}.settings-input:focus{border-color:#667eea;outline:0;box-shadow:0 0 10px rgba(102,126,234,.3)}.integration-card{display:flex;align-items:center;justify-content:space-between;padding:20px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:16px;margin-top:15px}.integration-info{display:flex;align-items:center;gap:15px}.integration-icon{width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:red;border-radius:12px;color:#fff;font-size:24px}.integration-details h4{margin:0;font-size:18px;color:#fff}.integration-details p{margin:4px 0 0;font-size:14px;color:#a0a8d0}.btn-connect{padding:10px 20px;background:red;border:none;border-radius:10px;color:#fff;font-weight:600;cursor:pointer;transition:all .3s ease}.btn-connect.connected{background:rgba(255,255,255,.1);color:#38ef7d}.save-bar{position:sticky;bottom:20px;display:flex;justify-content:flex-end;gap:15px;margin-top:40px}.btn-save{padding:14px 28px;background:linear-gradient(135deg,#667eea 0,#764ba2 100%);border:none;border-radius:12px;color:#fff;font-weight:700;cursor:pointer;box-shadow:0 4px 15px rgba(118,75,162,.4)}</style></head><body class="dark-mode"><div class="app-container"><div id="sidebar-container"></div><main class="main-content"><div class="settings-container"><h1 class="section-title">⚙️ Settings</h1><div class="settings-group"><h3>Profile Integration</h3><div class="settings-field"><span class="settings-label">YouTube API Key (Optional for real data)</span> <input type="text" id="youtube-api-key" class="settings-input" placeholder="AIzaSy..."></div></div><div class="settings-group"><h3>Integrations</h3><div class="integration-card" id="youtube-integration"><div class="integration-info"><div class="integration-icon">▶️</div><div class="integration-details"><h4>YouTube Analytics</h4><p id="yt-status">Not connected</p></div></div><button class="btn-connect" onclick="connectYouTube()">Connect</button></div><div id="yt-settings" style="display:none;margin-top:15px"><div class="settings-field"><span class="settings-label">Channel ID / Username</span> <input type="text" id="youtube-channel-id" class="settings-input" placeholder="e.g. UC_x5XG1OV2P6uZZ5FSM9Ttw"></div><div class="settings-field"><span class="settings-label">Insight Extraction Mode</span> <select id="yt-mode" class="settings-input"><option value="auto">Automatic (Every Response)</option><option value="manual">Manual Mention only</option><option value="creative">Creative Simulation (Premium)</option></select></div></div></div><div class="save-bar"><button class="btn-save" onclick="saveSettings()">Save Changes</button></div></div></main></div><script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-firestore-compat.js"></script><script src="js/firebase-init.js"></script><script src="js/sidebar.js"></script><script src="js/utils.js"></script><script>let isConnected=!1;async function loadSettings(){const e=csAuth.currentUser;if(!e)return;const t=await csDb.collection("cs_users").doc(e.uid).get();if(t.exists){const e=t.data();e.youtube&&(document.getElementById("youtube-channel-id").value=e.youtube.channelId||"",document.getElementById("yt-mode").value=e.youtube.mode||"auto",document.getElementById("youtube-api-key").value=e.youtube.apiKey||"",e.youtube.channelId&&markConnected())}}function connectYouTube(){isConnected=!isConnected;const e=document.getElementById("yt-settings"),t=document.querySelector(".btn-connect");isConnected?(e.style.display="block",t.textContent="Disconnect",t.classList.add("connected"),Utils.toast("YouTube connection enabled locally. Enter your channel ID.","success")):(e.style.display="none",t.textContent="Connect",t.classList.remove("connected"),document.getElementById("yt-status").textContent="Not connected")}function markConnected(){isConnected=!0,document.getElementById("yt-settings").style.display="block";const e=document.querySelector(".btn-connect");e.textContent="Connected",e.classList.add("connected"),document.getElementById("yt-status").textContent="Connected to Channel"}async function saveSettings(){const e=csAuth.currentUser;if(!e)return void Utils.toast("You must be logged in to save settings.","error");Utils.showLoading("Saving settings...");const t={channelId:document.getElementById("youtube-channel-id").value,mode:document.getElementById("yt-mode").value,apiKey:document.getElementById("youtube-api-key").value,connected:isConnected};try{await csDb.collection("cs_users").doc(e.uid).set({youtube:t,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:!0}),Utils.hideLoading(),Utils.toast("Settings saved successfully!","success")}catch(e){Utils.hideLoading(),Utils.toast("Error saving settings: "+e.message,"error")}}csAuth.onAuthStateChanged(e=>{e&&loadSettings()})</script></body></html>
