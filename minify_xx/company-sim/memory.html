<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Memory & History — CompanySim</title><meta name="description" content="View past meetings, summaries, decisions, and company knowledge base."><link rel="icon" type="image/svg+xml" href="../favicon.svg"><link rel="stylesheet" href="css/variables.css"><link rel="stylesheet" href="css/base.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/memory.css"></head><body><div class="main-content page-content" id="main-content"><div id="memory-content"><div style="text-align:center;padding:100px 0"><div class="loading-spinner" style="margin:0 auto 16px"></div><p class="loading-text">Loading memories...</p></div></div></div><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script><script src="js/firebase-init.js"></script><script src="js/utils.js"></script><script src="js/auth.js"></script><script src="js/router.js"></script><script src="js/sidebar.js"></script><script src="js/company.js"></script><script src="js/meeting-service.js"></script><script src="js/memory.js"></script><script src="data/role-catalog.js"></script><script>let companyData=null,meetingsData=[],memoriesData=[],agentsData=[],currentFilter="all",searchQuery="";const roleMap={};function renderMemoryPage(){const e=document.getElementById("memory-content"),t=filterMemories(),n=memoriesData.filter(e=>"decision"===e.type),s=memoriesData.filter(e=>"insight"===e.type),a=memoriesData.filter(e=>"action"===e.type),i=memoriesData.filter(e=>"fact"===e.type);e.innerHTML=`\n        <div class="memory-page-header">\n          <div>\n            <h1 class="page-title">🧠 Memory & History</h1>\n            <p class="page-subtitle">${memoriesData.length} memories from ${meetingsData.length} meetings</p>\n          </div>\n          <div class="memory-search">\n            <span class="memory-search-icon">🔍</span>\n            <input class="input" type="text" id="memory-search-input" placeholder="Search memories..."\n              value="${searchQuery}" oninput="handleSearch(this.value)" style="padding-left:40px">\n          </div>\n        </div>\n\n        \x3c!-- Stats Row --\x3e\n        <div class="dashboard-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:var(--space-6)">\n          <div class="stat-card" style="cursor:pointer" onclick="setFilter('decision')">\n            <div class="stat-label">Decisions</div>\n            <div class="stat-value" style="color:var(--color-accent-green);font-size:var(--font-size-xl)">${n.length}</div>\n          </div>\n          <div class="stat-card" style="cursor:pointer" onclick="setFilter('insight')">\n            <div class="stat-label">Insights</div>\n            <div class="stat-value" style="color:var(--color-accent-purple);font-size:var(--font-size-xl)">${s.length}</div>\n          </div>\n          <div class="stat-card" style="cursor:pointer" onclick="setFilter('action')">\n            <div class="stat-label">Action Items</div>\n            <div class="stat-value" style="color:var(--color-accent-orange);font-size:var(--font-size-xl)">${a.length}</div>\n          </div>\n          <div class="stat-card" style="cursor:pointer" onclick="setFilter('fact')">\n            <div class="stat-label">Facts</div>\n            <div class="stat-value" style="color:var(--color-accent-blue);font-size:var(--font-size-xl)">${i.length}</div>\n          </div>\n        </div>\n\n        \x3c!-- Filter Tabs --\x3e\n        <div class="memory-filters">\n          <button class="chip ${"all"===currentFilter?"selected":""}" onclick="setFilter('all')">All</button>\n          <button class="chip ${"decision"===currentFilter?"selected":""}" onclick="setFilter('decision')">✅ Decisions</button>\n          <button class="chip ${"insight"===currentFilter?"selected":""}" onclick="setFilter('insight')">💡 Insights</button>\n          <button class="chip ${"action"===currentFilter?"selected":""}" onclick="setFilter('action')">📌 Actions</button>\n          <button class="chip ${"fact"===currentFilter?"selected":""}" onclick="setFilter('fact')">📄 Facts</button>\n          <button class="chip ${"meetings"===currentFilter?"selected":""}" onclick="setFilter('meetings')">💬 Meetings</button>\n        </div>\n\n        \x3c!-- Content Area --\x3e\n        <div id="memory-list-area">\n          ${"meetings"===currentFilter?renderMeetingsList():renderMemoriesList(t)}\n        </div>\n\n        \x3c!-- Agent Memory Section --\x3e\n        ${agentsData.length>0?`\n          <div class="agent-memory-section">\n            <h3 style="margin-bottom:var(--space-5)">🤖 Agent Knowledge</h3>\n            <div class="agent-memory-grid">\n              ${agentsData.map(e=>{const t=roleMap[e.id]||e,n=memoriesData.filter(t=>t.agentRole===e.id);return`\n                  <div class="agent-memory-card">\n                    <div class="agent-memory-header">\n                      <div class="agent-memory-avatar" style="background:${t.bgColor||"rgba(102,126,234,0.12)"}">${t.emoji||"🤖"}</div>\n                      <div>\n                        <div class="agent-memory-name">${Utils.escapeHtml(t.name||e.id)}</div>\n                        <div style="font-size:11px;color:var(--color-text-muted)">${(e.memory||[]).length+n.length} memories</div>\n                      </div>\n                    </div>\n                    <div class="agent-memory-entries">\n                      ${(e.memory||[]).slice(0,3).map(e=>`\n                        <div class="agent-memory-entry">${Utils.escapeHtml(Utils.truncate(e,80))}</div>\n                      `).join("")}\n                      ${0===(e.memory||[]).length&&0===n.length?'<div class="agent-memory-entry" style="opacity:0.5">No memories yet</div>':""}\n                    </div>\n                  </div>\n                `}).join("")}\n            </div>\n          </div>\n        `:""}\n      `}function filterMemories(){let e=memoriesData;if("all"!==currentFilter&&"meetings"!==currentFilter&&(e=e.filter(e=>e.type===currentFilter)),searchQuery){const t=searchQuery.toLowerCase();e=e.filter(e=>(e.content||"").toLowerCase().includes(t))}return e}function renderMemoriesList(e){if(0===e.length)return`\n          <div class="empty-state" style="padding:60px">\n            <div class="empty-state-icon">📭</div>\n            <h3 class="empty-state-title">No memories found</h3>\n            <p class="empty-state-text">${searchQuery?"Try a different search term.":"Hold meetings to start building your knowledge base."}</p>\n          </div>\n        `;const t={decision:"✅",insight:"💡",action:"📌",fact:"📄"},n={decision:"green",insight:"purple",action:"orange",fact:"blue"},s={};return e.forEach(e=>{const t=e.createdAt?Utils.formatDate(e.createdAt):"Unknown Date";s[t]||(s[t]=[]),s[t].push(e)}),`\n        <div class="memory-timeline">\n          ${Object.entries(s).map(([e,s])=>`\n            <div class="memory-date-group">\n              <div class="memory-date-label">${e}</div>\n              ${s.map(e=>`\n                <div class="memory-entry" onclick="this.classList.toggle('expanded')">\n                  <div class="memory-entry-header">\n                    <div class="memory-entry-type">\n                      <span class="memory-type-icon">${t[e.type]||"📄"}</span>\n                      <span class="memory-type-label badge badge-${n[e.type]||"blue"}">${e.type||"memory"}</span>\n                    </div>\n                    <div class="memory-meta-item">${Utils.formatRelative(e.createdAt)}</div>\n                  </div>\n                  <div class="memory-entry-content">${Utils.escapeHtml(e.content)}</div>\n                  <div class="memory-entry-details">\n                    <div class="memory-entry-meta">\n                      <span class="memory-meta-item">📁 Source: ${e.source||"meeting"}</span>\n                      ${e.agentRole?`<span class="memory-meta-item">🤖 ${roleMap[e.agentRole]?.name||e.agentRole}</span>`:""}\n                    </div>\n                  </div>\n                </div>\n              `).join("")}\n            </div>\n          `).join("")}\n        </div>\n      `}function renderMeetingsList(){return 0===meetingsData.length?'\n          <div class="empty-state" style="padding:60px">\n            <div class="empty-state-icon">💬</div>\n            <h3 class="empty-state-title">No meetings yet</h3>\n            <p class="empty-state-text">Start a meeting to see the history here.</p>\n            <a href="meeting.html" class="btn btn-primary" style="margin-top:16px">Start First Meeting</a>\n          </div>\n        ':`\n        <div style="display:flex;flex-direction:column;gap:var(--space-4)">\n          ${meetingsData.map(e=>`\n            <div class="card" style="cursor:pointer" onclick="window.location.href='meeting.html?id=${e.id}'">\n              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-3)">\n                <h4 style="font-size:var(--font-size-base);font-weight:700">${Utils.escapeHtml(e.topic)}</h4>\n                <span class="badge badge-${"completed"===e.status?"green":"orange"}">${e.status||"active"}</span>\n              </div>\n              ${e.summary?`<p style="font-size:var(--font-size-sm);color:var(--color-text-muted);margin-bottom:var(--space-3)">${Utils.escapeHtml(Utils.truncate(e.summary,200))}</p>`:""}\n              <div style="display:flex;gap:var(--space-4);font-size:var(--font-size-xs);color:var(--color-text-muted)">\n                <span>🤖 ${(e.agentIds||[]).length} agents</span>\n                <span>💬 ${(e.transcript||[]).length} messages</span>\n                <span>📅 ${Utils.formatDate(e.createdAt)}</span>\n              </div>\n              ${e.decisions?.length?`\n                <div style="margin-top:var(--space-3);display:flex;flex-wrap:wrap;gap:var(--space-2)">\n                  ${e.decisions.slice(0,3).map(e=>`<span class="chip" style="font-size:11px;padding:4px 10px;cursor:default">✅ ${Utils.escapeHtml(Utils.truncate(e,40))}</span>`).join("")}\n                </div>\n              `:""}\n            </div>\n          `).join("")}\n        </div>\n      `}function setFilter(e){currentFilter=e,renderMemoryPage()}ROLE_CATALOG.forEach(e=>roleMap[e.id]=e),Router.requireAuth(async e=>{e&&(renderSidebar("memory"),companyData=await CompanyService.getByUser(e.uid),companyData?([meetingsData,memoriesData,agentsData]=await Promise.all([MeetingService.getAll(companyData.id),MemoryService.getAll(companyData.id),CompanyService.getAgents(companyData.id)]),renderMemoryPage()):document.getElementById("memory-content").innerHTML='\n          <div class="empty-state">\n            <div class="empty-state-icon">🧠</div>\n            <h2 class="empty-state-title">No Company Yet</h2>\n            <p class="empty-state-text">Create a company and hold meetings to build your knowledge base.</p>\n            <a href="company-setup.html" class="btn btn-primary">Create Company</a>\n          </div>\n        ')});const handleSearch=Utils.debounce(e=>{searchQuery=e;const t=filterMemories();document.getElementById("memory-list-area").innerHTML="meetings"===currentFilter?renderMeetingsList():renderMemoriesList(t)},300)</script></body></html>
