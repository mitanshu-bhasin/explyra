<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Agent Selection — CompanySim</title><meta name="description" content="Select AI agents for your company team."><link rel="icon" type="image/svg+xml" href="../favicon.svg"><link rel="stylesheet" href="css/variables.css"><link rel="stylesheet" href="css/base.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/dashboard.css"></head><body><div class="main-content page-content" id="main-content"><div class="page-header"><h1 class="page-title">🤖 Select Your AI Team</h1><p class="page-subtitle">Choose the agents that will power your company's executive team.</p></div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-6);flex-wrap:wrap;gap:var(--space-3)"><div><span id="selected-count" class="badge badge-blue" style="font-size:14px;padding:8px 16px">0 selected</span> <span id="recommended-hint" class="badge badge-orange" style="font-size:12px;padding:6px 12px;margin-left:8px;display:none">⭐ AI-recommended roles highlighted</span></div><button class="btn btn-primary" id="save-agents-btn" onclick="saveAgents()" disabled="disabled"><span id="save-btn-text">Save Team</span> <span id="save-btn-spinner" class="spinner" style="display:none"></span></button></div><div class="agent-select-grid stagger-children" id="agent-grid"></div></div><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script><script src="js/firebase-init.js"></script><script src="js/utils.js"></script><script src="js/auth.js"></script><script src="js/router.js"></script><script src="js/sidebar.js"></script><script src="js/company.js"></script><script src="data/role-catalog.js"></script><script src="data/industries.js"></script><script>let companyData=null,selectedAgents=new Set,recommendedRoles=[];function renderAgentGrid(){document.getElementById("agent-grid").innerHTML=ROLE_CATALOG.map(e=>{const t=selectedAgents.has(e.id),n=recommendedRoles.includes(e.id);return`\n          <div class="agent-select-card ${t?"selected":""} ${n?"recommended":""}"\n               id="agent-card-${e.id}" onclick="toggleAgent('${e.id}')">\n            ${n?'<div class="recommended-badge">⭐ Recommended</div>':""}\n            <div class="agent-select-check">${t?"✓":""}</div>\n            <div class="agent-select-avatar" style="background:${e.bgColor}">${e.emoji}</div>\n            <div class="agent-select-name">${e.name}</div>\n            <div class="agent-select-desc">${e.personality.split(".")[0]}.</div>\n            <div class="agent-select-responsibilities">\n              ${e.responsibilities.slice(0,3).map(e=>`<span class="agent-responsibility-tag">${e}</span>`).join("")}\n            </div>\n          </div>\n        `}).join("")}function toggleAgent(e){selectedAgents.has(e)?selectedAgents.delete(e):selectedAgents.add(e);const t=document.getElementById(`agent-card-${e}`);t.classList.toggle("selected"),t.querySelector(".agent-select-check").textContent=selectedAgents.has(e)?"✓":"",updateSelectedCount()}function updateSelectedCount(){const e=selectedAgents.size;document.getElementById("selected-count").textContent=`${e} selected`,document.getElementById("save-agents-btn").disabled=0===e}async function saveAgents(){const e=document.getElementById("save-agents-btn"),t=document.getElementById("save-btn-text"),n=document.getElementById("save-btn-spinner");e.disabled=!0,t.textContent="Saving...",n.style.display="inline-block";try{const e=Array.from(selectedAgents).map(e=>{const t=ROLE_CATALOG.find(t=>t.id===e);return{id:t.id,name:t.name,emoji:t.emoji,color:t.color,bgColor:t.bgColor,personality:t.personality,responsibilities:t.responsibilities,style:t.style}}),t=await CompanyService.saveAgents(companyData.id,e);if(!t.success)throw new Error(t.error);Utils.toast(`${e.length} agents activated! 🎉`,"success"),setTimeout(()=>window.location.href="dashboard.html",800)}catch(s){Utils.toast("Failed to save: "+s.message,"error"),e.disabled=!1,t.textContent="Save Team",n.style.display="none"}}Router.requireAuth(async e=>{if(!e)return;if(renderSidebar("agent-selection"),companyData=await CompanyService.getByUser(e.uid),!companyData)return Utils.toast("Please create a company first","info"),void(window.location.href="company-setup.html");const t=INDUSTRIES.find(e=>e.name===companyData.industry)?.id;recommendedRoles=t&&INDUSTRY_ROLE_MAP[t]||[],recommendedRoles.length>0&&(document.getElementById("recommended-hint").style.display="inline-flex");(await CompanyService.getAgents(companyData.id)).forEach(e=>selectedAgents.add(e.id)),renderAgentGrid(),updateSelectedCount()})</script></body></html>
