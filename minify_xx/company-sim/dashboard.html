<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dashboard — CompanySim</title><meta name="description" content="Your AI company dashboard. View agents, meetings, and company progress."><link rel="icon" type="image/svg+xml" href="../favicon.svg"><link rel="stylesheet" href="css/variables.css"><link rel="stylesheet" href="css/base.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/dashboard.css"></head><body><div class="main-content page-content" id="main-content"><div id="dashboard-loading" style="text-align:center;padding:100px 0"><div class="loading-spinner" style="margin:0 auto 16px"></div><p class="loading-text">Loading your dashboard...</p></div><div id="dashboard-content" style="display:none"></div></div><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script><script src="js/firebase-init.js"></script><script src="js/utils.js"></script><script src="js/auth.js"></script><script src="js/router.js"></script><script src="js/sidebar.js"></script><script src="js/company.js"></script><script src="js/meeting-service.js"></script><script src="js/memory.js"></script><script src="data/role-catalog.js"></script><script>let companyData=null,agentsData=[],meetingsData=[],memoriesData=[];async function loadDashboard(t){try{if(companyData=await CompanyService.getByUser(t.uid),!companyData)return void showNoCompany();const[e,a,n]=await Promise.all([CompanyService.getAgents(companyData.id),MeetingService.getRecent(companyData.id,5),MemoryService.getRecent(companyData.id,5)]);agentsData=e,meetingsData=a,memoriesData=n,renderDashboard()}catch(t){console.error("Dashboard load error:",t),Utils.toast("Failed to load dashboard","error")}}function showNoCompany(){document.getElementById("dashboard-loading").style.display="none",document.getElementById("dashboard-content").style.display="block",document.getElementById("dashboard-content").innerHTML='\n        <div class="empty-state">\n          <div class="empty-state-icon">🏢</div>\n          <h2 class="empty-state-title">Welcome to CompanySim!</h2>\n          <p class="empty-state-text">You haven\'t created a company yet. Set up your AI-powered company to get started.</p>\n          <a href="company-setup.html" class="btn btn-primary btn-lg">🚀 Create Your Company</a>\n        </div>\n      '}function renderDashboard(){document.getElementById("dashboard-loading").style.display="none";const t=document.getElementById("dashboard-content");t.style.display="block";const e={};ROLE_CATALOG.forEach(t=>e[t.id]=t);const a=meetingsData.filter(t=>"completed"===t.status).length,n=memoriesData.filter(t=>"decision"===t.type).length;t.innerHTML=`\n        <div class="page-header">\n          <h1 class="page-title">Dashboard</h1>\n          <p class="page-subtitle">Your company at a glance</p>\n        </div>\n\n        \x3c!-- Company Card --\x3e\n        <div class="company-card animate-fadeInUp">\n          <div class="company-card-header">\n            <div>\n              <div class="company-icon">🏢</div>\n              <h2 class="company-name">${Utils.escapeHtml(companyData.name)}</h2>\n              <p class="company-goal">${Utils.escapeHtml(companyData.goal)}</p>\n              <div class="company-meta">\n                <div class="company-meta-item">🏭 ${Utils.escapeHtml(companyData.industry)}</div>\n                <div class="company-meta-item">🤖 ${agentsData.length} Active Agents</div>\n                <div class="company-meta-item">💬 ${meetingsData.length} Meetings</div>\n              </div>\n            </div>\n            <a href="company-setup.html" class="btn btn-ghost btn-sm">Edit ✏️</a>\n          </div>\n          ${companyData.description?`<p style="font-size:var(--font-size-sm);color:var(--color-text-muted);margin-top:var(--space-4)">${Utils.escapeHtml(companyData.description)}</p>`:""}\n        </div>\n\n        \x3c!-- Stats Grid --\x3e\n        <div class="dashboard-grid stagger-children">\n          <div class="stat-card">\n            <div class="stat-label">Active Agents</div>\n            <div class="stat-value" style="color:var(--color-accent-blue)">${agentsData.length}</div>\n            <div class="stat-meta">AI team members</div>\n          </div>\n          <div class="stat-card">\n            <div class="stat-label">Meetings Held</div>\n            <div class="stat-value" style="color:var(--color-accent-purple)">${meetingsData.length}</div>\n            <div class="stat-meta">${a} completed</div>\n          </div>\n          <div class="stat-card">\n            <div class="stat-label">Decisions Made</div>\n            <div class="stat-value" style="color:var(--color-accent-green)">${n}</div>\n            <div class="stat-meta">from meetings</div>\n          </div>\n          <div class="stat-card">\n            <div class="stat-label">Memories Stored</div>\n            <div class="stat-value" style="color:var(--color-accent-orange)">${memoriesData.length}</div>\n            <div class="stat-meta">knowledge items</div>\n          </div>\n        </div>\n\n        \x3c!-- Quick Actions --\x3e\n        <div style="display:flex;gap:var(--space-3);margin-bottom:var(--space-8);flex-wrap:wrap">\n          <a href="meeting.html" class="btn btn-primary">💬 New Meeting</a>\n          <a href="chat.html" class="btn btn-secondary">👤 Personal Chat</a>\n          <a href="agent-selection.html" class="btn btn-secondary">🤖 Manage Agents</a>\n          <a href="presentation.html" class="btn btn-secondary">📽️ View Presentation</a>\n          <a href="settings.html" class="btn btn-secondary">⚙️ Settings</a>\n        </div>\n\n        \x3c!-- Active Agents --\x3e\n        <div class="dashboard-section">\n          <div class="section-title">\n            <h3>🤖 Active Agents</h3>\n            <a href="agent-selection.html" class="btn btn-ghost btn-sm">Manage →</a>\n          </div>\n          ${agentsData.length>0?`\n            <div class="agents-grid stagger-children">\n              ${agentsData.map(t=>{const a=e[t.id]||{};return`\n                  <div class="agent-mini-card">\n                    <div class="agent-mini-avatar" style="background:${a.bgColor||"rgba(102,126,234,0.12)"}">${a.emoji||"🤖"}</div>\n                    <div>\n                      <div class="agent-mini-name">${Utils.escapeHtml(a.name||t.name||t.id)}</div>\n                      <div class="agent-mini-role">${(t.memory||[]).length} memories</div>\n                    </div>\n                  </div>\n                `}).join("")}\n            </div>\n          `:'\n            <div class="empty-state" style="padding:40px">\n              <p class="empty-state-text" style="margin:0">No agents activated yet.</p>\n              <a href="agent-selection.html" class="btn btn-primary btn-sm" style="margin-top:16px">Select Agents</a>\n            </div>\n          '}\n        </div>\n\n        \x3c!-- Recent Meetings --\x3e\n        <div class="dashboard-section">\n          <div class="section-title">\n            <h3>💬 Recent Meetings</h3>\n            <a href="meeting.html" class="btn btn-ghost btn-sm">New Meeting →</a>\n          </div>\n          ${meetingsData.length>0?`\n            <div class="meeting-list">\n              ${meetingsData.map(t=>`\n                <div class="meeting-item" onclick="window.location.href='meeting.html?id=${t.id}'">\n                  <div class="meeting-dot" style="background:${"completed"===t.status?"var(--color-accent-green)":"var(--color-accent-orange)"}"></div>\n                  <div class="meeting-info">\n                    <div class="meeting-topic">${Utils.escapeHtml(t.topic)}</div>\n                    <div class="meeting-meta">${t.agentIds?.length||0} agents · ${t.transcript?.length||0} messages</div>\n                  </div>\n                  <div class="meeting-date">${Utils.formatRelative(t.createdAt)}</div>\n                </div>\n              `).join("")}\n            </div>\n          `:'\n            <div class="empty-state" style="padding:40px">\n              <p class="empty-state-text" style="margin:0">No meetings yet. Start your first team discussion!</p>\n              <a href="meeting.html" class="btn btn-primary btn-sm" style="margin-top:16px">Start Meeting</a>\n            </div>\n          '}\n        </div>\n\n        \x3c!-- Memory Highlights --\x3e\n        <div class="dashboard-section">\n          <div class="section-title">\n            <h3>🧠 Memory Highlights</h3>\n            <a href="memory.html" class="btn btn-ghost btn-sm">View All →</a>\n          </div>\n          ${memoriesData.length>0?`\n            <div class="memory-highlights">\n              ${memoriesData.slice(0,4).map(t=>`\n                <div class="memory-item">\n                  <div class="memory-item-text">${Utils.escapeHtml(Utils.truncate(t.content,150))}</div>\n                  <div class="memory-item-meta">\n                    <span class="badge badge-${"decision"===t.type?"green":"insight"===t.type?"purple":"blue"}">${t.type}</span>\n                    · ${Utils.formatRelative(t.createdAt)}\n                  </div>\n                </div>\n              `).join("")}\n            </div>\n          `:'\n            <div class="empty-state" style="padding:40px">\n              <p class="empty-state-text" style="margin:0">No memories yet. They\'ll appear after your first meeting.</p>\n            </div>\n          '}\n        </div>\n      `}Router.requireAuth(async t=>{t&&(renderSidebar("dashboard"),await loadDashboard(t))})</script></body></html>
