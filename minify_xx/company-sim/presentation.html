<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Presentation — CompanySim</title><meta name="description" content="Your AI company pitch deck and progress presentation."><link rel="icon" type="image/svg+xml" href="../favicon.svg"><link rel="stylesheet" href="css/variables.css"><link rel="stylesheet" href="css/base.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/presentation.css"><script src="../js/security.js" defer="defer"></script></head><body><div class="main-content page-content" id="main-content"><div class="presentation-page"><div class="presentation-actions" id="pres-actions"><button class="btn btn-secondary btn-sm" onclick="window.print()">🖨️ Print</button> <button class="btn btn-primary btn-sm" onclick="regeneratePresentation()" id="regen-btn">✨ Regenerate Copy</button></div><div id="presentation-content"><div style="text-align:center;padding:100px 0"><div class="loading-spinner" style="margin:0 auto 16px"></div><p class="loading-text">Preparing your presentation...</p></div></div></div></div><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script><script src="js/firebase-init.js"></script><script src="js/utils.js"></script><script src="js/auth.js"></script><script src="js/router.js"></script><script src="js/sidebar.js"></script><script src="js/company.js"></script><script src="js/gemini.js"></script><script src="js/meeting-service.js"></script><script src="js/memory.js"></script><script src="data/role-catalog.js"></script><script src="prompts/roles.js"></script><script src="prompts/meeting-prompts.js"></script><script>let companyData=null,agentsData=[],meetingsData=[],memoriesData=[];const roleMap={};async function loadPresentation(e){try{if(companyData=await CompanyService.getByUser(e.uid),!companyData)return void(document.getElementById("presentation-content").innerHTML='\n            <div class="empty-state">\n              <div class="empty-state-icon">📽️</div>\n              <h2 class="empty-state-title">No Company Yet</h2>\n              <p class="empty-state-text">Create a company first to generate your presentation.</p>\n              <a href="company-setup.html" class="btn btn-primary">Create Company</a>\n            </div>\n          ');[agentsData,meetingsData,memoriesData]=await Promise.all([CompanyService.getAgents(companyData.id),MeetingService.getAll(companyData.id),MemoryService.getAll(companyData.id)]),renderPresentation()}catch(e){Utils.toast("Failed to load presentation","error")}}async function renderPresentation(){const e=memoriesData.filter(e=>"decision"===e.type),n=memoriesData.filter(e=>"insight"===e.type),a=memoriesData.filter(e=>"action"===e.type),t=meetingsData.filter(e=>"completed"===e.status);let s=companyData.description||companyData.goal;try{const e=await GeminiService.generatePresentationCopy(companyData,"overview");e.success&&(s=e.text)}catch(e){}document.getElementById("presentation-content").innerHTML=`\n        \x3c!-- Slide 1: Title --\x3e\n        <div class="deck-slide deck-slide-hero">\n          <span class="deck-slide-number">01</span>\n          <div style="position:relative">\n            <div style="font-size:64px;margin-bottom:var(--space-6)">🏢</div>\n            <h1>${Utils.escapeHtml(companyData.name)}</h1>\n            <p>${Utils.escapeHtml(s)}</p>\n            <div style="display:flex;justify-content:center;gap:var(--space-4);margin-top:var(--space-8)">\n              <span class="badge badge-blue">${Utils.escapeHtml(companyData.industry)}</span>\n              <span class="badge badge-green">${agentsData.length} Team Members</span>\n              <span class="badge badge-purple">${t.length} Meetings</span>\n            </div>\n          </div>\n        </div>\n\n        \x3c!-- Slide 2: Vision & Goal --\x3e\n        <div class="deck-slide">\n          <span class="deck-slide-number">02</span>\n          <h2>🎯 Vision & Goal</h2>\n          <div class="card-glow" style="margin-bottom:var(--space-6)">\n            <h3>Our Mission</h3>\n            <p style="font-size:var(--font-size-lg);line-height:1.6">${Utils.escapeHtml(companyData.goal)}</p>\n          </div>\n          ${companyData.description?`\n            <div class="card" style="margin-top:var(--space-4)">\n              <h3>About Us</h3>\n              <p>${Utils.escapeHtml(companyData.description)}</p>\n            </div>\n          `:""}\n        </div>\n\n        \x3c!-- Slide 3: Team --\x3e\n        <div class="deck-slide">\n          <span class="deck-slide-number">03</span>\n          <h2>👥 AI Executive Team</h2>\n          ${agentsData.length>0?`\n            <div class="team-grid">\n              ${agentsData.map(e=>{const n=roleMap[e.id]||e;return`\n                  <div class="team-member-card">\n                    <div class="team-member-avatar" style="background:${n.bgColor||"rgba(102,126,234,0.12)"}">${n.emoji||"🤖"}</div>\n                    <div class="team-member-name">${Utils.escapeHtml(n.name||e.id)}</div>\n                    <div class="team-member-role">${(n.responsibilities||[])[0]||""}</div>\n                  </div>\n                `}).join("")}\n            </div>\n          `:'<p style="color:var(--color-text-muted)">No team members selected yet.</p>'}\n        </div>\n\n        \x3c!-- Slide 4: Key Decisions --\x3e\n        <div class="deck-slide">\n          <span class="deck-slide-number">04</span>\n          <h2>✅ Key Decisions</h2>\n          ${e.length>0?`\n            <div class="decisions-list">\n              ${e.slice(0,8).map((e,n)=>`\n                <div class="decision-card">\n                  <div class="decision-number">${n+1}</div>\n                  <div class="decision-text">${Utils.escapeHtml(e.content)}</div>\n                </div>\n              `).join("")}\n            </div>\n          `:'<p style="color:var(--color-text-muted)">No decisions recorded yet. Hold meetings to start making decisions.</p>'}\n        </div>\n\n        \x3c!-- Slide 5: Progress & Insights --\x3e\n        <div class="deck-slide">\n          <span class="deck-slide-number">05</span>\n          <h2>💡 Insights & Progress</h2>\n\n          <div class="grid-2" style="margin-bottom:var(--space-6)">\n            <div class="card">\n              <div class="stat-label">Meetings Held</div>\n              <div class="stat-value" style="color:var(--color-accent-blue)">${meetingsData.length}</div>\n            </div>\n            <div class="card">\n              <div class="stat-label">Total Decisions</div>\n              <div class="stat-value" style="color:var(--color-accent-green)">${e.length}</div>\n            </div>\n            <div class="card">\n              <div class="stat-label">Action Items</div>\n              <div class="stat-value" style="color:var(--color-accent-orange)">${a.length}</div>\n            </div>\n            <div class="card">\n              <div class="stat-label">Key Insights</div>\n              <div class="stat-value" style="color:var(--color-accent-purple)">${n.length}</div>\n            </div>\n          </div>\n\n          ${n.length>0?`\n            <h3>Top Insights</h3>\n            <ul style="list-style:none;padding:0;display:flex;flex-direction:column;gap:var(--space-3)">\n              ${n.slice(0,5).map(e=>`\n                <li style="padding:12px 16px;background:var(--color-surface-glass);border-radius:var(--radius-md);font-size:var(--font-size-sm);color:var(--color-text-secondary);border-left:3px solid var(--color-accent-purple)">\n                  ${Utils.escapeHtml(e.content)}\n                </li>\n              `).join("")}\n            </ul>\n          `:""}\n        </div>\n\n        \x3c!-- Slide 6: Roadmap --\x3e\n        <div class="deck-slide">\n          <span class="deck-slide-number">06</span>\n          <h2>🗺️ Action Items & Roadmap</h2>\n          ${a.length>0?`\n            <div class="roadmap-timeline">\n              ${a.slice(0,6).map(e=>`\n                <div class="roadmap-item">\n                  <div class="roadmap-dot"></div>\n                  <h4>${Utils.escapeHtml(Utils.truncate(e.content,80))}</h4>\n                  <p>${Utils.formatRelative(e.createdAt)}</p>\n                </div>\n              `).join("")}\n            </div>\n          `:'<p style="color:var(--color-text-muted)">Action items will appear here after meetings.</p>'}\n        </div>\n      `}async function regeneratePresentation(){const e=document.getElementById("regen-btn");e.disabled=!0,e.textContent="⏳ Regenerating...",await renderPresentation(),e.disabled=!1,e.textContent="✨ Regenerate Copy",Utils.toast("Presentation updated!","success")}ROLE_CATALOG.forEach(e=>roleMap[e.id]=e),Router.requireAuth(async e=>{e&&(renderSidebar("presentation"),await loadPresentation(e))})</script></body></html>
