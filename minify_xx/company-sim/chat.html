<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Personal Chat — CompanySim</title><link rel="stylesheet" href="css/presentation.css"><link rel="stylesheet" href="css/dashboard.css"><style>.chat-layout{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 40px);gap:20px;margin:20px}.agent-list{background:rgba(255,255,255,.05);border-radius:20px;border:1px solid rgba(255,255,255,.1);padding:20px;overflow-y:auto}.agent-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;cursor:pointer;transition:all .2s ease;margin-bottom:8px}.agent-item:hover{background:rgba(255,255,255,.08)}.agent-item.active{background:#667eea;color:#fff}.agent-emoji{font-size:24px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.2);border-radius:10px}.chat-window{background:rgba(255,255,255,.05);border-radius:20px;border:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;overflow:hidden}.chat-header{padding:20px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:space-between}.chat-messages{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:15px}.message{max-width:80%;padding:12px 18px;border-radius:16px;font-size:15px;line-height:1.5}.message-user{align-self:flex-end;background:#667eea;color:#fff;border-bottom-right-radius:4px}.message-agent{align-self:flex-start;background:rgba(255,255,255,.1);color:#fff;border-bottom-left-radius:4px}.chat-input-area{padding:20px;border-top:1px solid rgba(255,255,255,.1);display:flex;gap:15px}.chat-input{flex:1;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 16px;color:#fff;font-size:16px}.btn-send{padding:0 24px;background:linear-gradient(135deg,#667eea 0,#764ba2 100%);border:none;border-radius:12px;color:#fff;font-weight:700;cursor:pointer}</style><script src="../js/security.js" defer="defer"></script></head><body class="dark-mode"><div class="app-container"><div id="sidebar-container"></div><main class="main-content"><div class="chat-layout"><aside class="agent-list" id="agent-list"><h3 style="margin-top:0;color:#fff">Agents</h3></aside><section class="chat-window"><div class="chat-header" id="chat-header"><div style="display:flex;align-items:center;gap:15px"><div class="agent-emoji" id="current-agent-emoji">🤖</div><div><h4 id="current-agent-name" style="margin:0;font-size:18px">Select an Agent</h4><p id="current-agent-status" style="margin:4px 0 0;font-size:13px;color:#a0a8d0">Waiting for selection...</p></div></div><button class="btn-send" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)" onclick="clearHistory()">Clear</button></div><div class="chat-messages" id="chat-messages"></div><div class="chat-input-area"><input type="text" id="chat-input" class="chat-input" placeholder="Type a message..." onkeypress='"Enter"===event.key&&sendMessage()'> <button class="btn-send" onclick="sendMessage()">Send</button></div></section></div></main></div><script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-firestore-compat.js"></script><script src="js/firebase-init.js"></script><script src="js/sidebar.js"></script><script src="js/utils.js"></script><script src="js/gemini.js"></script><script src="js/memory.js"></script><script src="data/role-catalog.js"></script><script src="prompts/roles.js"></script><script>let selectedAgent=null,currentUser=null,currentCompany=null,chatHistory=[];async function init(){const e=document.getElementById("agent-list");ROLE_CATALOG.forEach(t=>{const n=document.createElement("div");n.className="agent-item",n.onclick=()=>selectAgent(t),n.innerHTML=`\n          <div class="agent-emoji">${t.emoji}</div>\n          <div>\n            <div style="font-weight:600">${t.name}</div>\n            <div style="font-size:12px; opacity:0.6">${t.style.split(".")[0]}</div>\n          </div>\n        `,e.appendChild(n)}),csAuth.onAuthStateChanged(async e=>{if(e){currentUser=e;const t=await csDb.collection("cs_companies").where("ownerId","==",e.uid).limit(1).get();t.empty||(currentCompany={id:t.docs[0].id,...t.docs[0].data()})}})}function selectAgent(e){selectedAgent=e,document.querySelectorAll(".agent-item").forEach(e=>e.classList.remove("active")),event.currentTarget.classList.add("active"),document.getElementById("current-agent-name").textContent=e.name,document.getElementById("current-agent-emoji").textContent=e.emoji,document.getElementById("current-agent-status").textContent="Online & Active",document.getElementById("chat-messages").innerHTML="",chatHistory=[],renderMessage("agent",`Hello Founder, I am your ${e.name}. How can I assist you in private today? Any insights I gain here will be remembered for our future meetings.`)}function renderMessage(e,t){const n=document.getElementById("chat-messages"),s=document.createElement("div");s.className=`message message-${e}`,s.innerHTML=`<strong>${"user"===e?"You":selectedAgent.name}:</strong><br>${t.replace(/\n/g,"<br>")}`,n.appendChild(s),n.scrollTop=n.scrollHeight}async function sendMessage(){const e=document.getElementById("chat-input"),t=e.value.trim();if(!t||!selectedAgent)return;e.value="",renderMessage("user",t),chatHistory.push({role:"user",content:t});const n=document.createElement("div");n.className="message message-agent",n.style.opacity="0.5",n.textContent=`${selectedAgent.name} is thinking...`,document.getElementById("chat-messages").appendChild(n);const s=await MemoryService.recall(currentCompany.id,selectedAgent.id,t),a=await GeminiService.agentRespond(selectedAgent,t,currentCompany,s);n.remove(),a.success?(renderMessage("agent",a.text),chatHistory.push({role:"agent",content:a.text}),await MemoryService.save(currentCompany.id,{content:`Personal chat snippet: "${t.substring(0,50)}..." -> "${a.text.substring(0,50)}..."`,agentRole:selectedAgent.id,source:"personal_chat",type:"insight"})):Utils.toast(a.error,"error")}function clearHistory(){document.getElementById("chat-messages").innerHTML="",chatHistory=[],Utils.toast("Chat cleared.","info")}init()</script></body></html>
