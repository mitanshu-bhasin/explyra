ches").textContent=t.filter(t=>"In Progress"===t.status).length,document.getElementById("targetUnits").textContent=t.reduce((t,e)=>t+e.target,0).toLocaleString();document.querySelector("#productionTable tbody").innerHTML=t.map(t=>`\n                <tr>\n                    <td><strong>${t.id}</strong></td>\n                    <td>${t.product}</td>\n                    <td><i class="fas fa-microchip" style="margin-right: 8px;"></i>${t.machine}</td>\n                    <td>${t.worker}</td>\n                    <td>${t.target}</td>\n                    <td>\n                        <div style="display: flex; align-items: center; gap: 10px;">\n                            <div style="flex: 1; height: 6px; background: var(--bg4); border-radius: 10px;">\n                                <div style="width: ${t.progress}%; height: 100%; background: ${100===t.progress?"var(--success)":"var(--accent)"}; border-radius: 10px;"></div>\n                            </div>\n                            <span style="font-size: 0.8rem; font-weight: 600;">${t.progress}%</span>\n                        </div>\n                    </td>\n                    <td><span class="badge ${"Completed"===t.status?"badge-active":"badge-idle"}">${t.status}</span></td>\n                    <td>\n                        <button class="btn" style="padding: 5px 10px;" onclick="window.showToast('Edit feature coming soon!', 'info')"><i class="fas fa-edit"></i></button>\n                        <button class="btn" style="padding: 5px 10px; color: var(--danger);" onclick="deleteItem('production', 'id', '${t.id}')"><i class="fas fa-stop"></i></button>\n                    </td>\n                </tr>\n            `).join("")})</script></body></html>
