getElementById("lowStockCount").textContent=e.length;const n=Math.min(100,Math.round(t.length/20*100));document.getElementById("warehouseCapacity").textContent=`${n}%`;const o=document.getElementById("alertsContainer");e.length>0&&(o.innerHTML=e.map(t=>`\n                    <div class="glass-card" style="border-left: 4px solid var(--danger); padding: 1rem; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; background: rgba(239, 68, 68, 0.05);">\n                        <div style="display: flex; align-items: center; gap: 15px;">\n                            <i class="fas fa-exclamation-triangle" style="color: var(--danger);"></i>\n                            <div>\n                                <div style="font-weight: 600;">Low Stock Alert: ${t.name}</div>\n                                <div style="font-size: 0.8rem; color: var(--text-muted);">Current level: ${t.quantity} | Reorder at: ${t.reorderLevel}</div>\n                            </div>\n                        </div>\n                        <button class="btn" style="font-size: 0.8rem;" onclick="reorderItem('${t.name}')">Reorder Now</button>\n                    </div>\n                `).join(""));document.querySelector("#inventoryTable tbody").innerHTML=t.map(t=>{const e=t.quantity<t.reorderLevel;return`\n                    <tr>\n                        <td><strong>${t.name}</strong></td>\n                        <td><span style="font-size: 0.8rem; background: var(--bg4); padding: 2px 8px; border-radius: 4px;">${t.type}</span></td>\n                        <td>${t.quantity} <span style="color: var(--text-muted); font-size: 0.8rem;">/ ${t.reorderLevel}</span></td>\n                        <td><span class="badge ${e?"badge-maintenance":"badge-active"}">${e?"Low Stock":"Optimal"}</span></td>\n                        <td>${t.supplier}</td>\n                        <td>${t.lastUpdated}</td>\n                        <td>\n                            <button class="btn" style="padding: 5px 10px;" onclick="window.showToast('History feature coming soon!', 'info')"><i class="fas fa-history"></i></button>\n                            <button class="btn" style="padding: 5px 10px;" onclick="window.showToast('Edit feature coming soon!', 'info')"><i class="fas fa-edit"></i></button>\n                            <button class="btn" style="padding: 5px 10px; color: var(--danger);" onclick="deleteItem('inventory', 'name', '${t.name}')"><i class="fas fa-trash"></i></button>\n                        </td>\n                    </tr>\n                `}).join("")}),window.reorderItem=t=>{window.showToast?window.showToast(`Purchase order sent for ${t}`,"success"):alert(`Purchase order sent for ${t}`)}</script></body></html>
