    <header>
    <meta property="og:site_name" content="Explyra" />
    <meta property="og:locale" content="en_US" />

        </a>
    </header>

    <main class="container">
        <nav style="margin-bottom: 20px; font-size: 0.9rem; color: var(--ink3);">
            <a href="../../index.html">Developers</a> / Data Tools / JSON to YAML
        </nav>

        <div class="tool-card animate-fade">
            <div class="tool-header">
                <h1 class="tool-title">JSON to YAML Converter</h1>
                <p class="tool-desc">Transform your JSON data into human-readable YAML format.</p>
            </div>

            <div class="input-group">
                <label for="input">Input JSON</label>
                <textarea id="input" placeholder="{"server": {"port": 8080, "host": "localhost"}}"></textarea>
            </div>

            <div class="btn-row">
                <button id="convertBtn" class="btn btn-primary">Convert to YAML</button>
                <button id="copyBtn" class="btn btn-secondary">Copy YAML</button>
                <button id="clearBtn" class="btn btn-secondary">Clear</button>
            </div>

            <div class="input-group">
                <label for="output">Generated YAML</label>
                <textarea id="output" readonly placeholder="YAML output will appear here..."
                    style="font-family: monospace;"></textarea>
            </div>
        </div>
    </main>

    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const convertBtn = document.getElementById('convertBtn');
        const copyBtn = document.getElementById('copyBtn');

        function jsonToYaml(obj, indent = 0) {
            let yaml = '';
            const padding = '  '.repeat(indent);

            if (typeof obj !== 'object' || obj === null) {
                return String(obj);
            }

            if (Array.isArray(obj)) {
                obj.forEach(item => {
                    yaml += `${padding}- ${jsonToYaml(item, indent + 1).trim()}\n`;
                });
            } else {
                Object.keys(obj).forEach(key => {
                    const value = obj[key];
                    if (typeof value === 'object' && value !== null) {
                        yaml += `${padding}${key}:\n${jsonToYaml(value, indent + 1)}`;
                    } else {
                        yaml += `${padding}${key}: ${value}\n`;
                    }
                });
            }
            return yaml;
        }

        convertBtn.addEventListener('click', () => {
            const jsonText = input.value.trim();
            if (!jsonText) return;
            try {
                const jsonObj = JSON.parse(jsonText);
                output.value = jsonToYaml(jsonObj);
            } catch (e) {
                output.value = "Error: Invalid JSON format. " + e.message;
            }
        });

        copyBtn.addEventListener('click', () => {
            output.select();
            document.execCommand('copy');
            copyBtn.textContent = 'Copied!';
            setTimeout(() => copyBtn.textContent = 'Copy YAML', 2000);
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            input.value = '';
            output.value = '';
        });
    </script>
