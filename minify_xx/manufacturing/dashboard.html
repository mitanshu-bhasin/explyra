}</script><link rel="canonical" href="https://explyra.me/manufacturing/dashboard"><link rel="stylesheet" href="../assets/css/global-theme.css"></head><body><div class="sidebar"></div><main class="main-content"><header class="reveal"><div><h1>Manufacturing <span class="grad">Dashboard</span></h1><p style="color:var(--text-muted)">Real-time production metrics and analytics.</p></div><div style="display:flex;gap:10px"><button class="btn"><i class="fas fa-download"></i> Export Data</button> <button class="btn btn-primary" onclick='window.location.href="production.html"'><i class="fas fa-plus"></i> New Batch</button></div></header><section class="stat-grid reveal"><div class="glass-card"><div class="stat-label">Production Today</div><div class="stat-value" id="stat-production">0 <span style="font-size:.9rem;color:var(--success)"><i class="fas fa-arrow-up"></i> --%</span></div></div><div class="glass-card"><div class="stat-label">Active Machines</div><div class="stat-value" id="stat-machines">0 / 0</div></div><div class="glass-card"><div class="stat-label">Pending Orders</div><div class="stat-value" id="stat-orders">0</div></div><div class="glass-card"><div class="stat-label">Efficiency</div><div class="stat-value" id="stat-efficiency">0%</div></div></section><div style="display:grid;grid-template-columns:2fr 1fr;gap:1.5rem" class="reveal"><div class="glass-card"><h3>Production Trends</h3><div style="position:relative;height:300px;width:100%;margin-top:1rem"><canvas id="productionChart"></canvas></div></div><div class="glass-card"><h3>Inventory Status</h3><div style="position:relative;height:300px;width:100%;margin-top:1rem"><canvas id="inventoryChart"></canvas></div></div></div><section class="glass-card reveal" style="margin-top:1.5rem"><h3>Ongoing Production Batches</h3><div class="table-container"><table id="productionTable"><thead><tr><th>Batch ID</th><th>Product</th><th>Machine</th><th>Progress</th><th>Status</th></tr></thead><tbody></tbody></table></div></section></main><script src="js/data-handler.js"></script><script src="js/main.js"></script><script>document.addEventListener("DOMContentLoaded",async()=>{const[t,e,n,a]=await Promise.all([DataHandler.fetchData("production"),DataHandler.getDashboardStats(),DataHandler.getProductionChartData(),DataHandler.getInventoryChartData()]);document.getElementById("stat-production").childNodes[0].textContent=e.productionToday+" ",document.getElementById("stat-machines").textContent=e.activeMachines,document.getElementById("stat-orders").textContent=e.pendingOrders,document.getElementById("stat-efficiency").textContent=e.efficiency;document.querySelector("#productionTable tbody").innerHTML=t.map(t=>`\n                <tr>\n                    <td><strong>${t.id}</strong></td>\n                    <td>${t.product}</td>\n                    <td>${t.machine}</td>\n                    <td>\n                        <div style="width: 100px; height: 6px; background: var(--bg4); border-radius: 10px;">\n                            <div style="width: ${t.progress}%; height: 100%; background: var(--accent); border-radius: 10px;"></div>\n                        </div>\n                    </td>\n                    <td><span class="badge ${100===t.progress?"badge-active":"badge-idle"}">${t.status}</span></td>\n                </tr>\n            `).join(""),new Chart(document.getElementById("productionChart"),{type:"line",data:{labels:n.labels,datasets:[{label:"Production Output",data:n.data,borderColor:"#1546C0",tension:.4,fill:!0,backgroundColor:"rgba(21, 70, 192, 0.05)"}]},options:{responsive:!0,maintainAspectRatio:!1,plugins:{legend:{display:!1}},scales:{y:{beginAtZero:!0,grid:{color:"#F1F5F9"}},x:{grid:{display:!1}}}}}),new Chart(document.getElementById("inventoryChart"),{type:"doughnut",data:{labels:["Available","Reserverd","Low Stock"],datasets:[{data:a,backgroundColor:["#10B981","#1546C0","#EF4444"],borderWidth:0}]},options:{responsive:!0,maintainAspectRatio:!1,plugins:{legend:{position:"bottom",labels:{color:"#64748B",font:{family:"Inter"}}}}}})})</script></body></html>
