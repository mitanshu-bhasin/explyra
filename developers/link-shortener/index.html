        code {

        .copy-btn {

            transition: 0.2s;

        .copy-btn.copied {
            background: #10b981;
            color: #fff;
            border-color: #10b981;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            display: inline-block;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-msg {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 8px;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            font-size: 0.85rem;
            font-weight: 500;
            text-align: center;
        }

        footer {
            padding: 40px 5vw;
            text-align: center;
            border-top: 1px solid var(--bdr);
            font-size: 0.85rem;
            color: var(--ink4);
        }

        .stats {
            margin-top: 2rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--ink3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .stats span {
            color: var(--blue);
        }

        [data-theme="dark"] .history-item {
            border-color: rgba(255, 255, 255, 0.05);
        }

        .history {
            margin-top: 3rem;
            background: var(--surf);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid var(--bdr);
        }

        .history h3 {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--ink4);
            margin-bottom: 1.5rem;
            letter-spacing: 0.05em;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem;
            background: var(--bg3);
            border-radius: 12px;
            font-size: 0.9rem;
        }

        .history-url {
            font-weight: 700;
            color: var(--blue);
            font-family: monospace;
        }

        .history-orig {
            font-size: 0.75rem;
            color: var(--ink3);
            display: block;
            margin-top: 4px;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .history-copy-sm {
            background: var(--surf);
            border: 1px solid var(--bdr2);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
    </style>

            <div class="foot-socials-wrapper" style="margin-top: 30px; text-align: center; border-top: 1px solid rgba(136, 136, 136, 0.2); padding-top: 20px;">

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "REDACTED_KEY_2",
            authDomain: "mitanshusupport.firebaseapp.com",
            projectId: "mitanshusupport",
            storageBucket: "mitanshusupport.firebasestorage.app",
            messagingSenderId: "490917500459",
            appId: "1:490917500459:web:139ebcf55996d4a28f3c6e",
            measurementId: "G-SFPLDCXR66"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function LinkShortener() {
            const [longUrl, setLongUrl] = React.useState('');
            const [shortCode, setShortCode] = React.useState(null);
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState('');
            const [copied, setCopied] = React.useState(false);
            const [totalLinks, setTotalLinks] = React.useState(0);
            const [user, setUser] = React.useState(null);
            const [history, setHistory] = React.useState([]);

            React.useEffect(() => {
                const email = "mfskufgu@gmail.com";
                const password = "Mitanshu@2009";
                signInWithEmailAndPassword(auth, email, password)
                    .then((creds) => setUser(creds.user))
                    .catch((err) => setError('Login failure: ' + err.message));

                const statsRef = doc(db, 'metadata', 'stats');
                getDoc(statsRef).then(snap => {
                    if (snap.exists()) setTotalLinks(snap.data().lastIndex || 0);
                });

                const saved = JSON.parse(localStorage.getItem('explyra-link-history') || '[]');
                setHistory(saved);
            }, []);

            const handleShorten = async (e) => {
                e.preventDefault();
                if (!longUrl) return;
                setError('');
                setShortCode(null);
                setLoading(true);

                let formatted = longUrl;
                if (!/^https?:\/\//i.test(longUrl)) formatted = 'https://' + longUrl;

                try {
                    const newCode = await runTransaction(db, async (txn) => {
                        const statsRef = doc(db, 'metadata', 'stats');
                        const statsDoc = await txn.get(statsRef);
                        let nextIndex = 10;
                        if (statsDoc.exists()) {
                            const current = statsDoc.data().lastIndex;
                            nextIndex = (current < 10) ? 10 : current + 1;
                        }
                        const codeStr = nextIndex.toString();
                        const linkRef = doc(db, 'shortLinks', codeStr);
                        txn.set(statsRef, { lastIndex: nextIndex }, { merge: true });
                        txn.set(linkRef, {
                            originalUrl: formatted,
                            createdAt: serverTimestamp(),
                            createdBy: user ? user.uid : 'anon',
                        });
                        return codeStr;
                    });

                    setShortCode(newCode);
                    setTotalLinks(parseInt(newCode));

                    const newHistory = [{
                        code: newCode,
                        original: formatted,
                        timestamp: Date.now()
                    }, ...history].slice(0, 5);
                    setHistory(newHistory);
                    localStorage.setItem('explyra-link-history', JSON.stringify(newHistory));
                } catch (err) {
                    setError('Error: ' + err.message);
                } finally {
                    setLoading(false);
                }
            };

            const copyToClipboard = (code, event) => {
                const fullShortLink = `m78.netlify.app/${code}`;
                navigator.clipboard.writeText(fullShortLink);
                if (!event) setCopied(true);
                const btn = event ? event.target : document.querySelector('.copy-btn');
                const orig = btn.textContent;
                btn.textContent = 'Copied!';
                if (!event) setTimeout(() => setCopied(false), 2000);
                else setTimeout(() => btn.textContent = orig, 2000);
            };

            return (
                <div>
                    <div className="tool-header">
                        <h1>Link Shortener</h1>
                        <p>Generate clean, professional short links for any URL. Scalable and secure.</p>
                    </div>

                    <div className="card">
                        <form onSubmit={handleShorten}>
                            <div className="input-group">
                                <label>Target URL</label>
                                <input
                                    type="text"
                                    placeholder="paste your long link here..."
                                    value={longUrl}
                                    onChange={(e) => setLongUrl(e.target.value)}
                                />
                            </div>

                            <button className="btn-primary" type="submit" disabled={loading || !longUrl}>
                                {loading && <span className="loader"></span>}
                                {loading ? 'Creating Link...' : 'Generate Short Link'}
                            </button>
                        </form>

                        {error && <div className="error-msg">{error}</div>}

                        {shortCode && (
                            <div className="result-box">
                                <label>Short Link Ready</label>
                                <div className="short-url-container">
                                    <code>m78.netlify.app/{shortCode}</code>
                                    <button
                                        className={`copy-btn ${copied ? 'copied' : ''}`}
                                        onClick={() => copyToClipboard(shortCode)}
                                    >
                                        {copied ? 'Copied!' : 'Copy Link'}
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="stats">
                        ⚡ Last created link internal index: <span>#{totalLinks}</span>
                    </div>

                    {history.length > 0 && (
                        <div className="history">
                            <h3>Recently Created Links</h3>
                            <div className="history-list">
                                {history.map((item, idx) => (
                                    <div className="history-item" key={idx}>
                                        <div>
                                            <span className="history-url">m78.netlify.app/{item.code}</span>
                                            <span className="history-orig">{item.original}</span>
                                        </div>
                                        <button className="history-copy-sm" onClick={(e) => copyToClipboard(item.code, e)}>Copy</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LinkShortener />);

        const savedTheme = localStorage.getItem('explyra-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
