  "@context": "https://schema.org",

}</script></head><body><nav><a href="../index.html">Explyra Devs</a></nav><main><div class="result-box"><span class="pwd-display" id="pwdDisplay">P4ssw0rd!</span> <button class="btn-copy" id="copyBtn" onclick="copy()">Copy Password</button></div><div class="options"><div class="opt-item"><label>Length: <span id="lenVal">16</span></label><input type="range" id="length" min="8" max="50" value="16"></div><div class="opt-item"><label>Uppercase Letters</label><input type="checkbox" id="upper" checked="checked"></div><div class="opt-item"><label>Lowercase Letters</label><input type="checkbox" id="lower" checked="checked"></div><div class="opt-item"><label>Numbers</label><input type="checkbox" id="numbers" checked="checked"></div><div class="opt-item"><label>Symbols</label><input type="checkbox" id="symbols" checked="checked"></div><button class="btn-gen" onclick="generate()">Generate Password</button></div><div class="history"><h3>Recent Passwords</h3><div class="history-list" id="historyList"></div></div></main><script>const display = document.getElementById('pwdDisplay');
        const lengthInput = document.getElementById('length');
        const lenVal = document.getElementById('lenVal');
        const historyList = document.getElementById('historyList');

        let passwordHistory = JSON.parse(localStorage.getItem('explyra-pwd-history') || '[]');

        lengthInput.addEventListener('input', () => lenVal.textContent = lengthInput.value);

        function updateHistoryUI() {
            historyList.innerHTML = passwordHistory.map(pwd => `
                <div class="history-item">
                    <span>${pwd}</span>
                    <button class="history-copy" onclick="copyText('${pwd}', this)">Copy</button>
                </div>
            `).join('');
        }

        function savePassword(pwd) {
            passwordHistory.unshift(pwd);
            if (passwordHistory.length > 10) passwordHistory.pop();
            localStorage.setItem('explyra-pwd-history', JSON.stringify(passwordHistory));
            updateHistoryUI();
        }

        function generate() {
            const length = lengthInput.value;
            const hasUpper = document.getElementById('upper').checked;
            const hasLower = document.getElementById('lower').checked;
            const hasNumber = document.getElementById('numbers').checked;
            const hasSymbol = document.getElementById('symbols').checked;

            const upperChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const lowerChars = 'abcdefghijklmnopqrstuvwxyz';
            const numberChars = '0123456789';
            const symbolChars = '!@#$%^&*()_+~`|}{[]:;?><,./-=';

            let charSet = '';
            if (hasUpper) charSet += upperChars;
            if (hasLower) charSet += lowerChars;
            if (hasNumber) charSet += numberChars;
            if (hasSymbol) charSet += symbolChars;

            if (charSet === '') { alert('Select at least one option'); return; }

            let password = '';
            for (let i = 0; i < length; i++) {
                password += charSet.charAt(Math.floor(Math.random() * charSet.length));
            }
            display.textContent = password;
            savePassword(password);
        }

        function copy() {
            copyText(display.textContent, document.getElementById('copyBtn'));
        }

        function copyText(text, btn) {
            navigator.clipboard.writeText(text);
            const original = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = original, 2000);
        }

        updateHistoryUI();
        const savedTheme = localStorage.getItem('explyra-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);</script></body></html>
