<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robots.txt Generator - Online Web Crawler Configurator | Explyra</title>
    <meta name="description"
        content="Easily create robots.txt files for your website. Control which search engine crawlers can access your content. Fast, free, and secure online tool.">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
</head>

<body>

    <header>
        <a href="../../index.html" class="logo">
            <div class="logo-icon">E</div>
            <span>Explyra <span
                    style="font-weight: 400; font-family: 'Outfit'; font-size: 0.8rem; color: var(--ink3);">Developers</span></span>
        </a>
    </header>

    <main class="container">
        <nav style="margin-bottom: 20px; font-size: 0.9rem; color: var(--ink3);">
            <a href="../../index.html">Developers</a> / Web Tools / Robots.txt Generator
        </nav>

        <div class="tool-card animate-fade">
            <div class="tool-header">
                <h1 class="tool-title">Robots.txt Generator</h1>
                <p class="tool-desc">Configure how search engines like Google and Bing crawl your website.</p>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="input-group">
                    <label for="userAgent">User-Agent</label>
                    <select id="userAgent">
                        <option value="*">All Robots (*)</option>
                        <option value="Googlebot">Googlebot</option>
                        <option value="Bingbot">Bingbot</option>
                        <option value="Baiduspider">Baiduspider</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="crawlDelay">Crawl Delay</label>
                    <select id="crawlDelay">
                        <option value="">No Delay</option>
                        <option value="5">5 Seconds</option>
                        <option value="10">10 Seconds</option>
                        <option value="20">20 Seconds</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label for="sitemapUrl">Sitemap URL (optional)</label>
                <input type="text" id="sitemapUrl" placeholder="https://example.com/sitemap.xml">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="input-group">
                    <label for="disallowDirs">Disallow Directories (one per line)</label>
                    <textarea id="disallowDirs" style="min-height: 100px;"
                        placeholder="/cgi-bin/&#10;/tmp/&#10;/private/"></textarea>
                </div>
                <div class="input-group">
                    <label for="allowDirs">Allow Directories (one per line)</label>
                    <textarea id="allowDirs" style="min-height: 100px;" placeholder="/public/&#10;/blog/"></textarea>
                </div>
            </div>

            <div class="btn-row">
                <button id="genBtn" class="btn btn-primary">Generate Robots.txt</button>
                <button id="copyBtn" class="btn btn-secondary">Copy Config</button>
                <button id="downloadBtn" class="btn btn-secondary">Download .txt</button>
            </div>

            <div class="input-group">
                <label for="output">File Content</label>
                <textarea id="output" readonly style="min-height: 150px;"></textarea>
            </div>
        </div>
    </main>

    <script>
        const genBtn = document.getElementById('genBtn');
        const output = document.getElementById('output');

        genBtn.addEventListener('click', () => {
            const ua = document.getElementById('userAgent').value;
            const delay = document.getElementById('crawlDelay').value;
            const sitemap = document.getElementById('sitemapUrl').value;
            const disallow = document.getElementById('disallowDirs').value.split('\n');
            const allow = document.getElementById('allowDirs').value.split('\n');

            let res = `User-agent: ${ua}\n`;
            if (delay) res += `Crawl-delay: ${delay}\n`;

            disallow.forEach(dir => {
                if (dir.trim()) res += `Disallow: ${dir.trim()}\n`;
            });
            allow.forEach(dir => {
                if (dir.trim()) res += `Allow: ${dir.trim()}\n`;
            });

            if (sitemap) res += `\nSitemap: ${sitemap}\n`;

            output.value = res;
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            output.select();
            document.execCommand('copy');
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            const blob = new Blob([output.value], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'robots.txt';
            a.click();
        });
    </script>
</body>

</html>
