<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refund Policy Generator | Explyra Developer Tools</title>
    <meta name="description"
        content="Generate a free, professional Refund and Return Policy in HTML format. Clearly state your business terms to customers.">
    <meta name="keywords"
        content="refund policy generator, return policy generator, free refund policy, explyra developer tools">

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Refund Policy Generator | Explyra Developer Tools",
      "description": "Generate a free, professional Refund and Return Policy in HTML format.",
      "url": "https://explyra.me/developers/tools/legal-doc-generator/refund-policy-generator.html"
    }
    </script>
</head>

<body>
    <nav>
        <a href="index.html" class="nav-logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="m15 18-6-6 6-6" />
            </svg>
            Legal Generators
        </a>
        <a href="../../index.html">Dev Hub</a>
    </nav>

    <main>
        <div class="tool-header">
            <span class="tagline">E-Commerce Returns</span>
            <h1>Refund Policy Generator</h1>
            <p>Generate a professional refund and return policy to build trust with customers and clearly state your
                business terms.</p>
        </div>

        <div class="generator-container">
            <!-- Form Section -->
            <div class="form-section">
                <form id="generatorForm" onsubmit="event.preventDefault(); generateRefundPolicy();">

                    <div class="form-group">
                        <label for="companyName">Company Name</label>
                        <input type="text" id="companyName" placeholder="e.g. Explyra Shop" required>
                    </div>

                    <div class="form-group">
                        <label for="websiteName">Store/Website Name</label>
                        <input type="text" id="websiteName" placeholder="e.g. Explyra Developer Store" required>
                    </div>

                    <div class="form-group">
                        <label for="websiteUrl">Website URL</label>
                        <input type="url" id="websiteUrl" placeholder="https://explyra.me" required>
                    </div>

                    <div class="form-group">
                        <label for="supportEmail">Support Email</label>
                        <input type="email" id="supportEmail" placeholder="support@explyra.me" required>
                    </div>

                    <div class="form-group">
                        <label for="refundDuration">Refund Window (Duration)</label>
                        <input type="text" id="refundDuration" placeholder="e.g. 14 days, 30 days" value="30 days"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="paymentMethods">Payment Methods Accepted</label>
                        <input type="text" id="paymentMethods" placeholder="e.g. Credit Card, PayPal, Stripe"
                            value="Credit Card, PayPal" required>
                    </div>

                    <!-- Hidden fields to satisfy generator.js getFormData() without errors -->
                    <input type="hidden" id="companyEmail" value="">
                    <input type="hidden" id="businessAddress" value="">
                    <input type="hidden" id="country" value="">

                    <button type="submit" class="btn-primary">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 3v12" />
                            <path d="m8 11 4 4 4-4" />
                            <path d="M8 5H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-4" />
                        </svg>
                        Generate Refund Policy
                    </button>
                </form>
            </div>

            <!-- Output Section -->
            <div class="preview-section">
                <div class="output-actions">
                    <button class="btn-secondary" onclick="copyHTML()">Copy Code</button>
                    <button class="btn-secondary" onclick="downloadHTML('refund')">Download .html</button>
                    <button class="btn-secondary" onclick="openPreview()">Preview Document</button>
                </div>

                <textarea id="outputArea" class="code-output" readonly
                    placeholder="Your generated HTML will appear here after clicking the Generate button..."></textarea>
            </div>
        </div>

        <!-- Preview Modal -->
        <div id="previewModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Document Preview</h2>
                    <button class="close-btn" onclick="closePreview()">&times;</button>
                </div>
                <!-- Render area -->
                <div id="previewContainer"></div>
            </div>
        </div>

    </main>

    <footer>
        <p>&copy; 2026 Explyra Developer Tools. All rights reserved.</p>
    </footer>

    <script src="scripts/generator.js"></script>
    <script>
        const savedTheme = localStorage.getItem('explyra-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</body>

</html>
