        .palette-workspace {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;

        .color-input-section {
            background: var(--surf);
            border: 1px solid var(--bdr);
            border-radius: var(--r);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--s1);
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .color-picker-wrap {
            position: relative;
            width: 56px;
            height: 56px;
            border-radius: 12px;
            overflow: hidden;
            border: 3px solid var(--bdr);
            cursor: pointer;
            flex-shrink: 0;
        }

        .color-picker-wrap input[type="color"] {
            position: absolute;
            top: -8px;
            left: -8px;
            width: calc(100% + 16px);
            height: calc(100% + 16px);
            border: none;
            cursor: pointer;
            padding: 0;
        }

        .hex-input {
            width: 140px;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1.5px solid var(--bdr2);
            background: var(--bg2);
            color: var(--ink);
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 1rem;
            font-weight: 700;
            outline: none;
            text-transform: uppercase;
        }

        .hex-input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 4px var(--blue-g);
        }

        .scheme-tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            flex: 1;
        }

        .scheme-tab {
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            background: var(--bg3);
            border: 1px solid var(--bdr);
            color: var(--ink2);
            cursor: pointer;
            transition: all 0.2s;
        }

        .scheme-tab:hover {
            background: var(--blue-g);
            border-color: var(--blue);
            color: var(--blue);
        }

        .scheme-tab.active {
            background: var(--blue);
            color: white;
            border-color: var(--blue);
        }

        .random-btn {
            padding: 10px 18px;
            border-radius: 8px;
            background: var(--bg3);
            border: 1px solid var(--bdr);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--ink2);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .random-btn:hover {
            background: var(--bg4);
            border-color: var(--ink4);
        }

        .palette-display {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .swatch {
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--bdr);
            box-shadow: var(--s1);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .swatch:hover {
            transform: translateY(-4px);
            box-shadow: var(--s2);
        }

        .swatch-color {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .swatch-copied {
            font-weight: 700;
            font-size: 0.9rem;
            opacity: 0;
            color: white;
            text-shadow: 0 1px 4px rgba(0,0,0,0.3);
            transition: opacity 0.2s;
        }

        .swatch:hover .swatch-copied { opacity: 1; }

        .swatch-info {
            padding: 14px 16px;
            background: var(--surf);
        }

        .swatch-hex {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 4px;
        }

        .swatch-rgb {
            font-size: 0.75rem;
            color: var(--ink3);
        }

        .swatch-hsl {
            font-size: 0.75rem;
            color: var(--ink4);
        }

        .contrast-section {
            background: var(--surf);
            border: 1px solid var(--bdr);
            border-radius: var(--r);
            padding: 24px;
            box-shadow: var(--s1);
        }

        .contrast-section h3 {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--ink2);
        }

        .contrast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }

        .contrast-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 10px;
            background: var(--bg3);
            border: 1px solid var(--bdr);
        }

        .contrast-preview {
            width: 48px;
            height: 36px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.7rem;
            flex-shrink: 0;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .contrast-details {
            flex: 1;
        }

        .contrast-ratio {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--ink);
        }

        .contrast-pass {
            font-size: 0.75rem;
            font-weight: 600;
        }

        .pass { color: #047857; }
        .fail { color: #ef4444; }

        @media (max-width: 768px) {
            .color-input-section {
                flex-direction: column;
                align-items: stretch;
            }
            .palette-display {
                grid-template-columns: repeat(2, 1fr);
            }
            .swatch-color {
                height: 90px;
            }
        }
    </style>

    <script>
        let currentScheme = 'complementary';
        let baseHex = '#1546C0';

        function hexToHSL(hex) {
            let r = parseInt(hex.slice(1, 3), 16) / 255;
            let g = parseInt(hex.slice(3, 5), 16) / 255;
            let b = parseInt(hex.slice(5, 7), 16) / 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) { h = s = 0; }
            else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }
            return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
        }

        function hslToHex(h, s, l) {
            h = ((h % 360) + 360) % 360;
            s = Math.max(0, Math.min(100, s)) / 100;
            l = Math.max(0, Math.min(100, l)) / 100;
            const a = s * Math.min(l, 1 - l);
            const f = n => {
                const k = (n + h / 30) % 12;
                const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
                return Math.round(255 * color).toString(16).padStart(2, '0');
            };
            return `#${f(0)}${f(8)}${f(4)}`;
        }

        function hexToRGB(hex) {
            return {
                r: parseInt(hex.slice(1, 3), 16),
                g: parseInt(hex.slice(3, 5), 16),
                b: parseInt(hex.slice(5, 7), 16)
            };
        }

        function generatePalette(hex, scheme) {
            const hsl = hexToHSL(hex);
            const colors = [hex];

            switch (scheme) {
                case 'complementary':
                    colors.push(hslToHex(hsl.h + 180, hsl.s, hsl.l));
                    colors.push(hslToHex(hsl.h, hsl.s - 20, hsl.l + 15));
                    colors.push(hslToHex(hsl.h + 180, hsl.s - 20, hsl.l + 15));
                    colors.push(hslToHex(hsl.h, hsl.s, hsl.l - 20));
                    break;
                case 'triadic':
                    colors.push(hslToHex(hsl.h + 120, hsl.s, hsl.l));
                    colors.push(hslToHex(hsl.h + 240, hsl.s, hsl.l));
                    colors.push(hslToHex(hsl.h, hsl.s - 15, hsl.l + 20));
                    colors.push(hslToHex(hsl.h + 120, hsl.s - 15, hsl.l + 20));
                    break;
                case 'analogous':
                    colors.push(hslToHex(hsl.h + 30, hsl.s, hsl.l));
                    colors.push(hslToHex(hsl.h - 30, hsl.s, hsl.l));
                    colors.push(hslToHex(hsl.h + 60, hsl.s, hsl.l));
                    colors.push(hslToHex(hsl.h - 60, hsl.s, hsl.l));
                    break;
                case 'monochromatic':
                    colors.push(hslToHex(hsl.h, hsl.s, Math.min(95, hsl.l + 30)));
                    colors.push(hslToHex(hsl.h, hsl.s, Math.min(85, hsl.l + 15)));
                    colors.push(hslToHex(hsl.h, hsl.s, Math.max(15, hsl.l - 15)));
                    colors.push(hslToHex(hsl.h, hsl.s, Math.max(5, hsl.l - 30)));
                    break;
                case 'split':
                    colors.push(hslToHex(hsl.h + 150, hsl.s, hsl.l));
                    colors.push(hslToHex(hsl.h + 210, hsl.s, hsl.l));
                    colors.push(hslToHex(hsl.h, hsl.s - 20, hsl.l + 20));
                    colors.push(hslToHex(hsl.h + 180, hsl.s - 25, hsl.l + 25));
                    break;
            }
            return colors;
        }

        function luminance(r, g, b) {
            const a = [r, g, b].map(v => {
                v /= 255;
                return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
            });
            return a[0] * 0.2126 + a[1] * 0.7152 + a[2] * 0.0722;
        }

        function contrastRatio(hex1, hex2) {
            const rgb1 = hexToRGB(hex1), rgb2 = hexToRGB(hex2);
            const l1 = luminance(rgb1.r, rgb1.g, rgb1.b);
            const l2 = luminance(rgb2.r, rgb2.g, rgb2.b);
            const lighter = Math.max(l1, l2), darker = Math.min(l1, l2);
            return ((lighter + 0.05) / (darker + 0.05)).toFixed(2);
        }

        function renderPalette() {
            const colors = generatePalette(baseHex, currentScheme);
            const container = document.getElementById('palette-display');

            container.innerHTML = colors.map((hex, i) => {
                const rgb = hexToRGB(hex);
                const hsl = hexToHSL(hex);
                const isLight = hsl.l > 55;
                return `<div class="swatch" onclick="copySwatch('${hex}', this)" title="Click to copy">
                    <div class="swatch-color" style="background: ${hex};">
                        <span class="swatch-copied" style="color: ${isLight ? '#000' : '#fff'}">
                            <i class="fa-solid fa-copy"></i> Click to copy
                        </span>
                    </div>
                    <div class="swatch-info">
                        <div class="swatch-hex">${hex.toUpperCase()}</div>
                        <div class="swatch-rgb">rgb(${rgb.r}, ${rgb.g}, ${rgb.b})</div>
                        <div class="swatch-hsl">hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)</div>
                    </div>
                </div>`;
            }).join('');

            // Contrast check
            const contrastGrid = document.getElementById('contrast-grid');
            const backgrounds = ['#FFFFFF', '#000000', '#F8F7F4', '#0D1117'];
            contrastGrid.innerHTML = backgrounds.map(bg => {
                const ratio = contrastRatio(baseHex, bg);
                const passAA = ratio >= 4.5;
                const passAAA = ratio >= 7;
                const isLight = hexToHSL(bg).l > 50;
                return `<div class="contrast-item">
                    <div class="contrast-preview" style="background: ${bg}; color: ${baseHex};">Aa</div>
                    <div class="contrast-details">
                        <div class="contrast-ratio">${ratio}:1 <span style="font-size: 0.75rem; color: var(--ink4);">vs ${bg}</span></div>
                        <div class="contrast-pass">
                            <span class="${passAA ? 'pass' : 'fail'}">AA ${passAA ? '✓ Pass' : '✗ Fail'}</span>
                            &nbsp;·&nbsp;
                            <span class="${passAAA ? 'pass' : 'fail'}">AAA ${passAAA ? '✓ Pass' : '✗ Fail'}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function onColorChange(val) {
            baseHex = val;
            document.getElementById('hex-input').value = val.toUpperCase();
            renderPalette();
        }

        function onHexInput(val) {
            if (/^#[0-9a-fA-F]{6}$/.test(val)) {
                baseHex = val;
                document.getElementById('base-color').value = val;
                renderPalette();
            }
        }

        function setScheme(scheme, btn) {
            currentScheme = scheme;
            document.querySelectorAll('.scheme-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            renderPalette();
        }

        function randomColor() {
            const hex = '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
            baseHex = hex;
            document.getElementById('base-color').value = hex;
            document.getElementById('hex-input').value = hex.toUpperCase();
            renderPalette();
        }

        function copySwatch(hex, el) {
            navigator.clipboard.writeText(hex.toUpperCase()).then(() => {
                const label = el.querySelector('.swatch-copied');
                label.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
                label.style.opacity = '1';
                setTimeout(() => {
                    label.innerHTML = '<i class="fa-solid fa-copy"></i> Click to copy';
                    label.style.opacity = '';
                }, 1200);
            });
        }

        renderPalette();
    </script>
