    <nav>

    <main>
        <div class="tool-header">
            <h1>JSON Formatter</h1>
            <p>Paste your JSON below to beautify or minify it. Works entirely in your browser.</p>
        </div>

        <div class="editor-container">
            <textarea id="jsonInput" placeholder="{"key": "value", "array": [1, 2, 3]}"></textarea>
            <div id="errorMsg" class="error-msg">Invalid JSON</div>

            <div class="controls">
                <button class="btn-primary" onclick="formatJSON()">Beautify JSON</button>
                <button class="btn-secondary" onclick="minifyJSON()">Minify JSON</button>
                <button class="btn-secondary" onclick="clearInput()">Clear</button>
                <button class="btn-secondary" onclick="copyToClipboard()">Copy to Clipboard</button>
            </div>
        </div>
    </main>

    <script>
        const textarea = document.getElementById('jsonInput');
        const errorMsg = document.getElementById('errorMsg');

        function formatJSON() {
            try {
                const val = textarea.value.trim();
                if (!val) return;
                const obj = JSON.parse(val);
                textarea.value = JSON.stringify(obj, null, 4);
                errorMsg.style.display = 'none';
            } catch (e) {
                errorMsg.style.display = 'block';
            }
        }

        function minifyJSON() {
            try {
                const val = textarea.value.trim();
                if (!val) return;
                const obj = JSON.parse(val);
                textarea.value = JSON.stringify(obj);
                errorMsg.style.display = 'none';
            } catch (e) {
                errorMsg.style.display = 'block';
            }
        }

        function clearInput() {
            textarea.value = '';
            errorMsg.style.display = 'none';
        }

        function copyToClipboard() {
            textarea.select();
            document.execCommand('copy');
            const btn = event.target;
            const original = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = original, 2000);
        }

        // Handle Dark Mode from LocalStorage
        const savedTheme = localStorage.getItem('explyra-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
