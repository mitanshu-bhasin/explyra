    <script>
        function parseMarkdown(md) {
            let html = md
                // Code blocks (must be before inline code)
                .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
                    `<pre><code class="language-${lang}">${escapeHtml(code.trim())}</code></pre>`)
                // Headings
                .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/^# (.+)$/gm, '<h1>$1</h1>')
                // Horizontal rule
                .replace(/^---$/gm, '<hr>')
                // Bold and italic
                .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                // Strikethrough
                .replace(/~~(.+?)~~/g, '<del>$1</del>')
                // Inline code
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                // Images
                .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
                // Links
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                // Blockquotes
                .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
                // Task lists
                .replace(/^- \[x\] (.+)$/gm, '<li class="task-list-item"><input type="checkbox" checked disabled> $1</li>')
                .replace(/^- \[ \] (.+)$/gm, '<li class="task-list-item"><input type="checkbox" disabled> $1</li>')
                // Unordered lists
                .replace(/^- (.+)$/gm, '<li>$1</li>')
                // Ordered lists
                .replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

            // Wrap consecutive <li> in <ul>
            html = html.replace(/((<li.*?<\/li>\n?)+)/g, '<ul>$1</ul>');

            // Tables
            html = html.replace(/^\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)*)/gm, (_, header, body) => {
                const heads = header.split('|').map(h => `<th>${h.trim()}</th>`).join('');
                const rows = body.trim().split('\n').map(row => {
                    const cells = row.replace(/^\||\|$/g, '').split('|').map(c => `<td>${c.trim()}</td>`).join('');
                    return `<tr>${cells}</tr>`;
                }).join('');
                return `<table><thead><tr>${heads}</tr></thead><tbody>${rows}</tbody></table>`;
            });

            // Merge consecutive blockquotes
            html = html.replace(/<\/blockquote>\n<blockquote>/g, '<br>');

            // Paragraphs
            html = html.split('\n\n').map(block => {
                block = block.trim();
                if (!block) return '';
                if (block.startsWith('<h') || block.startsWith('<ul') || block.startsWith('<ol') ||
                    block.startsWith('<pre') || block.startsWith('<blockquote') || block.startsWith('<table') ||
                    block.startsWith('<hr')) return block;
                return `<p>${block.replace(/\n/g, '<br>')}</p>`;
            }).join('\n');

            return html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderPreview() {
            const md = document.getElementById('md-editor').value;
            document.getElementById('md-preview').innerHTML = parseMarkdown(md);

            const words = md.trim().split(/\s+/).filter(w => w.length > 0).length;
            const chars = md.length;
            document.getElementById('word-count').textContent = `${words} words · ${chars} chars`;
        }

        function insertMD(before, after) {
            const editor = document.getElementById('md-editor');
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const selected = editor.value.substring(start, end);
            const replacement = before + (selected || 'text') + after;
            editor.setRangeText(replacement, start, end, 'select');
            editor.focus();
            renderPreview();
        }

        function exportHTML() {
            const html = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exported Markdown</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.7; color: #1a1a1a; }
        pre { background: #1e1e2e; color: #cdd6f4; padding: 16px; border-radius: 8px; overflow-x: auto; }
        code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
        pre code { background: none; padding: 0; }
        blockquote { border-left: 4px solid #1546C0; padding: 10px 16px; margin: 0 0 14px; background: #f0f4ff; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #f5f5f5; }
        img { max-width: 100%; }
    </style>
    <link rel="stylesheet" href="../../assets/css/global-theme.css">
</head>
<body>${document.getElementById('md-preview').innerHTML}</body>
</html>`;
            const blob = new Blob([html], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'markdown-export.html';
            a.click();
        }

        function copyMarkdown() {
            navigator.clipboard.writeText(document.getElementById('md-editor').value).then(() => {
                const btn = event.target.closest('button');
                const original = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
                setTimeout(() => btn.innerHTML = original, 1500);
            });
        }

        // Initial render
        renderPreview();
    </script>
