<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta property="og:site_name" content="Explyra" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:site" content="@explyras" />
    <meta name="twitter:creator" content="@explyras" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regex Tester — Explyra Devs</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #F8F7F4;
            --bg2: #FFFFFF;
            --bg3: #F1EFE9;
            --bg4: #E9E6E0;
            --surf: #FFFFFF;
            --bdr: #E4E1DB;
            --bdr2: #CCC8C0;
            --ink: #0D1117;
            --ink2: #2A3141;
            --ink3: #586070;
            --ink4: #939BAC;
            --blue: #1546C0;
            --purp: #6D28D9;
            --r: 12px;
            --t: .25s ease;
        }

        [data-theme="dark"] {
            --bg: #080B14;
            --bg2: #0E1220;
            --bg3: #141928;
            --bg4: #1B2235;
            --surf: #141928;
            --bdr: rgba(255, 255, 255, .07);
            --bdr2: rgba(255, 255, 255, .14);
            --ink: #EEF0F8;
            --ink2: #C4CCDC;
            --ink3: #8290A8;
            --ink4: #4E5A70;
            --blue: #5B8AF5;
            --purp: #A78BFA;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Outfit', sans-serif;
            transition: background .4s, color .4s;
        }

        nav {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5vw;
            background: var(--bg2);
            border-bottom: 1px solid var(--bdr);
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
        }

        main {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 5vw;
        }

        .tool-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--ink4);
            text-transform: uppercase;
        }

        input,
        textarea {
            width: 100%;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--bdr);
            background: var(--surf);
            color: var(--ink2);
            font-family: monospace;
            outline: none;
        }

        input:focus,
        textarea:focus {
            border-color: var(--purp);
        }

        .flags-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .match-display {
            min-height: 100px;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--bdr);
            background: var(--surf);
            white-space: pre-wrap;
            font-family: monospace;
        }

        .match-highlight {
            background: rgba(109, 40, 217, 0.2);
            border-bottom: 2px solid var(--purp);
            color: var(--ink);
        }
    </style>

    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Explyra",
  "url": "https://explyra.me/",
  "sameAs": [
    "https://x.com/explyras",
    "https://www.facebook.com/profile.php?id=61584891033070&sk=directory_personal_details",
    "https://www.instagram.com/explyras",
    "https://www.youtube.com/@explyras",
    "https://www.linkedin.com/company/explyra/",
    "https://www.threads.com/@explyras",
    "https://github.com/Explyra"
  ]
}
    </script>
</head>

<body>
    <nav><a href="../index.html" class="nav-logo">Explyra Devs</a><a href="../index.html">← Back</a></nav>
    <main>
        <div class="tool-header">
            <h1>Regex Tester</h1>
            <p>Test your regular expressions against sample text with live highlighting.</p>
        </div>
        <div class="input-group"><label>RegEx Pattern</label><input type="text" id="regexInput" placeholder="/pattern/g"
                value="[a-zA-Z0-9]+"></div>
        <div class="flags-group"><label><input type="checkbox" id="flagG" checked> Global (g)</label><label><input
                    type="checkbox" id="flagI"> Case Insensitive (i)</label><label><input type="checkbox" id="flagM">
                Multiline (m)</label></div>
        <div class="input-group"><label>Test String</label><textarea id="testString"
                placeholder="Enter text to test against..." rows="6"></textarea></div>
        <div class="input-group"><label>Live Matches</label>
            <div id="matchOutput" class="match-display"></div>
        </div>
    </main>
    <script>
        const regexInput = document.getElementById('regexInput');
        const testString = document.getElementById('testString');
        const matchOutput = document.getElementById('matchOutput');
        const flags = ['flagG', 'flagI', 'flagM'];

        function runRegex() {
            const pattern = regexInput.value;
            const text = testString.value;
            let flagStr = '';
            if (document.getElementById('flagG').checked) flagStr += 'g';
            if (document.getElementById('flagI').checked) flagStr += 'i';
            if (document.getElementById('flagM').checked) flagStr += 'm';

            if (!pattern) { matchOutput.textContent = text; return; }

            try {
                const re = new RegExp(pattern, flagStr);
                const highlighted = text.replace(re, (match) => `<span class="match-highlight">${match}</span>`);
                matchOutput.innerHTML = highlighted || text;
            } catch (e) { matchOutput.innerHTML = '<span style="color:red">Invalid Regular Expression</span>'; }
        }

        [regexInput, testString, ...flags.map(f => document.getElementById(f))].forEach(el => {
            el.addEventListener('input', runRegex);
            if (el.type === 'checkbox') el.addEventListener('change', runRegex);
        });

        const savedTheme = localStorage.getItem('explyra-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</body>

</html>
