<body>
    <nav><a href="../index.html" class="nav-logo">Explyra Devs</a></nav>
    <main>
        <div class="tool-header">
            <h1>Hash Generator</h1>
            <p>Securely generate MD5 and SHA hashes for any text using your browser's Crypto API.</p>
        </div>
        <div class="box"><label>Input Text</label><textarea id="hashInput"
                placeholder="Enter text to hash..."></textarea></div>
        <button class="btn" onclick="generate()">Generate Hashes</button>
        <div id="results" style="margin-top: 2rem;">
            <div class="hash-item"><span class="hash-label">SHA-256</span>
                <div id="sha256" class="hash-val">-</div>
            </div>
            <div class="hash-item"><span class="hash-label">SHA-1</span>
                <div id="sha1" class="hash-val">-</div>
            </div>
            <div class="hash-item"><span class="hash-label">MD5 (Insecure)</span>
                <div id="md5" class="hash-val">-</div>
            </div>
        </div>

        <div class="history">
            <h3>Recent Hashes</h3>
            <div class="history-list" id="historyList"></div>
        </div>
    </main>
    <script>
        const historyList = document.getElementById('historyList');
        let hashHistory = JSON.parse(localStorage.getItem('explyra-hash-history') || '[]');

        function updateHistoryUI() {
            historyList.innerHTML = hashHistory.map(item => `
                <div class="history-item">
                    <span class="history-input">"${item.input}"</span>
                    <div class="history-hashes">
                        <div><b>SHA256:</b> ${item.sha256.substring(0, 32)}...</div>
                    </div>
                </div>
            `).join('');
        }

        async function hash(algo, str) {
            const buf = new TextEncoder().encode(str);
            const hashBuf = await crypto.subtle.digest(algo, buf);
            return Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function generate() {
            const val = document.getElementById('hashInput').value;
            if (!val) return;

            const s256 = await hash('SHA-256', val);
            const s1 = await hash('SHA-1', val);

            document.getElementById('sha256').textContent = s256;
            document.getElementById('sha1').textContent = s1;
            document.getElementById('md5').textContent = "MD5: Use SHA for secure hashing.";

            hashHistory.unshift({
                input: val,
                sha256: s256,
                timestamp: Date.now()
            });
            if (hashHistory.length > 5) hashHistory.pop();
            localStorage.setItem('explyra-hash-history', JSON.stringify(hashHistory));
            updateHistoryUI();
        }

        updateHistoryUI();
        const savedTheme = localStorage.getItem('explyra-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
