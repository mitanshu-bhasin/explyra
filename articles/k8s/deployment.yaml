apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: my-app
        image: us-central1-docker.pkg.dev/explyras/explyra-repo/articles-app:v1
        ports:
        - containerPort: 3000

