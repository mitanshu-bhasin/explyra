<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explyra | Cinematic Space Colony</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2ff;
            --bg: #000000;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Outfit', sans-serif;
            color: #fff;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        #ui-layer {
            position: absolute;
            top: 30px;
            left: 30px;
            pointer-events: none;
            z-index: 100;
        }

        .title-group {
            border-left: 4px solid var(--accent);
            padding-left: 20px;
            background: linear-gradient(90deg, rgba(0, 242, 255, 0.1), transparent);
        }

        .title {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        .subtitle {
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-top: 5px;
        }

        #controls {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 100;
            pointer-events: auto;
        }

        .action-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 242, 255, 0.3);
            color: #fff;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            backdrop-filter: blur(15px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .action-btn:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
            transform: translateY(-5px) scale(1.05);
        }

        .action-btn.active {
            background: var(--accent);
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.6);
        }

        #watermark {
            position: absolute;
            bottom: 40px;
            right: 40px;
            text-align: right;
            pointer-events: none;
            z-index: 100;
        }

        .wm-text {
            font-size: 10px;
            letter-spacing: 3px;
            opacity: 0.5;
            text-transform: uppercase;
        }

        .wm-name {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.5));
        }

        #hint {
            position: absolute;
            top: 50%;
            left: 30px;
            transform: translateY(-50%);
            display: none;
            flex-direction: column;
            gap: 10px;
            opacity: 0.8;
        }

        .hint-key {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            width: 40px;
            text-align: center;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            display: none;
            pointer-events: none;
            opacity: 0.6;
        }

        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: var(--accent);
        }

        #crosshair::before { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }
        #crosshair::after { top: 50%; left: 0; height: 2px; width: 100%; transform: translateY(-50%); }

        #overlay-fx {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.6));
            z-index: 50;
        }

        #loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease;
        }

        .loader-bar {
            width: 200px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .loader-progress {
            position: absolute;
            width: 0%;
            height: 100%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            animation: load 4s forwards;
        }

        @keyframes load {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        #tooltip {
            position: absolute;
            background: rgba(0, 5, 10, 0.9);
            border: 1px solid var(--accent);
            padding: 15px;
            border-radius: 4px;
            display: none;
            z-index: 200;
            pointer-events: none;
            backdrop-filter: blur(10px);
            font-size: 13px;
            line-height: 1.5;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="title" style="font-size: 18px">System Initializing</div>
        <div class="loader-bar"><div class="loader-progress"></div></div>
    </div>

    <div id="overlay-fx"></div>

    <div id="ui-layer">
        <div class="title-group">
            <div class="title">Explyra Prime</div>
            <div class="subtitle">Deep Space Colony Alpha • Cinematic UI</div>
        </div>
    </div>

    <div id="controls">
        <button id="btn-orbit" class="action-btn active"><span>🔭</span> Orbit View</button>
        <button id="btn-explore" class="action-btn"><span>🚀</span> Land to Explore</button>
    </div>

    <div id="hint">
        <div style="display:flex; align-items:center; gap:10px"><div class="hint-key">W</div> forward</div>
        <div style="display:flex; align-items:center; gap:10px"><div class="hint-key">A</div> left</div>
        <div style="display:flex; align-items:center; gap:10px"><div class="hint-key">S</div> backward</div>
        <div style="display:flex; align-items:center; gap:10px"><div class="hint-key">D</div> right</div>
        <div style="display:flex; align-items:center; gap:10px; margin-top:20px"><div class="hint-key" style="width:auto">ESC</div> exit menu</div>
    </div>

    <div id="crosshair"></div>

    <div id="watermark">
        <div class="wm-text">Platform Genesis</div>
        <div class="wm-name">Mitanshu Bhasin</div>
    </div>

    <div id="tooltip"></div>
    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- Configuration ---
        const ASSETS = {
            facade1: 'facade_1.png',
            facade2: 'facade_2.png',
            facade3: 'facade_3.png',
            billboard: 'billboard.png',
            sky: 'skybox.png'
        };

        const PRODUCT_ZONES = [
            { name: "Explyra Suite", color: 0x3b82f6, icon: '⚡', pos: { x: -70, z: -60 } },
            { name: "Expense Manager", color: 0x22c55e, icon: '💰', pos: { x: -80, z: 50 } },
            { name: "Mailbox", color: 0xec4899, icon: '📫', pos: { x: -40, z: -90 } },
            { name: "Booking / CRM", color: 0xf59e0b, icon: '📅', pos: { x: 70, z: -70 } },
            { name: "Developer Tools", color: 0x06b6d4, icon: '🛠️', pos: { x: 90, z: 60 } },
            { name: "Learning Platform", color: 0x8b5cf6, icon: '🎓', pos: { x: 50, z: 90 } },
            { name: "Cloud Tools", color: 0x0ea5e9, icon: '☁️', pos: { x: -35, z: 80 } }
        ];

        let scene, camera, renderer, composer, orbitControls, fpControls;
        let clock = new THREE.Clock();
        let mouse = new THREE.Vector2();
        let raycaster = new THREE.Raycaster();
        let isExplorer = false;
        let landing = false;

        // Movement
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();

        const buildings = [];
        const textures = {};
        const worldGroup = new THREE.Group();

        init();

        async function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 5000);
            camera.position.set(200, 150, 200);

            renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Postprocessing
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0.2;
            bloomPass.strength = 1.2;
            bloomPass.radius = 0.55;

            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // Controls
            orbitControls = new OrbitControls(camera, renderer.domElement);
            orbitControls.enableDamping = true;
            orbitControls.dampingFactor = 0.05;
            orbitControls.autoRotate = true;
            orbitControls.autoRotateSpeed = 0.2;
            orbitControls.maxDistance = 800;
            orbitControls.minDistance = 100;

            fpControls = new PointerLockControls(camera, document.body);
            scene.add(fpControls.getObject());

            // Loading Assets
            const loader = new THREE.TextureLoader();
            for (const key in ASSETS) {
                textures[key] = loader.load(ASSETS[key]);
                if (key.includes('facade')) {
                    textures[key].wrapS = textures[key].wrapT = THREE.RepeatWrapping;
                    textures[key].anisotropy = 16;
                }
            }

            // --- Lighting ---
            const ambient = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xffffff, 3);
            sun.position.set(200, 400, 200);
            sun.castShadow = true;
            sun.shadow.mapSize.set(2048, 2048);
            scene.add(sun);

            const coreGlow = new THREE.PointLight(0x00f2ff, 20, 300);
            coreGlow.position.set(0, 50, 0);
            scene.add(coreGlow);

            createSkybox();
            createIsland();
            createCity();
            createProductDistricts();
            createDrones();
            
            scene.add(worldGroup);

            setupEvents();
            animate();

            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').remove(), 1000);
            }, 4000);
        }

        function createSkybox() {
            // Using the new panorama skybox.png
            const geometry = new THREE.SphereGeometry(2500, 60, 40);
            geometry.scale(-1, 1, 1);
            const material = new THREE.MeshBasicMaterial({ map: textures.sky });
            const sky = new THREE.Mesh(geometry, material);
            scene.add(sky);
        }

        function createIsland() {
            const group = new THREE.Group();
            const rockMat = new THREE.MeshPhysicalMaterial({
                color: 0x0a101f,
                metalness: 1,
                roughness: 0.1,
                reflectivity: 1,
                clearcoat: 1
            });

            // Crystalline Foundation
            for (let i = 0; i < 8; i++) {
                const r = 180 - (i * 20);
                const h = 15;
                const sides = 6 + i;
                const mesh = new THREE.Mesh(new THREE.CylinderGeometry(r, r * 1.1, h, sides), rockMat);
                mesh.position.y = -h/2 - (i * 20);
                mesh.rotation.y = i * 0.5;
                group.add(mesh);

                const glow = new THREE.Mesh(
                    new THREE.TorusGeometry(r, 0.6, 8, 64),
                    new THREE.MeshBasicMaterial({ color: 0x00f2ff })
                );
                glow.rotation.x = Math.PI/2;
                glow.position.y = - (i * 20) - h;
                group.add(glow);
            }

            // Surface
            const floor = new THREE.Mesh(
                new THREE.CylinderGeometry(175, 175, 4, 64),
                new THREE.MeshStandardMaterial({ color: 0x020617, metalness: 0.9, roughness: 0.1 })
            );
            floor.receiveShadow = true;
            group.add(floor);

            // Roads/Paths
            const path = new THREE.Mesh(
                new THREE.TorusGeometry(140, 6, 8, 64),
                new THREE.MeshPhysicalMaterial({ color: 0x00f2ff, transmission: 0.5, opacity: 0.8, transparent: true })
            );
            path.rotation.x = Math.PI/2;
            path.position.y = 2.5;
            group.add(path);

            worldGroup.add(group);
        }

        function createCity() {
            const texKeys = ['facade1', 'facade2', 'facade3'];
            for (let i = 0; i < 70; i++) {
                const angle = (i / 70) * Math.PI * 2;
                const dist = 40 + Math.random() * 80;
                const w = 8 + Math.random() * 8;
                const h = 40 + Math.random() * 80;
                const type = texKeys[Math.floor(Math.random() * 3)];

                const building = createBuilding(w, h, textures[type], type);
                building.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);
                worldGroup.add(building);
                buildings.push(building);
            }

            // Founder Tower
            const founder = createFounderSpire();
            worldGroup.add(founder);
            buildings.push(founder);
        }

        function createBuilding(w, h, tex, type) {
            const group = new THREE.Group();
            const geo = new THREE.BoxGeometry(w, h, w);
            const mat = new THREE.MeshPhysicalMaterial({
                map: tex.clone(),
                metalness: 0.8,
                roughness: 0.1,
                bumpMap: tex,
                bumpScale: 0.05,
                reflectivity: 1
            });
            mat.map.repeat.set(1, h/20);
            
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = h/2;
            mesh.castShadow = true;
            group.add(mesh);

            // Holographic Billboard
            if (Math.random() > 0.7) {
                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: textures.billboard, transparent: true, opacity: 0.8 }));
                sprite.scale.set(20, 10, 1);
                sprite.position.y = h + 10;
                group.add(sprite);
            }

            group.userData = { name: "Quantum Node", desc: "Hyper-realized data structure executing Explyra logic." };
            return group;
        }

        function createFounderSpire() {
            const group = new THREE.Group();
            const h = 180;
            const w = 20;

            for (let i = 0; i < 6; i++) {
                const th = h / 6;
                const tw = w - (i * 3);
                const mesh = new THREE.Mesh(
                    new THREE.BoxGeometry(tw, th, tw),
                    new THREE.MeshPhysicalMaterial({ map: textures.facade2.clone(), metalness: 1, roughness: 0 })
                );
                mesh.material.map.repeat.set(1, 2);
                mesh.position.y = (th * i) + th/2;
                group.add(mesh);

                const neon = new THREE.Mesh(new THREE.BoxGeometry(tw+1, 1, tw+1), new THREE.MeshBasicMaterial({ color: 0x00f2ff }));
                neon.position.y = th * (i + 1);
                group.add(neon);
            }

            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: textures.billboard, transparent: true }));
            sprite.scale.set(40, 20, 1);
            sprite.position.y = h + 20;
            group.add(sprite);

            group.userData = { name: "The Zenith Spire", desc: "Founder: Mitanshu Bhasin • The architectural heart of Explyra." };
            return group;
        }

        function createProductDistricts() {
            PRODUCT_ZONES.forEach(zone => {
                const group = new THREE.Group();
                group.position.set(zone.pos.x, 0, zone.pos.z);
                
                const h = 80;
                const main = createBuilding(20, h, textures.facade2, 'luxury');
                main.userData = { name: zone.name, desc: `The official interstellar hub for ${zone.name}.` };
                group.add(main);
                buildings.push(main);

                // Zone Beacon
                const beacon = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 500), new THREE.MeshBasicMaterial({ color: zone.color, transparent: true, opacity: 0.3 }));
                beacon.position.y = 250;
                group.add(beacon);

                worldGroup.add(group);
            });
        }

        function createDrones() {
            for (let i = 0; i < 50; i++) {
                const dr = new THREE.Mesh(new THREE.SphereGeometry(0.5, 8, 8), new THREE.MeshBasicMaterial({ color: 0x00f2ff }));
                dr.userData = {
                    angle: Math.random() * Math.PI * 2,
                    speed: 0.01 + Math.random() * 0.02,
                    radius: 140 + Math.random() * 20,
                    h: 5 + Math.random() * 30
                };
                worldGroup.add(dr);
                // I'll animate them in the loop
                vehicles.push(dr);
            }
        }

        function setupEvents() {
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            });

            document.getElementById('btn-explore').addEventListener('click', () => {
                fpControls.lock();
            });

            document.getElementById('btn-orbit').addEventListener('click', () => {
                isExplorer = false;
                orbitControls.enabled = true;
                camera.position.set(200, 150, 200);
                document.getElementById('btn-explore').classList.remove('active');
                document.getElementById('btn-orbit').classList.add('active');
                document.getElementById('hint').style.display = 'none';
                document.getElementById('crosshair').style.display = 'none';
            });

            fpControls.addEventListener('lock', () => {
                isExplorer = true;
                orbitControls.enabled = false;
                landing = true; // Trigger landing phase
                document.getElementById('btn-orbit').classList.remove('active');
                document.getElementById('btn-explore').classList.add('active');
                document.getElementById('hint').style.display = 'flex';
                document.getElementById('crosshair').style.display = 'block';
            });

            document.addEventListener('keydown', (e) => {
                if (e.code === 'KeyW') moveForward = true;
                if (e.code === 'KeyS') moveBackward = true;
                if (e.code === 'KeyA') moveLeft = true;
                if (e.code === 'KeyD') moveRight = true;
            });

            document.addEventListener('keyup', (e) => {
                if (e.code === 'KeyW') moveForward = false;
                if (e.code === 'KeyS') moveBackward = false;
                if (e.code === 'KeyA') moveLeft = false;
                if (e.code === 'KeyD') moveRight = false;
            });

            window.addEventListener('mousemove', (e) => {
                if (isExplorer) return;
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(buildings, true);
                if (intersects.length > 0) {
                    let target = intersects[0].object;
                    while(target.parent && !buildings.includes(target)) target = target.parent;
                    const el = document.getElementById('tooltip');
                    el.style.display = 'block';
                    el.style.left = (e.clientX + 20) + 'px';
                    el.style.top = (e.clientY + 20) + 'px';
                    el.innerHTML = `<b style="color:var(--accent)">${target.userData.name}</b><br>${target.userData.desc}`;
                } else {
                    document.getElementById('tooltip').style.display = 'none';
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            if (isExplorer && fpControls.isLocked) {
                if (landing) {
                    camera.position.y -= (camera.position.y - 7) * 0.1;
                    if (Math.abs(camera.position.y - 7) < 0.1) landing = false;
                } else {
                    velocity.x -= velocity.x * 10.0 * delta;
                    velocity.z -= velocity.z * 10.0 * delta;

                    direction.z = Number(moveForward) - Number(moveBackward);
                    direction.x = Number(moveRight) - Number(moveLeft);
                    direction.normalize();

                    if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
                    if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

                    fpControls.moveRight(-velocity.x * delta);
                    fpControls.moveForward(-velocity.z * delta);

                    // Clamp to island
                    const d = Math.sqrt(camera.position.x**2 + camera.position.z**2);
                    if (d > 170) camera.position.setLength(170);
                }
            }

            // Animate Drones
            vehicles.forEach(v => {
                v.userData.angle += v.userData.speed;
                v.position.x = Math.cos(v.userData.angle) * v.userData.radius;
                v.position.z = Math.sin(v.userData.angle) * v.userData.radius;
                v.position.y = v.userData.h + Math.sin(time + v.userData.angle) * 5;
            });

            worldGroup.position.y = Math.sin(time * 0.5) * 4;

            if (!isExplorer) orbitControls.update();
            composer.render();
        }
    </script>
</body>
</html>
