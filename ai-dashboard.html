    <style>
        :root {
            --brand-green: #10b981;
            --brand-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--brand-dark);
            color: #f8fafc;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
        }

        .sidebar-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-item:hover {
            background: rgba(16, 185, 129, 0.1);
            color: var(--brand-green);
            transform: translateX(4px);
        }

        .sidebar-item.active {
            background: rgba(16, 185, 129, 0.15);
            color: var(--brand-green);
            border-right: 3px solid var(--brand-green);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }

        .ai-message {
            max-width: 85%;
            padding: 16px 20px;
            margin-bottom: 16px;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .ai-message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .ai-message.ai {
            align-self: flex-start;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
        }

        input:focus {
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }

        .typing-dot {
            width: 4px;
            height: 4px;
            background: #94a3b8;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    </style>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

    <script src="js/firebase-config.js"></script>
    
    <script type="module">
        import { AIDashboard } from './js/ai-dashboard-logic.js';

        // Wait for Firebase to init
        const checkFirebase = setInterval(() => {
            if (window.firebase) {
                clearInterval(checkFirebase);
                initDashboard();
            }
        }, 100);

        async function initDashboard() {
            // Get user from local session (set by admin-logic.js)
            const sessionData = JSON.parse(localStorage.getItem('company_session') || '{}');
            
            if (!sessionData.companyId) {
                // If no session, try to get from Firebase Auth
                window.firebase.auth().onAuthStateChanged(async (user) => {
                    if (user) {
                        // Load user context from Firestore
                        const db = window.firebase.firestore();
                        window.db = db;
                        window.collection = (db, name) => db.collection(name);
                        window.query = (ref, ...args) => ref; // Compat layer
                        window.where = (field, op, val) => ({ field, op, val });
                        window.limit = (n) => ({ limit: n });
                        window.getDocs = async (ref) => {
                            if (ref.field) {
                                return await ref.ref.where(ref.field, ref.op, ref.val).limit(ref.limit || 20).get();
                            }
                            return await ref.get();
                        };

                        const userSnap = await db.collection('users').doc(user.uid).get();
                        const userData = userSnap.data() || {};

                        window.aiDashboard = new AIDashboard({
                            name: userData.name || user.displayName || 'Admin',
                            role: userData.role || 'Admin',
                            companyId: userData.companyId,
                            dashboardData: {}
                        });
                        
                        document.getElementById('user-name').textContent = userData.name || 'Admin';
                        document.getElementById('user-initial').textContent = (userData.name || 'A')[0];
                    } else {
                        window.location.href = 'index.html';
                    }
                });
            } else {
                // Use session data
                const db = window.firebase.firestore();
                window.db = db;
                // Add compat methods for the logic file
                window.collection = (db, name) => db.collection(name);
                window.query = (col, ...constraints) => {
                    let q = col;
                    constraints.forEach(c => {
                        if (c.op) q = q.where(c.field, c.op, c.val);
                        if (c.limit) q = q.limit(c.limit);
                    });
                    return q;
                };
                window.where = (field, op, val) => ({ field, op, val });
                window.limit = (n) => ({ limit: n });
                window.getDocs = (q) => q.get();

                window.aiDashboard = new AIDashboard({
                    name: sessionData.userId || 'Admin',
                    role: sessionData.role || 'Admin',
                    companyId: sessionData.companyId,
                    dashboardData: {}
                });

                document.getElementById('user-name').textContent = sessionData.userId || 'Admin';
                document.getElementById('user-initial').textContent = (sessionData.userId || 'A')[0];
            }
        }
    </script>
