name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd mobile-developers
          npm install

      - name: Build Web Assets & Sync Capacitor
        run: |
          cd mobile-developers
          npx cap sync android

      - name: Build Android APK
        run: |
          cd mobile-developers/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: explyra-dev-debug-apk
          path: mobile-developers/android/app/build/outputs/apk/debug/app-debug.apk
