name: Minify and Deploy to Cloudflare
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare dist folder and copy files
        run: |
          mkdir -p dist
          rsync -a --exclude='.git' --exclude='.github' --exclude='dist' . dist/

      - name: Install Minifiers
        run: |
          npm install -g terser clean-css-cli html-minifier

      - name: Minify JS, CSS, and HTML
        run: |
          # JS Minify
          find dist -type f -name "*.js" -exec terser {} -o {} \;
          # CSS Minify
          find dist -type f -name "*.css" -exec cleancss -o {} {} \;
          # HTML Minify
          find dist -type f -name "*.html" -exec html-minifier --collapse-whitespace --remove-comments --minify-css true --minify-js true {} -o {} \;
          echo "✅ Minification complete!"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "explyra-suite" # <-- Isse apne Cloudflare project name se match karna
          directory: "dist"
          # Optional: Agar tu chahta hai ki GitHub pe deployment ka link dikhe
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}