name: Minify and Prepare for Cloudflare
on:
  push:
    branches:
      - main

jobs:
  build-and-commit:
    if: false # Temporarily disabled minification
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare dist folder
        run: |
          mkdir -p dist
          rsync -a --exclude='.git' --exclude='.github' --exclude='dist' . dist/

      - name: Install Minifiers
        run: npm install -g terser clean-css-cli html-minifier

      - name: Minify (Ignoring booking & status)
        run: |
          find dist -type d \( -path dist/booking -o -path dist/status \) -prune -o -name "*.js" -exec terser {} -o {} \;
          find dist -type d \( -path dist/booking -o -path dist/status \) -prune -o -name "*.css" -exec cleancss -o {} {} \;
          find dist -type d \( -path dist/booking -o -path dist/status \) -prune -o -name "*.html" -exec html-minifier --collapse-whitespace --remove-comments {} -o {} \;

      - name: Push Minified Code to Production Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: production # Is branch ko Cloudflare se link karenge
          commit_message: "🚀 Optimized for Cloudflare [skip ci]"