name: Minify and Deploy
on:
  push:
    branches:
      - main  # Jab bhi main branch pe push karoge, ye chalega

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Minify Files
        run: |
          mkdir -p dist
          # Saari files ko dist folder mein copy karo
          cp -r * dist/ || true
          # Ab minify-all-cli tool use karke minify karo
          npx minify-all-cli dist

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./dist