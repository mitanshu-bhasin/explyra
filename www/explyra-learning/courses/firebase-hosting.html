<html lang="en" data-theme="light">

<head>

    <title>Firebase Hosting Course — Explyra Learning</title>
    <meta name="description"
        content="Deploy fast, secure websites with Firebase Hosting. Master custom domains, SSL, and CLI integration.">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap"

    <style>
        .course-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            min-height: calc(100vh - 70px);
        }

        .sidebar {
            background: var(--bg2);
            border-right: 1px solid var(--bdr);
            padding: 2rem;
        }

        .lesson-nav {
            list-style: none;
            margin-top: 1.5rem;
        }

        .lesson-nav li {
            margin-bottom: 0.5rem;
        }

        .lesson-nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--ink3);
        }

        .lesson-nav a.active {
            background: var(--blue-g);
            color: var(--blue);
            font-weight: 600;
        }

        .lesson-nav a i {
            width: 18px;
            text-align: center;
        }

        .main-content {
            padding: 4rem 10vw;
            background: var(--surf);
        }

        .lesson-content h2 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
        }

        .lesson-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--ink2);
            margin-bottom: 3rem;
        }

        .quiz-section {
            background: var(--bg3);
            padding: 3rem;
            border-radius: 20px;
            margin-top: 4rem;
            display: none;
        }

        @media (max-width: 900px) {
            .course-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }
        }
    </style>

    <script type="application/ld+json">
{
  "@context": "https://schema.org",

  "sameAs": [
    "https://x.com/explyras",

<body>
    <nav>
        <div class="container" style="display:flex; justify-content: space-between; align-items: center; width: 100%;">
            <a href="../index.html" class="logo"><i>E</i> Explyra Learning</a>
            <div id="course-title-nav" style="font-weight: 600; color: var(--ink3);">Firebase Hosting Guide</div>
            <div style="display:flex; align-items:center; gap:.6rem;">
                <div id="course-auth-nav"></div>
                <a href="../dashboard.html" class="btn btn-outline" style="padding: 0.4rem 1rem;">Dashboard</a>
            </div>

        </div>
    </nav>
    <div class="course-layout">
        <aside class="sidebar">
            <h3>Course Curriculum</h3>
            <ul id="lesson-list" class="lesson-nav"></ul>
        </aside>
        <main class="main-content">
            <div id="content-area"></div>
            <div id="quiz-area" class="quiz-section">
                <h2>Course Quiz</h2>
                <div id="quiz-container"></div>
                <button id="submit-quiz" class="btn btn-primary"
                    style="margin-top: 2rem; width: 100%; justify-content: center;">Submit Answers</button>
            </div>
            <div id="completion-area" style="display:none; text-align:center; padding: 4rem 0;">
                <div style="font-size: 4rem;">🎉</div>
                <h2>Congratulations!</h2>
                <p>You have successfully completed the course.</p>
                <a href="../dashboard.html" class="btn btn-primary" style="margin-top: 2rem;">Claim Your Certificate</a>
            </div>
        </main>
    </div>
    <script src="../scripts/learning-core.js"></script>
    <script>
        const COURSE_ID = 'firebase-hosting';
        document.addEventListener('DOMContentLoaded', () => loadCourse());
        function loadCourse() {
            const course = ExplyraLearning.Courses.getById(COURSE_ID);
            if (!course) return;
            const lessonList = document.getElementById('lesson-list');
            lessonList.innerHTML = course.lessons.map((lesson, index) => `
                <li><a href="#" class="${index === 0 ? 'active' : ''}" onclick="showLesson(${index})"><i>${index + 1}</i> ${lesson.title}</a></li>
            `).join('') + `<li><a href="#" id="quiz-link" onclick="showQuiz()"><i>📝</i> Take Final Quiz</a></li>`;
            showLesson(0);
        }
        function showLesson(index) {
            const course = ExplyraLearning.Courses.getById(COURSE_ID);
            const lesson = course.lessons[index];
            document.querySelectorAll('.lesson-nav a').forEach(a => a.classList.remove('active'));
            document.querySelectorAll('.lesson-nav a')[index].classList.add('active');
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('completion-area').style.display = 'none';
            document.getElementById('content-area').style.display = 'block';
            document.getElementById('content-area').innerHTML = `
                <div class="lesson-content">
                    <span class="course-badge">Lesson ${index + 1}</span>
                    <h2>${lesson.title}</h2>
                    <div class="lesson-text">${lesson.content}</div>
                    <button class="btn btn-primary" onclick="markComplete(${index})">${index === course.lessons.length - 1 ? 'Go to Quiz' : 'Next Lesson'}</button>
                </div>
            `;
            ExplyraLearning.Courses.updateProgress(COURSE_ID, lesson.id);
        }
        function markComplete(index) {
            const course = ExplyraLearning.Courses.getById(COURSE_ID);
            if (index === course.lessons.length - 1) showQuiz();
            else showLesson(index + 1);
        }
        function showQuiz() {
            const course = ExplyraLearning.Courses.getById(COURSE_ID);
            if (!course.quiz || course.quiz.length === 0) { finishCourse(); return; }
            document.querySelectorAll('.lesson-nav a').forEach(a => a.classList.remove('active'));
            document.getElementById('quiz-link').classList.add('active');
            document.getElementById('content-area').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
            document.getElementById('quiz-container').innerHTML = course.quiz.map((q, qIndex) => `
                <div class="quiz-item" style="margin-bottom: 2.5rem;">
                    <span class="quiz-q">${qIndex + 1}. ${q.q}</span>
                    <div class="options">
                        ${q.a.map((opt, oIndex) => `<div class="quiz-option" data-q="${qIndex}" data-o="${oIndex}" onclick="selectOption(this)">${opt}</div>`).join('')}
                    </div>
                </div>
            `).join('');
            document.getElementById('submit-quiz').onclick = () => validateQuiz(course);
        }
        function selectOption(el) {
            const qIndex = el.getAttribute('data-q');
            document.querySelectorAll(`.quiz-option[data-q="${qIndex}"]`).forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
        }
        function validateQuiz(course) {
            const selections = document.querySelectorAll('.quiz-option.selected');
            if (selections.length < course.quiz.length) { alert('Please answer all questions.'); return; }
            let correctCount = 0;
            selections.forEach(sel => {
                const qIdx = parseInt(sel.getAttribute('data-q'));
                const oIdx = parseInt(sel.getAttribute('data-o'));
                if (oIdx === course.quiz[qIdx].correct) correctCount++;
            });
            if (correctCount === course.quiz.length) { ExplyraLearning.Courses.passQuiz(COURSE_ID); finishCourse(); }
            else alert(`You got ${correctCount}/${course.quiz.length} correct. Please try again.`);
        }
        function finishCourse() {
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('completion-area').style.display = 'block';
        }
    </script>
    <link rel="stylesheet" href="../assets/ai-support.css">
    <script src="../scripts/ai-support.js"></script>
</body>

</html>
