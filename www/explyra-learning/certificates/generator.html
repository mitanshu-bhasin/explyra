<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate of Completion — Explyra Learning</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/learning-style.css">
    <style>
        body {
            background: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .print-btn {
            margin-bottom: 2rem;
        }

        @media print {
            .print-btn {
                display: none;
            }

            body {
                background: #fff;
                padding: 0;
            }

            .cert-frame {
                margin: 0;
                box-shadow: none;
            }
        }
    </style>

    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Explyra",
  "url": "https://explyra.me/",
  "sameAs": [
    "https://x.com/explyras",
    "https://www.facebook.com/profile.php?id=61584891033070&sk=directory_personal_details",
    "https://www.instagram.com/explyras",
    "https://www.youtube.com/@explyras",
    "https://www.linkedin.com/company/explyra/",
    "https://www.threads.com/@explyras",
    "https://github.com/Explyra"
  ]
}
    </script>
</head>

<body>
    <button class="btn btn-primary print-btn" onclick="window.print()">Download / Print Certificate</button>

    <div class="cert-frame" id="certificate">
        <div class="cert-logo"><i>E</i> Explyra Learning</div>
        <p style="font-size: 1.2rem; margin-bottom: 0.5rem; letter-spacing: 2px; text-transform: uppercase;">Certificate
            of Completion</p>
        <p style="font-size: 0.9rem; color: var(--ink3);">This is to certify that</p>

        <h1 class="cert-name" id="student-name">Student Name</h1>

        <p style="font-size: 1.1rem; max-width: 500px; margin: 0 auto;">has successfully completed the online course</p>
        <h2 style="font-size: 2rem; margin: 1rem 0; font-family: 'Playfair Display', serif;" id="course-name">Course
            Title</h2>

        <div style="margin-top: 3rem; display: flex; justify-content: space-around; align-items: flex-end;">
            <div style="text-align: center; width: 150px;">
                <p style="font-family: 'Playfair Display', serif; font-style: italic; border-bottom: 1px solid var(--ink); padding-bottom: 5px;"
                    id="issue-date">Date</p>
                <p style="font-size: 0.7rem; color: var(--ink4); margin-top: 5px;">ISSUE DATE</p>
            </div>
            <div style="text-align: center;">
                <div
                    style="width: 80px; height: 80px; background: var(--blue-g); border: 2px solid var(--blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px;">
                    <i style="color:var(--blue); font-size: 1.5rem;">✔</i>
                </div>
                <p style="font-size: 0.7rem; font-weight: 700; color: var(--blue);">VERIFIED</p>
            </div>
            <div style="text-align: center; width: 150px;">
                <p style="font-weight: 600; border-bottom: 1px solid var(--ink); padding-bottom: 5px;">Mitanshu Bhasin
                </p>
                <p style="font-size: 0.7rem; color: var(--ink4); margin-top: 5px;">CHIEF INSTRUCTOR</p>
            </div>
        </div>

        <div style="position: absolute; bottom: 40px; left: 0; right: 0; font-size: 0.7rem; color: var(--ink4);">
            Verification ID: <span id="cert-id" style="font-weight: 600; color: var(--ink3);">EXP-XXXXXX</span><br>
            Verify at: <strong>explyra-learning/certificates/verify.html</strong>
        </div>
    </div>

    <script src="../scripts/learning-core.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const certId = params.get('id');
            if (certId) {
                const cert = ExplyraLearning.Certificates.verify(certId);
                if (cert) {
                    document.getElementById('student-name').innerText = cert.studentName;
                    document.getElementById('course-name').innerText = cert.courseName;
                    document.getElementById('issue-date').innerText = cert.date;
                    document.getElementById('cert-id').innerText = cert.id;
                    return;
                }
            }
            alert('Certificate not found.');
        });
    </script>
</body>

</html>
