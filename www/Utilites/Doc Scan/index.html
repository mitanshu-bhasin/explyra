    <style>
        :root {
            --bg: #F8F7F4;
            --bg2: #FFFFFF;
            --bg3: #F1EFE9;
            --bg4: #E9E6E0;
            --surf: #FFFFFF;
            --bdr: #E4E1DB;
            --bdr2: #CCC8C0;
            --ink: #0D1117;
            --ink2: #2A3141;
            --ink3: #586070;
            --ink4: #939BAC;
            --rose: #BE185D;
            --rose2: #F472B6;
            --rose-g: rgba(190, 24, 93, .08);
            --rose-b: rgba(190, 24, 93, .2);
            --purp: #6D28D9;
            --purp-g: rgba(109, 40, 217, .08);
            --cyan: #06b6d4;
            --slate: #334155;
            --s1: 0 1px 3px rgba(0, 0, 0, .06), 0 1px 8px rgba(0, 0, 0, .04);
            --s2: 0 4px 16px rgba(0, 0, 0, .08), 0 1px 4px rgba(0, 0, 0, .04);
            --s3: 0 12px 40px rgba(0, 0, 0, .10), 0 2px 8px rgba(0, 0, 0, .05);
            --r: 8px;
            --t: .2s ease;
        }

        [data-theme="dark"] {
            --bg: #080B14;
            --bg2: #0E1220;
            --bg3: #141928;
            --bg4: #1B2235;
            --surf: #141928;
            --bdr: rgba(255, 255, 255, .07);
            --bdr2: rgba(255, 255, 255, .14);
            --ink: #EEF0F8;
            --ink2: #C4CCDC;
            --ink3: #8290A8;
            --ink4: #4E5A70;
            --rose: #F472B6;
            --rose2: #FBCFE8;
            --rose-g: rgba(244, 114, 182, .10);
            --rose-b: rgba(244, 114, 182, .22);
            --purp: #A78BFA;
            --purp-g: rgba(167, 139, 250, .10);
            --cyan: #22d3ee;
            --slate: #94A3B8;
            --s1: 0 1px 3px rgba(0, 0, 0, .4), 0 1px 8px rgba(0, 0, 0, .25);
            --s2: 0 4px 16px rgba(0, 0, 0, .45), 0 1px 4px rgba(0, 0, 0, .25);
            --s3: 0 12px 40px rgba(0, 0, 0, .5), 0 2px 8px rgba(0, 0, 0, .3);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Outfit', sans-serif;
            font-weight: 400;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            overscroll-behavior-y: none;
            transition: background .4s, color .4s;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* NAV STYLES (MATCHES EXPLYRA UTILITY HUB) */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 300;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5vw;
            background: rgba(248, 247, 244, .9);
            backdrop-filter: blur(20px) saturate(160%);
            border-bottom: 1px solid var(--bdr);
            transition: background .4s, border-color .4s;
            gap: 2rem;
        }

        [data-theme="dark"] nav {
            background: rgba(8, 11, 20, .88);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .nav-logo-icon {
            width: 34px;
            height: 34px;
            border-radius: 9px;
            background: var(--rose);
            color: var(--bg2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-logo-icon svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .nav-logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: .03em;
            color: var(--ink);
        }

        .nav-logo-sub {
            font-weight: 400;
            font-family: 'Outfit', sans-serif;
            font-size: .8rem;
            color: var(--ink3);
            margin-left: 4px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: .9rem;
            flex-shrink: 0;
            margin-left: auto;
        }

        .btn-back {
            font-size: .82rem;
            font-weight: 500;
            color: var(--ink3);
            transition: color var(--t);
            white-space: nowrap;
        }

        .btn-back:hover {
            color: var(--ink);
        }

        .theme-pill {
            display: flex;
            align-items: center;
            gap: .4rem;
            background: var(--bg3);
            border: 1px solid var(--bdr2);
            border-radius: 100px;
            padding: .3rem .5rem .3rem .7rem;
            cursor: pointer;
            transition: all var(--t);
        }

        .theme-pill:hover {
            border-color: var(--rose);
        }

        .theme-pill-label {
            font-size: .72rem;
            font-weight: 600;
            color: var(--ink3);
            letter-spacing: .05em;
        }

        .theme-pill-toggle {
            width: 32px;
            height: 18px;
            border-radius: 9px;
            background: var(--bg4);
            position: relative;
            transition: background .3s;
        }

        [data-theme="dark"] .theme-pill-toggle {
            background: var(--rose);
        }

        .theme-pill-toggle::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .2);
            transition: transform .3s cubic-bezier(.4, 0, .2, 1);
        }

        [data-theme="dark"] .theme-pill-toggle::before {
            transform: translateX(14px);
        }

        /* APP MAIN AREA */
        main {
            position: relative;
            flex-grow: 1;
            margin-top: 64px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg2);
        }

        #error-msg {
            position: absolute;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: .6rem 1rem;
            border-radius: 8px;
            font-size: .85rem;
            z-index: 100;
            display: none;
            align-items: center;
            gap: .5rem;
            backdrop-filter: blur(4px);
            white-space: nowrap;
        }

        /* CAMERA VIEW */
        #camera-view {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #000;
        }

        .camera-container {
            flex-grow: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .grid-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.25;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
        }

        .grid-overlay div {
            border-right: 1px solid rgba(255, 255, 255, 0.7);
            border-bottom: 1px solid rgba(255, 255, 255, 0.7);
        }

        .grid-overlay div:nth-child(3n) {
            border-right: none;
        }

        .grid-overlay div:nth-child(n+7) {
            border-bottom: none;
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, var(--rose-b), transparent);
            transform: translateY(-100%);
            pointer-events: none;
            z-index: 10;
            display: none;
        }

        .scanning .scan-line {
            display: block;
            animation: scanAnim 2s infinite linear;
        }

        @keyframes scanAnim {
            0% {
                transform: translateY(-100%);
            }

            100% {
                transform: translateY(100%);
            }
        }

        .btn-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: transform .2s, background .2s;
            outline: none;
        }

        .btn-circle:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.25);
        }

        .camera-controls {
            position: absolute;
            bottom: 2rem;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2.5rem;
            z-index: 20;
        }

        #capture-btn {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s;
        }

        #capture-btn .inner {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #fff;
            transition: transform .1s;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        #capture-btn:active .inner {
            transform: scale(0.9);
        }

        #flash-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 20;
        }

        #flash-btn.active {
            background: #facc15;
            color: #000;
            border-color: #facc15;
        }

        .page-badge-floater {
            position: absolute;
            top: 1rem;
            left: 1rem;
            z-index: 20;
            background: var(--bg2);
            color: var(--ink);
            border: 1px solid var(--bdr);
            padding: .4rem .8rem;
            border-radius: 100px;
            font-size: .8rem;
            font-weight: 600;
            display: none;
            align-items: center;
            gap: .5rem;
            box-shadow: var(--s2);
        }

        .page-badge-floater span {
            background: var(--rose);
            color: #fff;
            width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: .7rem;
        }

        /* EDITOR VIEW */
        #editor-view {
            display: none;
            flex-direction: column;
            position: absolute;
            inset: 0;
            z-index: 40;
            background: var(--bg);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: .8rem 1rem;
            background: var(--bg2);
            border-bottom: 1px solid var(--bdr);
        }

        .top-bar .title {
            font-weight: 600;
            color: var(--ink);
        }

        .top-bar button {
            font-size: .85rem;
            font-weight: 600;
            padding: .4rem .8rem;
            border-radius: var(--r);
            transition: background .2s;
        }

        .btn-discard {
            color: var(--ink3);
        }

        .btn-discard:hover {
            background: var(--bg3);
            color: var(--ink);
        }

        .btn-accept {
            color: var(--rose);
            display: flex;
            align-items: center;
            gap: .4rem;
        }

        .btn-accept:hover {
            background: var(--rose-g);
        }

        .canvas-area {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: repeating-conic-gradient(var(--bg3) 0% 25%, var(--bg) 0% 50%) 50% / 20px 20px;
            overflow: auto;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            box-shadow: var(--s3);
            border-radius: 2px;
        }

        .filter-bar {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            overflow-x: auto;
            scrollbar-width: none;
            background: var(--bg2);
            border-top: 1px solid var(--bdr);
        }

        .filter-bar::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .5rem;
            min-width: 64px;
        }

        .filter-thumb {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 2px solid var(--bdr);
            background: var(--bg3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--ink3);
            transition: all .2s;
            overflow: hidden;
            position: relative;
        }

        .filter-btn.active .filter-thumb {
            border-color: var(--rose);
            background: var(--rose-g);
            color: var(--rose);
        }

        .filter-label {
            font-size: .65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--ink3);
        }

        .filter-btn.active .filter-label {
            color: var(--rose);
        }

        /* REVIEW MODAL */
        #review-modal {
            display: none;
            position: absolute;
            inset: 0;
            z-index: 60;
            background: var(--bg);
            flex-direction: column;
        }

        #review-modal .top-bar {
            font-size: 1rem;
        }

        .pages-grid {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
            align-content: start;
        }

        .page-card {
            aspect-ratio: 3/4;
            border-radius: var(--r);
            overflow: hidden;
            border: 1px solid var(--bdr);
            background: var(--surf);
            box-shadow: var(--s1);
            position: relative;
        }

        .page-card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #fff;
        }

        .page-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg2);
            border-top: 1px solid var(--bdr);
            padding: .4rem .6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-num {
            font-size: .7rem;
            font-weight: 600;
            color: var(--ink3);
        }

        .btn-del {
            color: #f43f5e;
            font-size: .8rem;
        }

        .export-footer {
            padding: 1.5rem;
            background: var(--bg2);
            border-top: 1px solid var(--bdr);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .input-group {
            display: flex;
            border: 1px solid var(--bdr);
            border-radius: var(--r);
            overflow: hidden;
            background: var(--surf);
        }

        .input-group input {
            flex-grow: 1;
            padding: .8rem 1rem;
            border: none;
            outline: none;
            background: transparent;
            color: var(--ink);
            font-family: inherit;
            font-size: .9rem;
        }

        .ext-label {
            background: var(--bg3);
            padding: .8rem 1rem;
            color: var(--ink3);
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            font-size: .85rem;
            border-left: 1px solid var(--bdr);
        }

        .btn-export {
            width: 100%;
            padding: .9rem;
            border-radius: var(--r);
            font-weight: 600;
            font-size: 1rem;
            background: var(--rose);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .5rem;
            transition: transform .2s, filter .2s;
        }

        .btn-export:active {
            transform: scale(0.98);
        }

        .btn-export:hover {
            filter: brightness(1.1);
            box-shadow: var(--s2);
        }
    </style>

    <nav>
        <a href="../index.html" class="nav-logo">
            <div class="nav-logo-icon">
                <svg viewBox="0 0 24 24">

                    <path d="M2 17l10 5 10-5" />
                    <path d="M2 12l10 5 10-5" />
                </svg>
            </div>
            <span class="nav-logo-text">DocScan <span>by Explyra</span></span>
        </a>
        <div class="nav-right">
            <a href="../index.html" class="btn-back">&larr; Utility Hub</a>
            <div class="theme-pill" id="themePill">
                <span class="theme-pill-label" id="themeLabel">Light</span>
                <div class="theme-pill-toggle"></div>
            </div>
        </div>
    </nav>

    <main>
        <div id="error-msg"><i class="fa-solid fa-circle-exclamation"></i> <span id="error-text">Camera error</span>
        </div>

        <!-- CAMERA VIEW -->
        <div id="camera-view">
            <button id="page-counter" class="page-badge-floater" onclick="openReviewModal()">
                <i class="fa-solid fa-file-pdf" style="color:var(--rose)"></i> <span id="page-count">0</span> Pages
                &rarr;
            </button>
            <div class="camera-container">
                <video id="video-feed" autoplay playsinline></video>
                <div class="grid-overlay">
                    <div></div>
                    <div></div>
                    <div></div>
                    <div></div>
                    <div></div>
                    <div></div>
                    <div></div>
                    <div></div>
                    <div></div>
                </div>
                <div class="scan-line"></div>

                <button id="flash-btn" class="btn-circle" style="display:none;"><i
                        class="fa-solid fa-bolt"></i></button>

                <div class="camera-controls">
                    <input type="file" id="file-input" accept="image/*" style="display:none;">
                    <button class="btn-circle" onclick="document.getElementById('file-input').click()"><i
                            class="fa-regular fa-image"></i></button>
                    <button id="capture-btn">
                        <div class="inner"></div>
                    </button>
                    <button id="switch-camera-btn" class="btn-circle"><i class="fa-solid fa-rotate"></i></button>
                </div>
            </div>
        </div>

        <!-- EDITOR VIEW -->
        <div id="editor-view">
            <div class="top-bar">
                <button class="btn-discard" onclick="retakePhoto()"><i class="fa-solid fa-xmark"></i> Discard</button>
                <span class="title">Edit Scan</span>
                <button class="btn-accept" onclick="addCurrentPage()">Save Page <i
                        class="fa-solid fa-check"></i></button>
            </div>
            <div class="canvas-area">
                <canvas id="output-canvas"></canvas>
            </div>
            <div class="filter-bar">
                <button class="filter-btn" onclick="applyFilter('original', this)">
                    <div class="filter-thumb">RAW</div>
                    <span class="filter-label">Original</span>
                </button>
                <button class="filter-btn active" onclick="applyFilter('doc', this)">
                    <div class="filter-thumb" style="font-family:'Playfair Display',serif; font-weight:700;">A</div>
                    <span class="filter-label">Document</span>
                </button>
                <button class="filter-btn" onclick="applyFilter('gray', this)">
                    <div class="filter-thumb"
                        style="background:linear-gradient(45deg,#111 50%,#eee 50%); border-color:rgba(0,0,0,0.1);">
                    </div>
                    <span class="filter-label">B&W</span>
                </button>
                <button class="filter-btn" onclick="applyFilter('magic', this)">
                    <div class="filter-thumb"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
                    <span class="filter-label">Magic</span>
                </button>
                <button class="filter-btn" onclick="rotateImage()">
                    <div class="filter-thumb"><i class="fa-solid fa-rotate-right"></i></div>
                    <span class="filter-label">Rotate</span>
                </button>
            </div>
        </div>

        <!-- REVIEW MODAL -->
        <div id="review-modal">
            <div class="top-bar">
                <span class="title">Review Document</span>
                <button class="btn-discard" onclick="closeReviewModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="pages-grid" id="pages-grid"></div>
            <div class="export-footer">
                <div class="input-group">
                    <input type="text" id="pdf-filename" value="Explyra_Scan" placeholder="Document Name">
                    <span class="ext-label">.pdf</span>
                </div>
                <button id="download-btn" class="btn-export" onclick="generatePDF()">
                    <i class="fa-solid fa-download"></i> <span id="btn-text">Download PDF</span>
                </button>
            </div>
        </div>

    </main>

    <script>
        const html = document.documentElement, pill = document.getElementById('themePill'), lbl = document.getElementById('themeLabel');
        const saved = localStorage.getItem('explyra-theme') || 'light';
        html.setAttribute('data-theme', saved); lbl.textContent = saved === 'dark' ? 'Dark' : 'Light';
        pill.addEventListener('click', () => {
            const cur = html.getAttribute('data-theme'), nxt = cur === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', nxt); lbl.textContent = nxt === 'dark' ? 'Dark' : 'Light';
            localStorage.setItem('explyra-theme', nxt);
        });

        const state = { stream: null, facingMode: 'environment', originalImage: null, currentRotation: 0, currentFilter: 'doc', pages: [], torchOn: false };
        const video = document.getElementById('video-feed'), canvas = document.getElementById('output-canvas'), ctx = canvas.getContext('2d', { willReadFrequently: true });
        const cameraView = document.getElementById('camera-view'), editorView = document.getElementById('editor-view'), reviewModal = document.getElementById('review-modal');

        async function initCamera() {
            try {
                if (state.stream) state.stream.getTracks().forEach(t => t.stop());
                state.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: state.facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false });
                video.srcObject = state.stream;

                const track = state.stream.getVideoTracks()[0];
                if (track.getCapabilities && track.getCapabilities().torch) {
                    const fb = document.getElementById('flash-btn');
                    fb.style.display = 'inline-flex';
                    fb.onclick = async () => { state.torchOn = !state.torchOn; await track.applyConstraints({ advanced: [{ torch: state.torchOn }] }); fb.classList.toggle('active', state.torchOn); };
                }
            } catch (err) {
                document.getElementById('error-msg').style.display = 'flex';
                document.getElementById('error-text').innerText = "Camera access denied or unavailable.";
                setTimeout(() => document.getElementById('error-msg').style.display = 'none', 4000);
            }
        }

        document.getElementById('switch-camera-btn').onclick = () => { state.facingMode = state.facingMode === 'user' ? 'environment' : 'user'; initCamera(); };
        document.getElementById('file-input').onchange = (e) => { const f = e.target.files[0]; if (f) { const r = new FileReader(); r.onload = (ev) => loadImg(ev.target.result); r.readAsDataURL(f); } };
        document.getElementById('capture-btn').onclick = () => {
            if (!video.videoWidth) return;
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            if (state.facingMode === 'user') { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height); ctx.setTransform(1, 0, 0, 1, 0, 0);
            loadImg(canvas.toDataURL('image/jpeg', 1.0));
        };

        function loadImg(src) {
            const img = new Image();
            img.onload = () => { state.originalImage = img; state.currentRotation = 0; applyFilter('doc', document.querySelectorAll('.filter-btn')[1]); editorView.style.display = 'flex'; };
            img.src = src;
        }

        function retakePhoto() { editorView.style.display = 'none'; if (video.paused) video.play(); }

        function rotateImage() { state.currentRotation = (state.currentRotation + 90) % 360; renderImg(); }

        function applyFilter(f, btn) {
            if (btn && !btn.classList.contains('active')) {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            state.currentFilter = f; renderImg();
        }

        function renderImg() {
            const img = state.originalImage; if (!img) return;
            if (state.currentRotation === 90 || state.currentRotation === 270) { canvas.width = img.height; canvas.height = img.width; }
            else { canvas.width = img.width; canvas.height = img.height; }

            ctx.save(); ctx.translate(canvas.width / 2, canvas.height / 2); ctx.rotate(state.currentRotation * Math.PI / 180);
            ctx.drawImage(img, -img.width / 2, -img.height / 2); ctx.restore();

            if (state.currentFilter !== 'original') {
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height), d = imgData.data;
                for (let i = 0; i < d.length; i += 4) {
                    const r = d[i], g = d[i + 1], b = d[i + 2];
                    if (state.currentFilter === 'gray') { const gr = 0.299 * r + 0.587 * g + 0.114 * b; d[i] = d[i + 1] = d[i + 2] = gr; }
                    else if (state.currentFilter === 'doc') {
                        const gr = 0.299 * r + 0.587 * g + 0.114 * b; const val = gr > 140 ? 255 : (gr < 90 ? 0 : gr); const fin = val > 200 ? 255 : (val < 50 ? 0 : val);
                        d[i] = d[i + 1] = d[i + 2] = fin;
                    } else if (state.currentFilter === 'magic') {
                        d[i] = Math.min(255, r * 1.15); d[i + 1] = Math.min(255, g * 1.15); d[i + 2] = Math.min(255, b * 1.15);
                    }
                }
                ctx.putImageData(imgData, 0, 0);
            }
        }

        function addCurrentPage() {
            state.pages.push(canvas.toDataURL('image/jpeg', 0.85));
            updatePCounter(); editorView.style.display = 'none';
        }
        function updatePCounter() {
            const pc = document.getElementById('page-counter');
            if (state.pages.length > 0) { pc.style.display = 'inline-flex'; document.getElementById('page-count').innerText = state.pages.length; }
            else pc.style.display = 'none';
        }

        function openReviewModal() { reviewModal.style.display = 'flex'; renderGrid(); }
        function closeReviewModal() { reviewModal.style.display = 'none'; }

        function renderGrid() {
            const gr = document.getElementById('pages-grid'); gr.innerHTML = '';
            state.pages.forEach((p, i) => {
                const d = document.createElement('div'); d.className = 'page-card';
                d.innerHTML = `<img src="${p}"><div class="page-controls"><span class="page-num">Page ${i + 1}</span><button class="btn-del" onclick="delPage(${i})" title="Delete"><i class="fa-solid fa-trash-can"></i></button></div>`;
                gr.appendChild(d);
            });
        }
        window.delPage = function (i) { if (confirm('Delete this page?')) { state.pages.splice(i, 1); renderGrid(); updatePCounter(); if (state.pages.length === 0) closeReviewModal(); } };

        async function generatePDF() {
            if (state.pages.length === 0) return;
            const btn = document.getElementById('btn-text'); const orig = btn.innerText;
            btn.innerText = 'Processing...';
            try {
                const { jsPDF } = window.jspdf; const doc = new jsPDF();
                const pw = doc.internal.pageSize.getWidth(), ph = doc.internal.pageSize.getHeight();

                for (let i = 0; i < state.pages.length; i++) {
                    if (i > 0) doc.addPage();
                    const imgDat = state.pages[i], img = new Image(); img.src = imgDat; await new Promise(r => img.onload = r);
                    const ir = img.width / img.height, pr = pw / ph;
                    let fw, fh; if (ir > pr) { fw = pw; fh = pw / ir; } else { fh = ph; fw = ph * ir; }
                    doc.addImage(imgDat, 'JPEG', (pw - fw) / 2, (ph - fh) / 2, fw, fh);
                }
                doc.save(`${document.getElementById('pdf-filename').value || 'Explyra_DocScan'}.pdf`);
                btn.innerText = 'Saved!'; setTimeout(() => { btn.innerText = orig; closeReviewModal(); }, 2000);
            } catch (e) { alert("Error generating PDF."); btn.innerText = orig; }
        }

        window.onload = initCamera;
    </script>
</body>

</html>
