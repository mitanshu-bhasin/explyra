<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Off The Grid | Explyra Health</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    },
                    colors: {
                        slate: {
                            850: '#151f32', // Custom deeper slate
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .text-glow {
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        /* Subtle grid pattern for that "Tech/Architect" vibe */
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }
    </style>
</head>

<body
    class="bg-slate-900 text-white h-screen overflow-hidden relative font-sans selection:bg-indigo-500 selection:text-white flex flex-col items-center justify-center">

    <!-- Background Elements -->
    <div class="absolute inset-0 bg-grid pointer-events-none"></div>
    <!-- Ambient Glow Blobs -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-600/20 rounded-full blur-[100px] animate-pulse-slow">
    </div>
    <div
        class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-600/10 rounded-full blur-[100px] animate-pulse-slow delay-1000">
    </div>

    <!-- Giant Watermark 404 -->
    <div
        class="absolute font-black text-[20rem] text-white/5 select-none pointer-events-none z-0 leading-none tracking-tighter transform -translate-y-12">
        404
    </div>

    <!-- Main Content -->
    <main class="relative z-10 text-center px-6 max-w-2xl mx-auto">

        <!-- Animated Icon Wrapper -->
        <div class="relative inline-block mb-8 animate-float">
            <div class="absolute inset-0 bg-indigo-500 blur-2xl opacity-30 rounded-full"></div>
            <i class="fa-solid fa-compass-drafting text-8xl text-indigo-400 drop-shadow-2xl relative z-10"></i>

            <!-- Floating particles -->
            <i
                class="fa-solid fa-question absolute -top-4 -right-8 text-2xl text-slate-500 animate-bounce delay-100"></i>
            <i
                class="fa-solid fa-exclamation absolute bottom-0 -left-8 text-xl text-slate-600 animate-bounce delay-300"></i>
        </div>

        <!-- Typography -->
        <h1
            class="text-5xl md:text-6xl font-black mb-4 tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 text-glow">
            Out of Range
        </h1>

        <p class="text-slate-400 text-lg md:text-xl mb-10 leading-relaxed font-light">
            Looks like this page took a wrong turn at the last algorithm.
            Don't worry, even the best systems have a glitch now and then.
        </p>

        <!-- Actions -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
            <a href="/"
                class="group relative px-8 py-3.5 bg-indigo-600 rounded-full font-bold text-white shadow-lg shadow-indigo-500/25 hover:shadow-indigo-500/50 hover:-translate-y-1 transition-all duration-300 overflow-hidden w-full sm:w-auto">
                <span class="relative z-10 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-house-medical"></i> Return to Base
                </span>
                <div
                    class="absolute inset-0 bg-gradient-to-r from-indigo-600 to-purple-600 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                </div>
            </a>

            <button onclick="history.back()"
                class="group px-8 py-3.5 rounded-full font-bold text-slate-400 border border-slate-700 hover:bg-slate-800 hover:text-white hover:border-slate-600 transition-all duration-300 w-full sm:w-auto flex items-center justify-center gap-2">
                <i class="fa-solid fa-arrow-left group-hover:-translate-x-1 transition-transform"></i> Go Back
            </button>
        </div>

    </main>

    <footer class="absolute bottom-6 text-slate-600 text-sm font-medium">
        Explyra Health &copy;
        <script>document.write(new Date().getFullYear())</script>
    </footer>

</body>

</html>
