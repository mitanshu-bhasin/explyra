<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Zen - Personal Tracker</title>
    <meta name="theme-color" content="#7c3aed">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f3f4f6; 
        }
        ::-webkit-scrollbar-thumb {
            background: #d8b4fe; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a855f7; 
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        /* Smooth transitions */
        .task-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .task-enter {
            animation: slideIn 0.3s ease-out forwards;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Hide scrollbar for tabs but keep functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>

    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Explyra",
  "url": "https://explyra.me/",
  "sameAs": [
    "https://x.com/explyras",
    "https://www.facebook.com/profile.php?id=61584891033070&sk=directory_personal_details",
    "https://www.instagram.com/explyras",
    "https://www.youtube.com/@explyras",
    "https://www.linkedin.com/company/explyra/",
    "https://www.threads.com/@explyras",
    "https://github.com/Explyra"
  ]
}
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans selection:bg-purple-200 min-h-screen pb-20">

    <!-- Header -->
    <header class="sticky top-0 z-50 glass-effect border-b border-purple-100 shadow-sm px-4 py-3 flex items-center justify-between">
        <button onclick="goBack()" class="p-2 rounded-full hover:bg-purple-50 text-purple-700 transition-transform active:scale-95" aria-label="Go Back">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        </button>
        
        <div class="text-center">
            <h1 class="text-xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-fuchsia-600">
                Health Zen
            </h1>
            <p class="text-[10px] text-purple-400 font-bold tracking-[0.2em] uppercase">DAILY PLANNER</p>
        </div>

        <button onclick="requestNotificationPermission()" id="notif-btn" class="relative p-2 text-purple-600 hover:bg-purple-50 rounded-full transition-colors" aria-label="Enable Notifications">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
            <span id="notif-dot" class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full animate-pulse hidden border-2 border-white"></span>
        </button>
    </header>

    <main class="max-w-md mx-auto p-4">

        <!-- Progress Card (Only visible on Today tab) -->
        <div id="progress-card" class="bg-gradient-to-br from-purple-600 to-indigo-600 rounded-3xl p-6 text-white shadow-xl shadow-purple-200 mb-6 relative overflow-hidden hidden">
            <div class="absolute -top-4 -right-4 opacity-20">
                <svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
            </div>
            <div class="relative z-10">
                <p class="text-purple-100 text-sm font-medium mb-1 tracking-wide">Today's Progress</p>
                <div class="flex items-end gap-3 mb-4">
                    <h2 id="progress-percent" class="text-5xl font-bold">0%</h2>
                    <span class="text-lg mb-1.5 opacity-80 font-medium">Done</span>
                </div>
                <div class="h-2 w-full bg-black/20 rounded-full overflow-hidden backdrop-blur-sm">
                    <div id="progress-bar" class="h-full bg-white transition-all duration-1000 ease-out w-0 shadow-[0_0_10px_rgba(255,255,255,0.5)]"></div>
                </div>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <div class="flex bg-white p-1.5 rounded-2xl border border-purple-100 shadow-sm mb-6 sticky top-[72px] z-40">
            <button onclick="switchTab('today')" id="tab-today" class="flex-1 py-2.5 text-sm font-bold rounded-xl transition-all capitalize text-purple-800 bg-purple-100 shadow-sm">Today</button>
            <button onclick="switchTab('upcoming')" id="tab-upcoming" class="flex-1 py-2.5 text-sm font-bold rounded-xl transition-all capitalize text-slate-400 hover:text-purple-600">Upcoming</button>
            <button onclick="switchTab('history')" id="tab-history" class="flex-1 py-2.5 text-sm font-bold rounded-xl transition-all capitalize text-slate-400 hover:text-purple-600">History</button>
        </div>

        <!-- Add Task Form -->
        <form id="add-task-form" class="mb-6 bg-white p-5 rounded-3xl border border-purple-100 shadow-lg shadow-purple-100/50 transition-all hover:shadow-purple-200/50">
            <input type="text" id="task-input" placeholder="What needs to be done?" class="w-full text-lg font-medium text-slate-700 placeholder:text-slate-300 outline-none mb-4 bg-transparent" required>
            
            <div class="flex flex-col gap-3">
                <div class="flex gap-2">
                    <!-- Date Input -->
                    <div class="relative flex-1 group">
                        <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-purple-500">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                        </div>
                        <input type="date" id="date-input" class="w-full pl-10 pr-3 py-2 bg-purple-50 rounded-xl text-sm font-medium text-purple-900 outline-none border border-transparent focus:border-purple-300 transition-colors cursor-pointer">
                    </div>
                    
                    <!-- Time Input -->
                    <div class="relative flex-1 group">
                        <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-purple-500">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        </div>
                        <input type="time" id="time-input" class="w-full pl-10 pr-3 py-2 bg-purple-50 rounded-xl text-sm font-medium text-purple-900 outline-none border border-transparent focus:border-purple-300 transition-colors cursor-pointer">
                    </div>
                </div>

                <div class="flex justify-between items-center mt-1">
                    <select id="priority-input" class="bg-slate-50 border border-slate-200 text-xs font-bold rounded-lg px-3 py-2 outline-none text-slate-600 focus:border-purple-300 focus:text-purple-700">
                        <option value="normal">Normal</option>
                        <option value="high">High Priority</option>
                        <option value="urgent">Urgent 🔥</option>
                    </select>
                    
                    <button type="submit" class="bg-purple-600 hover:bg-purple-700 active:scale-95 text-white px-6 py-2 rounded-xl transition-all shadow-md shadow-purple-200 font-medium flex items-center gap-2">
                        <span>Add Task</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                    </button>
                </div>
            </div>
        </form>

        <!-- List Header -->
        <div class="flex items-center justify-between px-2 mb-4">
            <h3 id="list-title" class="text-xs font-bold text-slate-400 uppercase tracking-widest">TODAY'S PLAN</h3>
            <span id="task-count" class="bg-purple-100 text-purple-700 text-[10px] font-bold px-2.5 py-1 rounded-full border border-purple-200">0 Tasks</span>
        </div>

        <!-- Task Container -->
        <div id="tasks-container" class="space-y-4 pb-12">
            <!-- Tasks will be injected here -->
        </div>

        <!-- Empty State (Hidden by default) -->
        <div id="empty-state" class="hidden text-center py-16 opacity-60 flex flex-col items-center">
            <div class="bg-purple-50 p-6 rounded-full mb-4 animate-bounce-slow">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" class="text-purple-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            </div>
            <p class="text-slate-500 font-medium text-lg">All Caught Up!</p>
            <p class="text-slate-400 text-sm mt-1">Enjoy your free time or add a new task.</p>
        </div>

    </main>

    <script>
        // --- State Management ---
        let tasks = [];
        let activeTab = 'today';
        const STORAGE_KEY = 'health-zen-user-data'; // Generic key

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            loadTasks();
            setDefaultDate();
            render();
            checkNotifications();
            
            // Check Notification Permission on load
            if (Notification.permission !== 'granted' && Notification.permission !== 'denied') {
                document.getElementById('notif-dot').classList.remove('hidden');
            }
        });

        // --- Core Functions ---
        function loadTasks() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) tasks = JSON.parse(stored);
        }

        function saveTasks() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
            render();
        }

        function setDefaultDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date-input').value = today;
        }

        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                // Fallback attempt to close or alert if at start
                window.close();
                console.log("No history to go back to.");
            }
        }

        function requestNotificationPermission() {
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    document.getElementById('notif-dot').classList.add('hidden');
                    alert("Notifications enabled! You will be reminded on time.");
                } else if (permission === 'denied') {
                    alert("Notifications are blocked. Please enable them in browser settings.");
                }
            });
        }

        // --- Tabs Logic ---
        function switchTab(tab) {
            activeTab = tab;
            
            // UI Update
            ['today', 'upcoming', 'history'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === tab) {
                    btn.className = "flex-1 py-2.5 text-sm font-bold rounded-xl transition-all capitalize text-purple-800 bg-purple-100 shadow-sm transform scale-105";
                } else {
                    btn.className = "flex-1 py-2.5 text-sm font-bold rounded-xl transition-all capitalize text-slate-400 hover:text-purple-600 hover:bg-slate-50";
                }
            });

            // Show/Hide Input Form
            const form = document.getElementById('add-task-form');
            if (tab === 'history') {
                form.classList.add('hidden');
            } else {
                form.classList.remove('hidden');
                form.classList.add('block');
            }

            // Show/Hide Progress Card
            const card = document.getElementById('progress-card');
            if (tab === 'today') card.classList.remove('hidden');
            else card.classList.add('hidden');

            render();
        }

        // --- Rendering Logic ---
        function render() {
            const container = document.getElementById('tasks-container');
            container.innerHTML = '';
            
            const todayStr = new Date().toISOString().split('T')[0];
            let filteredTasks = [];

            // Filter logic
            if (activeTab === 'today') {
                filteredTasks = tasks.filter(t => !t.completed && t.date <= todayStr);
                document.getElementById('list-title').innerText = "TODAY'S TARGETS";
            } else if (activeTab === 'upcoming') {
                filteredTasks = tasks.filter(t => !t.completed && t.date > todayStr);
                document.getElementById('list-title').innerText = "FUTURE CALENDAR";
            } else if (activeTab === 'history') {
                filteredTasks = tasks.filter(t => t.completed).sort((a, b) => b.completedAt - a.completedAt); // Newest first
                document.getElementById('list-title').innerText = "COMPLETED LOGS";
            }

            // Sort active tasks by Date then Time
            if (activeTab !== 'history') {
                filteredTasks.sort((a, b) => {
                    return (a.date + (a.time || '')) - (b.date + (b.time || ''));
                });
            }

            // Update Counts
            document.getElementById('task-count').innerText = `${filteredTasks.length} Tasks`;

            // Update Progress (Today only)
            if (activeTab === 'today') {
                const todayTasks = tasks.filter(t => t.date === todayStr);
                const total = todayTasks.length;
                const completed = todayTasks.filter(t => t.completed).length;
                const percent = total === 0 ? 0 : Math.round((completed / total) * 100);
                
                document.getElementById('progress-percent').innerText = `${percent}%`;
                document.getElementById('progress-bar').style.width = `${percent}%`;
            }

            // Empty State
            if (filteredTasks.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            } else {
                document.getElementById('empty-state').classList.add('hidden');
            }

            // Render Groups (Calendar Type Feel)
            // Group by Date for cleaner look
            const groups = {};
            filteredTasks.forEach(task => {
                const dKey = task.date || "No Date";
                if (!groups[dKey]) groups[dKey] = [];
                groups[dKey].push(task);
            });

            // Render Groups
            Object.keys(groups).sort().forEach(dateKey => {
                // Date Header
                const dateHeader = document.createElement('div');
                dateHeader.className = "sticky top-[140px] z-30 bg-slate-50/95 backdrop-blur py-2 px-1 text-xs font-bold text-slate-500 flex items-center gap-2 uppercase tracking-wide border-b border-slate-100";
                
                const dateObj = new Date(dateKey);
                const readableDate = isNaN(dateObj) ? "No Date" : dateObj.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'long' });
                
                // Special labels
                let label = readableDate;
                if (dateKey === todayStr) label = "Today";
                else if (dateKey === new Date(Date.now() + 86400000).toISOString().split('T')[0]) label = "Tomorrow";

                dateHeader.innerHTML = `<span class="bg-purple-100 text-purple-800 px-2 py-0.5 rounded text-[10px]">${label}</span>`;
                
                container.appendChild(dateHeader);

                // Tasks in this group
                groups[dateKey].forEach(task => {
                    const el = createTaskElement(task, dateKey < todayStr && !task.completed);
                    container.appendChild(el);
                });
            });
        }

        function createTaskElement(task, isOverdue) {
            const div = document.createElement('div');
            div.className = `task-item task-enter group flex items-start gap-3 bg-white p-4 rounded-xl border border-transparent shadow-sm hover:shadow-md hover:border-purple-200 mb-2 relative overflow-hidden ${task.completed ? 'opacity-75 bg-slate-50' : ''}`;
            
            // Priority Colors
            let priorityClass = "bg-purple-50 text-purple-600 border-purple-100";
            if (task.priority === 'urgent') priorityClass = "bg-red-50 text-red-600 border-red-100";
            if (task.priority === 'high') priorityClass = "bg-orange-50 text-orange-600 border-orange-100";

            // Overdue indicator
            const overdueHtml = isOverdue ? `<div class="absolute left-0 top-0 bottom-0 w-1 bg-red-500"></div>` : '';

            // Checkbox Icon
            const icon = task.completed 
                ? `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" class="text-purple-600 fill-purple-100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`
                : `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" class="text-slate-300 hover:text-purple-500 transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>`;

            div.innerHTML = `
                ${overdueHtml}
                <button onclick="toggleTask(${task.id})" class="mt-0.5 flex-shrink-0 active:scale-90 transition-transform">
                    ${icon}
                </button>
                
                <div class="flex-1 min-w-0">
                    <p class="text-base font-semibold leading-snug break-words ${task.completed ? 'text-slate-400 line-through' : 'text-slate-700'}">
                        ${task.text}
                    </p>
                    
                    <div class="flex flex-wrap items-center gap-2 mt-2">
                        <span class="text-[10px] uppercase tracking-wider font-bold px-2 py-0.5 rounded border ${priorityClass}">
                            ${task.priority}
                        </span>
                        
                        ${task.time ? `
                            <span class="flex items-center text-[10px] font-medium text-slate-500 gap-1 bg-slate-100 px-1.5 py-0.5 rounded">
                                <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                ${task.time}
                            </span>` : ''}

                        ${isOverdue ? `
                            <span class="flex items-center gap-1 text-[10px] font-bold text-red-500 animate-pulse">
                                <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
                                OVERDUE
                            </span>` : ''}
                    </div>
                </div>

                <button onclick="deleteTask(${task.id})" class="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all opacity-0 group-hover:opacity-100" aria-label="Delete Task">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                </button>
            `;
            return div;
        }

        // --- Actions ---
        document.getElementById('add-task-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const text = document.getElementById('task-input').value.trim();
            if (!text) return;

            const newTask = {
                id: Date.now(),
                text: text,
                date: document.getElementById('date-input').value || new Date().toISOString().split('T')[0],
                time: document.getElementById('time-input').value,
                priority: document.getElementById('priority-input').value,
                completed: false,
                notified: false,
                createdAt: Date.now()
            };

            tasks.push(newTask);
            document.getElementById('task-input').value = '';
            document.getElementById('time-input').value = '';
            saveTasks();
        });

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                if(task.completed) task.completedAt = Date.now();
                else delete task.completedAt;
                saveTasks();
            }
        }

        function deleteTask(id) {
            if(confirm('Are you sure you want to delete this task?')) {
                tasks = tasks.filter(t => t.id !== id);
                saveTasks();
            }
        }

        // --- Notifications ---
        function checkNotifications() {
            setInterval(() => {
                const now = new Date();
                const timeStr = now.toTimeString().slice(0, 5); // HH:MM
                const dateStr = now.toISOString().split('T')[0];

                tasks.forEach(task => {
                    if (!task.completed && !task.notified && task.date === dateStr && task.time === timeStr) {
                        new Notification("Health Zen Reminder 💜", {
                            body: `Time to focus: ${task.text}`,
                            icon: 'https://cdn-icons-png.flaticon.com/512/7606/7606169.png'
                        });
                        task.notified = true;
                        saveTasks();
                    }
                });
            }, 30000); // Check every 30s
        }

    </script>
</body>
</html>
