<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta property="og:site_name" content="Explyra" />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:creator" content="@explyras" />

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Explyra Suite</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #F8F7F4;
            --bg2: #FFFFFF;
            --bg3: #F1EFE9;
            --bg4: #E9E6E0;
            --surf: #FFFFFF;
            --bdr: #E4E1DB;
            --bdr2: #CCC8C0;
            --ink: #0D1117;
            --ink2: #2A3141;
            --ink3: #586070;
            --ink4: #939BAC;
            --blue: #1546C0;
            --blue2: #5B8AF5;
            --blue-g: rgba(21, 70, 192, 0.08);
            --blue-b: rgba(21, 70, 192, 0.2);
            --r: 8px;
            --t: 0.2s ease;
            --s2: 0 4px 16px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04);
        }

        [data-theme="dark"] {
            --bg: #080B14;
            --bg2: #0E1220;
            --bg3: #141928;
            --bg4: #1B2235;
            --surf: #141928;
            --bdr: rgba(255, 255, 255, 0.07);
            --bdr2: rgba(255, 255, 255, 0.14);
            --ink: #EEF0F8;
            --ink2: #C4CCDC;
            --ink3: #8290A8;
            --ink4: #4E5A70;
            --blue: #5B8AF5;
            --blue2: #93B4FF;
            --blue-g: rgba(91, 138, 245, 0.12);
            --blue-b: rgba(91, 138, 245, 0.25);
            --s2: 0 4px 16px rgba(0, 0, 0, 0.45), 0 1px 4px rgba(0, 0, 0, 0.25);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            transition: background 0.4s, color 0.4s;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            background: var(--surf);
            border: 1px solid var(--bdr);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: var(--s2);
            text-align: center;
        }

        .auth-logo {
            width: 48px;
            height: 48px;
            background: var(--blue);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .auth-logo svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: #fff;
            stroke-width: 2.2;
            stroke-linecap: round;
        }

        .auth-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 0.5rem;
        }

        .auth-desc {
            font-size: 0.95rem;
            color: var(--ink3);
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }

        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--ink2);
            margin-bottom: 0.4rem;
        }

        .form-input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--bg);
            border: 1px solid var(--bdr);
            border-radius: var(--r);
            color: var(--ink);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all var(--t);
            outline: none;
        }

        .form-input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px var(--blue-g);
        }

        .btn-submit {
            width: 100%;
            background: var(--blue);
            color: #fff;
            padding: 0.9rem;
            border-radius: var(--r);
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all var(--t);
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-submit:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .auth-footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--ink3);
        }

        .auth-footer a {
            color: var(--blue);
            font-weight: 600;
            text-decoration: none;
            transition: color var(--t);
        }

        .auth-footer a:hover {
            color: var(--blue2);
        }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.8rem;
            color: var(--blue);
            font-weight: 500;
            margin-top: 0.3rem;
            text-decoration: none;
        }

        .forgot-link:hover {
            color: var(--blue2);
        }

        #toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: var(--s2);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease forwards;
        }

        .toast.success {
            background: #10B981;
        }

        .toast.error {
            background: #EF4444;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>

    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Explyra",
  "url": "https://explyra.me/",
  "sameAs": [
    "https://x.com/explyras",
    "https://www.facebook.com/profile.php?id=61584891033070&sk=directory_personal_details",
    "https://www.instagram.com/explyras",
    "https://www.youtube.com/@explyras",
    "https://www.linkedin.com/company/explyra/",
    "https://www.threads.com/@explyras",
    "https://github.com/Explyra"
  ]
}
</script>
</head>

<body>

    <div class="auth-container">
        <div class="auth-logo">
            <svg viewBox="0 0 24 24">
                <path d="M12 2L2 7l10 5 10-5-10-5z" />
                <path d="M2 17l10 5 10-5" />
                <path d="M2 12l10 5 10-5" />
            </svg>
        </div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-desc">Sign in to your Explyra workspace.</p>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="you@company.com" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                <a href="#" class="forgot-link" id="forgotLink">Forgot password?</a>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                Sign In <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="signup.html">Create one</a>
        </div>
    </div>

    <div id="toast-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKXkuH1zbUwOD1gA35gG4vQXKTX60xwe0",
            authDomain: "explyras.firebaseapp.com",
            projectId: "explyras",
            storageBucket: "explyras.firebasestorage.app",
            messagingSenderId: "411853553644",
            appId: "1:411853553644:web:eca79eab846b6a5149cac9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.showToast = (msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        };

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');

            if (!email || !password) return showToast('Please fill all fields', 'error');

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Signing in...';

            try {
                const userCred = await signInWithEmailAndPassword(auth, email, password);
                const user = userCred.user;

                // Check user document to determine redirect
                const userDoc = await getDoc(doc(db, "users", user.uid));

                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    const role = userData.role;

                    showToast('Login successful! Redirecting...', 'success');

                    setTimeout(() => {
                        if (role === 'owner' || role === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'emp.html';
                        }
                    }, 800);
                } else {
                    // No user doc — might be a legacy account, send to company setup
                    showToast('Welcome! Setting up your account...', 'success');
                    setTimeout(() => {
                        window.location.href = 'company.html';
                    }, 800);
                }
            } catch (error) {
                console.error("Login error:", error);
                let msg = 'Invalid email or password.';
                if (error.code === 'auth/user-not-found') msg = 'No account found with this email.';
                if (error.code === 'auth/wrong-password') msg = 'Incorrect password.';
                if (error.code === 'auth/too-many-requests') msg = 'Too many attempts. Please try later.';
                showToast(msg, 'error');
                btn.disabled = false;
                btn.innerHTML = 'Sign In <i class="fa-solid fa-arrow-right"></i>';
            }
        });

        // Forgot Password
        document.getElementById('forgotLink').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!email) return showToast('Enter your email first to reset password', 'error');

            try {
                await sendPasswordResetEmail(auth, email);
                showToast('Password reset email sent! Check your inbox.', 'success');
            } catch (error) {
                showToast('Error sending reset email. Check the address.', 'error');
            }
        });
    </script>
</body>

</html>
