<!DOCTYPE html>
<html lang="en">

<head>
    <meta property="og:site_name" content="Explyra" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:site" content="@explyras" />
    <meta name="twitter:creator" content="@explyras" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salaries & Bonuses - Company Attendance</title>
    <!-- Tailwind & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../css/common.css">
    <link rel="stylesheet" href="company.css">

    <!-- Firebase SDKs (Compat version as used in main app) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="../../js/firebase-config.js" defer></script>

    <!-- Logic -->
    <script src="../shared/utils.js"></script>
    <script src="../shared/auth.js"></script>
    <script>
        let currentMonth = new Date().toISOString().substring(0, 7);

        document.addEventListener('DOMContentLoaded', () => {
            initAuth('company');
            const session = getSession('company_session');
            if (session && session.role === 'Manager') {
                document.body.innerHTML = '<div class="flex items-center justify-center h-screen bg-slate-50 text-slate-500 font-bold text-xl">Access Denied. You do not have permission to view salary details. <a href="dashboard.html" class="text-green-600 ml-2 underline">Go back</a></div>';
                return;
            }

            document.getElementById('month-picker').value = currentMonth;
            setTimeout(renderSalaries, 300);
        });

        function changeMonth(e) {
            currentMonth = e.target.value;
            renderSalaries();
        }

        function calculateTotal(empId) {
            const basic = parseFloat(document.getElementById(`basic-${empId}`).dataset.value) || 0;
            const incentiveInput = document.getElementById(`incentive-${empId}`);
            let incentive = 0;
            if (incentiveInput) {
                incentive = parseFloat(incentiveInput.value) || 0;
            }
            const total = basic + incentive;
            document.getElementById(`total-${empId}`).textContent = formatCurrency(total);
        }

        async function renderSalaries() {
            const session = getSession('company_session');
            if (!session) return;

            const tbody = document.getElementById('salary-tbody');
            tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-8 text-center text-slate-500"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading salaries...</td></tr>';

            let emps = [];
            let monthSals = {};

            if (typeof window.db !== 'undefined' && session.companyId) {
                try {
                    // Fetch active employees
                    const empSnap = await window.db.collection('employees').where('companyId', '==', session.companyId).get();
                    empSnap.forEach(doc => emps.push({ firebaseId: doc.id, ...doc.data() }));

                    // Fetch salary records for company
                    const salSnap = await window.db.collection('salaries').doc(session.companyId).get();
                    if (salSnap.exists) {
                        const allSals = salSnap.data();
                        monthSals = allSals[currentMonth] || {};
                    }
                } catch (e) {
                    console.error("Firestore error loading salaries", e);
                }
            } else {
                const data = getAppData('attendance_app_data', {});
                emps = data.employees[session.companyId] || [];

                if (!data.salaries[session.companyId]) {
                    data.salaries[session.companyId] = {};
                }
                monthSals = data.salaries[session.companyId][currentMonth] || {};
            }

            tbody.innerHTML = '';

            if (emps.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-slate-500">No employees found.</td></tr>`;
            } else {
                emps.forEach(emp => {
                    const safeId = emp.id || emp.firebaseId;
                    const salRecord = monthSals[safeId] || { paid: false, incentive: 0 };
                    const isPaid = salRecord.paid;
                    const incentiveVal = isPaid ? salRecord.incentive : (salRecord.incentive || 0);

                    const el = document.createElement('tr');
                    el.className = "border-b border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition";

                    let incentiveHtml = '-';
                    if (emp.incentiveEligible) {
                        if (isPaid) {
                            incentiveHtml = `<span class="font-mono">${formatCurrency(incentiveVal)}</span>`;
                        } else {
                            incentiveHtml = `<input type="number" id="incentive-${safeId}" value="${incentiveVal}" oninput="calculateTotal('${safeId}')" class="w-24 px-2 py-1 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 rounded outline-none focus:border-green-500 text-sm font-mono" min="0" ${!hasAccess(['Admin'], 'company') ? 'disabled' : ''}>`;
                        }
                    }

                    let actionHtml = '';
                    if (isPaid) {
                        actionHtml = `
                            <span class="badge bg-green-100 text-green-700 border-green-200 inline-block mb-1"><i class="fa-solid fa-check mr-1"></i> Paid</span>
                            ${hasAccess(['Admin'], 'company') ? `<button onclick="unmarkPaid('${safeId}')" class="text-[10px] text-red-500 hover:underline block font-bold mt-1">Revert</button>` : ''}
                        `;
                    } else {
                        actionHtml = hasAccess(['Admin'], 'company') ? `
                            <button onclick="markPaid('${safeId}', ${emp.salary || 0})" class="bg-green-600 hover:bg-green-500 text-white px-3 py-1.5 rounded text-xs font-bold shadow-sm transition">
                                Mark as Paid
                            </button>
                        ` : '<span class="text-slate-400 text-xs font-bold">Pending</span>';
                    }

                    el.innerHTML = `
                        <td class="px-6 py-4 font-mono text-sm">${safeId}</td>
                        <td class="px-6 py-4 font-bold">${emp.name || ''}</td>
                        <td class="px-6 py-4 font-mono text-sm" id="basic-${safeId}" data-value="${emp.salary || 0}">${formatCurrency(emp.salary || 0)}</td>
                        <td class="px-6 py-4">${incentiveHtml}</td>
                        <td class="px-6 py-4 font-mono font-bold text-green-600 dark:text-green-400" id="total-${safeId}">${formatCurrency(parseFloat(emp.salary || 0) + (emp.incentiveEligible ? parseFloat(incentiveVal) : 0))}</td>
                        <td class="px-6 py-4 admin-only">${actionHtml}</td>
                    `;
                    tbody.appendChild(el);

                    if (!isPaid && emp.incentiveEligible) {
                        // Ensure total is correctly calculated on render
                        calculateTotal(safeId);
                    }
                });
            }

            // Reapply RBAC wrapper
            updateUIForRole(session.role, 'company');
        }

        async function markPaid(empId, basicSalary) {
            const session = getSession('company_session');

            let incAmt = 0;
            const incInput = document.getElementById(`incentive-${empId}`);
            if (incInput) incAmt = parseFloat(incInput.value) || 0;

            const payloadData = {
                basic: parseFloat(basicSalary),
                incentive: incAmt,
                paid: true,
                paidAt: new Date().toISOString()
            };

            if (typeof window.db !== 'undefined' && session.companyId) {
                try {
                    const salRef = window.db.collection('salaries').doc(session.companyId);

                    const updateObj = {};
                    updateObj[`${currentMonth}.${empId}`] = payloadData;

                    await salRef.set(updateObj, { merge: true });
                } catch (e) {
                    console.error("Firestore mark paid error", e);
                }
            } else {
                const data = getAppData('attendance_app_data', {});

                if (!data.salaries[session.companyId][currentMonth]) {
                    data.salaries[session.companyId][currentMonth] = {};
                }

                data.salaries[session.companyId][currentMonth][empId] = payloadData;
                saveAppData('attendance_app_data', data);
            }

            renderSalaries();
        }

        async function unmarkPaid(empId) {
            const session = getSession('company_session');

            if (typeof window.db !== 'undefined' && session.companyId) {
                try {
                    const salRef = window.db.collection('salaries').doc(session.companyId);

                    const updateObj = {};
                    updateObj[`${currentMonth}.${empId}.paid`] = false;

                    await salRef.set(updateObj, { merge: true });
                } catch (e) {
                    console.error("Firestore unmark paid error", e);
                }
            } else {
                const data = getAppData('attendance_app_data', {});

                if (data.salaries[session.companyId] && data.salaries[session.companyId][currentMonth]) {
                    if (data.salaries[session.companyId][currentMonth][empId]) {
                        data.salaries[session.companyId][currentMonth][empId].paid = false;
                    }
                }

                saveAppData('attendance_app_data', data);
            }

            renderSalaries();
        }

        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('explyra-theme', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('explyra-theme', 'dark');
            }
        }
        if (localStorage.getItem('explyra-theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>

<body
    class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-['Outfit'] h-screen overflow-hidden flex transition-colors duration-300">

    <!-- Sidebar -->
    <aside
        class="w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 flex flex-col shrink-0 hidden md:flex">
        <div class="h-16 flex items-center px-6 border-b border-slate-200 dark:border-slate-700">
            <i class="fa-solid fa-layer-group text-green-600 text-xl mr-3"></i>
            <span class="font-bold text-lg tracking-tight">CM Workspace</span>
        </div>

        <div class="p-4 border-b border-slate-100 dark:border-slate-700/50 bg-slate-50/50 dark:bg-slate-900/20">
            <p class="text-[10px] uppercase font-bold text-slate-400 mb-1">Active Company</p>
            <p id="sidebar-company-name" class="font-bold text-slate-700 dark:text-slate-200 truncate">Loading...</p>
        </div>

        <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
            <a href="dashboard.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-slate-900 dark:hover:text-slate-200 font-medium transition">
                <i class="fa-solid fa-chart-pie w-5 text-center"></i> Dashboard
            </a>
            <a href="employees.html"
                class="hr-auth flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-slate-900 dark:hover:text-slate-200 font-medium transition">
                <i class="fa-solid fa-users w-5 text-center"></i> Employees
            </a>
            <a href="attendance.html"
                class="hr-auth flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-slate-900 dark:hover:text-slate-200 font-medium transition">
                <i class="fa-regular fa-calendar-check w-5 text-center"></i> Attendance
            </a>
            <a href="salary.html"
                class="admin-only flex items-center gap-3 px-3 py-2.5 rounded-lg bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-400 font-bold transition">
                <i class="fa-solid fa-wallet w-5 text-center"></i> Salary & Bonus
            </a>
        </nav>

        <div class="p-4 border-t border-slate-200 dark:border-slate-700">
            <div class="flex items-center gap-3 mb-4">
                <div
                    class="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-500 font-bold">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="overflow-hidden">
                    <p id="sidebar-user-name" class="text-sm font-bold truncate">User</p>
                    <p id="sidebar-user-role" class="text-[10px] font-bold uppercase text-slate-400 truncate">Role</p>
                </div>
            </div>
            <button onclick="doLogout('company')"
                class="w-full flex items-center justify-center gap-2 py-2 text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg text-xs font-bold transition">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <!-- Header -->
        <header
            class="h-16 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between px-6 shrink-0 z-10">
    <meta property="og:site_name" content="Explyra" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:site" content="@explyras" />
    <meta name="twitter:creator" content="@explyras" />
    <meta name="twitter:card" content="summary_large_image" />
            <div class="flex items-center gap-3">
                <h1 class="text-lg font-bold">Salary Management</h1>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()"
                    class="w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-500 dark:text-yellow-400 hover:bg-slate-200 dark:hover:bg-slate-600 transition">
                    <i class="fa-solid fa-moon dark:hidden"></i>
                    <i class="fa-solid fa-sun hidden dark:block"></i>
                </button>
            </div>
        </header>

        <!-- Content Area -->
        <div class="flex-1 overflow-y-auto p-6 md:p-8 space-y-6">

            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                <div>
                    <h2 class="text-2xl font-bold">Payroll</h2>
                    <p class="text-slate-500 text-sm mt-1">Review basic salaries, compute incentives, and mark payments
                        done.</p>
                </div>
                <div
                    class="flex items-center gap-3 bg-white dark:bg-slate-800 p-2 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm">
                    <label class="text-xs font-bold text-slate-500 ml-2 uppercase">Payroll Month:</label>
                    <input type="month" id="month-picker" onchange="changeMonth(event)"
                        class="px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-green-500 outline-none text-sm font-mono cursor-pointer">
                </div>
            </div>

            <div
                class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead
                            class="bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700 text-xs uppercase tracking-wider text-slate-500 font-bold">
                            <tr>
                                <th class="px-6 py-4">EMP ID</th>
                                <th class="px-6 py-4">Name</th>
                                <th class="px-6 py-4">Base Salary</th>
                                <th class="px-6 py-4">Incentive</th>
                                <th class="px-6 py-4">Total Payable</th>
                                <th class="px-6 py-4 admin-only">Status / Action</th>
                            </tr>
                        </thead>
                        <tbody id="salary-tbody" class="text-sm">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

</body>

</html>
