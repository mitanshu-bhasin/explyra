<!DOCTYPE html><html lang="en"><head><meta property="og:site_name" content="Explyra"><meta property="og:locale" content="en_US"><meta name="twitter:site" content="@explyras"><meta name="twitter:creator" content="@explyras"><meta name="twitter:card" content="summary_large_image"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Attendance - Company Attendance</title><script src="https://cdn.tailwindcss.com"></script><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="../../css/common.css"><link rel="stylesheet" href="company.css"><script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script><script src="../../js/firebase-config.js" defer="defer"></script><script src="../shared/utils.js"></script><script src="../shared/auth.js"></script><script>let currentDate = new Date().toISOString().split('T')[0];

        document.addEventListener('DOMContentLoaded', () => {
            initAuth('company');
            document.getElementById('date-picker').value = currentDate;
            setTimeout(renderAttendance, 300);
        });

        function changeDate(e) {
            currentDate = e.target.value;
            renderAttendance();
        }

        function calculateMonthlyStats(empId, yearMonth, attData) {
            let present = 0, halfDay = 0, absent = 0, leave = 0;

            // Iterate over all days in attData
            Object.keys(attData).forEach(date => {
                if (date.startsWith(yearMonth) && attData[date][empId]) {
                    const status = attData[date][empId];
                    if (status === 'Present') present++;
                    else if (status === 'Half Day') halfDay++;
                    else if (status === 'Absent') absent++;
                    else if (status === 'Leave') leave++;
                }
            });

            const totalMarked = present + halfDay + absent + leave;
            const totalWorked = present + (halfDay * 0.5);
            const percentage = totalMarked > 0 ? Math.round((totalWorked / totalMarked) * 100) : 0;

            return {
                worked: totalWorked,
                leaves: leave,
                percentage: percentage
            };
        }

        async function renderAttendance() {
            const session = getSession('company_session');
            if (!session) return;

            const tbody = document.getElementById('attendance-tbody');
            tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-slate-500"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading attendance...</td></tr>';

            let emps = [];
            let att = {};

            if (typeof window.db !== 'undefined' && session.companyId) {
                try {
                    // Fetch employees
                    const empSnap = await window.db.collection('employees').where('companyId', '==', session.companyId).get();
                    empSnap.forEach(doc => emps.push({ firebaseId: doc.id, ...doc.data() }));

                    // Fetch attendance document
                    const attSnap = await window.db.collection('attendance').doc(session.companyId).get();
                    if (attSnap.exists) {
                        att = attSnap.data();
                    }
                } catch (e) {
                    console.error("Firestore error loading attendance data", e);
                }
            } else {
                const data = getAppData('attendance_app_data', {});
                emps = data.employees[session.companyId] || [];
                att = data.attendance[session.companyId] || {};
            }

            const todayAtt = att[currentDate] || {};
            const yearMonth = currentDate.substring(0, 7);

            tbody.innerHTML = '';

            if (emps.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-slate-500">No employees found.</td></tr>`;
            } else {
                emps.forEach(emp => {
                    const safeId = emp.id || emp.firebaseId;
                    const stats = calculateMonthlyStats(safeId, yearMonth, att);
                    const currentStatus = todayAtt[safeId] || '';

                    const el = document.createElement('tr');
                    el.className = "border-b border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition";

                    let statusHtml = '';
                    if (hasAccess(['Admin', 'HR'], 'company')) {
                        statusHtml = `
                            <select onchange="updateStatus('${safeId}', this.value)" class="px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-sm focus:ring-2 focus:ring-green-500 outline-none">
                                <option value="" ${currentStatus === '' ? 'selected' : ''}>Not Marked</option>
                                <option value="Present" ${currentStatus === 'Present' ? 'selected' : ''}>Present</option>
                                <option value="Absent" ${currentStatus === 'Absent' ? 'selected' : ''}>Absent</option>
                                <option value="Half Day" ${currentStatus === 'Half Day' ? 'selected' : ''}>Half Day</option>
                                <option value="Leave" ${currentStatus === 'Leave' ? 'selected' : ''}>Leave</option>
                            </select>
                        `;
                    } else {
                        statusHtml = `<span class="badge ${getBadgeClass(currentStatus)}">${currentStatus || 'Not Marked'}</span>`;
                    }

                    el.innerHTML = `
                        <td class="px-6 py-4 font-mono text-sm">${safeId}</td>
                        <td class="px-6 py-4 font-bold">${emp.name || ''}</td>
                        <td class="px-6 py-4">${statusHtml}</td>
                        <td class="px-6 py-4 text-sm font-semibold text-blue-600 dark:text-blue-400">${stats.percentage}%</td>
                        <td class="px-6 py-4 text-xs">
                            <span class="text-green-600 dark:text-green-400 font-bold">${stats.worked} Days Worked</span><br>
                            <span class="text-amber-600 dark:text-amber-400">${stats.leaves} Leaves</span>
                        </td>
                    `;
                    tbody.appendChild(el);
                });
            }
        }

        function getBadgeClass(status) {
            if (status === 'Present') return 'badge-present';
            if (status === 'Absent') return 'badge-absent';
            if (status === 'Half Day') return 'badge-halfday';
            if (status === 'Leave') return 'badge-leave';
            return 'bg-slate-100 text-slate-500 border-slate-200';
        }

        async function updateStatus(empId, status) {
            const session = getSession('company_session');

            if (typeof window.db !== 'undefined' && session.companyId) {
                try {
                    const attRef = window.db.collection('attendance').doc(session.companyId);

                    // Firestore Set/Merge strategy
                    const updateObj = {};
                    if (status === '') {
                        updateObj[`${currentDate}.${empId}`] = firebase.firestore.FieldValue.delete();
                    } else {
                        updateObj[`${currentDate}.${empId}`] = status;
                    }

                    await attRef.set(updateObj, { merge: true });
                } catch (e) {
                    console.error("Firestore attendance update error", e);
                }
            } else {
                const data = getAppData('attendance_app_data', {});

                if (!data.attendance[session.companyId]) {
                    data.attendance[session.companyId] = {};
                }
                if (!data.attendance[session.companyId][currentDate]) {
                    data.attendance[session.companyId][currentDate] = {};
                }

                if (status === '') {
                    delete data.attendance[session.companyId][currentDate][empId];
                } else {
                    data.attendance[session.companyId][currentDate][empId] = status;
                }

                saveAppData('attendance_app_data', data);
            }

            renderAttendance();
        }

        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('explyra-theme', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('explyra-theme', 'dark');
            }
        }
        if (localStorage.getItem('explyra-theme') === 'dark') {
            document.documentElement.classList.add('dark');

t w-5 text-center"></i> Salary & Bonus</a></nav><div class="p-4 border-t border-slate-200 dark:border-slate-700"><div class="flex items-center gap-3 mb-4"><div class="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-500 font-bold"><i class="fa-solid fa-user"></i></div><div class="overflow-hidden"><p id="sidebar-user-name" class="text-sm font-bold truncate">User</p><p id="sidebar-user-role" class="text-[10px] font-bold uppercase text-slate-400 truncate">Role</p></div></div><button onclick="doLogout('company')" class="w-full flex items-center justify-center gap-2 py-2 text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg text-xs font-bold transition"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button></div></aside><main class="flex-1 flex flex-col h-screen overflow-hidden relative"><header class="h-16 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between px-6 shrink-0 z-10"><meta property="og:site_name" content="Explyra"><meta property="og:locale" content="en_US"><meta name="twitter:site" content="@explyras"><meta name="twitter:creator" content="@explyras"><meta name="twitter:card" content="summary_large_image"><div class="flex items-center gap-3"><h1 class="text-lg font-bold">Attendance Register</h1></div><div class="flex items-center gap-4"><button onclick="toggleTheme()" class="w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-500 dark:text-yellow-400 hover:bg-slate-200 dark:hover:bg-slate-600 transition"><i class="fa-solid fa-moon dark:hidden"></i> <i class="fa-solid fa-sun hidden dark:block"></i></button></div></header><div class="flex-1 overflow-y-auto p-6 md:p-8 space-y-6"><div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4"><div><h2 class="text-2xl font-bold">Daily Tracking</h2><p class="text-slate-500 text-sm mt-1">Mark attendance and view monthly analytics per employee.</p></div><div class="flex items-center gap-3 bg-white dark:bg-slate-800 p-2 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm"><label class="text-xs font-bold text-slate-500 ml-2 uppercase">Select Date:</label> <input type="date" id="date-picker" onchange="changeDate(event)" class="px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-green-500 outline-none text-sm font-mono"></div></div><div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-sm overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-left"><thead class="bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700 text-xs uppercase tracking-wider text-slate-500 font-bold"><tr><th class="px-6 py-4">EMP ID</th><th class="px-6 py-4">Name</th><th class="px-6 py-4">Today's Status</th><th class="px-6 py-4">Monthly Rate</th><th class="px-6 py-4">Monthly Overview</th></tr></thead><tbody id="attendance-tbody" class="text-sm"></tbody></table></div></div></div></main></body></html>
