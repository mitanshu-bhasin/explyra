<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees - Company Attendance</title>
    <!-- Tailwind & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../css/common.css">
    <link rel="stylesheet" href="company.css">

    <!-- Firebase SDKs (Compat version as used in main app) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="../../js/firebase-config.js" defer></script>

    <!-- Logic -->
    <script src="../shared/utils.js"></script>
    <script src="../shared/auth.js"></script>
    <script>
        let currentEditId = null;

        document.addEventListener('DOMContentLoaded', () => {
            initAuth('company');
            setTimeout(renderEmployees, 300);
        });

        let cachedEmployees = [];

        async function renderEmployees() {
            const session = getSession('company_session');
            if (!session) return;

            const tbody = document.getElementById('employee-tbody');
            tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-8 text-center text-slate-500"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading employees...</td></tr>';

            let emps = [];

            if (typeof window.db !== 'undefined' && session.companyId) {
                try {
                    const snapshot = await window.db.collection('employees').where('companyId', '==', session.companyId).get();
                    snapshot.forEach(doc => {
                        emps.push({ firebaseId: doc.id, ...doc.data() });
                    });
                } catch (e) {
                    console.error("Firestore error loading employees", e);
                }
            } else {
                const data = getAppData('attendance_app_data', {});
                emps = data.employees[session.companyId] || [];
            }

            cachedEmployees = emps;
            tbody.innerHTML = '';

            if (emps.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-slate-500">No employees found. Add one to get started.</td></tr>`;
            } else {
                emps.forEach(emp => {
                    const el = document.createElement('tr');
                    el.className = "border-b border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition";
                    const safeId = emp.id || emp.firebaseId;
                    el.innerHTML = `
                        <td class="px-6 py-4 font-mono text-sm">${safeId}</td>
                        <td class="px-6 py-4 font-bold">${emp.name || ''}</td>
                        <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-300">${emp.department || ''}</td>
                        <td class="px-6 py-4 text-sm">${emp.joiningDate || ''}</td>
                        <td class="px-6 py-4 font-mono text-sm">${formatCurrency(emp.salary || 0)}</td>
                        <td class="px-6 py-4"><span class="badge ${emp.incentiveEligible ? 'badge-present' : 'badge-absent'}">${emp.incentiveEligible ? 'Eligible' : 'Not Eligible'}</span></td>
                        <td class="px-6 py-4 hr-auth" style="display: items-center">
                            <button onclick="editEmployee('${safeId}')" class="w-8 h-8 rounded-full text-blue-600 bg-blue-50 hover:bg-blue-100 transition mr-2"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="deleteEmployee('${safeId}', '${emp.firebaseId || ''}')" class="w-8 h-8 rounded-full text-red-600 bg-red-50 hover:bg-red-100 transition"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    `;
                    tbody.appendChild(el);
                });
            }

            // Reapply RBAC styles to newly injected rows
            updateUIForRole(session.role, 'company');
        }

        function openModal() {
            document.getElementById('emp-form').reset();
            currentEditId = null;
            document.getElementById('emp-modal-title').textContent = 'Add Employee';
            document.getElementById('emp-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('emp-modal').classList.add('hidden');
        }

        async function saveEmployee(e) {
            e.preventDefault();
            const session = getSession('company_session');

            const submitBtn = document.querySelector('#emp-form button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Saving';
            submitBtn.disabled = true;

            const empData = {
                id: document.getElementById('emp-id').value.trim(),
                name: document.getElementById('emp-name').value.trim(),
                department: document.getElementById('emp-dept').value.trim(),
                joiningDate: document.getElementById('emp-date').value,
                salary: parseFloat(document.getElementById('emp-salary').value),
                incentiveEligible: document.getElementById('emp-incentive').checked,
                companyId: session.companyId,
                updatedAt: new Date().toISOString()
            };

            if (typeof window.db !== 'undefined' && session.companyId) {
                try {
                    let docRef;
                    const empCollection = window.db.collection('employees');

                    if (currentEditId) {
                        // Find the firebase document ID by checking cache
                        const existingEmp = cachedEmployees.find(x => x.id === currentEditId || x.firebaseId === currentEditId);

                        if (existingEmp && existingEmp.firebaseId) {
                            docRef = empCollection.doc(existingEmp.firebaseId);
                        } else {
                            // Verify no ID collision if editing and ID changed
                            if (empData.id !== currentEditId) {
                                const collisionCheck = await empCollection.where('companyId', '==', session.companyId).where('id', '==', empData.id).get();
                                if (!collisionCheck.empty) {
                                    alert("Employee ID already exists!");
                                    submitBtn.innerHTML = originalText;
                                    submitBtn.disabled = false;
                                    return;
                                }
                            }

                            // fallback query if firebaseId wasn't cached
                            const q = await empCollection.where('companyId', '==', session.companyId).where('id', '==', currentEditId).get();
                            if (!q.empty) {
                                docRef = q.docs[0].ref;
                            } else {
                                docRef = empCollection.doc();
                            }
                        }
                    } else {
                        // Creating new
                        const collisionCheck = await empCollection.where('companyId', '==', session.companyId).where('id', '==', empData.id).get();
                        if (!collisionCheck.empty) {
                            alert("Employee ID already exists!");
                            submitBtn.innerHTML = originalText;
                            submitBtn.disabled = false;
                            return;
                        }
                        docRef = empCollection.doc();
                        empData.createdAt = new Date().toISOString();
                    }

                    await docRef.set(empData, { merge: true });
                } catch (e) {
                    console.error("Firestore saving error", e);
                    alert("Error saving employee to database.");
                }
            } else {
                const data = getAppData('attendance_app_data', {});
                const emps = data.employees[session.companyId] || [];

                if (currentEditId) {
                    const idx = emps.findIndex(x => x.id === currentEditId);
                    if (idx !== -1) {
                        if (empData.id !== currentEditId && emps.some(x => x.id === empData.id)) {
                            submitBtn.innerHTML = originalText; submitBtn.disabled = false;
                            return alert("Employee ID already exists!");
                        }
                        emps[idx] = empData;
                    }
                } else {
                    if (emps.some(x => x.id === empData.id)) {
                        submitBtn.innerHTML = originalText; submitBtn.disabled = false;
                        return alert("Employee ID already exists!");
                    }
                    emps.push(empData);
                }

                saveAppData('attendance_app_data', data);
            }

            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
            closeModal();
            renderEmployees();
        }

        function editEmployee(id) {
            const emp = cachedEmployees.find(x => x.id === id || x.firebaseId === id);
            if (!emp) return;

            currentEditId = emp.id || emp.firebaseId;
            document.getElementById('emp-id').value = emp.id || '';
            document.getElementById('emp-name').value = emp.name || '';
            document.getElementById('emp-dept').value = emp.department || '';
            document.getElementById('emp-date').value = emp.joiningDate || '';
            document.getElementById('emp-salary').value = emp.salary || 0;
            document.getElementById('emp-incentive').checked = emp.incentiveEligible || false;

            document.getElementById('emp-modal-title').textContent = 'Edit Employee';
            document.getElementById('emp-modal').classList.remove('hidden');
        }

        async function deleteEmployee(id, firebaseId) {
            if (!confirm("Are you sure you want to delete this employee?")) return;
            const session = getSession('company_session');

            if (typeof window.db !== 'undefined' && session.companyId) {
                try {
                    const empCollection = window.db.collection('employees');
                    if (firebaseId) {
                        await empCollection.doc(firebaseId).delete();
                    } else {
                        // Fallback search
                        const q = await empCollection.where('companyId', '==', session.companyId).where('id', '==', id).get();
                        if (!q.empty) {
                            await q.docs[0].ref.delete();
                        }
                    }
                } catch (e) {
                    console.error("Delete error", e);
                }
            } else {
                const data = getAppData('attendance_app_data', {});
                data.employees[session.companyId] = data.employees[session.companyId].filter(x => x.id !== id);
                saveAppData('attendance_app_data', data);
            }
            renderEmployees();
        }

        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('explyra-theme', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('explyra-theme', 'dark');
            }
        }
        if (localStorage.getItem('explyra-theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>

<body
    class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-['Outfit'] h-screen overflow-hidden flex transition-colors duration-300">

    <!-- Employee Modal -->
    <div id="emp-modal"
        class="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-md flex items-center justify-center hidden">
        <div
            class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-xl w-full max-w-lg border border-slate-100 dark:border-slate-700 animate-fade-in max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 id="emp-modal-title" class="text-xl font-bold dark:text-white">Add Employee</h2>
                <button type="button" onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i
                        class="fa-solid fa-times"></i></button>
            </div>

            <form id="emp-form" onsubmit="saveEmployee(event)" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label
                            class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1">Employee
                            ID</label>
                        <input type="text" id="emp-id"
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-green-500 outline-none text-sm font-mono"
                            required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1">Full
                            Name</label>
                        <input type="text" id="emp-name"
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-green-500 outline-none text-sm"
                            required>
                    </div>
                    <div>
                        <label
                            class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1">Department</label>
                        <input type="text" id="emp-dept"
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-green-500 outline-none text-sm"
                            required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1">Joining
                            Date</label>
                        <input type="date" id="emp-date"
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-green-500 outline-none text-sm"
                            required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1">Monthly
                            Salary (₹)</label>
                        <input type="number" id="emp-salary" min="0" step="0.01"
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-green-500 outline-none text-sm"
                            required>
                    </div>
                    <div class="flex items-center mt-6">
                        <input type="checkbox" id="emp-incentive"
                            class="w-4 h-4 text-green-600 rounded border-slate-300 focus:ring-green-600">
                        <label for="emp-incentive"
                            class="ml-2 text-sm font-bold text-slate-600 dark:text-slate-300">Eligible for
                            Incentives</label>
                    </div>
                </div>

                <div class="pt-4 flex justify-end gap-3 mt-4 border-t border-slate-100 dark:border-slate-700">
                    <button type="button" onclick="closeModal()"
                        class="px-5 py-2.5 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 font-bold transition">Cancel</button>
                    <button type="submit"
                        class="px-5 py-2.5 bg-green-600 hover:bg-green-500 text-white font-bold rounded-lg shadow-md transition">Save
                        Employee</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Sidebar -->
    <aside
        class="w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 flex flex-col shrink-0 hidden md:flex">
        <div class="h-16 flex items-center px-6 border-b border-slate-200 dark:border-slate-700">
            <i class="fa-solid fa-layer-group text-green-600 text-xl mr-3"></i>
            <span class="font-bold text-lg tracking-tight">CM Workspace</span>
        </div>

        <div class="p-4 border-b border-slate-100 dark:border-slate-700/50 bg-slate-50/50 dark:bg-slate-900/20">
            <p class="text-[10px] uppercase font-bold text-slate-400 mb-1">Active Company</p>
            <p id="sidebar-company-name" class="font-bold text-slate-700 dark:text-slate-200 truncate">Loading...</p>
        </div>

        <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
            <a href="dashboard.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-slate-900 dark:hover:text-slate-200 font-medium transition">
                <i class="fa-solid fa-chart-pie w-5 text-center"></i> Dashboard
            </a>
            <a href="employees.html"
                class="hr-auth flex items-center gap-3 px-3 py-2.5 rounded-lg bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-400 font-bold transition">
                <i class="fa-solid fa-users w-5 text-center"></i> Employees
            </a>
            <a href="attendance.html"
                class="hr-auth flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-slate-900 dark:hover:text-slate-200 font-medium transition">
                <i class="fa-regular fa-calendar-check w-5 text-center"></i> Attendance
            </a>
            <a href="salary.html"
                class="admin-only flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-slate-900 dark:hover:text-slate-200 font-medium transition">
                <i class="fa-solid fa-wallet w-5 text-center"></i> Salary & Bonus
            </a>
        </nav>

        <div class="p-4 border-t border-slate-200 dark:border-slate-700">
            <div class="flex items-center gap-3 mb-4">
                <div
                    class="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-500 font-bold">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="overflow-hidden">
                    <p id="sidebar-user-name" class="text-sm font-bold truncate">User</p>
                    <p id="sidebar-user-role" class="text-[10px] font-bold uppercase text-slate-400 truncate">Role</p>
                </div>
            </div>
            <button onclick="doLogout('company')"
                class="w-full flex items-center justify-center gap-2 py-2 text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg text-xs font-bold transition">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <!-- Header -->
        <header
            class="h-16 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between px-6 shrink-0 z-10">
            <div class="flex items-center gap-3">
                <h1 class="text-lg font-bold">Employee Directory</h1>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()"
                    class="w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-500 dark:text-yellow-400 hover:bg-slate-200 dark:hover:bg-slate-600 transition">
                    <i class="fa-solid fa-moon dark:hidden"></i>
                    <i class="fa-solid fa-sun hidden dark:block"></i>
                </button>
            </div>
        </header>

        <!-- Content Area -->
        <div class="flex-1 overflow-y-auto p-6 md:p-8 space-y-6">

            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-2xl font-bold">Employees</h2>
                    <p class="text-slate-500 text-sm mt-1">Manage personnel records, departments, and basic salaries.
                    </p>
                </div>
                <button onclick="openModal()"
                    class="hr-auth bg-green-600 hover:bg-green-500 text-white px-5 py-2.5 rounded-lg text-sm font-bold shadow-md transition flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> Add Employee
                </button>
            </div>

            <div
                class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead
                            class="bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700 text-xs uppercase tracking-wider text-slate-500 font-bold">
                            <tr>
                                <th class="px-6 py-4">EMP ID</th>
                                <th class="px-6 py-4">Name</th>
                                <th class="px-6 py-4">Department</th>
                                <th class="px-6 py-4">Join Date</th>
                                <th class="px-6 py-4">Base Salary</th>
                                <th class="px-6 py-4">Incentive</th>
                                <th class="px-6 py-4 hr-auth">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="employee-tbody" class="text-sm">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

</body>

</html>
