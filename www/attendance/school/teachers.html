<!DOCTYPE html>
<html lang="en">

<head>
    <meta property="og:site_name" content="Explyra" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:site" content="@explyras" />
    <meta name="twitter:creator" content="@explyras" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Teachers - Explyra School</title>
    <!-- Tailwind & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../css/common.css">
    <link rel="stylesheet" href="../shared/shared.css">
    <link rel="stylesheet" href="school.css">

    <!-- Firebase SDKs (Compat version as used in main app) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="../../js/firebase-config.js" defer></script>

    <!-- Logic -->
    <script src="../shared/utils.js"></script>
    <script src="../shared/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initAuth('school');

            if (!hasAccess(['Principal'], 'school')) {
                document.body.innerHTML = '<div class="flex items-center justify-center h-screen bg-slate-50 text-slate-500 font-bold text-xl">Access Denied. Only Principals can manage Teachers. <a href="dashboard.html" class="text-indigo-600 ml-2 underline">Go back</a></div>';
                return;
            }

            setTimeout(renderTeachers, 200);
        });

        let cachedTeachers = [];

        async function renderTeachers() {
            const session = getSession('school_session');
            if (!session) return;

            const tbody = document.getElementById('teachers-tbody');
            tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-slate-500"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading teachers...</td></tr>';

            let teachers = [];
            if (typeof window.db !== 'undefined' && session.schoolId) {
                try {
                    // School teachers are stored in the employees collection mapped by the schoolId
                    const snap = await window.db.collection('employees').where('companyId', '==', session.schoolId).get();
                    snap.forEach(doc => teachers.push({ firebaseId: doc.id, ...doc.data() }));
                } catch (e) { console.error("Firestore get teachers error", e); }
            } else {
                const data = getAppData('school_attendance_data', {});
                teachers = data.teachers?.[session.schoolId] || [];
            }

            cachedTeachers = teachers;
            tbody.innerHTML = '';

            if (teachers.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-slate-500">No teachers found. Click 'Add Teacher' to create one.</td></tr>`;
                return;
            }

            teachers.forEach((t, index) => {
                const safeId = t.id || t.firebaseId;
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition animate-fade-in";
                tr.style.animationDelay = `${index * 0.05}s`;

                tr.innerHTML = `
                    <td class="px-6 py-4 font-mono text-sm">${safeId}</td>
                    <td class="px-6 py-4 font-bold text-slate-800 dark:text-slate-200">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-teal-100 dark:bg-teal-900/30 text-teal-600 flex items-center justify-center font-bold text-xs shadow-sm">${(t.name || '?').charAt(0)}</div>
                            ${t.name || ''}
                        </div>
                    </td>
                    <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-400">${t.subject || ''}</td>
                    <td class="px-6 py-4 font-mono text-sm text-slate-500">${t.phone || '-'}</td>
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3">
                            <button onclick="editTeacher('${safeId}')" class="text-indigo-600 hover:text-indigo-800 dark:text-indigo-400 dark:hover:text-indigo-300 transition" title="Edit"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button onclick="deleteTeacher('${safeId}')" class="text-rose-600 hover:text-rose-800 dark:text-rose-400 dark:hover:text-rose-300 transition" title="Delete"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function toggleModal(show) {
            const modal = document.getElementById('teacher-modal');
            if (show) {
                modal.classList.remove('hidden');
                document.getElementById('teacher-id').focus();
            } else {
                modal.classList.add('hidden');
                document.getElementById('teacher-form').reset();
                document.getElementById('teacher-id').readOnly = false;
            }
        }

        let currentEditingFirebaseId = null;

        async function handleSaveTeacher(e) {
            e.preventDefault();
            const session = getSession('school_session');

            const teacherData = {
                id: document.getElementById('teacher-id').value.trim() || generateId(session.schoolId, 'tch'),
                name: document.getElementById('teacher-name').value.trim(),
                subject: document.getElementById('teacher-subject').value.trim(),
                phone: document.getElementById('teacher-phone').value.trim(),
                companyId: session.schoolId
            };

            const btn = document.querySelector('#teacher-form button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Saving...';
            btn.disabled = true;

            if (typeof window.db !== 'undefined' && session.schoolId) {
                try {
                    const empCollection = window.db.collection('employees');
                    if (currentEditingFirebaseId) {
                        await empCollection.doc(currentEditingFirebaseId).set(teacherData, { merge: true });
                    } else {
                        const existingSnap = await empCollection.where('companyId', '==', session.schoolId).where('id', '==', teacherData.id).get();
                        if (!existingSnap.empty) {
                            await empCollection.doc(existingSnap.docs[0].id).set(teacherData, { merge: true });
                        } else {
                            await empCollection.add(teacherData);
                        }
                    }
                } catch (e) { console.error("Firestore save teacher error", e); }
            } else {
                const data = getAppData('school_attendance_data', {});
                if (!data.teachers[session.schoolId]) {
                    data.teachers[session.schoolId] = [];
                }

                const existingIndex = data.teachers[session.schoolId].findIndex(t => t.id === teacherData.id);
                if (existingIndex >= 0) {
                    data.teachers[session.schoolId][existingIndex] = teacherData;
                } else {
                    data.teachers[session.schoolId].push(teacherData);
                }
                saveAppData('school_attendance_data', data);
            }

            btn.innerHTML = originalText;
            btn.disabled = false;

            toggleModal(false);
            renderTeachers();
        }

        function editTeacher(id) {
            const teacher = cachedTeachers.find(t => t.id === id || t.firebaseId === id);

            if (teacher) {
                if (teacher.firebaseId) currentEditingFirebaseId = teacher.firebaseId;
                else currentEditingFirebaseId = null;

                document.getElementById('teacher-id').value = teacher.id || teacher.firebaseId || '';
                document.getElementById('teacher-id').readOnly = true;
                document.getElementById('teacher-name').value = teacher.name || '';
                document.getElementById('teacher-subject').value = teacher.subject || '';
                document.getElementById('teacher-phone').value = teacher.phone || '';
                toggleModal(true);
            }
        }

        async function deleteTeacher(id) {
            if (confirm("Are you sure you want to remove this teacher?")) {
                const session = getSession('school_session');
                const teacher = cachedTeachers.find(t => t.id === id || t.firebaseId === id);

                if (typeof window.db !== 'undefined' && session.schoolId && teacher?.firebaseId) {
                    try {
                        await window.db.collection('employees').doc(teacher.firebaseId).delete();
                    } catch (e) { console.error("Firestore delete error", e); }
                } else {
                    const data = getAppData('school_attendance_data', {});
                    if (data.teachers[session.schoolId]) {
                        data.teachers[session.schoolId] = data.teachers[session.schoolId].filter(t => t.id !== id);
                        saveAppData('school_attendance_data', data);
                    }
                }
                renderTeachers();
            }
        }
    </script>
</head>

<body
    class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-['Outfit'] h-screen overflow-hidden flex transition-colors duration-300">

    <!-- Modal -->
    <div id="teacher-modal"
        class="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center hidden">
        <div
            class="bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100 dark:border-slate-700 animate-fade-in relative">
            <button onclick="toggleModal(false)"
                class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 transition"><i
                    class="fa-solid fa-xmark text-xl"></i></button>
            <h2 class="text-2xl font-bold mb-6">Teacher Details</h2>
            <form id="teacher-form" onsubmit="handleSaveTeacher(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Teacher ID</label>
                    <input type="text" id="teacher-id"
                        class="w-full px-3 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-teal-500 outline-none text-sm placeholder:text-slate-400 font-mono"
                        placeholder="Auto-generated if blank">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Full Name</label>
                    <input type="text" id="teacher-name"
                        class="w-full px-3 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-teal-500 outline-none text-sm"
                        required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Primary Subject / Role</label>
                    <input type="text" id="teacher-subject"
                        class="w-full px-3 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-teal-500 outline-none text-sm placeholder:text-slate-400"
                        placeholder="e.g. Mathematics">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Contact Phone</label>
                    <input type="text" id="teacher-phone"
                        class="w-full px-3 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-teal-500 outline-none text-sm font-mono placeholder:text-slate-400"
                        placeholder="+1...">
                </div>
                <div class="pt-4 flex justify-end gap-3">
                    <button type="button" onclick="toggleModal(false)"
                        class="px-5 py-2.5 text-sm font-bold text-slate-600 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition">Cancel</button>
                    <button type="submit"
                        class="px-5 py-2.5 bg-teal-600 hover:bg-teal-500 text-white text-sm font-bold rounded-lg shadow-md transition">Save
                        Teacher</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Sidebar -->
    <aside
        class="w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 flex flex-col shrink-0 hidden md:flex z-20">
        <div class="h-16 flex items-center px-6 border-b border-slate-200 dark:border-slate-700">
            <i class="fa-solid fa-graduation-cap text-indigo-600 text-xl mr-3"></i>
            <span class="font-bold text-lg tracking-tight">Edu Workspace</span>
        </div>

        <div class="p-4 border-b border-slate-100 dark:border-slate-700/50 bg-slate-50/50 dark:bg-slate-900/20">
            <p class="text-[10px] uppercase font-bold text-slate-400 mb-1">Active School</p>
            <p id="sidebar-org-name" class="font-bold text-slate-700 dark:text-slate-200 truncate">Loading...</p>
        </div>

        <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
            <a href="dashboard.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-slate-900 dark:hover:text-slate-200 font-medium transition">
                <i class="fa-solid fa-chart-pie w-5 text-center"></i> Dashboard
            </a>
            <a href="teachers.html"
                class="principal-only flex items-center gap-3 px-3 py-2.5 rounded-lg bg-indigo-50 dark:bg-indigo-900/20 text-indigo-700 dark:text-indigo-400 font-bold transition">
                <i class="fa-solid fa-chalkboard-user w-5 text-center"></i> Teachers
            </a>
            <a href="students.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-slate-900 dark:hover:text-slate-200 font-medium transition">
                <i class="fa-solid fa-users w-5 text-center"></i> Students
            </a>
            <a href="attendance.html"
                class="teacher-auth flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-slate-900 dark:hover:text-slate-200 font-medium transition">
                <i class="fa-regular fa-calendar-check w-5 text-center"></i> Attendance
            </a>
            <a href="analytics.html"
                class="teacher-auth flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-slate-900 dark:hover:text-slate-200 font-medium transition">
                <i class="fa-solid fa-chart-line w-5 text-center"></i> Analytics
            </a>
        </nav>

        <div class="p-4 border-t border-slate-200 dark:border-slate-700">
            <div class="flex items-center gap-3 mb-4">
                <div
                    class="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-500 font-bold">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="overflow-hidden">
                    <p id="sidebar-user-name" class="text-sm font-bold truncate">User</p>
                    <p id="sidebar-user-role" class="text-[10px] font-bold uppercase text-slate-400 truncate">Role</p>
                </div>
            </div>
            <button onclick="doLogout('school')"
                class="w-full flex items-center justify-center gap-2 py-2 text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg text-xs font-bold transition">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <header
            class="h-16 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between px-6 shrink-0 z-10">
    <meta property="og:site_name" content="Explyra" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:site" content="@explyras" />
    <meta name="twitter:creator" content="@explyras" />
    <meta name="twitter:card" content="summary_large_image" />
            <div class="flex items-center gap-3">
                <h1 class="text-lg font-bold">Manage Teachers</h1>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()"
                    class="w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-500 dark:text-yellow-400 hover:bg-slate-200 dark:hover:bg-slate-600 transition">
                    <i class="fa-solid fa-moon dark:hidden"></i>
                    <i class="fa-solid fa-sun hidden dark:block"></i>
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-8 space-y-6">

            <div class="flex items-center justify-between animate-fade-in" style="animation-delay: 0.1s;">
                <div>
                    <h2 class="text-2xl font-bold">Staff Directory</h2>
                    <p class="text-slate-500 text-sm mt-1">Add, edit, or remove teaching staff from the system.</p>
                </div>
                <button onclick="toggleModal(true)"
                    class="bg-teal-600 hover:bg-teal-500 text-white px-5 py-2.5 rounded-lg text-sm font-bold shadow-md shadow-teal-500/20 transition flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> Add Teacher
                </button>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-sm overflow-hidden animate-fade-in"
                style="animation-delay: 0.2s;">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead
                            class="bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700 text-xs uppercase tracking-wider text-slate-500 font-bold">
                            <tr>
                                <th class="px-6 py-4">ID / Staff Hash</th>
                                <th class="px-6 py-4">Name</th>
                                <th class="px-6 py-4">Role / Subject</th>
                                <th class="px-6 py-4">Contact</th>
                                <th class="px-6 py-4 w-24">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="teachers-tbody" class="text-sm">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

</body>

</html>
