<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explyra Updates — Announcements & Product Releases</title>

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="styles/style.css">

    <!-- SEO Meta Tags -->
    <meta name="description"
        content="Stay updated with the latest product releases, company announcements, and developer tools from Explyra.">
</head>

<body data-theme="light">
    <!-- Navbar (Matched to index.html) -->
    <nav>
        <div class="nav-logo">
            <div class="nav-logo-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor"></path>
                </svg>
            </div>
            <a href="../index.html" class="nav-logo-text">Explyra</a>
        </div>
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="../pricing.html">Pricing</a></li>
            <li><a href="#">Support</a></li>
            <li><a href="index.html" style="color: var(--blue);">Updates</a></li>
        </ul>
        <div class="nav-right">
            <a href="../login.html" class="btn-try">Get Started</a>
        </div>
    </nav>

    <!-- Hero Section (Matched to index.html style) -->
    <main>
        <section class="hero">
            <div class="hero-mesh"></div>
            <div class="hero-grid"></div>
            <div class="hero-inner" style="max-width: 880px; margin: 0 auto; text-align: center;">
                <div class="hero-badge">
                    <div class="badge-pulse"></div>
                    Latest Announcements
                </div>
                <h1>Platform <span class="grad">Updates</span></h1>
                <p style="font-size: 1.25rem; color: var(--ink3); max-width: 600px; margin: 0 auto 3rem;">
                    The latest news, features, and releases from the Explyra team.
                </p>
            </div>
        </section>

        <!-- Updates Content -->
        <section style="padding: 0 5vw 100px; max-width: 1400px; margin: 0 auto;">
            <div id="updates-loader" class="text-center" style="padding: 80px;">
                <p style="color: var(--ink3);">Loading updates...</p>
            </div>
            <div id="updates-grid" class="updates-grid">
                <!-- Updates will be injected here -->
            </div>
            <div id="no-updates" class="text-center" style="display: none; padding: 80px;">
                <p style="color: var(--ink3);">No updates found. Check back later!</p>
            </div>
        </section>
    </main>

    <!-- Footer (Simplified matched) -->
    <footer style="padding: 60px 5vw; border-top: 1px solid var(--bdr); text-align: center; background: var(--bg2);">
        <div class="nav-logo" style="justify-content: center; margin-bottom: 2rem;">
            <span class="nav-logo-text">Explyra</span>
        </div>
        <p style="color: var(--ink4); font-size: 0.9rem;">&copy; 2026 Explyra. All rights reserved.</p>
    </footer>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <!-- Firebase Config -->
    <script src="../js/firebase-config.js"></script>

    <!-- Custom Scripts -->
    <script src="scripts/updates.js"></script>
</body>

</html>
