<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Minifier — Explyra Devs</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #F8F7F4;
            --bg2: #FFFFFF;
            --bg3: #F1EFE9;
            --bg4: #E9E6E0;
            --surf: #FFFFFF;
            --bdr: #E4E1DB;
            --bdr2: #CCC8C0;
            --ink: #0D1117;
            --ink2: #2A3141;
            --ink3: #586070;
            --ink4: #939BAC;
            --blue: #1546C0;
            --purp: #6D28D9;
            --r: 12px;
            --t: .25s ease;
        }

        [data-theme="dark"] {
            --bg: #080B14;
            --bg2: #0E1220;
            --bg3: #141928;
            --bg4: #1B2235;
            --surf: #141928;
            --bdr: rgba(255, 255, 255, .07);
            --bdr2: rgba(255, 255, 255, .14);
            --ink: #EEF0F8;
            --ink2: #C4CCDC;
            --ink3: #8290A8;
            --ink4: #4E5A70;
            --blue: #5B8AF5;
            --purp: #A78BFA;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Outfit', sans-serif;
            transition: background .4s, color .4s;
        }

        nav {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5vw;
            background: var(--bg2);
            border-bottom: 1px solid var(--bdr);
        }

        main {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 5vw;
        }

        .tool-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .tool-header p {
            color: var(--ink3);
            margin-bottom: 2rem;
        }

        .mode-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .mode-btn {
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            border: 1px solid var(--bdr);
            background: var(--bg3);
            cursor: pointer;
            font-weight: 600;
        }

        .mode-btn.active {
            background: var(--purp);
            color: #fff;
            border-color: var(--purp);
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 1.5rem;
            border-radius: var(--r);
            border: 1px solid var(--bdr);
            background: var(--surf);
            color: var(--ink2);
            font-family: monospace;
            outline: none;
            margin-bottom: 1.5rem;
        }

        .controls {
            display: flex;
            gap: 1rem;
        }

        button {
            padding: 0.8rem 1.8rem;
            border-radius: 8px;
            border: none;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--blue);
            color: #fff;
        }

        .btn-secondary {
            background: var(--bg3);
            color: var(--ink2);
            border: 1px solid var(--bdr2);
        }

        .stats-banner {
            display: none;
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-weight: 600;
            text-align: center;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .history {
            margin-top: 3rem;
            background: var(--surf);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--bdr);
        }

        .history h3 {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--ink4);
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: var(--bg3);
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .history-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .history-tag {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--purp);
            text-transform: uppercase;
        }

        .history-btn {
            background: var(--surf);
            border: 1px solid var(--bdr2);
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
        }
    </style>

    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Explyra",
  "url": "https://explyra.me/",
  "sameAs": [
    "https://x.com/explyras",
    "https://www.facebook.com/profile.php?id=61584891033070&sk=directory_personal_details",
    "https://www.instagram.com/explyras",
    "https://www.youtube.com/@explyras",
    "https://www.linkedin.com/company/explyra/",
    "https://www.threads.com/@explyras",
    "https://github.com/Explyra"
  ]
}
    </script>
</head>

<body>
    <nav><a href="../index.html" class="nav-logo">Explyra Devs</a><a href="../index.html">← Back</a></nav>
    <main>
        <div class="tool-header">
            <h1>Code Minifier</h1>
            <p>Compress your HTML, CSS, or JavaScript code for better performance.</p>
        </div>

        <div id="statsBanner" class="stats-banner"></div>

        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('html')">HTML</button>
            <button class="mode-btn" onclick="setMode('css')">CSS</button>
            <button class="mode-btn" onclick="setMode('js')">JS</button>
        </div>
        <textarea id="codeInput" placeholder="Paste your code here..."></textarea>
        <div class="controls">
            <button class="btn-primary" onclick="minify()">Minify Code</button>
            <button class="btn-secondary" onclick="clearAll()">Clear</button>
            <button class="btn-secondary" onclick="copy()">Copy Result</button>
        </div>

        <div class="history">
            <h3>Recent Minifications</h3>
            <div class="history-list" id="historyList"></div>
        </div>
    </main>
    <script>
        let mode = 'html';
        const input = document.getElementById('codeInput');
        const statsBanner = document.getElementById('statsBanner');
        const historyList = document.getElementById('historyList');

        let minHistory = JSON.parse(localStorage.getItem('explyra-min-history') || '[]');

        function setMode(m) {
            mode = m;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function updateHistoryUI() {
            historyList.innerHTML = minHistory.map((item, idx) => `
                <div class="history-item">
                    <div class="history-info">
                        <span class="history-tag">${item.type}</span>
                        <span>Saved ${item.saved} (${item.percent}%)</span>
                    </div>
                    <button class="history-btn" onclick="loadHistory(${idx})">Load</button>
                </div>
            `).join('');
        }

        function loadHistory(idx) {
            const item = minHistory[idx];
            input.value = item.code;
            mode = item.type.toLowerCase();
            document.querySelectorAll('.mode-btn').forEach(btn => {
                if (btn.textContent.toLowerCase() === mode) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            statsBanner.style.display = 'none';
        }

        function minify() {
            const originalCode = input.value;
            if (!originalCode.trim()) return;

            let code = originalCode;
            const originalSize = new Blob([originalCode]).size;

            if (mode === 'html') {
                code = code.replace(/>\s+</g, '><').replace(/\s+/g, ' ').trim();
            } else if (mode === 'css') {
                code = code.replace(/\s*([\{\}:;])\s*/g, '$1').replace(/\/\*.*?\*\//g, '').replace(/\s+/g, ' ').trim();
            } else if (mode === 'js') {
                code = code.replace(/\/\/.*?\n/g, '').replace(/\/\*.*?\*\//gs, '').replace(/\s+/g, ' ').trim();
            }

            const minSize = new Blob([code]).size;
            const saved = originalSize - minSize;
            const percent = ((saved / originalSize) * 100).toFixed(1);

            input.value = code;

            if (saved > 0) {
                statsBanner.textContent = `Reduced by ${saved} bytes (${percent}%)`;
                statsBanner.style.display = 'block';

                minHistory.unshift({
                    type: mode.toUpperCase(),
                    saved: saved + 'B',
                    percent: percent,
                    code: code,
                    timestamp: Date.now()
                });
                if (minHistory.length > 5) minHistory.pop();
                localStorage.setItem('explyra-min-history', JSON.stringify(minHistory));
                updateHistoryUI();
            }
        }

        function clearAll() {
            input.value = '';
            statsBanner.style.display = 'none';
        }

        function copy() {
            input.select();
            document.execCommand('copy');
            const btn = event.target;
            const original = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = original, 2000);
        }

        updateHistoryUI();
        const savedTheme = localStorage.getItem('explyra-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</body>

</html>
