<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Data Generator — Explyra Devs</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #F8F7F4;
            --bg2: #FFFFFF;
            --bg3: #F1EFE9;
            --bg4: #E9E6E0;
            --surf: #FFFFFF;
            --bdr: #E4E1DB;
            --bdr2: #CCC8C0;
            --ink: #0D1117;
            --ink2: #2A3141;
            --ink3: #586070;
            --ink4: #939BAC;
            --blue: #1546C0;
            --purp: #6D28D9;
            --r: 12px;
            --t: .25s ease;
        }

        [data-theme="dark"] {
            --bg: #080B14;
            --bg2: #0E1220;
            --bg3: #141928;
            --bg4: #1B2235;
            --surf: #141928;
            --bdr: rgba(255, 255, 255, .07);
            --bdr2: rgba(255, 255, 255, .14);
            --ink: #EEF0F8;
            --ink2: #C4CCDC;
            --ink3: #8290A8;
            --ink4: #4E5A70;
            --blue: #5B8AF5;
            --purp: #A78BFA;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Outfit', sans-serif;
            transition: background .4s, color .4s;
        }

        nav {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5vw;
            background: var(--bg2);
            border-bottom: 1px solid var(--bdr);
        }

        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 5vw;
        }

        .data-card {
            background: var(--surf);
            border: 1px solid var(--bdr);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        .data-item {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid var(--bg3);
        }

        .data-item:last-child {
            border-bottom: none;
        }

        .label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--ink4);
            text-transform: uppercase;
        }

        .value {
            font-weight: 600;
            color: var(--ink);
        }

        button {
            width: 100%;
            padding: 1rem;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            background: var(--blue);
            color: #fff;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <nav><a href="../index.html">Explyra Devs</a></nav>
    <main>
        <div class="tool-header">
            <h1>Fake Data Generator</h1>
            <p>Generate random mock data for testing your apps.</p>
        </div>
        <div class="data-card" id="dataCard">
            <div class="data-item"><span class="label">Full Name</span><span class="value" id="fname">-</span></div>
            <div class="data-item"><span class="label">Email Address</span><span class="value" id="femail">-</span>
            </div>
            <div class="data-item"><span class="label">Phone Number</span><span class="value" id="fphone">-</span></div>
            <div class="data-item"><span class="label">Address</span><span class="value" id="faddress">-</span></div>
        </div>
        <button onclick="generate()">Generate New Data</button>
    </main>
    <script>
        const firstNames = ['John', 'Jane', 'Michael', 'Emily', 'Chris', 'Sarah', 'David', 'Laura', 'Robert', 'Emma', 'Aryan', 'Priya', 'Rahul', 'Ananya'];
        const lastNames = ['Smith', 'Johnson', 'Williams', 'Brown', 'Jones', 'Garcia', 'Miller', 'Davis', 'Sharma', 'Verma', 'Singh', 'Bhasin'];
        const domains = ['gmail.com', 'yahoo.com', 'outlook.com', 'explyra.com', 'test.io'];
        const cities = ['New York', 'London', 'Berlin', 'Tokyo', 'Mumbai', 'Delhi', 'Dubai', 'Sydney'];
        const streets = ['Baker St', 'Main St', 'Park Ave', 'Ring Rd', 'Sunset Blvd'];

        function generate() {
            const fn = firstNames[Math.floor(Math.random() * firstNames.length)];
            const ln = lastNames[Math.floor(Math.random() * lastNames.length)];
            const name = `${fn} ${ln}`;
            document.getElementById('fname').textContent = name;
            document.getElementById('femail').textContent = `${fn.toLowerCase()}.${ln.toLowerCase()}@${domains[Math.floor(Math.random() * domains.length)]}`;
            document.getElementById('fphone').textContent = `+91 ${Math.floor(6000000000 + Math.random() * 3999999999)}`;
            document.getElementById('faddress').textContent = `${Math.floor(Math.random() * 1000)}, ${streets[Math.floor(Math.random() * streets.length)]}, ${cities[Math.floor(Math.random() * cities.length)]}`;
        }
        generate();
        const savedTheme = localStorage.getItem('explyra-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</body>

</html>
