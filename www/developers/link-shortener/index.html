        const app = initializeApp(firebaseConfig);

        const db = getFirestore(app);

        function LinkShortener() {

            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState('');
            const [copied, setCopied] = React.useState(false);
            const [totalLinks, setTotalLinks] = React.useState(0);
            const [user, setUser] = React.useState(null);
            const [history, setHistory] = React.useState([]);

            React.useEffect(() => {
                const email = "mfskufgu@gmail.com";
                const password = "Mitanshu@2009";
                signInWithEmailAndPassword(auth, email, password)
                    .then((creds) => setUser(creds.user))
                    .catch((err) => setError('Login failure: ' + err.message));

                const statsRef = doc(db, 'metadata', 'stats');
                getDoc(statsRef).then(snap => {
                    if (snap.exists()) setTotalLinks(snap.data().lastIndex || 0);
                });

                const saved = JSON.parse(localStorage.getItem('explyra-link-history') || '[]');
                setHistory(saved);
            }, []);

            const handleShorten = async (e) => {
                e.preventDefault();
                if (!longUrl) return;
                setError('');
                setShortCode(null);
                setLoading(true);

                let formatted = longUrl;
                if (!/^https?:\/\//i.test(longUrl)) formatted = 'https://' + longUrl;

                try {
                    const newCode = await runTransaction(db, async (txn) => {
                        const statsRef = doc(db, 'metadata', 'stats');
                        const statsDoc = await txn.get(statsRef);
                        let nextIndex = 10;
                        if (statsDoc.exists()) {
                            const current = statsDoc.data().lastIndex;
                            nextIndex = (current < 10) ? 10 : current + 1;
                        }
                        const codeStr = nextIndex.toString();
                        const linkRef = doc(db, 'shortLinks', codeStr);
                        txn.set(statsRef, { lastIndex: nextIndex }, { merge: true });
                        txn.set(linkRef, {
                            originalUrl: formatted,
                            createdAt: serverTimestamp(),
                            createdBy: user ? user.uid : 'anon',
                        });
                        return codeStr;
                    });

                    setShortCode(newCode);
                    setTotalLinks(parseInt(newCode));

                    const newHistory = [{
                        code: newCode,
                        original: formatted,
                        timestamp: Date.now()
                    }, ...history].slice(0, 5);

                } finally {
                    setLoading(false);
                }
            };

            const copyToClipboard = (code, event) => {
                const fullShortLink = `m78.netlify.app/${code}`;
                navigator.clipboard.writeText(fullShortLink);
                if (!event) setCopied(true);
                const btn = event ? event.target : document.querySelector('.copy-btn');
                const orig = btn.textContent;
                btn.textContent = 'Copied!';
                if (!event) setTimeout(() => setCopied(false), 2000);
                else setTimeout(() => btn.textContent = orig, 2000);
            };

            return (
                <div>
                    <div className="tool-header">
                        <h1>Link Shortener</h1>
                        <p>Generate clean, professional short links for any URL. Scalable and secure.</p>
                    </div>

                    <div className="card">
                        <form onSubmit={handleShorten}>
                            <div className="input-group">
                                <label>Target URL</label>
                                <input
                                    type="text"
                                    placeholder="paste your long link here..."
                                    value={longUrl}
                                    onChange={(e) => setLongUrl(e.target.value)}
                                />
                            </div>

                            <button className="btn-primary" type="submit" disabled={loading || !longUrl}>
                                {loading && <span className="loader"></span>}
                                {loading ? 'Creating Link...' : 'Generate Short Link'}
                            </button>
                        </form>

                        {error && <div className="error-msg">{error}</div>}

                        {shortCode && (
                            <div className="result-box">
                                <label>Short Link Ready</label>
                                <div className="short-url-container">
                                    <code>m78.netlify.app/{shortCode}</code>
                                    <button
                                        className={`copy-btn ${copied ? 'copied' : ''}`}
                                        onClick={() => copyToClipboard(shortCode)}
                                    >
                                        {copied ? 'Copied!' : 'Copy Link'}
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="stats">
                        ⚡ Last created link internal index: <span>#{totalLinks}</span>
                    </div>

                    {history.length > 0 && (
                        <div className="history">
                            <h3>Recently Created Links</h3>
                            <div className="history-list">
                                {history.map((item, idx) => (
                                    <div className="history-item" key={idx}>
                                        <div>
                                            <span className="history-url">m78.netlify.app/{item.code}</span>
                                            <span className="history-orig">{item.original}</span>
                                        </div>
                                        <button className="history-copy-sm" onClick={(e) => copyToClipboard(item.code, e)}>Copy</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LinkShortener />);

        const savedTheme = localStorage.getItem('explyra-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);</script></body></html>
