<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Clip Path Generator - Visual Polygon Tool | Explyra</title>
    <meta name="description"
        content="Generate CSS clip-path shapes visually. Create circles, ellipses, and complex polygons for your web projects. Fast, free, and secure online designer.">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <style>
        .preview-container {
            width: 100%;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg3);
            border-radius: 12px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .preview-box {
            width: 150px;
            height: 150px;
            background: var(--blue);
            transition: clip-path 0.3s ease;
        }

        .shape-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .shape-btn {
            padding: 10px;
            border: 1px solid var(--bdr);
            border-radius: 8px;
            background: var(--surf);
            cursor: pointer;
            text-align: center;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .shape-btn:hover,
        .shape-btn.active {
            border-color: var(--blue);
            background: var(--blue-g);
            color: var(--blue);
        }
    </style>

    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Explyra",
  "url": "https://explyra.me/",
  "sameAs": [
    "https://x.com/explyras",
    "https://www.facebook.com/profile.php?id=61584891033070&sk=directory_personal_details",
    "https://www.instagram.com/explyras",
    "https://www.youtube.com/@explyras",
    "https://www.linkedin.com/company/explyra/",
    "https://www.threads.com/@explyras",
    "https://github.com/Explyra"
  ]
}
    </script>
</head>

<body>

    <header>
        <a href="../../index.html" class="logo">
            <div class="logo-icon">E</div>
            <span>Explyra <span
                    style="font-weight: 400; font-family: 'Outfit'; font-size: 0.8rem; color: var(--ink3);">Developers</span></span>
        </a>
    </header>

    <main class="container">
        <nav style="margin-bottom: 20px; font-size: 0.9rem; color: var(--ink3);">
            <a href="../../index.html">Developers</a> / CSS Tools / Clip Path Generator
        </nav>

        <div class="tool-card animate-fade">
            <div class="tool-header">
                <h1 class="tool-title">CSS Clip Path Generator</h1>
                <p class="tool-desc">Create unique shapes by clipping elements with CSS clip-path transitions.</p>
            </div>

            <div class="preview-container">
                <div class="preview-box" id="preview"></div>
            </div>

            <div class="shape-grid">
                <button class="shape-btn active" data-shape="circle(50% at 50% 50%)">Circle</button>
                <button class="shape-btn" data-shape="ellipse(25% 40% at 50% 50%)">Ellipse</button>
                <button class="shape-btn" data-shape="inset(10% 20% 10% 20%)">Inset</button>
                <button class="shape-btn" data-shape="polygon(50% 0%, 0% 100%, 100% 100%)">Triangle</button>
                <button class="shape-btn"
                    data-shape="polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%)">Pentagon</button>
                <button class="shape-btn"
                    data-shape="polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%)">Star</button>
            </div>

            <div class="input-group">
                <label>Generated CSS</label>
                <textarea id="output" readonly style="min-height: 60px;"></textarea>
            </div>

            <div class="btn-row">
                <button id="copyBtn" class="btn btn-primary">Copy Clip-Path</button>
            </div>
        </div>
    </main>

    <script>
        const preview = document.getElementById('preview');
        const output = document.getElementById('output');
        const btns = document.querySelectorAll('.shape-btn');

        function update(shape) {
            preview.style.clipPath = shape;
            output.value = `clip-path: ${shape};`;
        }

        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                update(btn.dataset.shape);
            });
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            output.select();
            document.execCommand('copy');
        });

        update(btns[0].dataset.shape);
    </script>
</body>

</html>
