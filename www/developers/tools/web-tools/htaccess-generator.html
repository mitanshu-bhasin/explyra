    <meta property="og:site_name" content="Explyra" />

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.htaccess Generator - Online Apache Configuration Tool | Explyra</title>
    <meta name="description"
        content="Generate common .htaccess rules for your Apache server. Redirect HTTP to HTTPS, enable caching, prevent directory listing, and more. Free and secure.">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">

{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Explyra",
  "url": "https://explyra.me/",

</head>

<body>

    <header>
    <meta property="og:site_name" content="Explyra" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:site" content="@explyras" />
    <meta name="twitter:creator" content="@explyras" />
    <meta name="twitter:card" content="summary_large_image" />
        <a href="../../index.html" class="logo">
            <div class="logo-icon">E</div>
            <span>Explyra <span
                    style="font-weight: 400; font-family: 'Outfit'; font-size: 0.8rem; color: var(--ink3);">Developers</span></span>
        </a>
    </header>

    <main class="container">
        <nav style="margin-bottom: 20px; font-size: 0.9rem; color: var(--ink3);">
            <a href="../../index.html">Developers</a> / Web Tools / .htaccess Generator
        </nav>

        <div class="tool-card animate-fade">
            <div class="tool-header">
                <h1 class="tool-title">.htaccess Generator</h1>
                <p class="tool-desc">Create server configuration rules for Apache without writing code manually.</p>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="input-group">
                    <label>General Rules</label>
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        <label style="font-size: 0.8rem; display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="httpsRedirect"> Force HTTPS
                        </label>
                        <label style="font-size: 0.8rem; display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="noDirectoryListing"> Prevent Directory Listing
                        </label>
                        <label style="font-size: 0.8rem; display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="wwwRedirect"> Force WWW
                        </label>
                    </div>
                </div>
                <div class="input-group">
                    <label>Security Header Rules</label>
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        <label style="font-size: 0.8rem; display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="xFrameOptions"> X-Frame-Options (DENY)
                        </label>
                        <label style="font-size: 0.8rem; display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="xContentType"> X-Content-Type (nosniff)
                        </label>
                    </div>
                </div>
            </div>

            <div class="btn-row">
                <button id="genBtn" class="btn btn-primary">Generate .htaccess</button>
                <button id="copyBtn" class="btn btn-secondary">Copy Config</button>
                <button id="downloadBtn" class="btn btn-secondary">Download</button>
            </div>

            <div class="input-group">
                <label for="output">Generated .htaccess</label>
                <textarea id="output" readonly style="min-height: 200px; font-family: monospace;"></textarea>
            </div>
        </div>
    </main>

    <script>
        const genBtn = document.getElementById('genBtn');
        const output = document.getElementById('output');

        genBtn.addEventListener('click', () => {
            let res = `# Generated by Explyra Developer Tools\n# ----------------------------------\n\n`;

            if (document.getElementById('httpsRedirect').checked) {
                res += `RewriteEngine On\nRewriteCond %{HTTPS} off\nRewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]\n\n`;
            }

            if (document.getElementById('noDirectoryListing').checked) {
                res += `Options -Indexes\n\n`;
            }

            if (document.getElementById('wwwRedirect').checked) {
                res += `RewriteEngine On\nRewriteCond %{HTTP_HOST} !^www\\. [NC]\nRewriteRule ^(.*)$ http://www.%{HTTP_HOST}/$1 [R=301,L]\n\n`;
            }

            if (document.getElementById('xFrameOptions').checked) {
                res += `Header set X-Frame-Options "DENY"\n`;
            }

            if (document.getElementById('xContentType').checked) {
                res += `Header set X-Content-Type-Options "nosniff"\n`;
            }

            output.value = res.trim();
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            output.select();
            document.execCommand('copy');
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            const blob = new Blob([output.value], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '.htaccess';
            a.click();
        });
    </script>
</body>

</html>
