<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON to YAML Converter - Online Config Transformation | Explyra</title>
    <meta name="description"
        content="Convert JSON to YAML instantly. Perfect for generating Kubernetes, Docker, or CI/CD configuration files from JSON data. Fast, free, and secure.">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">

    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Explyra",
  "url": "https://explyra.me/",
  "sameAs": [
    "https://x.com/explyras",
    "https://www.facebook.com/profile.php?id=61584891033070&sk=directory_personal_details",
    "https://www.instagram.com/explyras",
    "https://www.youtube.com/@explyras",
    "https://www.linkedin.com/company/explyra/",
    "https://www.threads.com/@explyras",
    "https://github.com/Explyra"
  ]
}
    </script>
</head>

<body>

    <header>
        <a href="../../index.html" class="logo">
            <div class="logo-icon">E</div>
            <span>Explyra <span
                    style="font-weight: 400; font-family: 'Outfit'; font-size: 0.8rem; color: var(--ink3);">Developers</span></span>
        </a>
    </header>

    <main class="container">
        <nav style="margin-bottom: 20px; font-size: 0.9rem; color: var(--ink3);">
            <a href="../../index.html">Developers</a> / Data Tools / JSON to YAML
        </nav>

        <div class="tool-card animate-fade">
            <div class="tool-header">
                <h1 class="tool-title">JSON to YAML Converter</h1>
                <p class="tool-desc">Transform your JSON data into human-readable YAML format.</p>
            </div>

            <div class="input-group">
                <label for="input">Input JSON</label>
                <textarea id="input" placeholder='{"server": {"port": 8080, "host": "localhost"}}'></textarea>
            </div>

            <div class="btn-row">
                <button id="convertBtn" class="btn btn-primary">Convert to YAML</button>
                <button id="copyBtn" class="btn btn-secondary">Copy YAML</button>
                <button id="clearBtn" class="btn btn-secondary">Clear</button>
            </div>

            <div class="input-group">
                <label for="output">Generated YAML</label>
                <textarea id="output" readonly placeholder="YAML output will appear here..."
                    style="font-family: monospace;"></textarea>
            </div>
        </div>
    </main>

    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const convertBtn = document.getElementById('convertBtn');
        const copyBtn = document.getElementById('copyBtn');

        function jsonToYaml(obj, indent = 0) {
            let yaml = '';
            const padding = '  '.repeat(indent);

            if (typeof obj !== 'object' || obj === null) {
                return String(obj);
            }

            if (Array.isArray(obj)) {
                obj.forEach(item => {
                    yaml += `${padding}- ${jsonToYaml(item, indent + 1).trim()}\n`;
                });
            } else {
                Object.keys(obj).forEach(key => {
                    const value = obj[key];
                    if (typeof value === 'object' && value !== null) {
                        yaml += `${padding}${key}:\n${jsonToYaml(value, indent + 1)}`;
                    } else {
                        yaml += `${padding}${key}: ${value}\n`;
                    }
                });
            }
            return yaml;
        }

        convertBtn.addEventListener('click', () => {
            const jsonText = input.value.trim();
            if (!jsonText) return;
            try {
                const jsonObj = JSON.parse(jsonText);
                output.value = jsonToYaml(jsonObj);
            } catch (e) {
                output.value = "Error: Invalid JSON format. " + e.message;
            }
        });

        copyBtn.addEventListener('click', () => {
            output.select();
            document.execCommand('copy');
            copyBtn.textContent = 'Copied!';
            setTimeout(() => copyBtn.textContent = 'Copy YAML', 2000);
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            input.value = '';
            output.value = '';
        });
    </script>
</body>

</html>
