<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta property="og:site_name" content="Explyra" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:site" content="@explyras" />
    <meta name="twitter:creator" content="@explyras" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy Generator | Explyra Developer Tools</title>
    <meta name="description"
        content="Generate a free, professional Privacy Policy in HTML format. Protect your website, app, and users easily.">
    <meta name="keywords"
        content="privacy policy generator, free privacy policy, explyra developer tools, legal document generator">

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Privacy Policy Generator | Explyra Developer Tools",
      "description": "Generate a free, professional Privacy Policy in HTML format.",
      "url": "https://explyra.me/developers/tools/legal-doc-generator/privacy-generator.html"
    }
    </script>
</head>

<body>
    <nav>
        <a href="index.html" class="nav-logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="m15 18-6-6 6-6" />
            </svg>
            Legal Generators
        </a>
        <a href="../../index.html">Dev Hub</a>
    </nav>

    <main>
        <div class="tool-header">
            <span class="tagline">Compliance</span>
            <h1>Privacy Policy Generator</h1>
            <p>Answer a few questions to generate a fully formatted HTML Privacy Policy document for your website or
                app.</p>
        </div>

        <div class="generator-container">
            <!-- Form Section -->
            <div class="form-section">
                <form id="generatorForm" onsubmit="event.preventDefault(); generatePrivacyPolicy();">

                    <div class="form-group">
                        <label for="companyName">Company or Individual Name</label>
                        <input type="text" id="companyName" placeholder="e.g. Explyra Tech" required>
                    </div>

                    <div class="form-group">
                        <label for="websiteName">Website Name</label>
                        <input type="text" id="websiteName" placeholder="e.g. Explyra Dev Tools" required>
                    </div>

                    <div class="form-group">
                        <label for="websiteUrl">Website URL</label>
                        <input type="url" id="websiteUrl" placeholder="https://explyra.me" required>
                    </div>

                    <div class="form-group">
                        <label for="companyEmail">Contact Email</label>
                        <input type="email" id="companyEmail" placeholder="support@explyra.me" required>
                    </div>

                    <div class="form-group">
                        <label for="businessAddress">Business Address</label>
                        <input type="text" id="businessAddress" placeholder="123 Developer Lane, City">
                    </div>

                    <div class="form-group">
                        <label for="country">Country</label>
                        <input type="text" id="country" placeholder="United States">
                    </div>

                    <div class="form-group">
                        <label for="businessType">Entity Type</label>
                        <select id="businessType">
                            <option value="Website">Website</option>
                            <option value="App">Mobile App</option>
                            <option value="SaaS">SaaS Platform</option>
                            <option value="Business">Business</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Do you collect user data? (Forms, Accounts, etc.)</label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="collectsData" value="yes" checked>
                                Yes</label>
                            <label class="radio-label"><input type="radio" name="collectsData" value="no"> No</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Do you use Cookies?</label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="usesCookies" value="yes" checked>
                                Yes</label>
                            <label class="radio-label"><input type="radio" name="usesCookies" value="no"> No</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Do you use third-party services? (Google Analytics, Ads, etc.)</label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="usesThirdParty" value="yes" checked>
                                Yes</label>
                            <label class="radio-label"><input type="radio" name="usesThirdParty" value="no"> No</label>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 3v12" />
                            <path d="m8 11 4 4 4-4" />
                            <path d="M8 5H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-4" />
                        </svg>
                        Generate Policy
                    </button>
                </form>
            </div>

            <!-- Output Section -->
            <div class="preview-section">
                <div class="output-actions">
                    <button class="btn-secondary" onclick="copyHTML()">Copy Code</button>
                    <button class="btn-secondary" onclick="downloadHTML('privacy')">Download .html</button>
                    <button class="btn-secondary" onclick="openPreview()">Preview Document</button>
                </div>
                <textarea id="outputArea" class="code-output" readonly
                    placeholder="Your generated HTML will appear here after clicking the Generate button..."></textarea>
            </div>
        </div>

        <!-- Preview Modal -->
        <div id="previewModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Document Preview</h2>
                    <button class="close-btn" onclick="closePreview()">&times;</button>
                </div>
                <!-- Render area -->
                <div id="previewContainer"></div>
            </div>
        </div>

    </main>

    <footer>
        <p>&copy; 2026 Explyra Developer Tools. All rights reserved.</p>
    </footer>

    <script src="scripts/generator.js"></script>
    <script>
        const savedTheme = localStorage.getItem('explyra-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</body>

</html>
