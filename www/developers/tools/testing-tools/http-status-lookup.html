    <meta name="description"
        content="Quickly look up HTTP response status codes and their meanings. Comprehensive guide for developers to debug API responses and server errors. Fast and free.">

<body>

    <header>
    <meta property="og:site_name" content="Explyra" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:site" content="@explyras" />
    <meta name="twitter:creator" content="@explyras" />
    <meta name="twitter:card" content="summary_large_image" />
        <a href="../../index.html" class="logo">
            <div class="logo-icon">E</div>
            <span>Explyra <span
                    style="font-weight: 400; font-family: 'Outfit'; font-size: 0.8rem; color: var(--ink3);">Developers</span></span>
        </a>
    </header>

    <main class="container">
        <nav style="margin-bottom: 20px; font-size: 0.9rem; color: var(--ink3);">
            <a href="../../index.html">Developers</a> / Testing Tools / HTTP Status Code Lookup
        </nav>

        <div class="tool-card animate-fade">
            <div class="tool-header">
                <h1 class="tool-title">HTTP Status Lookup</h1>
                <p class="tool-desc">Find the meaning and purpose of any HTTP response status code.</p>
            </div>

            <div class="search-box">
                <input type="text" id="search" placeholder="Search by code or description (e.g. 404, NotFound)...">
            </div>

            <div class="status-list" id="statusList">
                <!-- Data populated via JS -->
            </div>
        </div>
    </main>

    <script>
        const statusCodes = [
            { code: 200, name: "OK", desc: "The request has succeeded." },
            { code: 201, name: "Created", desc: "The request has been fulfilled and resulted in a new resource being created." },
            { code: 204, name: "No Content", desc: "The server successfully processed the request and is not returning any content." },
            { code: 301, name: "Moved Permanently", desc: "This and all future requests should be directed to the given URI." },
            { code: 400, name: "Bad Request", desc: "The server cannot or will not process the request due to an apparent client error." },
            { code: 401, name: "Unauthorized", desc: "Similar to 403 Forbidden, but specifically for use when authentication is required." },
            { code: 403, name: "Forbidden", desc: "The request was valid, but the server is refusing action." },
            { code: 404, name: "Not Found", desc: "The requested resource could not be found but may be available in the future." },
            { code: 500, name: "Internal Server Error", desc: "A generic error message, given when an unexpected condition was encountered." },
            { code: 502, name: "Bad Gateway", desc: "The server was acting as a gateway or proxy and received an invalid response from the upstream server." },
            { code: 503, name: "Service Unavailable", desc: "The server is currently unavailable (because it is overloaded or down for maintenance)." }
        ];

        const list = document.getElementById('statusList');
        const search = document.getElementById('search');

        function render(items) {
            list.innerHTML = items.map(item => `
                <div class="status-item">
                    <div class="status-code">${item.code}</div>
                    <div class="status-info">
                        <h3>${item.name}</h3>
                        <p>${item.desc}</p>
                    </div>
                </div>
            `).join('');
        }

        search.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = statusCodes.filter(s =>
                s.code.toString().includes(term) ||
                s.name.toLowerCase().includes(term) ||
                s.desc.toLowerCase().includes(term)
            );
            render(filtered);
        });

        render(statusCodes);
    </script>
</body>

</html>
