<body>
    <div class="sidebar"></div>

    <main class="main-content">
        <header class="reveal">
            <div>
                <h1>Inventory <span class="grad">Management</span></h1>
                <p style="color: var(--text-muted);">Track materials, components, and replenishment cycles.</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn"><i class="fas fa-barcode"></i> Scan Item</button>
                <button class="btn btn-primary" onclick="showActionModal('inventory')"><i class="fas fa-plus"></i> Add Material</button>
            </div>
        </header>

        <section id="alertsContainer" class="reveal" style="margin-bottom: 1.5rem;"></section>

        <section class="stat-grid reveal">
            <div class="glass-card">
                <div class="stat-label">Total Items</div>
                <div class="stat-value" id="totalItems">0</div>
            </div>
            <div class="glass-card">
                <div class="stat-label">Low Stock Alerts</div>
                <div class="stat-value" style="color: var(--danger);" id="lowStockCount">0</div>
            </div>
            <div class="glass-card">
                <div class="stat-label">Warehouse Capacity</div>
                <div class="stat-value" id="warehouseCapacity">0%</div>
            </div>
        </section>

        <section class="glass-card reveal">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h3>Stock Inventory</h3>
                <div style="display: flex; gap: 10px;">
                    <input type="text" placeholder="Filter materials..." class="btn" style="padding: 0.5rem 1rem; width: 250px; text-align: left;">
                </div>
            </div>
            <div class="table-container">
                <table id="inventoryTable">
                    <thead>
                        <tr>
                            <th>Material Name</th>
                            <th>Type</th>
                            <th>Stock Quantity</th>
                            <th>Status</th>
                            <th>Supplier</th>
                            <th>Last Updated</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Dynamic content -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/data-handler.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const data = await DataHandler.fetchData('inventory');
            
            const lowStockItems = data.filter(item => item.quantity < item.reorderLevel);
            document.getElementById('totalItems').textContent = data.length;
            document.getElementById('lowStockCount').textContent = lowStockItems.length;
            
            // Mock capacity calculation
            const capacity = Math.min(100, Math.round((data.length / 20) * 100));
            document.getElementById('warehouseCapacity').textContent = `${capacity}%`;

            // Render Alerts
            const alertsContainer = document.getElementById('alertsContainer');
            if (lowStockItems.length > 0) {
                alertsContainer.innerHTML = lowStockItems.map(item => `
                    <div class="glass-card" style="border-left: 4px solid var(--danger); padding: 1rem; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; background: rgba(239, 68, 68, 0.05);">
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <i class="fas fa-exclamation-triangle" style="color: var(--danger);"></i>
                            <div>
                                <div style="font-weight: 600;">Low Stock Alert: ${item.name}</div>
                                <div style="font-size: 0.8rem; color: var(--text-muted);">Current level: ${item.quantity} | Reorder at: ${item.reorderLevel}</div>
                            </div>
                        </div>
                        <button class="btn" style="font-size: 0.8rem;" onclick="reorderItem('${item.name}')">Reorder Now</button>
                    </div>
                `).join('');
            }

            const tableBody = document.querySelector('#inventoryTable tbody');
            tableBody.innerHTML = data.map(item => {
                const isLow = item.quantity < item.reorderLevel;
                return `
                    <tr>
                        <td><strong>${item.name}</strong></td>
                        <td><span style="font-size: 0.8rem; background: var(--bg4); padding: 2px 8px; border-radius: 4px;">${item.type}</span></td>
                        <td>${item.quantity} <span style="color: var(--text-muted); font-size: 0.8rem;">/ ${item.reorderLevel}</span></td>
                        <td><span class="badge ${isLow ? 'badge-maintenance' : 'badge-active'}">${isLow ? 'Low Stock' : 'Optimal'}</span></td>
                        <td>${item.supplier}</td>
                        <td>${item.lastUpdated}</td>
                        <td>
                            <button class="btn" style="padding: 5px 10px;" onclick="window.showToast('History feature coming soon!', 'info')"><i class="fas fa-history"></i></button>
                            <button class="btn" style="padding: 5px 10px;" onclick="window.showToast('Edit feature coming soon!', 'info')"><i class="fas fa-edit"></i></button>
                            <button class="btn" style="padding: 5px 10px; color: var(--danger);" onclick="deleteItem('inventory', 'name', '${item.name}')"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');
        });

        window.reorderItem = (name) => {
            if (window.showToast) window.showToast(`Purchase order sent for ${name}`, 'success');
            else alert(`Purchase order sent for ${name}`);
        };
    </script>
