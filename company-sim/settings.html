<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — CompanySim</title>
  <link rel="stylesheet" href="css/presentation.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <style>
    .settings-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 30px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
    }

    .section-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .settings-group {
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .settings-field {
      margin-bottom: 20px;
    }

    .settings-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #a0a8d0;
      margin-bottom: 8px;
    }

    .settings-input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .settings-input:focus {
      border-color: #667eea;
      outline: none;
      box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
    }

    .integration-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      margin-top: 15px;
    }

    .integration-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .integration-icon {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ff0000;
      border-radius: 12px;
      color: #fff;
      font-size: 24px;
    }

    .integration-details h4 {
      margin: 0;
      font-size: 18px;
      color: #fff;
    }

    .integration-details p {
      margin: 4px 0 0;
      font-size: 14px;
      color: #a0a8d0;
    }

    .btn-connect {
      padding: 10px 20px;
      background: #ff0000;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-connect.connected {
      background: rgba(255, 255, 255, 0.1);
      color: #38ef7d;
    }

    .save-bar {
      position: sticky;
      bottom: 20px;
      display: flex;
      justify-content: flex-end;
      gap: 15px;
      margin-top: 40px;
    }

    .btn-save {
      padding: 14px 28px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(118, 75, 162, 0.4);
    }
  </style>
</head>
<body class="dark-mode">
  <div class="app-container">
    <div id="sidebar-container"></div>
    <main class="main-content">
      <div class="settings-container">
        <h1 class="section-title">⚙️ Settings</h1>
        
        <div class="settings-group">
          <h3>Profile Integration</h3>
          <div class="settings-field">
            <span class="settings-label">YouTube API Key (Optional for real data)</span>
            <input type="text" id="youtube-api-key" class="settings-input" placeholder="AIzaSy...">
          </div>
        </div>

        <div class="settings-group">
          <h3>Integrations</h3>
          <div class="integration-card" id="youtube-integration">
            <div class="integration-info">
              <div class="integration-icon">▶️</div>
              <div class="integration-details">
                <h4>YouTube Analytics</h4>
                <p id="yt-status">Not connected</p>
              </div>
            </div>
            <button class="btn-connect" onclick="connectYouTube()">Connect</button>
          </div>
          
          <div id="yt-settings" style="display:none; margin-top:15px;">
            <div class="settings-field">
              <span class="settings-label">Channel ID / Username</span>
              <input type="text" id="youtube-channel-id" class="settings-input" placeholder="e.g. UC_x5XG1OV2P6uZZ5FSM9Ttw">
            </div>
            <div class="settings-field">
              <span class="settings-label">Insight Extraction Mode</span>
              <select id="yt-mode" class="settings-input">
                <option value="auto">Automatic (Every Response)</option>
                <option value="manual">Manual Mention only</option>
                <option value="creative">Creative Simulation (Premium)</option>
              </select>
            </div>
          </div>
        </div>

        <div class="save-bar">
          <button class="btn-save" onclick="saveSettings()">Save Changes</button>
        </div>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-firestore-compat.js"></script>
  <script src="js/firebase-init.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/utils.js"></script>

  <script>
    let isConnected = false;

    async function loadSettings() {
      const user = csAuth.currentUser;
      if (!user) return;
      
      const doc = await csDb.collection('cs_users').doc(user.uid).get();
      if (doc.exists) {
        const data = doc.data();
        if (data.youtube) {
          document.getElementById('youtube-channel-id').value = data.youtube.channelId || '';
          document.getElementById('yt-mode').value = data.youtube.mode || 'auto';
          document.getElementById('youtube-api-key').value = data.youtube.apiKey || '';
          if (data.youtube.channelId) {
            markConnected();
          }
        }
      }
    }

    function connectYouTube() {
      isConnected = !isConnected;
      const ytSettings = document.getElementById('yt-settings');
      const btn = document.querySelector('.btn-connect');
      
      if (isConnected) {
        ytSettings.style.display = 'block';
        btn.textContent = 'Disconnect';
        btn.classList.add('connected');
        Utils.toast('YouTube connection enabled locally. Enter your channel ID.', 'success');
      } else {
        ytSettings.style.display = 'none';
        btn.textContent = 'Connect';
        btn.classList.remove('connected');
        document.getElementById('yt-status').textContent = 'Not connected';
      }
    }

    function markConnected() {
      isConnected = true;
      document.getElementById('yt-settings').style.display = 'block';
      const btn = document.querySelector('.btn-connect');
      btn.textContent = 'Connected';
      btn.classList.add('connected');
      document.getElementById('yt-status').textContent = 'Connected to Channel';
    }

    async function saveSettings() {
      const user = csAuth.currentUser;
      if (!user) {
        Utils.toast('You must be logged in to save settings.', 'error');
        return;
      }

      Utils.showLoading('Saving settings...');
      
      const ytData = {
        channelId: document.getElementById('youtube-channel-id').value,
        mode: document.getElementById('yt-mode').value,
        apiKey: document.getElementById('youtube-api-key').value,
        connected: isConnected
      };

      try {
        await csDb.collection('cs_users').doc(user.uid).set({
          youtube: ytData,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        
        Utils.hideLoading();
        Utils.toast('Settings saved successfully!', 'success');
      } catch (err) {
        Utils.hideLoading();
        Utils.toast('Error saving settings: ' + err.message, 'error');
      }
    }

    csAuth.onAuthStateChanged(user => {
      if (user) loadSettings();
    });
  </script>
</body>
</html>
