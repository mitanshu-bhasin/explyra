<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Chat — CompanySim</title>
  <link rel="stylesheet" href="css/presentation.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <style>
    .chat-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: calc(100vh - 40px);
      gap: 20px;
      margin: 20px;
    }

    .agent-list {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px;
      overflow-y: auto;
    }

    .agent-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 8px;
    }

    .agent-item:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .agent-item.active {
      background: #667eea;
      color: #fff;
    }

    .agent-emoji {
      font-size: 24px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
    }

    .chat-window {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message {
      max-width: 80%;
      padding: 12px 18px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.5;
    }

    .message-user {
      align-self: flex-end;
      background: #667eea;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message-agent {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border-bottom-left-radius: 4px;
    }

    .chat-input-area {
      padding: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      gap: 15px;
    }

    .chat-input {
      flex: 1;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px 16px;
      color: #fff;
      font-size: 16px;
    }

    .btn-send {
      padding: 0 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
  </style>

    <!-- Security & Context Menu -->
    <script src="../js/security.js" defer></script>
</head>
<body class="dark-mode">
  <div class="app-container">
    <div id="sidebar-container"></div>
    <main class="main-content">
      <div class="chat-layout">
        <aside class="agent-list" id="agent-list">
          <h3 style="margin-top:0; color:#fff;">Agents</h3>
          <!-- Agents populated here -->
        </aside>

        <section class="chat-window">
          <div class="chat-header" id="chat-header">
            <div style="display:flex; align-items:center; gap:15px;">
              <div class="agent-emoji" id="current-agent-emoji">🤖</div>
              <div>
                <h4 id="current-agent-name" style="margin:0; font-size:18px;">Select an Agent</h4>
                <p id="current-agent-status" style="margin:4px 0 0; font-size:13px; color:#a0a8d0;">Waiting for selection...</p>
              </div>
            </div>
            <button class="btn-send" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);" onclick="clearHistory()">Clear</button>
          </div>

          <div class="chat-messages" id="chat-messages">
            <!-- Messages here -->
          </div>

          <div class="chat-input-area">
            <input type="text" id="chat-input" class="chat-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="btn-send" onclick="sendMessage()">Send</button>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-firestore-compat.js"></script>
  <script src="js/firebase-init.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/gemini.js"></script>
  <script src="js/memory.js"></script>
  <script src="data/role-catalog.js"></script>
  <script src="prompts/roles.js"></script>

  <script>
    let selectedAgent = null;
    let currentUser = null;
    let currentCompany = null;
    let chatHistory = [];

    async function init() {
      const list = document.getElementById('agent-list');
      ROLE_CATALOG.forEach(role => {
        const div = document.createElement('div');
        div.className = 'agent-item';
        div.onclick = () => selectAgent(role);
        div.innerHTML = `
          <div class="agent-emoji">${role.emoji}</div>
          <div>
            <div style="font-weight:600">${role.name}</div>
            <div style="font-size:12px; opacity:0.6">${role.style.split('.')[0]}</div>
          </div>
        `;
        list.appendChild(div);
      });

      csAuth.onAuthStateChanged(async user => {
        if (user) {
          currentUser = user;
          const companyDoc = await csDb.collection('cs_companies').where('ownerId', '==', user.uid).limit(1).get();
          if (!companyDoc.empty) {
            currentCompany = { id: companyDoc.docs[0].id, ...companyDoc.docs[0].data() };
          }
        }
      });
    }

    function selectAgent(role) {
      selectedAgent = role;
      document.querySelectorAll('.agent-item').forEach(el => el.classList.remove('active'));
      event.currentTarget.classList.add('active');
      
      document.getElementById('current-agent-name').textContent = role.name;
      document.getElementById('current-agent-emoji').textContent = role.emoji;
      document.getElementById('current-agent-status').textContent = 'Online & Active';
      
      document.getElementById('chat-messages').innerHTML = '';
      chatHistory = [];
      
      renderMessage('agent', `Hello Founder, I am your ${role.name}. How can I assist you in private today? Any insights I gain here will be remembered for our future meetings.`);
    }

    function renderMessage(sender, text) {
      const container = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = `message message-${sender}`;
      div.innerHTML = `<strong>${sender === 'user' ? 'You' : selectedAgent.name}:</strong><br>${text.replace(/\n/g, '<br>')}`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text || !selectedAgent) return;

      input.value = '';
      renderMessage('user', text);
      chatHistory.push({ role: 'user', content: text });

      const loadingDiv = document.createElement('div');
      loadingDiv.className = 'message message-agent';
      loadingDiv.style.opacity = '0.5';
      loadingDiv.textContent = `${selectedAgent.name} is thinking...`;
      document.getElementById('chat-messages').appendChild(loadingDiv);

      // Fetch memories for this agent
      const memories = await MemoryService.recall(currentCompany.id, selectedAgent.id, text);
      
      const response = await GeminiService.agentRespond(selectedAgent, text, currentCompany, memories);
      loadingDiv.remove();

      if (response.success) {
        renderMessage('agent', response.text);
        chatHistory.push({ role: 'agent', content: response.text });
        
        // Save new memory
        await MemoryService.save(currentCompany.id, {
          content: `Personal chat snippet: "${text.substring(0, 50)}..." -> "${response.text.substring(0, 50)}..."`,
          agentRole: selectedAgent.id,
          source: 'personal_chat',
          type: 'insight'
        });
      } else {
        Utils.toast(response.error, 'error');
      }
    }

    function clearHistory() {
      document.getElementById('chat-messages').innerHTML = '';
      chatHistory = [];
      Utils.toast('Chat cleared.', 'info');
    }

    init();
  </script>
</body>
</html>
