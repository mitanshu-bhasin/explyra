<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory & History — CompanySim</title>
  <meta name="description" content="View past meetings, summaries, decisions, and company knowledge base.">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/memory.css">
</head>
<body>
  <div class="main-content page-content" id="main-content">
    <div id="memory-content">
      <div style="text-align:center;padding:100px 0">
        <div class="loading-spinner" style="margin:0 auto 16px"></div>
        <p class="loading-text">Loading memories...</p>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

  <!-- App Scripts -->
  <script src="js/firebase-init.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/company.js"></script>
  <script src="js/meeting-service.js"></script>
  <script src="js/memory.js"></script>
  <script src="data/role-catalog.js"></script>

  <script>
    let companyData = null;
    let meetingsData = [];
    let memoriesData = [];
    let agentsData = [];
    let currentFilter = 'all';
    let searchQuery = '';

    const roleMap = {};
    ROLE_CATALOG.forEach(r => roleMap[r.id] = r);

    Router.requireAuth(async (user) => {
      if (!user) return;
      renderSidebar('memory');
      companyData = await CompanyService.getByUser(user.uid);

      if (!companyData) {
        document.getElementById('memory-content').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🧠</div>
            <h2 class="empty-state-title">No Company Yet</h2>
            <p class="empty-state-text">Create a company and hold meetings to build your knowledge base.</p>
            <a href="company-setup.html" class="btn btn-primary">Create Company</a>
          </div>
        `;
        return;
      }

      [meetingsData, memoriesData, agentsData] = await Promise.all([
        MeetingService.getAll(companyData.id),
        MemoryService.getAll(companyData.id),
        CompanyService.getAgents(companyData.id)
      ]);

      renderMemoryPage();
    });

    function renderMemoryPage() {
      const content = document.getElementById('memory-content');
      const filtered = filterMemories();
      const decisions = memoriesData.filter(m => m.type === 'decision');
      const insights = memoriesData.filter(m => m.type === 'insight');
      const actions = memoriesData.filter(m => m.type === 'action');
      const facts = memoriesData.filter(m => m.type === 'fact');

      content.innerHTML = `
        <div class="memory-page-header">
          <div>
            <h1 class="page-title">🧠 Memory & History</h1>
            <p class="page-subtitle">${memoriesData.length} memories from ${meetingsData.length} meetings</p>
          </div>
          <div class="memory-search">
            <span class="memory-search-icon">🔍</span>
            <input class="input" type="text" id="memory-search-input" placeholder="Search memories..."
              value="${searchQuery}" oninput="handleSearch(this.value)" style="padding-left:40px">
          </div>
        </div>

        <!-- Stats Row -->
        <div class="dashboard-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:var(--space-6)">
          <div class="stat-card" style="cursor:pointer" onclick="setFilter('decision')">
            <div class="stat-label">Decisions</div>
            <div class="stat-value" style="color:var(--color-accent-green);font-size:var(--font-size-xl)">${decisions.length}</div>
          </div>
          <div class="stat-card" style="cursor:pointer" onclick="setFilter('insight')">
            <div class="stat-label">Insights</div>
            <div class="stat-value" style="color:var(--color-accent-purple);font-size:var(--font-size-xl)">${insights.length}</div>
          </div>
          <div class="stat-card" style="cursor:pointer" onclick="setFilter('action')">
            <div class="stat-label">Action Items</div>
            <div class="stat-value" style="color:var(--color-accent-orange);font-size:var(--font-size-xl)">${actions.length}</div>
          </div>
          <div class="stat-card" style="cursor:pointer" onclick="setFilter('fact')">
            <div class="stat-label">Facts</div>
            <div class="stat-value" style="color:var(--color-accent-blue);font-size:var(--font-size-xl)">${facts.length}</div>
          </div>
        </div>

        <!-- Filter Tabs -->
        <div class="memory-filters">
          <button class="chip ${currentFilter === 'all' ? 'selected' : ''}" onclick="setFilter('all')">All</button>
          <button class="chip ${currentFilter === 'decision' ? 'selected' : ''}" onclick="setFilter('decision')">✅ Decisions</button>
          <button class="chip ${currentFilter === 'insight' ? 'selected' : ''}" onclick="setFilter('insight')">💡 Insights</button>
          <button class="chip ${currentFilter === 'action' ? 'selected' : ''}" onclick="setFilter('action')">📌 Actions</button>
          <button class="chip ${currentFilter === 'fact' ? 'selected' : ''}" onclick="setFilter('fact')">📄 Facts</button>
          <button class="chip ${currentFilter === 'meetings' ? 'selected' : ''}" onclick="setFilter('meetings')">💬 Meetings</button>
        </div>

        <!-- Content Area -->
        <div id="memory-list-area">
          ${currentFilter === 'meetings' ? renderMeetingsList() : renderMemoriesList(filtered)}
        </div>

        <!-- Agent Memory Section -->
        ${agentsData.length > 0 ? `
          <div class="agent-memory-section">
            <h3 style="margin-bottom:var(--space-5)">🤖 Agent Knowledge</h3>
            <div class="agent-memory-grid">
              ${agentsData.map(a => {
                const role = roleMap[a.id] || a;
                const agentMems = memoriesData.filter(m => m.agentRole === a.id);
                return `
                  <div class="agent-memory-card">
                    <div class="agent-memory-header">
                      <div class="agent-memory-avatar" style="background:${role.bgColor || 'rgba(102,126,234,0.12)'}">${role.emoji || '🤖'}</div>
                      <div>
                        <div class="agent-memory-name">${Utils.escapeHtml(role.name || a.id)}</div>
                        <div style="font-size:11px;color:var(--color-text-muted)">${(a.memory || []).length + agentMems.length} memories</div>
                      </div>
                    </div>
                    <div class="agent-memory-entries">
                      ${(a.memory || []).slice(0, 3).map(m => `
                        <div class="agent-memory-entry">${Utils.escapeHtml(Utils.truncate(m, 80))}</div>
                      `).join('')}
                      ${(a.memory || []).length === 0 && agentMems.length === 0 ? '<div class="agent-memory-entry" style="opacity:0.5">No memories yet</div>' : ''}
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        ` : ''}
      `;
    }

    function filterMemories() {
      let filtered = memoriesData;
      if (currentFilter !== 'all' && currentFilter !== 'meetings') {
        filtered = filtered.filter(m => m.type === currentFilter);
      }
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(m => (m.content || '').toLowerCase().includes(q));
      }
      return filtered;
    }

    function renderMemoriesList(memories) {
      if (memories.length === 0) {
        return `
          <div class="empty-state" style="padding:60px">
            <div class="empty-state-icon">📭</div>
            <h3 class="empty-state-title">No memories found</h3>
            <p class="empty-state-text">${searchQuery ? 'Try a different search term.' : 'Hold meetings to start building your knowledge base.'}</p>
          </div>
        `;
      }

      const typeIcons = { decision: '✅', insight: '💡', action: '📌', fact: '📄' };
      const typeColors = { decision: 'green', insight: 'purple', action: 'orange', fact: 'blue' };

      // Group by date
      const groups = {};
      memories.forEach(m => {
        const dateKey = m.createdAt ? Utils.formatDate(m.createdAt) : 'Unknown Date';
        if (!groups[dateKey]) groups[dateKey] = [];
        groups[dateKey].push(m);
      });

      return `
        <div class="memory-timeline">
          ${Object.entries(groups).map(([date, items]) => `
            <div class="memory-date-group">
              <div class="memory-date-label">${date}</div>
              ${items.map(m => `
                <div class="memory-entry" onclick="this.classList.toggle('expanded')">
                  <div class="memory-entry-header">
                    <div class="memory-entry-type">
                      <span class="memory-type-icon">${typeIcons[m.type] || '📄'}</span>
                      <span class="memory-type-label badge badge-${typeColors[m.type] || 'blue'}">${m.type || 'memory'}</span>
                    </div>
                    <div class="memory-meta-item">${Utils.formatRelative(m.createdAt)}</div>
                  </div>
                  <div class="memory-entry-content">${Utils.escapeHtml(m.content)}</div>
                  <div class="memory-entry-details">
                    <div class="memory-entry-meta">
                      <span class="memory-meta-item">📁 Source: ${m.source || 'meeting'}</span>
                      ${m.agentRole ? `<span class="memory-meta-item">🤖 ${roleMap[m.agentRole]?.name || m.agentRole}</span>` : ''}
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderMeetingsList() {
      if (meetingsData.length === 0) {
        return `
          <div class="empty-state" style="padding:60px">
            <div class="empty-state-icon">💬</div>
            <h3 class="empty-state-title">No meetings yet</h3>
            <p class="empty-state-text">Start a meeting to see the history here.</p>
            <a href="meeting.html" class="btn btn-primary" style="margin-top:16px">Start First Meeting</a>
          </div>
        `;
      }

      return `
        <div style="display:flex;flex-direction:column;gap:var(--space-4)">
          ${meetingsData.map(m => `
            <div class="card" style="cursor:pointer" onclick="window.location.href='meeting.html?id=${m.id}'">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-3)">
                <h4 style="font-size:var(--font-size-base);font-weight:700">${Utils.escapeHtml(m.topic)}</h4>
                <span class="badge badge-${m.status === 'completed' ? 'green' : 'orange'}">${m.status || 'active'}</span>
              </div>
              ${m.summary ? `<p style="font-size:var(--font-size-sm);color:var(--color-text-muted);margin-bottom:var(--space-3)">${Utils.escapeHtml(Utils.truncate(m.summary, 200))}</p>` : ''}
              <div style="display:flex;gap:var(--space-4);font-size:var(--font-size-xs);color:var(--color-text-muted)">
                <span>🤖 ${(m.agentIds || []).length} agents</span>
                <span>💬 ${(m.transcript || []).length} messages</span>
                <span>📅 ${Utils.formatDate(m.createdAt)}</span>
              </div>
              ${m.decisions?.length ? `
                <div style="margin-top:var(--space-3);display:flex;flex-wrap:wrap;gap:var(--space-2)">
                  ${m.decisions.slice(0, 3).map(d => `<span class="chip" style="font-size:11px;padding:4px 10px;cursor:default">✅ ${Utils.escapeHtml(Utils.truncate(d, 40))}</span>`).join('')}
                </div>
              ` : ''}
            </div>
          `).join('')}
        </div>
      `;
    }

    function setFilter(filter) {
      currentFilter = filter;
      renderMemoryPage();
    }

    const handleSearch = Utils.debounce((query) => {
      searchQuery = query;
      const filtered = filterMemories();
      document.getElementById('memory-list-area').innerHTML =
        currentFilter === 'meetings' ? renderMeetingsList() : renderMemoriesList(filtered);
    }, 300);
  </script>
</body>
</html>
