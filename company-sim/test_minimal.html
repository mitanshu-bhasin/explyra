<!DOCTYPE html>
<html>
<head>
  <title>Firestore Simple Test</title>

    <!-- Security & Context Menu -->
    <script src="../js/security.js" defer></script>
</head>
<body>
  <h1>Firestore Connection Test (Unauthenticated)</h1>
  <div id="log" style="font-family: monospace; padding: 10px; border: 1px solid #ccc; background: #f9f9f9;"></div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

  <script>
    function log(msg, color = 'black') {
      const div = document.getElementById('log');
      div.innerHTML += `<p style="color: ${color}">${new Date().toLocaleTimeString()} - ${msg}</p>`;
      console.log(msg);
    }

    const config = {
      apiKey: "AIzaSyAoDQhHlUbiUl57azSrst5M2eGDeQ8EydA",
      projectId: "explyras"
    };

    log("Initializing Firebase...");
    try {
      const app = firebase.initializeApp(config, "testApp_" + Date.now());
      const db = firebase.firestore(app);
      
      log("Attempting to write to cs_companies...");
      db.collection('cs_companies').add({
        test: true,
        type: 'minimal_browser_test',
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      })
      .then(docRef => {
        log("SUCCESS! Created document: " + docRef.id, 'green');
      })
      .catch(err => {
        log("ERROR: " + err.code + " - " + err.message, 'red');
        console.error(err);
      });

    } catch (e) {
      log("CRITICAL FAILURE: " + e.message, 'red');
    }
  </script>
</body>
</html>
