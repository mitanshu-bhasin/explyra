<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explyra — Document Verification (CC)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Outfit:wght@300..700&display=swap" rel="stylesheet">
    <script src="js/env.js"></script>

    <style>
        :root {
            --bg: #04060b;
            --blue: #1546C0;
            --ink: #EEF0F8;
            --bdr: rgba(255, 255, 255, .1);
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .verify-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid var(--bdr);
            padding: 40px;
            border-radius: 24px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .logo { width: 60px; margin-bottom: 20px; }
        h1 { font-family: 'Bricolage Grotesque', sans-serif; margin-bottom: 10px; font-size: 1.8rem; }
        p { color: #8290A8; margin-bottom: 30px; font-size: 0.95rem; }

        .status-badge {
            padding: 10px 20px;
            border-radius: 100px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
        }

        .status-valid { background: rgba(52, 211, 153, 0.1); color: #34D399; }
        .status-invalid { background: rgba(244, 114, 182, 0.1); color: #F472B6; }

        .details-box {
            text-align: left;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }

        .detail-row span:first-child { color: #4E5A70; }
        .detail-row span:last-child { color: #EEF0F8; font-weight: 600; }
    </style>
</head>
<body>

    <div class="verify-card">
        <img src="nobg.png" alt="Explyra" class="logo">
        <h1>Document Verification</h1>
        <p id="subHeading">Authenticating Explyra Secure Document...</p>

        <div id="statusContainer" class="hidden">
            <div id="statusBadge" class="status-badge">
                <i class="fas fa-check-circle"></i> VERIFIED
            </div>

            <div class="details-box">
                <div class="detail-row"><span>Document ID</span><span id="resId"></span></div>
                <div class="detail-row"><span>Candidate</span><span id="resName"></span></div>
                <div class="detail-row"><span>Role</span><span id="resRole"></span></div>
                <div class="detail-row"><span>Issued On</span><span id="resDate"></span></div>
            </div>
            
            <p style="font-size: 0.75rem;">This document is part of the Explyra Suite secure blockchain verification system.</p>
        </div>

        <div id="errorContainer" class="hidden">
            <div class="status-badge status-invalid">
                <i class="fas fa-times-circle"></i> INVALID
            </div>
            <p>We could not find a record for this document ID. It may be forged or expired.</p>
        </div>

        <div id="loader">
            <i class="fas fa-spinner fa-spin fa-3x" style="color: var(--blue);"></i>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = window.EXPLYRA_CONFIG.firebase;
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const docId = urlParams.get('id');

        async function verify() {
            const loader = document.getElementById('loader');
            const statusContainer = document.getElementById('statusContainer');
            const errorContainer = document.getElementById('errorContainer');

            if (!docId) {
                loader.classList.add('hidden');
                errorContainer.classList.remove('hidden');
                document.getElementById('subHeading').innerText = "No Document ID Provided";
                return;
            }

            try {
                const q = query(collection(db, "generated_docs"), where("docId", "==", docId));
                const querySnapshot = await getDocs(q);

                loader.classList.add('hidden');

                if (querySnapshot.empty) {
                    errorContainer.classList.remove('hidden');
                } else {
                    const data = querySnapshot.docs[0].data();
                    statusContainer.classList.remove('hidden');
                    document.getElementById('statusBadge').className = "status-badge status-valid";
                    document.getElementById('resId').innerText = data.docId;
                    document.getElementById('resName').innerText = data.candidateName;
                    document.getElementById('resRole').innerText = data.role;
                    document.getElementById('resDate').innerText = data.createdAt?.toDate().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) || "N/A";
                }
            } catch (err) {
                console.error(err);
                loader.classList.add('hidden');
                errorContainer.classList.remove('hidden');
            }
        }

        verify();
    </script>
</body>
</html>
