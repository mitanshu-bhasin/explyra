        });

        function onLoginSubmit(e) {

        }
    </script>

<body
    class="bg-green-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-['Inter'] min-h-screen flex items-center justify-center p-4 transition-colors duration-300">

    <div class="fixed top-6 right-6 z-50 flex items-center gap-4">
        <a href="../index.html"
            class="text-sm font-bold text-slate-500 hover:text-green-600 dark:hover:text-green-400 transition bg-white dark:bg-slate-800 px-4 py-2 rounded-full shadow-sm border border-slate-200 dark:border-slate-700">
            <i class="fa-solid fa-arrow-left mr-1"></i> Back
        </a>
        <button onclick="toggleTheme()"
            class="w-10 h-10 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex items-center justify-center text-slate-500 dark:text-yellow-400 hover:bg-slate-50 dark:hover:bg-slate-700 transition shadow-sm">
            <i class="fa-solid fa-moon dark:hidden"></i>
            <i class="fa-solid fa-sun hidden dark:block"></i>
        </button>
    </div>

    <!-- Background Blobs -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0 dark:hidden">
        <div class="absolute -top-[20%] -right-[10%] w-[60%] h-[60%] bg-green-100/50 rounded-full blur-3xl"></div>
        <div class="absolute bottom-[10%] left-[10%] w-[40%] h-[40%] bg-indigo-100/50 rounded-full blur-3xl"></div>
    </div>

    <!-- Auth Screen Wrapper -->
    <div id="auth-screen" class="w-full h-screen flex flex-col relative overflow-y-auto overflow-x-hidden pt-10">
        <!-- Card Container -->
        <div
            class="w-full flex-1 flex flex-col items-center justify-center p-4 py-8 md:py-16 relative z-10 transition-all duration-500">
            <!-- Glassmorphism Card -->
            <div
                class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl border border-slate-200/50 dark:border-slate-700/50 shadow-2xl transition-all w-full max-w-md p-6 sm:p-8 rounded-2xl">
                <div class="text-center mb-8">
                    <div id="login-logo-container"
                        class="w-20 h-20 bg-gradient-to-br from-green-600 to-green-800 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-green-500/30 overflow-hidden">
                        <img id="login-logo-img" class="w-full h-full object-contain hidden"
                            src="assets/images/explyra_logo.png" alt="Company Logo">
                        <i id="login-logo-fallback"
                            class="fa-solid fa-building-user text-3xl text-white drop-shadow-md"></i>
                    </div>
                    <h1 class="text-3xl font-bold text-slate-800 dark:text-slate-100 tracking-tight mb-2"
                        id="login-company-name">Company <span
                            class="text-transparent bg-clip-text bg-gradient-to-r from-green-600 to-teal-500">Login</span>
                    </h1>
                    <p class="text-slate-500 dark:text-slate-400 text-xs uppercase tracking-[0.2em] font-bold">Sign in
                        to your corporate workspace</p>
                </div>

                <form id="login-form" onsubmit="onLoginSubmit(event)" class="space-y-5">
                    <div>
                        <label
                            class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1.5 ml-1">Admin
                            Email</label>
                        <div class="relative">
                            <i
                                class="fa-regular fa-envelope absolute left-3.5 top-3.5 text-slate-400 transition-colors"></i>
                            <input type="email" id="login-email"
                                class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-900/50 focus:bg-white dark:focus:bg-slate-800 focus:ring-2 focus:ring-green-500/50 focus:border-green-500 outline-none text-sm font-medium transition-all"
                                placeholder="admin@company.com" autocomplete="username" required>
                        </div>
                    </div>
                    <div>
                        <label
                            class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1.5 ml-1">Password</label>
                        <div class="relative">
                            <i class="fa-solid fa-lock absolute left-3.5 top-3.5 text-slate-400 transition-colors"></i>
                            <input type="password" id="login-password"
                                class="w-full pl-10 pr-10 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-900/50 focus:bg-white dark:focus:bg-slate-800 focus:ring-2 focus:ring-green-500/50 focus:border-green-500 outline-none text-sm font-medium transition-all"
                                placeholder="••••••••" autocomplete="current-password" required>
                            <button type="button" onclick="toggleLoginPassword()"
                                class="absolute right-3 top-3 text-slate-400 hover:text-green-600 transition">
                                <i class="fa-regular fa-eye" id="login-eye-icon"></i>
                            </button>
                        </div>
                        <div class="text-right mt-1.5 flex justify-between items-center">
                            <span class="text-[10px] text-slate-400 dark:text-slate-500">Secure AES-256</span>
                            <button type="button" onclick="forgotPassword()"
                                class="text-xs text-green-600 hover:text-green-800 dark:hover:text-green-400 font-semibold hover:underline">Forgot
                                Password?</button>
                        </div>
                    </div>
                    <button type="submit" id="login-btn"
                        class="w-full py-3 mt-2 text-base shadow-xl shadow-green-500/30 bg-gradient-to-r from-green-600 to-green-700 hover:from-green-500 hover:to-green-600 border border-green-500/30 text-white font-bold rounded-xl relative overflow-hidden group transition-all">
                        <span class="relative z-10 flex items-center justify-center gap-2">Secure Login <i
                                class="fa-solid fa-shield-halved"></i></span>
                        <div
                            class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300">
                        </div>
                    </button>
                </form>

                <div class="mt-6 text-center border-t border-slate-100 dark:border-slate-800 pt-6">
                    <div id="login-footer" class="space-y-4">
                        <p class="text-[10px] text-slate-400 max-w-xs mx-auto leading-relaxed">
                            <i class="fa-solid fa-circle-info mr-1 text-green-500"></i> New Company?
                        </p>
                        <a href="register.html"
                            class="block w-full text-center text-xs text-green-600 hover:text-green-800 dark:hover:text-green-400 font-bold hover:underline transition-colors py-2">
                            <i class="fa-solid fa-building mr-1"></i> Register New Company
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
