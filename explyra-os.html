<head>

    <style>
        :root {
            --accent: #00F2FF;
            --glass: rgba(15, 23, 42, 0.4);
            --glass-thick: rgba(10, 15, 25, 0.98);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text: #EEF2F6;
            --r-lg: 28px;
            --brightness: 1;
            --fs: 14px;
        }
        [data-theme="light"] {
            --bg-dark: #F1F5F9; --text: #0F172A;
            --glass: rgba(255, 255, 255, 0.4); --glass-thick: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; outline: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; font-size: var(--fs); background: #000; height: 100vh; width: 100vw; overflow: hidden; color: var(--text); }

        #wallpaper { 
            position: fixed; inset: 0; z-index: -1; transition: 1s ease;
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
                url('file:///C:/Users/mitan/.gemini/antigravity/brain/d7eed8f0-dde1-4776-8997-6240c74e5751/explyra_wallpaper_ios_1_1774359823750.png');
            background-size: cover; background-position: center;
        }
        #brightness-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 10000; background: rgba(0,0,0, calc(1 - var(--brightness))); transition: 0.3s; }

        #boot-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 1s ease; cursor: pointer; }

        .status-bar { position: fixed; top: 0; left: 0; right: 0; height: 40px; background: rgba(0, 0, 0, 0.1); backdrop-filter: blur(40px); border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; padding: 0 25px; z-index: 2000; font-size: 13px; font-weight: 700; }
        .dynamic-island { position: absolute; left: 50%; transform: translateX(-50%); width: 120px; height: 28px; background: #000; border-radius: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .dynamic-island:hover { width: 220px; height: 36px; }
        .dynamic-island span { font-size: 10px; color: var(--accent); opacity: 0; white-space: nowrap; transition: 0.3s; }
        .dynamic-island:hover span { opacity: 1; }

        .status-right { display: flex; align-items: center; gap: 18px; cursor: pointer; padding: 5px 10px; border-radius: 20px; transition: 0.2s; }
        .status-right:hover { background: rgba(255,255,255,0.1); }

        /* Notification Panel */
        #notification-panel {
            position: fixed; top: -100%; left: 0; width: 100vw; height: 100vh; 
            background: rgba(0,0,0,0.4); backdrop-filter: blur(60px); z-index: 3000;
            display: flex; flex-direction: column; align-items: center; padding-top: 80px;
            transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #notification-panel.active { top: 0; }
        .panel-content { width: 400px; max-width: 90vw; display: flex; flex-direction: column; gap: 20px; }
        .cc-tile { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; padding: 18px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
        .cc-tile.active { background: var(--accent); color: #000; }
        .cc-tile i { font-size: 20px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); border-radius: 10px; }

        /* Desktop */
        .desktop { height: 100vh; width: 100vw; padding-top: 60px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .widget-clock { text-align: center; margin-bottom: 20px; }
        .widget-clock h1 { font-size: 100px; font-weight: 200; letter-spacing: -5px; line-height: 1; }
        .widget-clock p { font-size: 14px; font-weight: 700; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; }

        .app-view { flex: 1; width: 100%; overflow: hidden; position: relative; }
        .app-pages { display: flex; height: 100%; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .app-page { min-width: 100%; padding: 30px 50px; display: grid; grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 35px; align-content: start; }

        .app-icon { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: 0.3s; }
        .icon-box { width: 76px; height: 76px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; background: var(--glass); border: 1px solid var(--glass-border); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .app-icon:hover { transform: translateY(-8px); }
        .app-name { font-size: 11px; font-weight: 600; text-align: center; }

        .pagination { position: fixed; bottom: 125px; display: flex; gap: 10px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: 0.3s; }
        .dot.active { background: #fff; transform: scale(1.5); }

        .dock-wrapper { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 2000; }
        .dock { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(50px); border: 1px solid var(--glass-border); border-radius: 35px; padding: 12px 18px; display: flex; gap: 15px; }
        .dock-item { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; transition: 0.2s; }
        .dock-item:hover { transform: scale(1.3) translateY(-12px); }

        /* Window System */
        .window { position: absolute; width: 90%; height: 80%; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--glass-thick); backdrop-filter: blur(80px); border: 1px solid var(--glass-border); border-radius: 30px; display: none; flex-direction: column; z-index: 1500; box-shadow: 0 50px 150px rgba(0,0,0,0.8); overflow: hidden; }
        .window.active { display: flex; }
        .win-header { height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--glass-border); cursor: move; }
        .win-body { flex: 1; overflow-y: auto; padding: 30px; }

        /* Settings UI */
        .settings-sec { margin-bottom: 30px; }
        .settings-sec h3 { font-size: 12px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        .settings-card { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 18px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .settings-row { display: flex; justify-content: space-between; align-items: center; }
        .btn-set { background: var(--glass); border: 1px solid var(--glass-border); color: #fff; padding: 12px 25px; border-radius: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-set:hover { background: rgba(255,255,255,0.15); }
        
        .wallpaper-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        .wall-thumb { height: 80px; border-radius: 12px; cursor: pointer; border: 2px solid transparent; background-size: cover; }
        .wall-thumb.active { border-color: var(--accent); transform: scale(1.05); }

        /* Terminal UI */
        .term-container { font-family: 'Fira Code', monospace; color: #00FF88; height: 100%; display: flex; flex-direction: column; gap: 10px; }
        .term-out { flex: 1; overflow-y: auto; white-space: pre-wrap; font-size: 13px; }
        .term-in-row { display: flex; gap: 10px; }
        .term-in { background: none; border: none; color: white; flex: 1; font-family: inherit; font-size: 13px; }

        @media (max-width: 600px) {
            .app-page { grid-template-columns: repeat(4, 1fr); padding: 20px; gap: 20px; }
            .icon-box { width: 64px; height: 64px; font-size: 26px; }
            .widget-clock h1 { font-size: 80px; }
        }
    </style>

    <script>
        const appList = [
            { n: 'Expense Mgr', i: 'fa-wallet', c: '#00FF88', u: 'admin.html' },
            { n: 'Invoice', i: 'fa-file-invoice', c: '#FFD700', u: 'invoice-software/' },
            { n: 'Pricing', i: 'fa-tags', c: '#FF9F0A', u: 'pricing.html' },
            { n: 'Attendance', i: 'fa-user-clock', c: '#BB86FC', u: 'attendance/' },
            { n: 'ERP Suite', i: 'fa-industry', c: '#6366F1', u: 'manufacturing/' },
            { n: 'Shop', i: 'fa-cart-shopping', c: '#00F2FF', u: 'shop/' },
            { n: 'Mail', i: 'fa-envelope', c: '#F43F5E', u: 'email-app/' },
            { n: 'Helpdesk', i: 'fa-headset', c: '#10B981', u: 'support.html' },
            { n: 'COM Hub', i: 'fa-users', c: '#8B5CF6' },
            { n: 'Updates', i: 'fa-clock-rotate-left', c: '#F59E0B' },
            { n: 'Events', i: 'fa-calendar-check', c: '#EC4899' },
            { n: 'Skills', i: 'fa-bolt', c: '#FCD34D' },
            { n: 'Book', i: 'fa-book-open', c: '#8B5CF6' },
            { n: 'DNS', i: 'fa-globe', c: '#3B82F6' },
            { n: 'Docs', i: 'fa-file-lines', c: '#94A3B8' },
            { n: 'Utilities', i: 'fa-screwdriver-wrench', c: '#64748B' }
        ];

        let state = {
            wallpaper: 'file:///C:/Users/mitan/.gemini/antigravity/brain/d7eed8f0-dde1-4776-8997-6240c74e5751/explyra_wallpaper_ios_1_1774359823750.png',
            fontSize: 14, theme: 'dark', curP: 0, customApps: []
        };

        function startOS() {
            load(); renderDesktop(); updateT(); setInterval(updateT, 1000);
            initH(); initG();
            document.getElementById('wallpaper').style.backgroundImage = `url('${state.wallpaper}')`;
            document.documentElement.style.setProperty('--fs', state.fontSize+'px');
        }

        function renderDesktop() {
            const wrap = document.getElementById('app-pages'), dots = document.getElementById('pag-dots');
            wrap.innerHTML = ''; dots.innerHTML = '';
            const per = window.innerWidth < 600 ? 12 : 16;
            const pages = Math.ceil(appList.length / per);
            for(let i=0; i<pages; i++) {
                const pg = document.createElement('div'); pg.className = 'app-page';
                appList.slice(i*per, (i+1)*per).forEach(a => {
                    const el = document.createElement('div'); el.className = 'app-icon';
                    el.onclick = () => openApp(a.n);
                    el.innerHTML = `<div class="icon-box"><i class="fa-solid ${a.i}" style="color:${a.c}"></i></div><p class="app-name">${a.n}</p>`;
                    pg.appendChild(el);
                });
                wrap.appendChild(pg);
                const d = document.createElement('div'); d.className = `dot ${i===state.curP ? 'active':''}`;
                dots.appendChild(d);
            }
        }

        function openApp(name) {
            const win = document.getElementById('app-window'), body = document.getElementById('win-body');
            document.getElementById('win-title').textContent = name;
            win.classList.add('active');
            if(name === 'Settings') renderSettings();
            else if(name === 'Terminal') renderTerminal();
            else {
                const app = appList.find(a=>a.n===name);
                body.innerHTML = app && app.u ? `<iframe src="${app.u}" style="width:100%; height:100%; border:none;"></iframe>` : `<div style="padding:40px; text-align:center;"><h2>${name}</h2><p>Experience the suite.</p></div>`;
            }
        }

        function renderSettings() {
            const body = document.getElementById('win-body');
            body.innerHTML = `
                <div class="settings-sec">
                    <h3>Wallpaper & Aesthetics</h3>
                    <div class="settings-card">
                        <div class="wallpaper-grid">
                            ${[1, 2].map(i => `<div class="wall-thumb ${state.wallpaper.includes('ios_'+i)?'active':''}" style="background-image:url('file:///C:/Users/mitan/.gemini/antigravity/brain/d7eed8f0-dde1-4776-8997-6240c74e5751/explyra_wallpaper_ios_${i}_1774359823750.png')" onclick="setWall('file:///C:/Users/mitan/.gemini/antigravity/brain/d7eed8f0-dde1-4776-8997-6240c74e5751/explyra_wallpaper_ios_${i}_1774359823750.png')"></div>`).join('')}
                        </div>
                        <button class="btn-set" onclick="document.getElementById('wall-up').click()">Upload Custom Wallpaper</button>
                        <input type="file" id="wall-up" hidden onchange="uploadWall(this)">
                    </div>
                </div>
                <div class="settings-sec">
                    <h3>System Scale</h3>
                    <div class="settings-card">
                        <div class="settings-row"><span>Font Size</span><b>${state.fontSize}px</b></div>
                        <input type="range" min="12" max="20" value="${state.fontSize}" oninput="setFont(this.value)" style="width:100%">
                    </div>
                </div>
                <button class="btn-set" style="width:100%; padding:20px; background:rgba(255,0,0,0.1);" onclick="localStorage.clear(); location.reload();">Reset System OS</button>
            `;
        }

        function setWall(url) { state.wallpaper = url; document.getElementById('wallpaper').style.backgroundImage = `url('${url}')`; save(); renderSettings(); }
        function uploadWall(input) {
            const reader = new FileReader(); reader.onload = e => setWall(e.target.result);
            reader.readAsDataURL(input.files[0]);
        }
        function setFont(v) { state.fontSize = v; document.documentElement.style.setProperty('--fs', v+'px'); save(); renderSettings(); }

        function renderTerminal() {
            const body = document.getElementById('win-body');
            body.innerHTML = `
                <div class="term-container">
                    <div class="term-out" id="term-out">Explyra Platinum [Version 6.1]\n(c) 2026 Explyra Corporation. All rights reserved.\n\nType 'help' for commands.</div>
                    <div class="term-in-row"><span>explyra@platinum:~$</span><input type="text" class="term-in" autofocus onkeydown="runCmd(event)"></div>
                </div>
            `;
        }
        function runCmd(e) {
            if(e.key !== 'Enter') return;
            const input = e.target.value.trim().toLowerCase(), out = document.getElementById('term-out');
            out.innerHTML += `\nexplyra@platinum:~$ ${input}`;
            if(input==='help') out.innerHTML += `\nAvailable: help, ls, clear, whoami, run <app>`;
            else if(input==='ls') out.innerHTML += `\n${appList.map(a=>a.n).join('  ')}`;
            else if(input==='clear') out.innerHTML = '';
            else if(input==='whoami') out.innerHTML += `\nExplyra Power User`;
            else if(input.startsWith('run ')) {
                const app = input.split('run ')[1];
                if(appList.some(a=>a.n.toLowerCase() === app)) { openApp(appList.find(a=>a.n.toLowerCase()===app).n); out.innerHTML += `\nLaunching ${app}...`; }
                else out.innerHTML += `\nApp '${app}' not found.`;
            } else out.innerHTML += `\nCommand not found.`;
            e.target.value = ''; out.scrollTop = out.scrollHeight;
        }

        function togglePanel() { document.getElementById('notification-panel').classList.toggle('active'); }
        function closePanel() { document.getElementById('notification-panel').classList.remove('active'); }
        function moveSlider(t,e) {
            const r = e.currentTarget.getBoundingClientRect(), v = (e.clientX-r.left)/r.width;
            if(t==='bri') { document.documentElement.style.setProperty('--brightness', v); document.getElementById('bri-fill').style.width = v*100+'%'; }
        }

        function closeApp() { document.getElementById('app-window').classList.remove('active'); }
        function maximizeApp() { document.getElementById('app-window').classList.toggle('active'); }
        function bootNow() {
            try { document.documentElement.requestFullscreen(); } catch(e){}
            document.getElementById('boot-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('boot-screen').style.display='none', 1000);
        }

        function updateT() {
            const n = new Date(); const t = n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false});
            document.getElementById('clock-txt').textContent = t; document.getElementById('top-time').textContent = t;
            document.getElementById('date-txt').textContent = n.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
        }

        async function initH() {
            if(navigator.getBattery) {
                const b = await navigator.getBattery();
                const u = () => {
                    const l = Math.round(b.level * 100);
                    document.getElementById('batt-txt').textContent = l + '%';
                    document.getElementById('batt-ico').className = b.level > 0.8 ? 'fa-solid fa-battery-full' : 'fa-solid fa-battery-half';
                };
                b.onlevelchange = u; b.onchargingchange = u; u();
            }
            const net = () => document.getElementById('wifi-ico').className = navigator.onLine ? 'fa-solid fa-wifi' : 'fa-solid fa-wifi-slash';
            window.ononline = net; window.onoffline = net; net();
        }

        function initG() {
            let sX = 0; document.getElementById('touch-area').addEventListener('touchstart', e => sX = e.touches[0].clientX);
            document.getElementById('touch-area').addEventListener('touchend', e => {
                const d = sX - e.changedTouches[0].clientX;
                if(Math.abs(d) > 60) {
                    const max = Math.ceil(appList.length / (window.innerWidth < 600 ? 12 : 16)) - 1;
                    if(d > 0 && state.curP < max) state.curP++; else if(d < 0 && state.curP > 0) state.curP--;
                    document.getElementById('app-pages').style.transform = `translateX(-${state.curP * 100}%)`;
                    document.querySelectorAll('.dot').forEach((dt,idx) => dt.classList.toggle('active', idx === state.curP));
                }
            });
        }

        function save() { localStorage.setItem('explyra_state', JSON.stringify(state)); }
        function load() { const s = localStorage.getItem('explyra_state'); if(s) state = JSON.parse(s); }

        startOS();
    </script>
</body>
</html>
