<body>
    <div id="loader">
        <div class="spinner"></div>
        <div class="label">Synthesizing Realistic City</div>
    </div>

    <div id="ui-overlay">
        <div class="label">Explyra Cinematic Ecosystem</div>
        <div class="sub-label">Ultra Graphics • Dynamic Life • v5.0.0</div>
    </div>

    <div id="tooltip"></div>
    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { Sky } from 'three/addons/objects/Sky.js';

        // --- Configuration & Assets ---
        const COLORS = {
            sky: 0xddeeff,
            grass: 0x55a630,
            concrete: 0xcbd5e1,
            metal: 0x94a3b8,
            water: 0x38bdf8,
            founder: 0xffffff,
            road: 0x334155
        };

        const PRODUCT_ZONES = [
            { name: "Explyra Suite", color: 0x2563eb, pos: { x: -50, z: -40 } },
            { name: "Expense Manager", color: 0x16a34a, pos: { x: -60, z: 30 } },
            { name: "Mailbox", color: 0xdb2777, pos: { x: -25, z: -65 } },
            { name: "Booking / CRM", color: 0xd97706, pos: { x: 50, z: -50 } },
            { name: "Developer Tools", color: 0x0891b2, pos: { x: 65, z: 35 } },
            { name: "Learning Platform", color: 0x7c3aed, pos: { x: 30, z: 65 } },
            { name: "Cloud Tools", color: 0x0284c7, pos: { x: -20, z: 55 } }
        ];

        let scene, camera, renderer, controls, raycaster, sunLight;
        let clock = new THREE.Clock();
        let mouse = new THREE.Vector2();
        let hoveredObject = null;
        
        const worldGroup = new THREE.Group();
        const cityGroup = new THREE.Group();
        const trafficGroup = new THREE.Group();
        const humanGroup = new THREE.Group();
        const cloudGroup = new THREE.Group();
        
        const buildings = [];
        const vehicles = [];
        const humans = [];

        init();
        animate();

        function init() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 3000);
            camera.position.set(130, 100, 130);

            renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 0.85;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.08;
            controls.maxDistance = 500;
            controls.minDistance = 60;
            controls.maxPolarAngle = Math.PI / 2.1;

            // --- Physical Lighting & Sky ---
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x475569, 1.2);
            scene.add(hemiLight);

            sunLight = new THREE.DirectionalLight(0xffffff, 3.5);
            sunLight.position.set(200, 400, 200);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 4096;
            sunLight.shadow.mapSize.height = 4096;
            sunLight.shadow.camera.left = -200;
            sunLight.shadow.camera.right = 200;
            sunLight.shadow.camera.top = 200;
            sunLight.shadow.camera.bottom = -200;
            sunLight.shadow.camera.far = 1500;
            sunLight.shadow.bias = -0.00005;
            scene.add(sunLight);

            initSky();
            createClouds();

            raycaster = new THREE.Raycaster();

            createNaturalIsland();
            createHighDetailCity();
            createProductNodes();
            createRealisticTraffic();
            createLivePedestrians();
            
            scene.add(worldGroup);

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);

            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').remove(), 800);
            }, 3500);
        }

        function initSky() {
            const sky = new Sky();
            sky.scale.setScalar(10000);
            scene.add(sky);
            const uniforms = sky.material.uniforms;
            uniforms[ 'turbidity' ].value = 10;
            uniforms[ 'rayleigh' ].value = 3;
            uniforms[ 'mieCoefficient' ].value = 0.005;
            uniforms[ 'mieDirectionalG' ].value = 0.7;
            const phi = THREE.MathUtils.degToRad( 90 - 35 );
            const theta = THREE.MathUtils.degToRad( 180 );
            const sun = new THREE.Vector3();
            sun.setFromSphericalCoords( 1, phi, theta );
            uniforms[ 'sunPosition' ].value.copy( sun );
        }

        function createClouds() {
            for(let i = 0; i < 15; i++) {
                const cloud = new THREE.Group();
                const count = 5 + Math.random() * 5;
                for(let j = 0; j < count; j++) {
                    const puff = new THREE.Mesh(
                        new THREE.SphereGeometry(5 + Math.random() * 5, 8, 8),
                        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 })
                    );
                    puff.position.set(j * 5, Math.random() * 5, Math.random() * 5);
                    cloud.add(puff);
                }
                cloud.position.set(
                    (Math.random() - 0.5) * 800,
                    150 + Math.random() * 100,
                    (Math.random() - 0.5) * 800
                );
                cloud.userData = { speed: 0.1 + Math.random() * 0.2 };
                cloudGroup.add(cloud);
            }
            scene.add(cloudGroup);
        }

        function createNaturalIsland() {
            const island = new THREE.Group();
            
            // Layered Floating Rock (Replacing the "black plate")
            const rockMat = new THREE.MeshStandardMaterial({ 
                color: 0x64748b, 
                roughness: 0.9, 
                metalness: 0.2,
                flatShading: true
            });

            // Main tiered floating foundation
            for(let i = 0; i < 4; i++) {
                const radius = 120 - i * 15;
                const height = 8 + Math.random() * 5;
                const geo = new THREE.CylinderGeometry(radius, radius * 1.1, height, 8 + i * 2);
                const mesh = new THREE.Mesh(geo, rockMat);
                mesh.position.y = -height/2 - (i * 10);
                mesh.rotation.y = Math.random() * Math.PI;
                island.add(mesh);
            }

            // Stalactite / Jagged bottom
            const jaggedGeo = new THREE.ConeGeometry(80, 150, 6);
            const jagged = new THREE.Mesh(jaggedGeo, rockMat);
            jagged.rotation.x = Math.PI;
            jagged.position.y = -100;
            island.add(jagged);

            // Top Surface - Grass & Concrete
            const surfaceGeo = new THREE.CylinderGeometry(118, 118, 1, 64);
            const surfaceMat = new THREE.MeshStandardMaterial({ color: COLORS.grass, roughness: 1 });
            const surface = new THREE.Mesh(surfaceGeo, surfaceMat);
            surface.receiveShadow = true;
            island.add(surface);

            // Urban Pavement Path
            const ringGeo = new THREE.TorusGeometry(95, 8, 4, 64);
            const ringMat = new THREE.MeshStandardMaterial({ color: COLORS.concrete });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            ring.position.y = 0.6;
            ring.receiveShadow = true;
            island.add(ring);

            // Driving Road
            const roadGeo = new THREE.TorusGeometry(85, 4.5, 4, 64);
            const roadMat = new THREE.MeshStandardMaterial({ color: COLORS.road, roughness: 0.6 });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = Math.PI / 2;
            road.position.y = 0.7;
            road.receiveShadow = true;
            island.add(road);

            worldGroup.add(island);
        }

        function createHighDetailCity() {
            // Diverse Architecture
            const count = 45;
            for(let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                const dist = 20 + Math.random() * 45;
                const x = Math.cos(angle) * dist;
                const z = Math.sin(angle) * dist;
                
                const w = 5 + Math.random() * 5;
                const h = 20 + Math.random() * 50;
                const type = Math.floor(Math.random() * 3); // 0: Octagon, 1: Slanted, 2: Tiered
                
                const building = createComplexArchitecture(w, h, type);
                building.position.set(x, 0, z);
                cityGroup.add(building);
                buildings.push(building);
            }

            // Mitanshu Bhasin Signature Tower
            const founder = createFounderSpire();
            cityGroup.add(founder);
            buildings.push(founder);

            worldGroup.add(cityGroup);
        }

        function createComplexArchitecture(w, h, type) {
            const group = new THREE.Group();
            let geo;
            
            if(type === 0) { // Octagonal Corporate
                geo = new THREE.CylinderGeometry(w/2, w/2, h, 8);
            } else if(type === 1) { // Slanted Tech
                geo = new THREE.BoxGeometry(w, h, w);
                const pos = geo.attributes.position;
                for(let i = 0; i < pos.count; i++) {
                    if(pos.getY(i) > 0) {
                        pos.setX(i, pos.getX(i) + 2);
                        pos.setZ(i, pos.getZ(i) + 2);
                    }
                }
            } else { // Tiered Residential
                const tiers = 3;
                for(let i = 0; i < tiers; i++) {
                    const th = h / tiers;
                    const tw = w - i * 1.5;
                    const tmesh = new THREE.Mesh(
                        new THREE.BoxGeometry(tw, th, tw),
                        new THREE.MeshStandardMaterial({ color: 0x0f172a, metalness: 0.9, roughness: 0.1 })
                    );
                    tmesh.position.y = (th * i) + th/2;
                    tmesh.castShadow = true;
                    group.add(tmesh);
                    
                    // Glass Balcony for this tier
                    const bgeo = new THREE.BoxGeometry(tw + 0.5, 0.5, tw + 0.5);
                    const bmesh = new THREE.Mesh(bgeo, new THREE.MeshPhysicalMaterial({ color: 0x60a5fa, transparent: true, opacity: 0.5 }));
                    bmesh.position.y = th * (i+1);
                    group.add(bmesh);
                }
            }

            if(type < 2) {
                const core = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0x0f172a, metalness: 0.8, roughness: 0.2 }));
                core.position.y = h/2;
                core.castShadow = true;
                group.add(core);

                // External Glass Lattice
                const glass = new THREE.Mesh(geo, new THREE.MeshPhysicalMaterial({
                    color: 0xbfdbfe,
                    transmission: 0.5,
                    transparent: true,
                    opacity: 0.6,
                    thickness: 1,
                    metalness: 0.9,
                    roughness: 0.05
                }));
                glass.scale.set(1.05, 1, 1.05);
                glass.position.y = h/2;
                group.add(glass);
                
                // Antennas / Heli-pads
                if(Math.random() > 0.5) {
                    const antenna = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 10), new THREE.MeshStandardMaterial({ color: 0xffffff }));
                    antenna.position.y = h + 5;
                    group.add(antenna);
                }
            }

            const shell = new THREE.Mesh(new THREE.BoxGeometry(w*1.5, h*1.1, w*1.5), new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 }));
            shell.position.y = h/2;
            shell.name = "hover_shell";
            group.add(shell);

            group.userData = { name: "Futuristic Urban Node", description: "Advanced structural design for Explyra City." };
            return group;
        }

        function createFounderSpire() {
            const group = new THREE.Group();
            const h = 85;
            const w = 10;
            
            // Grand Triple-Helix Tiered Spire
            for(let i = 0; i < 5; i++) {
                const th = h / 5;
                const tw = w - i * 1.5;
                const mesh = new THREE.Mesh(
                    new THREE.CylinderGeometry(tw - 1, tw, th, 12),
                    new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 1, roughness: 0.05 })
                );
                mesh.position.y = (th * i) + th/2;
                mesh.castShadow = true;
                group.add(mesh);
                
                // Chrome Rings
                const rgeo = new THREE.TorusGeometry(tw + 0.5, 0.2, 8, 32);
                const rmesh = new THREE.Mesh(rgeo, new THREE.MeshStandardMaterial({ color: 0x94a3b8, metalness: 1 }));
                rmesh.rotation.x = Math.PI/2;
                rmesh.position.y = th * (i+1);
                group.add(rmesh);
            }

            // Top Jewel Antenna
            const needle = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.3, 20), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            needle.position.y = h + 10;
            group.add(needle);

            const label = createLabel("Founder: Mitanshu Bhasin");
            label.position.set(0, h + 25, 0);
            group.add(label);

            const shell = new THREE.Mesh(new THREE.BoxGeometry(w+5, h+30, w+5), new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 }));
            shell.position.y = h/2;
            shell.name = "hover_shell";
            group.add(shell);

            group.userData = { name: "Mitanshu Bhasin Spire", description: "The architectural pinnacle of the ecosystem." };
            return group;
        }

        function createProductNodes() {
            PRODUCT_ZONES.forEach(zone => {
                const group = new THREE.Group();
                group.position.set(zone.pos.x, 0, zone.pos.z);
                
                const h = 30 + Math.random() * 15;
                const building = createComplexArchitecture(10, h, 0);
                building.children[0].material.color.set(zone.color);
                building.userData = { name: zone.name, description: "Official High-Speed Hub for " + zone.name };
                group.add(building);
                buildings.push(building);

                const label = createLabel(zone.name);
                label.position.set(0, h + 15, 0);
                group.add(label);

                worldGroup.add(group);
            });
        }

        function createRealisticTraffic() {
            for(let i = 0; i < 35; i++) {
                const type = Math.random();
                let vehicle;
                if(type > 0.8) vehicle = createDetailedTruck();
                else if(type > 0.4) vehicle = createDetailedCar(Math.random() > 0.5 ? 0x1e40af : 0xf1f5f9);
                else vehicle = createDetailedShuttle(0xffffff);

                vehicle.userData = {
                    angle: Math.random() * Math.PI * 2,
                    speed: 0.003 + Math.random() * 0.005,
                    radius: 85 + (Math.random() - 0.5) * 3
                };
                vehicles.push(vehicle);
                trafficGroup.add(vehicle);
            }
            worldGroup.add(trafficGroup);
        }

        function createDetailedTruck() {
            const group = new THREE.Group();
            // Wheels
            const wgeo = new THREE.CylinderGeometry(0.3, 0.3, 0.2, 12);
            wgeo.rotateZ(Math.PI/2);
            const wmat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            for(let i = 0; i < 6; i++) {
                const w = new THREE.Mesh(wgeo, wmat);
                w.position.set(i % 2 === 0 ? 0.8 : -0.8, -0.2, (i < 2 ? -1.5 : (i < 4 ? 0 : 1.5)));
                group.add(w);
            }
            // Cab & Body
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2, 4), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            body.position.y = 1;
            body.castShadow = true;
            group.add(body);
            const cab = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1, 1.2), new THREE.MeshStandardMaterial({ color: 0x334155 }));
            cab.position.set(0, 0.5, 2);
            group.add(cab);
            return group;
        }

        function createDetailedCar(color) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.6, 2.5), new THREE.MeshStandardMaterial({ color: color }));
            body.position.y = 0.3;
            body.castShadow = true;
            group.add(body);
            const roof = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 1.2), new THREE.MeshPhysicalMaterial({ color: 0x0f172a, transmission: 0.2, transparent: true }));
            roof.position.set(0, 0.8, -0.2);
            group.add(roof);
            // Wheels
            const wgeo = new THREE.CylinderGeometry(0.25, 0.25, 0.15, 12);
            wgeo.rotateZ(Math.PI/2);
            for(let i = 0; i < 4; i++) {
                const w = new THREE.Mesh(wgeo, new THREE.MeshStandardMaterial({ color: 0x000000 }));
                w.position.set(i % 2 === 0 ? 0.65 : -0.65, 0, (i < 2 ? 0.8 : -0.8));
                group.add(w);
            }
            return group;
        }

        function createDetailedShuttle(color) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 2, 8, 12), new THREE.MeshStandardMaterial({ color: color, metalness: 1, roughness: 0.1 }));
            body.rotation.z = Math.PI/2;
            body.position.y = 0.6;
            body.castShadow = true;
            group.add(body);
            return group;
        }

        function createLivePedestrians() {
            for(let i = 0; i < 60; i++) {
                const h = createDetailedHuman();
                h.userData = {
                    angle: Math.random() * Math.PI * 2,
                    speed: 0.001 + Math.random() * 0.003,
                    radius: 95 + (Math.random() - 0.5) * 6,
                    offset: Math.random() * Math.PI * 2
                };
                humans.push(h);
                humanGroup.add(h);
            }
            worldGroup.add(humanGroup);
        }

        function createDetailedHuman() {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 1), new THREE.MeshStandardMaterial({ color: 0x1e293b }));
            body.position.y = 0.7;
            group.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshStandardMaterial({ color: 0xffd8a8 }));
            head.position.y = 1.35;
            group.add(head);
            const legGeo = new THREE.BoxGeometry(0.12, 0.6, 0.12);
            const lLeg = new THREE.Mesh(legGeo, new THREE.MeshStandardMaterial({ color: 0x020617 }));
            lLeg.position.set(-0.1, 0.3, 0);
            group.add(lLeg);
            const rLeg = new THREE.Mesh(legGeo, new THREE.MeshStandardMaterial({ color: 0x020617 }));
            rLeg.position.set(0.1, 0.3, 0);
            group.add(rLeg);
            group.castShadow = true;
            return group;
        }

        function createLabel(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512;
            canvas.height = 128;
            ctx.font = 'bold 42px Outfit, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#1e3a8a';
            ctx.fillText(text, 256, 80);
            const texture = new THREE.CanvasTexture(canvas);
            const mat = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(mat);
            sprite.scale.set(22, 6, 1);
            return sprite;
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(buildings, true);
            if(intersects.length > 0) {
                let target = intersects[0].object;
                while(target.parent && !buildings.includes(target)) target = target.parent;
                if(hoveredObject !== target) {
                    if(hoveredObject) setHighlight(hoveredObject, false);
                    hoveredObject = target;
                    setHighlight(hoveredObject, true);
                    showTooltip(event.clientX, event.clientY, hoveredObject.userData.name, hoveredObject.userData.description);
                }
            } else {
                if(hoveredObject) setHighlight(hoveredObject, false);
                hoveredObject = null;
                hideTooltip();
            }
        }

        function setHighlight(obj, active) {
            const shell = obj.getObjectByName('hover_shell');
            if(shell) {
                shell.material.opacity = active ? 0.3 : 0;
                shell.material.color.set(0x3b82f6);
            }
        }

        function showTooltip(x, y, title, desc) {
            const el = document.getElementById('tooltip');
            el.style.display = 'block';
            el.style.left = (x + 25) + 'px';
            el.style.top = (y + 25) + 'px';
            el.innerHTML = `<strong>${title}</strong><br><small style="opacity:0.8">${desc}</small>`;
        }

        function hideTooltip() {
            document.getElementById('tooltip').style.display = 'none';
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            worldGroup.position.y = Math.sin(time * 0.2) * 1.5;

            // Clouds drift
            cloudGroup.children.forEach(c => {
                c.position.x += c.userData.speed;
                if(c.position.x > 500) c.position.x = -500;
            });

            // Vehicles with subtle banking
            vehicles.forEach(v => {
                v.userData.angle += v.userData.speed;
                v.position.x = Math.cos(v.userData.angle) * v.userData.radius;
                v.position.z = Math.sin(v.userData.angle) * v.userData.radius;
                v.rotation.y = -v.userData.angle + Math.PI/2;
            });

            // Humans Walking
            humans.forEach((h, i) => {
                h.userData.angle += h.userData.speed;
                h.position.x = Math.cos(h.userData.angle) * h.userData.radius;
                h.position.z = Math.sin(h.userData.angle) * h.userData.radius;
                h.rotation.y = -h.userData.angle;

                const swing = Math.sin(time * 12 + h.userData.offset) * 0.4;
                h.children[2].rotation.x = swing;
                h.children[3].rotation.x = -swing;
            });

            // Interactive Camera Tilt
            camera.position.x += (mouse.x * 10 - (camera.position.x - 130)) * 0.02;
            camera.position.y += (mouse.y * 10 - (camera.position.y - 100)) * 0.02;

            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
