    <style>
        :root {
            /* Explyra Theme Variables (Dark Default) */
            --primary: #080B14;
            --secondary: #141928;
            --accent: #F472B6;
            --accent-hover: #FBCFE8;
            --accent-grad: linear-gradient(135deg, #F472B6 0%, #A78BFA 100%);
            --text: #EEF0F8;
            --text-muted: #94A3B8;
            --danger: #ef4444;
            --success: #10b981;
            --glass-bg: rgba(20, 25, 40, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            --input-bg: rgba(0, 0, 0, 0.5);
            --reticle-color: #F472B6;
        }

        /* Light Mode Variables */
        body.light-mode {
            --primary: #F8F7F4;
            --secondary: #ffffff;
            --accent: #BE185D;
            --accent-hover: #9D174D;
            --accent-grad: linear-gradient(135deg, #BE185D 0%, #6D28D9 100%);
            --text: #0D1117;
            --text-muted: #586070;
            --danger: #ef4444;
            --success: #10b981;
            --glass-bg: rgba(255, 255, 255, 0.85);
            /* Lighter Glass */
            --glass-border: rgba(0, 0, 0, 0.1);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            --input-bg: rgba(255, 255, 255, 0.6);
            --reticle-color: #BE185D;
        }

        /* Base Resets */
        body {
            background-color: var(--primary);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            transition: background-color 0.3s, color 0.3s;
            touch-action: none;
            /* Disables browser zoom/scroll gestures */
        }

        video {
            object-fit: cover;
            width: 100%;
            height: 100%;
            transform: scaleX(1);
            /* Ensure no mirroring by default for back cam */
        }

        /* Admin Style Components */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            transition: background 0.3s, border-color 0.3s;
        }

        .btn-primary {
            background: var(--accent-grad);
            color: var(--primary);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            touch-action: manipulation;
        }

        body.light-mode .btn-primary {
            color: #ffffff;
        }

        .btn-primary:active {
            transform: scale(0.95);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .btn-secondary {
            background: var(--secondary);
            border: 1px solid var(--glass-border);
            color: var(--text);
            transition: all 0.2s;
        }

        .btn-secondary:active {
            transform: scale(0.95);
            background: var(--glass-border);
        }

        .form-input {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.3s, background 0.3s, color 0.3s;
        }

        .form-input:focus {
            border-color: var(--accent);
        }

        /* Mode Badge */
        .mode-badge {
            background: rgba(244, 114, 182, 0.1);
            border: 1px solid rgba(244, 114, 182, 0.3);
            color: var(--accent);
            font-weight: 800;
            letter-spacing: 1.5px;
        }

        body.light-mode .mode-badge {
            background: rgba(0, 0, 0, 0.05);
            border-color: rgba(0, 0, 0, 0.1);
            color: var(--text);
        }

        /* Animations */
        .reticle-pulse {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
            will-change: transform, opacity;
        }

        @keyframes pulse-ring {
            0% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0.5;
                border-color: var(--reticle-color);
            }

            50% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 1;
                border-color: var(--secondary);
            }

            100% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0.5;
                border-color: var(--reticle-color);
            }
        }

        /* SVG Styles */
        .svg-shadow {
            filter: drop-shadow(2px 2px 3px rgba(0, 0, 0, 0.9));
        }

        body.light-mode .svg-shadow {
            filter: drop-shadow(1px 1px 2px rgba(255, 255, 255, 0.8));
        }

        /* Floating measurement label */
        .measure-label {
            background: var(--accent-grad);
            color: var(--primary);
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        body.light-mode .measure-label {
            color: white;
        }

        body.light-mode .btn-float {
            background: rgba(255, 255, 255, 0.8);
            color: var(--text);
            border-color: var(--glass-border);
        }

        /* Safe Area Handling for iOS Notch */
        .safe-top {
            padding-top: env(safe-area-inset-top, 20px);
        }

        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
    </style>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // --- Variables ---
        let stream = null;
        let points = [];
        let mode = 'calibrate';
        let facingMode = 'environment';
        let calibrationFactor = null;
        let tempDistance = 0;
        let calibrationLength = 10;

        // --- DOM Elements ---
        const videoEl = document.getElementById('camera-feed');
        const svgEl = document.getElementById('drawing-board');
        const touchLayer = document.getElementById('touch-layer');
        const panelCalibrate = document.getElementById('panel-calibrate');
        const panelMeasure = document.getElementById('panel-measure');
        const modeBadge = document.getElementById('mode-badge');
        const calibrateHint = document.getElementById('calibrate-hint');
        const btnCalibrate = document.getElementById('btn-calibrate');
        const displayDistance = document.getElementById('display-distance');
        const inputCalibration = document.getElementById('calibration-input');
        const btnAddPoint = document.getElementById('btn-add-point');
        const themeIcon = document.getElementById('theme-icon');
        const themeText = document.getElementById('theme-text');
        const errorMsg = document.getElementById('error-msg');
        const errorText = document.getElementById('error-text');

        // --- Init ---
        lucide.createIcons();

        // --- Theme Logic ---
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');

            // Update Icon
            if (isLight) {
                themeIcon.setAttribute('data-lucide', 'moon');
                themeText.innerText = "Dark";
            } else {
                themeIcon.setAttribute('data-lucide', 'sun');
                themeText.innerText = "Light";
            }
            lucide.createIcons();
        }

        // --- Camera ---
        async function startCamera() {
            if (stream) stream.getTracks().forEach(track => track.stop());

            const isMobile = window.innerWidth < 768;

            try {
                // Constraints optimized for devices
                const constraints = {
                    video: {
                        facingMode: { ideal: facingMode },
                        // Desktop gets Full HD, Mobile gets whatever is native/stable
                        width: { ideal: isMobile ? 1280 : 1920 },
                        height: { ideal: isMobile ? 720 : 1080 }
                    }
                };

                stream = await navigator.mediaDevices.getUserMedia(constraints);
                videoEl.srcObject = stream;

                // IMPORTANT for iOS: Ensure video plays
                videoEl.onloadedmetadata = () => {
                    videoEl.play().catch(e => console.log("Play error", e));
                };

                errorMsg.classList.add('hidden');
            } catch (err) {
                console.error("Camera Error:", err);
                errorMsg.classList.remove('hidden');
                if (err.name === 'NotAllowedError') {
                    errorText.innerText = "Permission Denied. Enable Camera in Settings.";
                } else if (err.name === 'NotFoundError') {
                    errorText.innerText = "No Camera Found.";
                } else {
                    errorText.innerText = "Camera Error: " + err.name;
                }
            }
        }

        function toggleCamera() {
            facingMode = facingMode === 'environment' ? 'user' : 'environment';
            startCamera();
        }

        // --- Math & Logic ---
        function getPixelDistance(p1, p2) {
            return Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));
        }

        function getMidPoint(p1, p2) {
            return { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };
        }

        function addPoint(x, y) {
            if (points.length < 2) {
                points.push({ x, y });
                renderOverlay();
                updateUIState();
            }
        }

        // Handle Touch and Click uniformly
        function handleInput(e) {
            // Prevent default only if necessary, but here we want standard tapping
            const rect = touchLayer.getBoundingClientRect();
            let clientX, clientY;

            if (e.type === 'touchstart') {
                // e.preventDefault(); // Prevents mouse emulation but might break scroll if needed (hidden overflow here so ok)
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            addPoint(clientX - rect.left, clientY - rect.top);
        }

        // Using click covers both mouse and simple touch, 
        // but touchstart is faster on mobile (no 300ms delay)
        touchLayer.addEventListener('click', handleInput);
        // If we add touchstart, we must debounce or prevent default to avoid double firing
        // Simple strategy: Just use click with 'touch-action: manipulation' in CSS handles the delay.

        function handleCenterAdd() {
            if (points.length >= 2) return;
            const rect = videoEl.getBoundingClientRect();
            // Add point relative to container
            // Since video object-fit: cover, center is always safe
            addPoint(rect.width / 2, rect.height / 2);
        }

        // --- Rendering ---
        function renderOverlay() {
            let html = '';
            // Determine stroke color based on mode
            const isLight = document.body.classList.contains('light-mode');
            const strokeColor = isLight ? '#BE185D' : '#F472B6';
            const circleFill = isLight ? 'rgba(190, 24, 93, 0.1)' : 'rgba(244, 114, 182, 0.3)';

            if (points.length === 2) {
                const p1 = points[0];
                const p2 = points[1];

                html += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="${strokeColor}" stroke-width="3" stroke-dasharray="5,5" />`;

                const pxDist = getPixelDistance(p1, p2);
                let labelText = "";

                if (mode === 'calibrate') {
                    tempDistance = pxDist;
                    labelText = "Reference";
                } else if (mode === 'measure' && calibrationFactor) {
                    const cm = (pxDist / calibrationFactor).toFixed(2);
                    labelText = `${cm} cm`;
                    displayDistance.innerText = cm;
                }

                if (mode === 'measure' && labelText) {
                    const mid = getMidPoint(p1, p2);
                    html += `
                        <foreignObject x="${mid.x - 50}" y="${mid.y - 15}" width="100" height="30">
                            <div xmlns="http://www.w3.org/1999/xhtml" class="measure-label text-center">
                                ${labelText}
                            </div>
                        </foreignObject>
                    `;
                }
            }

            points.forEach(p => {
                html += `
                    <circle cx="${p.x}" cy="${p.y}" r="8" fill="${circleFill}" stroke="${strokeColor}" stroke-width="2" />
                    <circle cx="${p.x}" cy="${p.y}" r="3" fill="#ffffff" />
                `;
            });

            svgEl.innerHTML = html;
        }

        function updateUIState() {
            renderOverlay();

            if (mode === 'calibrate') {
                if (points.length === 0) calibrateHint.innerHTML = '<i data-lucide="mouse-pointer-2" class="inline w-3 h-3 mr-1"></i> TAP START POINT';
                else if (points.length === 1) calibrateHint.innerHTML = '<i data-lucide="mouse-pointer-2" class="inline w-3 h-3 mr-1"></i> TAP END POINT';
                else calibrateHint.innerHTML = '<i data-lucide="check-circle" class="inline w-3 h-3 mr-1"></i> READY TO CALIBRATE';

                if (points.length === 2) {
                    btnCalibrate.disabled = false;
                } else {
                    btnCalibrate.disabled = true;
                }
            } else {
                if (points.length >= 2) {
                    btnAddPoint.style.opacity = "0.5";
                    btnAddPoint.style.filter = "grayscale(1)";
                } else {
                    btnAddPoint.style.opacity = "1";
                    btnAddPoint.style.filter = "none";
                }
            }
            lucide.createIcons();
        }

        // --- Controls ---
        function confirmCalibration() {
            calibrationLength = parseFloat(inputCalibration.value) || 10;
            if (points.length === 2 && tempDistance > 0) {
                calibrationFactor = tempDistance / calibrationLength;

                mode = 'measure';
                resetPoints();

                modeBadge.style.borderColor = "#2ed573";
                modeBadge.style.backgroundColor = "rgba(46, 213, 115, 0.1)";
                modeBadge.querySelector('span').innerText = "MEASURING";
                modeBadge.querySelector('span').style.color = "#2ed573";

                panelCalibrate.classList.add('hidden');
                panelMeasure.classList.remove('hidden');
            }
        }

        function resetPoints() {
            points = [];
            displayDistance.innerText = "0.00";
            renderOverlay();
            updateUIState();
        }

        function fullReset() {
            resetPoints();
            calibrationFactor = null;
            mode = 'calibrate';

            modeBadge.style.borderColor = "";
            modeBadge.style.backgroundColor = "";
            modeBadge.querySelector('span').innerText = "CALIBRATE";
            modeBadge.querySelector('span').style.color = "";

            panelMeasure.classList.add('hidden');
            panelCalibrate.classList.remove('hidden');
        }

        function exitTool() {
            if (window.history.length > 1) window.history.back();
            else alert("Please close this tab to exit.");
        }

        // Theme Change Observer
        const observer = new MutationObserver(function (mutations) {
            mutations.forEach(function (mutation) {
                if (mutation.attributeName === "class") {
                    renderOverlay();
                }
            });
        });
        observer.observe(document.body, { attributes: true });

        // Force icons to load initially
        window.addEventListener('load', () => {
            startCamera();
            updateUIState();
        });

    </script>
</body>

</html>
